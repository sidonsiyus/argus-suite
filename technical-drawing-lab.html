<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Drawing Lab · CATIA V5 · 24PBAV32</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --red:#e01625; --red-dk:#a50f1a; --red-soft:#fbe3e4;
  --navy:#100a0b; --steel:#6b4f52; --line:#e6dedc; --cyan:#c0202f;
  --paper:#f4f1f0; --paper-2:#ebe5e4; --ink:#150e0d; --ink-soft:#6b5c5a;
  --card:#ffffff; --shadow:0 12px 34px rgba(20,8,8,.12);
  --grid:rgba(190,25,35,.06); --ok:#1f9d57; --bad:#e01625; --amber:#c98a12;
  --radius:14px;
  --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
html[data-theme="night"]{
  --paper:#0a0607; --paper-2:#1a1113; --card:#170f10; --ink:#f7efee; --ink-soft:#cbb4b2;
  --navy:#050303; --steel:#c99a9a; --line:#332527; --cyan:#ff5560;
  --grid:rgba(255,55,65,.05); --red-soft:#2a1315; --shadow:0 16px 44px rgba(0,0,0,.65);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--ink); background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px; line-height:1.55; -webkit-font-smoothing:antialiased;
  transition:background-color .3s,color .3s;
}
a{color:var(--cyan)}
.wrap{max-width:1120px;margin:0 auto;padding:0 18px}

/* ---------- Header ---------- */
header.top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--card),color-mix(in srgb,var(--card) 92%,transparent));
  backdrop-filter:blur(8px);border-bottom:2px solid var(--red)}
.topbar{display:flex;align-items:center;gap:14px;padding:11px 0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.logo .mark{display:flex;align-items:center;gap:2px;font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:-.5px}
.logo .mh{background:var(--ink);color:var(--paper);padding:2px 7px;border-radius:6px 2px 6px 2px}
.logo .ck{color:var(--red);border-bottom:2px solid var(--red);padding-bottom:1px}
.logo .wing{color:var(--red);font-size:20px;transform:translateY(-1px)}
.logo small{display:block;font-family:var(--mono);font-size:10px;color:var(--ink-soft);letter-spacing:1px;margin-top:1px}
.top-spacer{flex:1}
.icon-btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 12px;
  font-family:var(--mono);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.progress-mini{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.pm-bar{width:120px;height:7px;border-radius:6px;background:var(--paper-2);overflow:hidden;border:1px solid var(--line)}
.pm-fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--red-dk));transition:width .5s}

/* announcement */
.announce{display:none;background:var(--red);color:#fff;font-size:13px;text-align:center;padding:7px 14px;font-weight:500}
.announce.show{display:block}

/* ---------- Tabs ---------- */
.tabscroll{position:sticky;top:56px;z-index:30;background:var(--paper);border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:9px 0;scrollbar-width:thin}
.tabs::-webkit-scrollbar{height:6px}
.tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
.tab{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:20px;
  padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px;font-family:var(--body)}
.tab .num{font-family:var(--mono);font-size:10px;background:var(--paper-2);color:var(--ink-soft);border-radius:5px;padding:1px 5px}
.tab:hover{border-color:var(--red)}
.tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.tab.active .num{background:var(--red);color:#fff}
.tab.done{border-color:var(--ok)}
.tab.done::after{content:"✓";color:var(--ok);font-weight:700}
.tab.final{background:linear-gradient(90deg,var(--red),var(--red-dk));color:#fff;border-color:transparent}
.tab.final.active{outline:2px solid var(--ink)}

/* ---------- Panels ---------- */
.panel{display:none;padding:26px 0 70px;animation:fade .35s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* home */
.hero{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:34px 30px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px}
.hero-blob{position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:var(--red);border-radius:50%;opacity:.9}
.hero-content{position:relative;z-index:2;max-width:640px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:#ffd2d7;text-transform:uppercase}
.hero h1{font-family:var(--disp);font-size:clamp(30px,6vw,52px);line-height:1;margin:10px 0 6px;letter-spacing:-1px}
.hero .sub{font-size:16px;color:#cdd8e4;max-width:520px}
.hero .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 12px;font-size:12px;font-family:var(--mono)}
.hero-cta{margin-top:18px;display:inline-flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:11px 20px;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--body);transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn.primary{background:var(--red);color:#fff}
.btn.primary:hover{background:var(--red-dk)}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.35)}
.btn.ghost:hover{border-color:#fff}
.btn.dark{background:var(--ink);color:var(--paper)}
.btn.dark:hover{background:#22384c}
.btn:disabled{opacity:.45;cursor:not-allowed}

.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:22px}
.excard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.excard:hover{transform:translateY(-3px);border-color:var(--red);box-shadow:var(--shadow)}
.excard .exn{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:700}
.excard h3{font-family:var(--disp);font-size:16px;margin:6px 0 4px;line-height:1.15}
.excard p{font-size:12.5px;color:var(--ink-soft);margin:0}
.excard .skills{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
.excard .skills span{font-family:var(--mono);font-size:9.5px;background:var(--paper-2);color:var(--ink-soft);padding:2px 6px;border-radius:4px}
.excard .state{position:absolute;top:12px;right:12px;font-size:11px;font-family:var(--mono)}
.excard .state.done{color:var(--ok)}

.section-title{font-family:var(--disp);font-size:22px;margin:0 0 4px;display:flex;align-items:center;gap:10px}
.section-title .bar{width:26px;height:4px;background:var(--red);border-radius:3px}
.muted{color:var(--ink-soft);font-size:13.5px}

/* experiment header */
.exhead{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--red);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow)}
.exhead .tag{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--red);background:var(--red-soft);padding:3px 9px;border-radius:6px;display:inline-block}
.exhead h2{font-family:var(--disp);font-size:26px;margin:10px 0 4px;line-height:1.1}
.exhead .oneliner{color:var(--ink-soft);margin:0 0 14px}
.info2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.info2{grid-template-columns:1fr}}
.infobox{background:var(--paper-2);border-radius:10px;padding:12px 14px;font-size:13px}
.infobox h4{margin:0 0 5px;font-size:11px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--cyan)}
.infobox.aim h4{color:var(--red)}
.cmds{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px}
.cmds .c{font-family:var(--mono);font-size:11px;background:var(--card);border:1px solid var(--line);color:var(--ink);padding:3px 8px;border-radius:6px}
.cmds .c.hot{border-color:var(--red);color:var(--red)}

/* stepper */
.stepwrap{margin-top:20px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.stepbar{display:flex;gap:0;background:var(--paper-2);border-bottom:1px solid var(--line);overflow-x:auto}
.stepdot{flex:0 0 auto;padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);cursor:pointer;border-right:1px solid var(--line);position:relative;white-space:nowrap;transition:.15s}
.stepdot:hover{color:var(--red)}
.stepdot.active{background:var(--card);color:var(--red);font-weight:700}
.stepdot.active::after{content:"";position:absolute;left:0;bottom:-1px;width:100%;height:3px;background:var(--red)}
.stepdot.seen::before{content:"✓ ";color:var(--ok)}
.stepbody{display:grid;grid-template-columns:1.05fr .95fr;gap:0}
@media(max-width:780px){.stepbody{grid-template-columns:1fr}}
.stepviz{background:var(--navy);position:relative;min-height:320px;display:flex;align-items:center;justify-content:center;padding:16px}
html[data-theme="night"] .stepviz{background:#050303}
.stepviz svg{width:100%;height:auto;max-height:340px}
.viz-caption{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10.5px;color:#9db8d4}
.steptext{padding:20px 22px}
.steptext .sc{font-family:var(--mono);font-size:11px;color:var(--red)}
.steptext h3{font-family:var(--disp);font-size:19px;margin:5px 0 10px}
.steptext p{font-size:14px;margin:0 0 12px}
.steptext .valpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.steptext .valpills b{font-family:var(--mono);font-size:11px;background:var(--red-soft);color:var(--red-dk);padding:3px 8px;border-radius:6px;font-weight:600}
html[data-theme="night"] .steptext .valpills b{color:#ff9aa4}
.tip{background:color-mix(in srgb,var(--amber) 12%,var(--card));border:1px solid color-mix(in srgb,var(--amber) 30%,transparent);border-radius:9px;padding:9px 12px;font-size:12.5px}
.tip b{color:var(--amber)}
.stepnav{display:flex;justify-content:space-between;align-items:center;padding:12px 22px;border-top:1px solid var(--line);background:var(--paper-2)}
.stepnav .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}

/* quiz */
.quizwrap{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.quizhead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.quizhead h3{font-family:var(--disp);font-size:20px;margin:0}
.qmeta{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.setpick{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 4px}
.setbtn{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:8px;padding:6px 12px;cursor:pointer}
.setbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.q{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:12px 0}
.q .qq{font-weight:600;font-size:14.5px;margin-bottom:10px}
.q .qq .qn{font-family:var(--mono);color:var(--red);margin-right:6px}
.opt{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin:6px 0;cursor:pointer;font-size:13.5px;transition:.12s;background:var(--card)}
.opt:hover{border-color:var(--cyan)}
.opt .mk{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono)}
.opt.sel{border-color:var(--cyan)}
.opt.sel .mk{border-color:var(--cyan);background:var(--cyan);color:#fff}
.opt.correct{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 10%,var(--card))}
.opt.correct .mk{border-color:var(--ok);background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 10%,var(--card))}
.opt.wrong .mk{border-color:var(--bad);background:var(--bad);color:#fff}
.opt.lock{pointer-events:none}
.qfoot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:16px}
.scorebox{font-family:var(--mono);font-size:14px}
.scorebox .big{font-size:22px;font-weight:700}
.result-banner{border-radius:11px;padding:14px 16px;margin-top:14px;display:none;font-size:14px}
.result-banner.pass{display:block;background:color-mix(in srgb,var(--ok) 12%,var(--card));border:1px solid var(--ok);color:var(--ink)}
.result-banner.fail{display:block;background:color-mix(in srgb,var(--bad) 10%,var(--card));border:1px solid var(--bad);color:var(--ink)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(8,16,25,.72);z-index:60;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid var(--line)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-head h3{font-family:var(--disp);margin:0;font-size:18px}
.modal-body{padding:18px 20px}
.x{border:none;background:var(--paper-2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--ink)}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px}
.admin-card{border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:12px}
.admin-card h4{font-family:var(--disp);margin:0 0 4px;font-size:15px;display:flex;align-items:center;gap:8px}
.admin-card .ic{width:26px;height:26px;border-radius:7px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:14px}
.admin-card p{font-size:12.5px;color:var(--ink-soft);margin:0 0 10px}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.statgrid .s{background:var(--paper-2);border-radius:9px;padding:10px 6px}
.statgrid .s b{display:block;font-family:var(--disp);font-size:22px;color:var(--red)}
.statgrid .s span{font-size:10px;font-family:var(--mono);color:var(--ink-soft)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.mini{font-size:12px;padding:8px 12px;border-radius:8px}

/* certificate */
.certframe{background:#fff;color:#12202e;border:12px solid var(--ink);border-radius:6px;padding:26px 26px 22px;position:relative;font-family:var(--body)}
.certframe::after{content:"";position:absolute;inset:8px;border:2px solid var(--red);border-radius:3px;pointer-events:none}
.cert-in{position:relative;text-align:center}
.cert-logo{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.5px}
.cert-logo .mh{background:#12202e;color:#fff;padding:1px 6px;border-radius:5px 2px}
.cert-logo .ck{color:var(--red)}
.cert-el{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--red);margin-top:12px}
.cert-h1{font-family:var(--disp);font-size:30px;margin:6px 0 2px}
.cert-line{width:60px;height:3px;background:var(--red);margin:8px auto}
.cert-name{font-family:var(--disp);font-size:26px;color:var(--red-dk);margin:14px 0 4px;border-bottom:2px dotted #ccc;display:inline-block;padding:0 20px 4px;min-width:260px}
.cert-body{font-size:13px;color:#3a4a5a;max-width:420px;margin:10px auto}
.cert-foot{display:flex;justify-content:space-between;margin-top:22px;font-size:11px;color:#556}
.cert-foot b{display:block;color:#12202e;font-family:var(--mono)}
.cert-seal{position:absolute;right:6px;top:0;width:70px;height:70px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--mono);font-size:8px;color:var(--red);transform:rotate(-12deg);line-height:1.2}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:10px;font-size:13.5px;z-index:80;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)} .toast.bad{background:var(--bad)}

.locknote{font-family:var(--mono);font-size:12px;color:var(--amber);margin-top:8px}
footer.foot{border-top:1px solid var(--line);padding:20px 0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}

.svg-dim{stroke:#6fa8d4;stroke-width:1}
.svg-dash{stroke-dasharray:4 3}
.pulse{animation:pl 1.6s ease-in-out infinite}
@keyframes pl{0%,100%{opacity:.35}50%{opacity:1}}
.draw path,.draw line,.draw rect,.draw circle,.draw polygon,.draw polyline{stroke-dasharray:600;stroke-dashoffset:600;animation:dr 1.1s ease forwards}
@keyframes dr{to{stroke-dashoffset:0}}
@media(prefers-reduced-motion:reduce){.draw *{animation:none;stroke-dashoffset:0}.pulse{animation:none}}

/* progressive blueprint SVG — red on black */
.stepviz{min-height:430px}
.stepviz svg{max-height:430px}
.stepviz svg text{font-family:var(--mono)}
.stepviz svg g.layer{stroke:#9a8b8c;fill:none;stroke-width:1.5;stroke-linejoin:round}
.stepviz svg g.layer text{fill:#c6b3b4;stroke:none;font-size:10px}
.stepviz svg g.layer .big{font-size:13px;fill:#e7d6d6}
.stepviz svg g.layer .fillsoft{fill:rgba(220,180,180,.08)}
.stepviz svg g.layer .fillmet{fill:rgba(220,190,190,.14)}
.stepviz svg g.layer .dim{stroke:#7a6668;stroke-width:.9}
.stepviz svg g.layer .thin{stroke-width:1}
.stepviz svg g.layer .weld{fill:#ff3b46;stroke:none}
.stepviz svg g.cur{stroke:#ff3b46;stroke-width:2.4}
.stepviz svg g.cur text{fill:#ff9198}
.stepviz svg g.cur .big{fill:#ff8088}
.stepviz svg g.cur .fillsoft{fill:rgba(255,59,70,.16)}
.stepviz svg g.cur .fillmet{fill:rgba(255,59,70,.20)}
.stepviz svg g.cur .dim{stroke:#ff7079}
.stepviz svg .axis{stroke:#513f41;stroke-width:1;stroke-dasharray:3 3}
.stepviz svg .hot{cursor:help;transition:filter .15s}
.stepviz svg g.hot:hover{filter:brightness(1.4)}
/* keep overlapping labels readable + de-emphasise stale ones */
.stepviz svg g.layer text{paint-order:stroke;stroke:#0a0708;stroke-width:3.4px;stroke-linejoin:round}
.stepviz svg g.layer:not(.cur) text{opacity:.34}
.stepviz svg g.layer:not(.cur) .big{opacity:.4}
.stepviz svg g.cur text{opacity:1}

/* svg tooltip */
#svgtip{position:fixed;z-index:90;background:#160f10;color:#ffd9db;border:1px solid var(--red);
  font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:7px;pointer-events:none;opacity:0;
  transition:opacity .12s;max-width:220px;box-shadow:0 8px 20px rgba(0,0,0,.5)}
#svgtip.show{opacity:1}
.viz-hint{position:absolute;top:8px;right:10px;font-family:var(--mono);font-size:9.5px;color:#8a6f70;letter-spacing:.5px}

/* logo emblem */
.logo .emblem{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:#17100f;border-radius:9px}
.logo .emblem svg{width:20px;height:20px}
.logo .mark{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.5px;line-height:1}
.logo .mark b{color:var(--ink)}
.logo .mark .ck{color:var(--red);margin-left:4px}
html[data-theme="night"] .logo .mark b{color:var(--ink)}

/* ---------- HOME (redesigned) ---------- */
.h-hero{position:relative;background:#0c0708;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  border:1px solid #241819}
.h-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,60,70,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,60,70,.06) 1px,transparent 1px);background-size:30px 30px}
.h-hero-inner{position:relative;display:grid;grid-template-columns:1.25fr .75fr;gap:20px;padding:40px 36px;align-items:center}
@media(max-width:760px){.h-hero-inner{grid-template-columns:1fr;padding:30px 22px}}
.h-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:#ff5560;text-transform:uppercase}
.h-hero h1{font-family:var(--disp);font-size:clamp(34px,6.5vw,60px);line-height:.98;margin:12px 0 8px;color:#fff;letter-spacing:-1.5px}
.h-hero h1 .accent{color:var(--red)}
.h-hero p{color:#cbbcbc;max-width:520px;font-size:15.5px;margin:0 0 18px}
.h-cta{display:flex;gap:10px;flex-wrap:wrap}
.h-sim-badge{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font-family:var(--mono);font-size:11px;color:#ff8087;border:1px dashed #5a2b2f;border-radius:20px;padding:5px 12px;cursor:pointer}
.h-visual{display:flex;align-items:center;justify-content:center;min-height:210px}
.h-visual svg{width:100%;max-width:280px}
.spin{transform-origin:200px 160px;animation:spin 7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.spin{animation:none}}

.workflow{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:22px 0 6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.wf-step{display:flex;align-items:center;gap:10px;flex:1;min-width:130px}
.wf-num{width:30px;height:30px;border-radius:8px;background:var(--red);color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.wf-t b{display:block;font-family:var(--disp);font-size:13px;color:var(--ink)}
.wf-t span{font-size:11px;color:var(--ink-soft)}
.wf-arrow{color:var(--red);font-size:18px;margin:0 6px;opacity:.6}
@media(max-width:680px){.wf-arrow{display:none}.wf-step{min-width:45%}}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
@media(max-width:620px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:#181010;color:#fff;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 14px;text-align:center;position:relative;overflow:hidden}
.stat b{display:block;font-family:var(--disp);font-size:30px;color:var(--red)}
.stat span{font-size:10.5px;font-family:var(--mono);letter-spacing:.5px;color:#cbbcbc}

.exthumb{background:#0c0708;border-radius:10px;height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;border:1px solid #241819}
.exthumb svg{width:100%;height:100%;transform:scale(1.05)}

/* ---------- SIMULATOR ---------- */
.simintro{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--red);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:20px}
.simintro h2{font-family:var(--disp);font-size:24px;margin:6px 0 4px}
.simcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.simcard-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.simcard-head h3{font-family:var(--disp);margin:0;font-size:18px}
.simcard-head .tie{font-family:var(--mono);font-size:10.5px;color:var(--red);background:var(--red-soft);padding:3px 8px;border-radius:6px}
.simbody{display:grid;grid-template-columns:1.1fr .9fr;gap:0}
@media(max-width:760px){.simbody{grid-template-columns:1fr}}
.simstage{background:#0c0708;min-height:300px;display:flex;align-items:center;justify-content:center;padding:12px;position:relative}
.simstage svg{width:100%;max-height:320px}
.simctrl{padding:18px 20px}
.simctrl label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 6px}
.simctrl input[type=range]{width:100%;accent-color:var(--red)}
.readouts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.readout{background:var(--paper-2);border-radius:9px;padding:10px;text-align:center}
.readout b{display:block;font-family:var(--disp);font-size:22px;color:var(--red)}
.readout span{font-size:10px;font-family:var(--mono);color:var(--ink-soft)}
.simctrl .desc{font-size:13px;color:var(--ink-soft);margin:6px 0 0}
.toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tgl{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:8px;padding:6px 12px;cursor:pointer}
.tgl.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ---------- name / register gate ---------- */
.namegate{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);max-width:520px;margin:0 auto}
.namegate h3{font-family:var(--disp);margin:0 0 4px;font-size:20px}
.namegate p{color:var(--ink-soft);font-size:13px;margin:0 0 16px}
.gate-badge{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--red);background:var(--red-soft);padding:3px 9px;border-radius:6px;margin-bottom:8px}

/* certificate disclaimer */
.cert-tos{margin-top:14px;font-size:9px;color:#8a7a7a;line-height:1.35;max-width:440px;margin-left:auto;margin-right:auto;font-style:italic}
.cert-reg{font-family:var(--mono);font-size:11px;color:#555;margin-top:2px}

/* ---------- CATIA STUDIO (mini-CAD) ---------- */
.cad{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:16px}
.cad-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--paper-2);flex-wrap:wrap;gap:8px}
.wb-toggle{display:flex;gap:4px}
.wb-toggle button{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);padding:7px 15px;border-radius:8px;cursor:pointer}
.wb-toggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cad-actions{display:flex;gap:6px}
.cad-main{display:grid;grid-template-columns:58px 1fr 268px}
@media(max-width:860px){.cad-main{grid-template-columns:54px 1fr}.cad-side{grid-column:1/-1;border-top:1px solid var(--line);border-left:none}}
.cad-tools{display:flex;flex-direction:column;gap:5px;padding:8px 7px;border-right:1px solid var(--line);background:var(--paper-2)}
.cad-tool{width:44px;height:44px;border:1px solid var(--line);background:var(--card);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink);gap:0;line-height:1}
.cad-tool .ic{font-size:16px}
.cad-tool small{font-size:6.5px;font-family:var(--mono);color:var(--ink-soft);letter-spacing:.2px}
.cad-tool.on{border-color:var(--red);color:var(--red);box-shadow:0 0 0 2px var(--red-soft)}
.cad-tool.on small{color:var(--red)}
.cad-tool:hover{border-color:var(--red)}
.cad-tool.sep{height:1px;background:var(--line);border:none;border-radius:0;margin:2px 4px;pointer-events:none}
.cad-board{position:relative;background:#0b0708;min-height:430px;touch-action:none}
.cad-board svg{width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
.cad-hint{position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:10.5px;color:#e0a0a5;background:rgba(0,0,0,.45);padding:3px 9px;border-radius:6px;pointer-events:none;max-width:70%}
.cad-finish{position:absolute;bottom:10px;right:10px;display:none;font-family:var(--mono);font-size:12px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer}
.cad-dim{position:absolute;top:38px;left:10px;background:var(--card);border:1px solid var(--red);border-radius:10px;padding:12px;box-shadow:var(--shadow);z-index:6;display:none;min-width:170px}
.cad-dim.show{display:block}
.cad-dim h5{margin:0 0 6px;font-family:var(--disp);font-size:13px}
.cad-dim label{display:block;font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin:7px 0 3px}
.cad-dim input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px}
.cad-dim .drow{display:flex;gap:6px;margin-top:10px}
.cad-side{padding:12px;display:flex;flex-direction:column;gap:10px;border-left:1px solid var(--line)}
.cad-3d{background:#0b0708;border-radius:10px;height:220px;display:flex;align-items:center;justify-content:center;border:1px solid #241819;position:relative}
.cad-3d svg{width:100%;height:210px}
.cad-3d .lbl3d{position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:9.5px;color:#8a6f70}
.feature-row{display:flex;align-items:center;gap:8px}
.feature-row label{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);white-space:nowrap}
.feature-row input{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px}
.cad-info{font-size:12px;color:var(--ink-soft);font-family:var(--mono);line-height:1.5;background:var(--paper-2);border-radius:9px;padding:10px}
.cad-info b{color:var(--red)}
.cad-info .ok{color:var(--ok)} .cad-info .no{color:var(--bad)}
.cad-bottom{display:flex;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--ink-soft);background:var(--paper-2)}
.cad-challenges{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cad-challenges .clabel{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--ink-soft);text-transform:uppercase;width:100%}
.cad-chip{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:6px 12px;border-radius:20px;cursor:pointer}
.cad-chip:hover{border-color:var(--red);color:var(--red)}
.cad-chip.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ---------- CATIA V5 replica chrome ---------- */
.catia{margin-top:16px;border:1px solid #6f6f64;border-radius:6px;overflow:hidden;background:#d4d0c8;font-family:'Segoe UI',Tahoma,sans-serif;box-shadow:var(--shadow)}
.catia-title{background:linear-gradient(#33538c,#20355a);color:#eef3fb;font-size:12px;padding:5px 10px;display:flex;align-items:center;gap:6px}
.catia-title .tspace{flex:1}.catia-title .twin{letter-spacing:3px;opacity:.85;font-size:11px}
.catia-menu{position:relative;background:linear-gradient(#f7f6f1,#e7e4d9);border-bottom:1px solid #b6b3a8;display:flex;align-items:center;gap:2px;padding:2px 6px;font-size:12px;color:#2a2a2a;z-index:12}
.catia-menu span{padding:3px 8px;cursor:default;border-radius:3px}
.catia-menu span:hover{background:#cfe0f5}
.catia-menu .mstart{color:#12793c;font-weight:700;cursor:pointer}
.menu-pop{position:absolute;top:100%;left:4px;background:#f6f4ec;border:1px solid #8f8c82;box-shadow:2px 3px 8px rgba(0,0,0,.35);z-index:30;min-width:250px;display:none;padding:3px}
.menu-pop.show{display:block}
.menu-pop a{display:block;padding:6px 12px;font-size:12px;color:#222;cursor:pointer;border-radius:3px}
.menu-pop a:hover{background:#2f66b0;color:#fff}
.catia-std{background:linear-gradient(#efece3,#dedbce);border-bottom:1px solid #b6b3a8;display:flex;align-items:center;gap:4px;padding:4px 8px}
.std-b{width:26px;height:24px;border:1px solid transparent;background:transparent;border-radius:3px;cursor:pointer;font-size:13px}
.std-b:hover{border-color:#8fb0dc;background:#e8f1fc}
.std-sep{width:1px;height:18px;background:#b6b3a8;margin:0 3px}
.wb-badge{font-size:11px;font-weight:700;color:#12793c;background:#e2efe6;border:1px solid #a8ccb4;border-radius:4px;padding:2px 8px}
.std-reset{font-size:11px;font-family:var(--mono);color:#a5120e;background:#fdeceb;border:1px solid #e6b0ac;border-radius:5px;padding:3px 9px;cursor:pointer;margin-left:2px}
.std-reset:hover{background:#f7d9d6;border-color:#d0182b}
.catia-std .tspace{flex:1}
.std-val{font-size:11px;color:#333;display:flex;align-items:center;gap:6px}
.std-val input{width:66px;padding:3px 6px;border:1px solid #9a9a8e;border-radius:3px;background:#fff;color:#111;font-family:var(--mono);font-size:12px}
.catia-body{display:grid;grid-template-columns:1fr 74px}
.catia-view{position:relative;min-height:440px;background:#3f6ea6;overflow:hidden}
.catia-view>svg#cadSvg{width:100%;height:100%;display:block;position:absolute;inset:0;touch-action:none;cursor:crosshair}
.spec-tree{position:absolute;top:8px;left:10px;z-index:3;font-size:11px;line-height:1.55;color:#eef4fc;user-select:none;text-shadow:0 1px 1px rgba(0,10,25,.5);max-width:230px;overflow:hidden}
.spec-tree .node{white-space:nowrap}
.spec-tree .kids{margin-left:10px;border-left:1px solid rgba(180,205,235,.45);padding-left:8px}
.compass{position:absolute;top:8px;right:10px;z-index:3;opacity:.95}
.geoaxis{position:absolute;bottom:8px;right:10px;z-index:3;opacity:.9}
.catia-prompt{position:absolute;left:0;bottom:0;z-index:3;background:rgba(15,28,45,.6);color:#e6eefa;font-size:11px;font-family:'Segoe UI',Tahoma;padding:4px 12px;max-width:78%}
.wbname{position:absolute;bottom:26px;right:12px;z-index:3;color:#dfe8f5;font-size:11px;font-family:var(--mono);opacity:.85}
.spec-tree,.compass,.geoaxis,.catia-prompt,.wbname{pointer-events:none}
.catia-view .cad-finish{position:absolute;bottom:34px;left:12px;display:none;font-family:var(--mono);font-size:12px;background:#12793c;color:#fff;border:none;border-radius:5px;padding:7px 12px;cursor:pointer;z-index:4}
.catia-view .cad-dim{position:absolute;top:40px;left:10px;background:#f2efe7;border:1px solid #8f8c82;border-radius:6px;padding:12px;box-shadow:2px 3px 8px rgba(0,0,0,.35);z-index:6;display:none;min-width:180px;color:#222}
.catia-view .cad-dim.show{display:block}
.catia-view .cad-dim h5{margin:0 0 6px;font-size:12px;font-family:'Segoe UI',Tahoma}
.catia-view .cad-dim label{display:block;font-family:var(--mono);font-size:10px;color:#555;margin:7px 0 3px}
.catia-view .cad-dim input{width:100%;padding:5px 7px;border:1px solid #9a9a8e;border-radius:4px;background:#fff;color:#111;font-family:var(--mono);font-size:13px}
.catia-view .cad-dim .drow{display:flex;gap:6px;margin-top:10px}
.catia-dock{background:linear-gradient(#eeece3,#dbd8cc);border-left:1px solid #b6b3a8;padding:4px 0;overflow-y:auto;max-height:490px}
.dock-grp{font-size:7px;font-family:var(--mono);color:#7a7768;text-align:center;letter-spacing:.3px;margin:5px 2px 2px;border-top:1px solid #c3c0b4;padding-top:3px}
.dock-tool{width:64px;height:44px;margin:3px auto;border:1px solid #a2a294;background:linear-gradient(#fdfdfb,#e4e1d6);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:#2f2f2a;padding:2px}
.dock-tool .dic{font-size:15px;line-height:1}
.dock-tool small{font-size:7px;line-height:1.05;color:#5a5850;text-align:center;letter-spacing:.1px}
.dock-tool.on small{color:#a0630a}
.dock-tool:hover{border-color:#3b6fb5;background:linear-gradient(#eef6ff,#cfe0f5)}
.dock-tool.on{border-color:#e08b1a;background:linear-gradient(#fff3d8,#ffe1a6);box-shadow:0 0 0 1px #e08b1a inset}
.catia-bottom{display:flex;justify-content:space-between;background:linear-gradient(#efece3,#ded9cc);border-top:1px solid #b6b3a8;padding:4px 12px;font-family:var(--mono);font-size:11px;color:#4a4a40}
.catia .cad-challenges{background:#e9e6dc;border-top:1px solid #b6b3a8;border-bottom:none}
.catia .cad-challenges .clabel{color:#5a5648}
.catia .cad-chip{background:#faf9f4;border-color:#b6b3a8;color:#333}
.catia .cad-chip:hover{border-color:#3b6fb5;color:#1a4f92}
.catia .cad-chip.on{background:#2f66b0;border-color:#2f66b0;color:#fff}
@media(max-width:820px){.catia-body{grid-template-columns:1fr 66px}.dock-tool{width:58px;height:40px}.spec-tree{font-size:9.5px;max-width:150px}}

/* studio guide + plane chooser */
.plane-badge{font-family:var(--mono);font-size:11px;background:#e2efe6;border:1px solid #a8ccb4;border-radius:4px;padding:2px 8px;color:#12793c}
.spec-tree .plane{pointer-events:auto;cursor:pointer;border-radius:3px;padding:0 4px;display:inline-block}
.spec-tree .plane:hover{background:rgba(255,255,255,.18)}
.spec-tree .plane.on{color:#9dffbb;font-weight:700}
.cad-guide{background:linear-gradient(180deg,#ffffff,#f4f7fb);border:1px solid var(--line);border-top:none;padding:12px 16px}
.guide-flow{display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin-bottom:10px}
.gstep{font-family:var(--mono);font-size:11px;color:#8a94a0;padding:4px 11px;border:1px solid #dfe3e8;border-radius:16px;background:#fff}
.gstep.done{border-color:#7fc59b;color:#2e9d57}
.gstep.cur{background:#2f66b0;border-color:#2f66b0;color:#fff}
.garrow{color:#c3c9d0;font-size:13px}
.guide-body{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:#2a2f36}
.guide-badge{flex:0 0 auto;font-family:var(--mono);font-size:11px;background:#eaf1fb;color:#1a4f92;border:1px solid #bcd3ee;border-radius:6px;padding:4px 10px;font-weight:600}
#cadGuide{line-height:1.5}

/* --- night-mode studio guide (was a jarring white box) --- */
html[data-theme="night"] .cad-guide{background:linear-gradient(180deg,#1b1113,#140c0d);border-color:#332527}
html[data-theme="night"] .cad-guide .guide-body{color:#ece0df}
html[data-theme="night"] #cadGuide{color:#ece0df}
html[data-theme="night"] .gstep{background:#221618;border-color:#3a2a2c;color:#c7b0ae}
html[data-theme="night"] .gstep.done{border-color:#2e7d4f;color:#5fd08a}
html[data-theme="night"] .gstep.cur{background:#c0202f;border-color:#c0202f;color:#fff}
html[data-theme="night"] .garrow{color:#5a4446}
html[data-theme="night"] .guide-badge{background:#2a1618;border-color:#5a2a2e;color:#ff9aa2}
html[data-theme="night"] .viz-caption{color:#c7d4e6}
/* --- in-studio step-by-step procedure --- */
.cad-procedure{padding:14px 16px;border-top:1px solid #b6b3a8;background:#efece3}
html[data-theme="night"] .cad-procedure{background:#160e0f;border-top-color:#332527}
.proc-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px}
.proc-tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;background:var(--red);color:#fff;padding:3px 9px;border-radius:5px}
.proc-head b{font-family:var(--disp);font-size:15px;color:var(--ink)}
.proc-sub{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.proc-save{margin-left:auto;font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--paper);border:none;border-radius:8px;padding:8px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.proc-save:hover{background:var(--red);color:#fff}
html[data-theme="night"] .proc-save{color:#160e0f}
.proc-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.proc-list li{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;line-height:1.5;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;transition:.12s}
.proc-list li:hover{border-color:var(--red)}
.proc-list li.done{opacity:.62}
.proc-list li.done .proc-txt{text-decoration:line-through}
.proc-ck{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--paper-2);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:600}
.proc-list li.done .proc-ck{background:var(--ok);border-color:var(--ok);color:#fff}
/* --- student sign-in modal --- */
.stu-modal{position:fixed;inset:0;background:rgba(8,4,5,.72);z-index:90;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}
.stu-modal.show{display:flex}
.stu-modal .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 26px 22px;max-width:430px;width:100%;box-shadow:var(--shadow)}
.stu-modal .box h3{font-family:var(--disp);margin:0 0 4px;font-size:21px;color:var(--ink)}
.stu-modal .box .k{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--red);text-transform:uppercase}
.stu-modal .box p{color:var(--ink-soft);font-size:13px;margin:6px 0 16px;line-height:1.5}
.stu-modal .box .field label{color:var(--ink-soft)}
.stu-modal .box .brow{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.stu-who{font-family:var(--mono);font-size:11px;color:#12793c;background:#e2efe6;border:1px solid #a8ccb4;border-radius:4px;padding:2px 9px;margin-left:2px}

.cad-viewcube{position:absolute;top:8px;right:84px;z-index:5;display:none;gap:4px}
.cad-viewcube button{font-family:var(--mono);font-size:9.5px;background:rgba(15,28,45,.62);color:#dfe8f5;border:1px solid rgba(180,205,235,.42);border-radius:5px;padding:3px 7px;cursor:pointer;letter-spacing:.3px}
.cad-viewcube button:hover{background:rgba(46,86,150,.82);color:#fff;border-color:#8fb0dc}

<script>
/* ================= DATA ================= */
const EX = [
/* ---------- EXPERIMENT 1 : LAP RIVETED JOINT ---------- */
{
 n:1,id:"e1",title:"Lap Riveted Joint",sub:"Two overlapping plates fastened with rivets in single shear.",
 aim:"Understand the geometry and design of a lap riveted joint and model a single- or double-riveted lap joint in CATIA.",
 sw:"CATIA V5 (or later) · Workstation with adequate RAM & graphics",
 skills:["Sketch","Pad","Pocket","Assembly"],
 cmds:[{t:"New Part"},{t:"Sketch"},{t:"Rectangle"},{t:"Constraint"},{t:"Pad",hot:1},{t:"Circle"},{t:"Pocket",hot:1},{t:"Coincidence"},{t:"Contact"},{t:"Fix"},{t:"Drafting"}],
 viz:[
  `<g class="layer"><line class="axis" x1="55" y1="45" x2="55" y2="245"/><line class="axis" x1="55" y1="245" x2="375" y2="245"/><text x="60" y="40" class="big">Part Design · XY plane</text><text x="150" y="150" class="big">New Part → "Lap_Plate1"</text><text x="150" y="170">Sketcher · aim for all-green</text></g>`,
  `<g class="layer"><rect class="fillmet" x="45" y="70" width="185" height="90"/><text x="70" y="64">Plate 1</text><line class="dim" x1="45" y1="178" x2="230" y2="178"/><text x="118" y="192">200 mm</text><line class="dim" x1="34" y1="70" x2="34" y2="160"/><text x="8" y="120">100</text><text x="70" y="115" class="lbl">Pad 5 mm</text></g>`,
  `<g class="layer"><rect class="fillmet" x="175" y="100" width="185" height="90"/><text x="290" y="205">Plate 2 (identical)</text></g>`,
  `<g class="layer"><circle class="fillsoft" cx="202" cy="112" r="6"/><circle class="fillsoft" cx="202" cy="136" r="6"/><circle class="fillsoft" cx="202" cy="160" r="6"/><line class="dim" x1="224" y1="112" x2="224" y2="136"/><text x="230" y="130">p 50</text><text x="150" y="92">ø10 holes · margin 20</text></g>`,
  `<g class="layer"><text x="45" y="226">Rivet: ø10 shank + heads</text><rect class="fillmet" x="70" y="248" width="10" height="24"/><ellipse class="fillmet" cx="75" cy="247" rx="11" ry="5"/><ellipse class="fillmet" cx="75" cy="273" rx="11" ry="5"/><text x="92" y="253">manufactured head</text><text x="92" y="272">driven head</text></g>`,
  `<g class="layer"><rect class="fillsoft" x="175" y="100" width="55" height="60"/><text x="240" y="140">Overlap 100 mm</text><text x="240" y="156">align hole rows</text></g>`,
  `<g class="layer"><circle cx="202" cy="112" r="6" style="fill:#ff5c6a;stroke:none"/><circle cx="202" cy="136" r="6" style="fill:#ff5c6a;stroke:none"/><circle cx="202" cy="160" r="6" style="fill:#ff5c6a;stroke:none"/><text x="250" y="118">Coincidence · Contact · Fix</text></g>`,
  `<g class="layer"><rect class="fillmet" x="150" y="250" width="120" height="10"/><rect class="fillmet" x="220" y="260" width="120" height="10"/><rect x="286" y="246" width="8" height="28" style="fill:#ff5c6a;stroke:none"/><text x="150" y="244">pull →</text><text x="270" y="244">single shear</text><text x="150" y="290">Interference check → Drafting</text></g>`
 ],
 steps:[
  {sc:"Warm-up",title:"Learn the CATIA mouse controls",text:"Before modelling, master navigation. Pan = hold the middle mouse button and move. Rotate = hold middle button, then also hold the right button and move. Zoom = hold middle button, click the right button once, then move up/down.",vals:["Pan","Rotate","Zoom"],tip:"These three moves are the muscle memory every CATIA task depends on.",l:0},
  {sc:"Phase 1 · Step 1",title:"Start a new part",text:"Go to Start → Mechanical Design → Part Design. In the specification tree name the part Lap_Plate1 so files stay organised.",vals:["Part Design"],l:0},
  {sc:"Phase 1 · Step 2",title:"Enter the Sketcher",text:"Click the XY plane in the tree, then click the Sketch icon (pencil-and-paper) on the right toolbar to drop into the 2D Sketcher.",vals:["XY plane","Sketch"],tip:"White lines are under-constrained. Green means locked. Aim for an all-green sketch.",l:0},
  {sc:"Phase 1 · Step 3",title:"Draw the plate rectangle",text:"Pick the Rectangle tool and click from the origin outward to rough out the first plate.",vals:["Rectangle"],l:1},
  {sc:"Phase 1 · Step 4",title:"Constrain the length",text:"Click the Constraint tool, select the long edge, place the dimension, double-click the value and type 200 mm.",vals:["Length 200"],l:1},
  {sc:"Phase 1 · Step 5",title:"Constrain the width",text:"Repeat with the short edge and set the width to 100 mm. The rectangle should now be fully green.",vals:["Width 100","all green"],l:1},
  {sc:"Phase 1 · Step 6",title:"Extrude the plate",text:"Click Exit Workbench (door + arrow), then the Pad tool. Enter length 5 mm and click OK to get a solid 3D plate.",vals:["Pad 5 mm"],l:1},
  {sc:"Phase 1 · Step 7",title:"Model the second plate",text:"Create a new part named Lap_Plate2 and repeat steps 2–6 to build an identical 200 × 100 × 5 mm plate.",vals:["identical plate"],l:2},
  {sc:"Phase 1 · Step 8",title:"Sketch the rivet holes",text:"On the overlap face of Plate 1 enter the Sketcher and draw one vertical row of circles. Constrain diameters to 10 mm, centre spacing (pitch) to 50 mm and edge distance (margin) to 20 mm.",vals:["ø10","pitch 50","margin 20"],l:3},
  {sc:"Phase 1 · Step 9",title:"Pocket the holes",text:"Exit and use the Pocket tool set to \u201cUp to last\u201d to cut the holes fully through. Repeat the hole sketch + pocket on Plate 2 so both align.",vals:["Pocket · Up to last"],tip:"\u201cUp to last\u201d keeps holes cutting through even if you later change the plate thickness.",l:3},
  {sc:"Phase 1 · Step 10",title:"Model the rivet",text:"New part Rivet: sketch a ø10 mm circle on XY and Pad 15 mm for the shank. On one end sketch a ø15 mm circle and Pad 3 mm for the head; repeat on the other end for the driven head.",vals:["ø10 shank","ø15 head"],l:4},
  {sc:"Phase 2 · Step 11",title:"Start the assembly",text:"Start → Assembly Design, create a new product Lap_Joint_Assembly. Use Insert → Existing Component to bring in both plates and the rivets.",vals:["Assembly Design"],l:5},
  {sc:"Phase 2 · Step 12",title:"Overlap the plates",text:"Position the plates so they overlap by 100 mm and the two hole rows line up in the overlap region.",vals:["Overlap 100 mm"],l:5},
  {sc:"Phase 2 · Step 13",title:"Insert rivets & constrain",text:"Drop a rivet into each aligned hole. Apply Coincidence (rivet axis to hole axis), Contact (plate faces touching) and Fix one plate. Press Ctrl+U to update and lock everything.",vals:["Coincidence","Contact","Fix"],l:6},
  {sc:"Phase 2 · Step 14",title:"Verify & draft",text:"Run an interference check, then switch to the Drafting workbench and generate 2D views showing pitch, margin and overlap. Save all parts and the product.",vals:["Interference","Drafting"],tip:"The lap joint loads rivets in single shear and has eccentricity → secondary bending stress.",l:7}
 ],
 quiz:[
  {q:"In a lap joint the rivets are loaded mainly in:",o:["Double shear","Single shear","Pure tension","Torsion"],a:1},
  {q:"Because the two load lines are not aligned, a lap joint suffers from:",o:["Eccentricity → bending","Zero stress","Buckling only","Thermal warping"],a:0},
  {q:"Pitch (p) is the distance between:",o:["Hole centre and plate edge","Centres of adjacent rivets in a row","The two plates","Rivet head and shank"],a:1},
  {q:"Margin (m) is measured from:",o:["Rivet head to shank","Hole centre to nearest plate edge","Row to row","Plate to plate"],a:1},
  {q:"Typical plate size used in this experiment:",o:["100×50×2 mm","200×100×5 mm","300×300×10 mm","50×50×5 mm"],a:1},
  {q:"Which CATIA tool cuts the rivet holes?",o:["Pad","Pocket","Revolve","Shell"],a:1},
  {q:"The Pocket \u201cUp to last\u201d option ensures the hole:",o:["Stays blind","Cuts fully through","Becomes threaded","Is filleted"],a:1},
  {q:"To align a rivet axis with a hole axis in Assembly, use:",o:["Contact constraint","Coincidence constraint","Angle constraint","Fix"],a:1},
  {q:"A lap joint is best suited for:",o:["Heavy bridge girders","Lightweight structures / fuselage skins","Boiler shells","Pressure vessels"],a:1},
  {q:"Which is NOT a failure mode of a riveted joint?",o:["Rivet shear","Plate tearing","Crushing/bearing","Magnetic fatigue"],a:3}
 ]
},
/* ---------- EXPERIMENT 2 : BUTT RIVETED JOINT ---------- */
{
 n:2,id:"e2",title:"Butt Riveted Joint",sub:"Plates joined end-to-end by cover plates — rivets in double shear.",
 aim:"Understand the geometry and design of a butt riveted joint and model a single- or double-cover butt joint in CATIA.",
 sw:"CATIA V5 (or later) · Workstation with adequate RAM & graphics",
 skills:["Cover plates","Double shear","Constraints"],
 cmds:[{t:"Sketch"},{t:"Rectangle"},{t:"Pad",hot:1},{t:"Circle"},{t:"Pocket",hot:1},{t:"Mirror"},{t:"Coincidence"},{t:"Contact"},{t:"Fix"},{t:"Drafting"}],
 viz:[
  `<g class="layer"><rect class="fillmet" x="45" y="120" width="150" height="60"/><rect class="fillmet" x="205" y="120" width="150" height="60"/><text x="90" y="112">Main plate 1</text><text x="250" y="112">Main plate 2</text><text x="150" y="205">end-to-end · 150×100×5</text></g>`,
  `<g class="layer"><rect class="fillsoft" x="120" y="100" width="160" height="18"/><rect class="fillsoft" x="120" y="182" width="160" height="18"/><text x="120" y="95">cover plate top</text><text x="120" y="216">cover plate bottom (200×100)</text></g>`,
  `<g class="layer"><circle class="fillsoft" cx="150" cy="150" r="6"/><circle class="fillsoft" cx="250" cy="150" r="6"/><text x="110" y="240">Holes pitch 50 · margin 20 · Mirror to covers</text></g>`,
  `<g class="layer"><rect class="fillmet" x="60" y="255" width="8" height="22"/><ellipse class="fillmet" cx="64" cy="254" rx="9" ry="4"/><ellipse class="fillmet" cx="64" cy="278" rx="9" ry="4"/><text x="80" y="270">rivet spans 3 plates</text></g>`,
  `<g class="layer"><rect class="fillsoft" x="120" y="100" width="160" height="100"/><text x="150" y="90">Position covers top & bottom</text></g>`,
  `<g class="layer"><circle cx="150" cy="150" r="6" style="fill:#ff5c6a;stroke:none"/><circle cx="250" cy="150" r="6" style="fill:#ff5c6a;stroke:none"/><text x="120" y="230">Coincidence · Contact · Fix · symmetric straps</text></g>`,
  `<g class="layer"><rect class="fillmet" x="120" y="252" width="150" height="9"/><rect class="fillmet" x="120" y="240" width="70" height="9"/><rect class="fillmet" x="200" y="240" width="70" height="9"/><rect class="fillmet" x="120" y="264" width="150" height="9"/><rect x="188" y="236" width="8" height="34" style="fill:#ff5c6a;stroke:none"/><text x="120" y="290">double shear · no eccentricity → Drafting</text></g>`
 ],
 steps:[
  {sc:"Recap",title:"Why the butt joint exists",text:"The butt joint solves the lap joint's bending problem. The main plates sit end-to-end with cover plates over the gap, so the pull forces stay perfectly in line — zero eccentricity.",vals:["no eccentricity"],l:0},
  {sc:"Phase 1 · Step 1",title:"Model main plate 1",text:"New part Butt_MainPlate1: sketch a 150 × 100 mm rectangle, fully constrain it and Pad 5 mm.",vals:["150×100×5"],l:0},
  {sc:"Phase 1 · Step 2",title:"Model main plate 2",text:"Duplicate the part as Butt_MainPlate2 — an identical second main plate that will butt against the first.",vals:["identical"],l:0},
  {sc:"Phase 1 · Step 3",title:"Model the cover plate",text:"New part Butt_CoverPlate: sketch a 200 × 100 mm rectangle — long enough to span across both main plates — and Pad 5 mm.",vals:["200×100×5"],l:1},
  {sc:"Phase 1 · Step 4",title:"Duplicate for double cover",text:"For a double-cover joint, make a second identical cover plate. One goes on top, one underneath.",vals:["double cover"],l:1},
  {sc:"Phase 1 · Step 5",title:"Sketch the rivet holes",text:"In each main plate, sketch the hole row near the butt end with pitch 50 mm and margin 20 mm.",vals:["pitch 50","margin 20"],l:2},
  {sc:"Phase 1 · Step 6",title:"Mirror to the covers",text:"Mirror the same hole pattern onto the cover plate(s) so every hole lines up, then Pocket all holes through.",vals:["Mirror","Pocket"],l:2},
  {sc:"Phase 1 · Step 7",title:"Model the rivet",text:"Build the rivet as in Experiment 1, but make the shank span three plate thicknesses (5 + 5 + 5 = 15 mm) plus the heads.",vals:["spans 3 plates"],l:3},
  {sc:"Phase 2 · Step 8",title:"Position the plates",text:"New product Butt_Joint_Assembly. Use a Contact constraint on the end faces to butt the two main plates together end-to-end.",vals:["end-to-end"],l:4},
  {sc:"Phase 2 · Step 9",title:"Add the cover plates",text:"Place one cover plate on top (single-cover) or one on top and one on the bottom (double-cover). Keep the two straps symmetric.",vals:["top & bottom"],tip:"Strap symmetry is exactly what removes the bending a lap joint suffers from.",l:5},
  {sc:"Phase 2 · Step 10",title:"Insert rivets & constrain",text:"Line up all holes with Coincidence, insert the rivets, add Contact between faces and Fix one main plate. Press Ctrl+U to update.",vals:["Coincidence","Contact","Fix"],l:5},
  {sc:"Phase 2 · Step 11",title:"Verify & draft",text:"Run an interference check, then create Drafting views highlighting the double shear and the absence of eccentricity. Save all parts and the product.",vals:["double shear","Drafting"],l:6}
 ],
 quiz:[
  {q:"In a double-cover butt joint each rivet is in:",o:["Single shear","Double shear","No shear","Bending only"],a:1},
  {q:"The main plates in a butt joint are placed:",o:["Overlapping","End-to-end (butted)","At 90°","Stacked"],a:1},
  {q:"Cover / strap plates are used to:",o:["Add weight","Span across the butted main plates","Cut holes","Replace rivets"],a:1},
  {q:"Compared with a lap joint, an ideal butt joint has:",o:["More eccentricity","No eccentricity","Weaker rivets","Fewer plates"],a:1},
  {q:"To copy the hole pattern from main plate to cover plate, use:",o:["Mirror","Shell","Chamfer","Revolve"],a:0},
  {q:"A double-cover butt joint is preferred for:",o:["Decorative panels","Critical / heavy-duty work","Temporary jigs","Zero-load parts"],a:1},
  {q:"The rivet shank length must accommodate:",o:["One plate","Two plates","Three plate thicknesses + heads","Only the heads"],a:2},
  {q:"Typical cover plate length in this experiment:",o:["100 mm","150 mm","200 mm","50 mm"],a:2},
  {q:"Butt joints are commonly used in:",o:["Bridges, boiler shells, pressure vessels","Paper models","Wooden toys","Curtain rails"],a:0},
  {q:"Symmetry of the two straps is essential for:",o:["Aesthetics only","Balanced loading","Faster drafting","Reducing rivet count"],a:1}
 ]
},
/* ---------- EXPERIMENT 3 : WELDED T-SECTION ---------- */
{
 n:3,id:"e3",title:"Welded T-Section",sub:"A vertical plate joined to a base plate by symmetrical fillet welds.",
 aim:"Understand the design and assembly of a welded T-section and model it in CATIA — part design, assembly and weld application.",
 sw:"CATIA V5 (or later) · Weld Design workbench",
 skills:["Assembly","Weld Design","Fillet weld"],
 cmds:[{t:"Sketch"},{t:"Rectangle"},{t:"Pad",hot:1},{t:"Assembly Design"},{t:"Coincidence"},{t:"Contact"},{t:"Weld Design",hot:1},{t:"Fillet Weld",hot:1},{t:"Drafting"}],
 viz:[
  `<g class="layer"><rect class="fillmet" x="90" y="180" width="220" height="26"/><rect class="fillsoft" x="192" y="200" width="16" height="6"/><text x="90" y="172">Base (Part1) 100×45 · cutout · Pad 10</text></g>`,

 ],
 steps:[

  {sc:"Phase 1 · Step 3",title:"Add the centring cutout",text:"Add a small centred cutout on the bottom edge (about 5 mm high and 5 mm wide, 47.5 mm to each side). It helps locate the vertical plate.",vals:["cutout 5 mm"],l:0},
  {sc:"Phase 1 · Step 4",title:"Extrude the base",text:"Exit the Sketcher and Pad the base 10 mm. Save it as Part1.CATPart.",vals:["Pad 10"],l:0},
  {sc:"Phase 1 · Step 5",title:"Model the top plate",text:"New part Part2: sketch a 100 × 25 mm rectangle and Pad 10 mm. This is the vertical web of the T. Save as Part2.CATPart.",vals:["100 × 25","Pad 10"],l:1},
  {sc:"Phase 2 · Step 6",title:"Insert & rough-position",text:"Start → Assembly Design, product T_Section_Assembly. Insert both parts and use Manipulate to roughly set the T shape.",vals:["Manipulate"],l:2},

  {sc:"Phase 3 · Step 11",title:"Weld the other side",text:"Repeat the fillet weld on the opposite corner for a symmetrical joint.",vals:["symmetrical"],tip:"A symmetrical pair of welds keeps the T balanced; a single-side weld would pull it out of line as it cools.",l:5},

 ],
 quiz:[

  {q:"The size of a fillet weld is defined by its:",o:["Diameter","Leg length","Pitch","Margin"],a:1},

  {q:"Compared to riveting, welding generally gives:",o:["Higher weight","Lower weight & seamless look","More holes","Less strength"],a:1},

/* ================= STEPPER ================= */
function buildSVG(e,upto,tip){
 let inner='';
 e.viz.forEach((frag,i)=>{if(i>upto)return;let f=frag;
   if(i===upto){const dt=tip?' data-tip="'+tip.replace(/"/g,'')+'"':'';f=frag.replace('class="layer"','class="layer cur draw hot"'+dt);}
   inner+=f;});
 return `<svg viewBox="0 0 400 310" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}
function renderStep(id){
 const e=EX.find(x=>x.id===id); const i=stepIndex[id];
 const layer=(e.steps[i].l!==undefined)?e.steps[i].l:Math.min(i,e.viz.length-1);
 document.getElementById('viz_'+id).innerHTML=buildSVG(e,layer,e.steps[i].title);
 const s=e.steps[i];
 document.getElementById('txt_'+id).innerHTML=`<div class="sc">${s.sc}</div><h3>${s.title}</h3><p>${s.text}</p>`+
   (s.vals&&s.vals.length?`<div class="valpills">${s.vals.map(v=>`<b>${v}</b>`).join('')}</div>`:'')+
   (s.tip?`<div class="tip"><b>Tip · </b>${s.tip}</div>`:'');
 document.getElementById('cnt_'+id).textContent=`Step ${i+1} of ${e.steps.length}`;
 if(!state.steps[id]) state.steps[id]=[];
 if(!state.steps[id].includes(i)){state.steps[id].push(i);persist();updateProgress();}
 e.steps.forEach((_,k)=>{const d=document.getElementById('dot_'+id+'_'+k);if(d){d.classList.toggle('active',k===i);d.classList.toggle('seen',state.steps[id].includes(k));}});
}
function setStep(id,i){stepIndex[id]=i;renderStep(id);}
function nextStep(id){const e=EX.find(x=>x.id===id);if(stepIndex[id]<e.steps.length-1){stepIndex[id]++;renderStep(id);}else{toast('All steps done — try the checkpoint quiz ↓','ok');}}
function prevStep(id){if(stepIndex[id]>0){stepIndex[id]--;renderStep(id);}}
/* ================= QUIZ (per experiment) ================= */
function renderQuiz(id){
 const e=EX.find(x=>x.id===id);
 const picks=(state.quiz[id]&&state.quiz[id].picks)||{};
 let h='';
 e.quiz.forEach((q,qi)=>{h+=`<div class="q"><div class="qq"><span class="qn">Q${qi+1}.</span>${q.q}</div>`;
   q.o.forEach((o,oi)=>{const sel=picks[qi]===oi?'sel':'';h+=`<div class="opt ${sel}" id="opt_${id}_${qi}_${oi}" onclick="pick('${id}',${qi},${oi})"><span class="mk">${String.fromCharCode(65+oi)}</span>${o}</div>`;});
   h+='</div>';});
 document.getElementById('quiz_'+id).innerHTML=h;
}
function pick(id,qi,oi){
 if(!state.quiz[id]) state.quiz[id]={picks:{},done:false};
 if(state.quiz[id].done) return;
 state.quiz[id].picks[qi]=oi; persist();
 const e=EX.find(x=>x.id===id);
 e.quiz[qi].o.forEach((_,k)=>document.getElementById('opt_'+id+'_'+qi+'_'+k).classList.remove('sel'));
 document.getElementById('opt_'+id+'_'+qi+'_'+oi).classList.add('sel');
}
function gradeQuiz(id){
 const e=EX.find(x=>x.id===id);const picks=state.quiz[id].picks;let score=0;
 e.quiz.forEach((q,qi)=>{const chosen=picks[qi];
   q.o.forEach((_,oi)=>{const el=document.getElementById('opt_'+id+'_'+qi+'_'+oi);el.classList.add('lock');
     if(oi===q.a) el.classList.add('correct');if(oi===chosen&&chosen!==q.a) el.classList.add('wrong');});
   if(chosen===q.a) score++;});
 return score;
}
function submitQuiz(id){
 const e=EX.find(x=>x.id===id);
 const picks=(state.quiz[id]&&state.quiz[id].picks)||{};
 if(Object.keys(picks).length<e.quiz.length){toast('Please answer all 10 questions first.','bad');return;}
 const score=gradeQuiz(id);const pass=score>=7;
 state.quiz[id]={picks,done:true,score,pass};persist();
 showQuizResult(id,score,pass);
 updateProgress();refreshTabDone();refreshHomeStates();
 if(pass) toast('Experiment '+e.n+' passed ✓','ok');
}
function showQuizResult(id,score,pass){
 const e=EX.find(x=>x.id===id);
 const res=document.getElementById('qres_'+id);
 res.className='result-banner '+(pass?'pass':'fail');
 res.innerHTML=pass?`✓ Passed with <b>${score}/10</b>. Experiment ${e.n} complete!`:`You scored <b>${score}/10</b>. Review the highlighted answers and reset to try again (need ≥ 7).`;
 document.getElementById('qscore_'+id).innerHTML=`<span class="big">${score}</span> / 10`;
}
function restoreQuizResult(id){
 const q=state.quiz[id];
 if(q&&q.done){gradeQuiz(id);showQuizResult(id,q.score,q.pass);}
}
function resetQuiz(id){
 state.quiz[id]={picks:{},done:false};persist();
 renderQuiz(id);
 document.getElementById('qres_'+id).className='result-banner';
 document.getElementById('qscore_'+id).innerHTML='';
 updateProgress();refreshTabDone();refreshHomeStates();
}
/* ================= FINAL QUIZ ================= */
function renderFinal(){
 document.getElementById('setpick').innerHTML=['A','B','C','D','E'].map(s=>`<button class="setbtn ${s===finalSet?'active':''}" onclick="pickSet('${s}')">Set ${s}</button>`).join('');
 const qs=FINAL[finalSet];
 finalPicks=(state.final[finalSet]&&state.final[finalSet].picks)||{};
 let h='';
 qs.forEach((q,qi)=>{h+=`<div class="q"><div class="qq"><span class="qn">Q${qi+1}.</span>${q.q}</div>`;
   q.o.forEach((o,oi)=>{const sel=finalPicks[qi]===oi?'sel':'';h+=`<div class="opt ${sel}" id="fopt_${qi}_${oi}" onclick="fpick(${qi},${oi})"><span class="mk">${String.fromCharCode(65+oi)}</span>${o}</div>`;});
   h+='</div>';});
 document.getElementById('finalquiz').innerHTML=h;
 const st=state.final[finalSet];
 if(st&&st.done){gradeFinal();showFinalResult(st.score,st.pass);}
 else {document.getElementById('fres').className='result-banner';document.getElementById('fscore').innerHTML='';document.getElementById('getcert').style.display='none';document.getElementById('flock').textContent='';}
 if(state.finalStarted&&state.student) showFinalArea();
}
function pickSet(s){finalSet=s;renderFinal();}
function fpick(qi,oi){
 if(state.final[finalSet]&&state.final[finalSet].done) return;
 if(!state.final[finalSet]) state.final[finalSet]={picks:{}};
 state.final[finalSet].picks[qi]=oi;persist();finalPicks[qi]=oi;
 FINAL[finalSet][qi].o.forEach((_,k)=>document.getElementById('fopt_'+qi+'_'+k).classList.remove('sel'));
 document.getElementById('fopt_'+qi+'_'+oi).classList.add('sel');
}
function gradeFinal(){
 const qs=FINAL[finalSet];const picks=state.final[finalSet].picks;let score=0;
 qs.forEach((q,qi)=>{const chosen=picks[qi];
   q.o.forEach((_,oi)=>{const el=document.getElementById('fopt_'+qi+'_'+oi);el.classList.add('lock');
     if(oi===q.a) el.classList.add('correct');if(oi===chosen&&chosen!==q.a) el.classList.add('wrong');});
   if(chosen===q.a) score++;});
 return score;
}
function showFinalResult(score,pass){
 const res=document.getElementById('fres');
 res.className='result-banner '+(pass?'pass':'fail');
 res.innerHTML=pass?`✓ Perfect score — <b>10/10</b>! You may now claim your certificate.`:`You scored <b>${score}/10</b>. A perfect 10 is required. Reset this set or try another.`;
 document.getElementById('fscore').innerHTML=`<span class="big">${score}</span> / 10`;
 document.getElementById('getcert').style.display=pass?'inline-flex':'none';
 document.getElementById('flock').textContent=pass?'✓ Set '+finalSet+' passed — certificate unlocked.':'';
}
function submitFinal(){
 const qs=FINAL[finalSet];
 const picks=(state.final[finalSet]&&state.final[finalSet].picks)||{};
 if(Object.keys(picks).length<qs.length){toast('Answer all 10 questions in this set.','bad');return;}
 const score=gradeFinal();const pass=score===10;
 state.final[finalSet]={picks,done:true,score,pass};persist();
 showFinalResult(score,pass);updateProgress();
 if(pass) toast('Final quiz passed 🎓','ok');
}
function resetFinal(){state.final[finalSet]={picks:{},done:false};persist();renderFinal();toast('Set '+finalSet+' reset','ok');}

/* utils */
function cadId(){return 'c'+(cad.idc++);}
function near(a,b,t){return Math.abs(a-b)<=t;}
function biggestRect(){let r=null;cad.ents.forEach(e=>{if(e.type==='rect'&&(!r||e.w*e.h>r.w*r.h))r=e;});return r;}
function biggestCircle(){let c=null;cad.ents.forEach(e=>{if(e.type==='circle'&&(!c||e.r>c.r))c=e;});return c;}
function cadMenu(e){e.stopPropagation();document.getElementById('cadStartMenu').classList.toggle('show');}
document.addEventListener('click',e=>{const m=document.getElementById('cadStartMenu');if(m&&!e.target.closest('.catia-menu'))m.classList.remove('show');});
function cadPtRaw(e){const svg=document.getElementById('cadSvg');let x,y;try{const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;const q=pt.matrixTransform(svg.getScreenCTM().inverse());x=q.x;y=q.y;}catch(_){const r=svg.getBoundingClientRect();x=(e.clientX-r.left)/r.width*BW;y=(e.clientY-r.top)/r.height*BH;}return{x,y};}
function cadInit(){
 const svg=document.getElementById('cadSvg');
 svg.addEventListener('pointerdown',cadDown);svg.addEventListener('pointermove',cadMove);window.addEventListener('pointerup',cadUp);svg.addEventListener('wheel',cadWheel,{passive:false});
 cadRenderTools();cadRenderChallenges();cadLoadChallenge('ex1');cadSetWB('sketch');cadPlaneLbl();cadGuide();cad.student=load('student',null);cadRenderProcedure();
}
function cadSetWB(wb){cad.wb=wb;cad.draft=null;cad.tool='select';
 document.getElementById('cadStartMenu').classList.remove('show');
 document.getElementById('cadFinish').style.display='none';cadDimClose();
 document.getElementById('cadWbBadge').textContent=WBNAME[wb];
 document.getElementById('cadWbName').textContent=WBNAME[wb];
 document.getElementById('cadPlaneBadge').style.display=(wb==='sketch'||wb==='part')?'':'none';
 cadRenderTools();cadRenderViewport();cadTree();cadUpdateInfo();cadPrompt();cadGuide();
 const vc=document.getElementById('cadViewCube');if(vc)vc.style.display=(wb==='part')?'flex':'none';
 const sv=document.getElementById('cadSvg');if(sv)sv.style.cursor=(wb==='part')?'grab':'crosshair';
}
function cadPickPlane(pl){cad.plane=pl;if(cad.wb!=='sketch'&&cad.wb!=='part')cadSetWB('sketch');cadPlaneLbl();cadTree();cadRenderViewport();toast('Now sketching on the '+pl.toUpperCase()+' plane','ok');}
function cadPlaneLbl(){const el=document.getElementById('cadPlaneBadge');if(el)el.textContent=cad.plane.toUpperCase()+' plane';}
function cadRenderTools(){
 const list=TOOLS[cad.wb]||[];let h='';
 list.forEach(o=>{
   if(o.g){h+=`<div class="dock-grp">${o.g}</div>`;return;}
   const id=o.t||o.act;const call=o.t?`cadSetTool('${o.t}')`:`cadAct('${o.act}')`;
   h+=`<button class="dock-tool ${cad.tool===o.t?'on':''}" title="${o.n}" onmouseover="cadHoverHelp('${id}')" onmouseout="cadGuideActive()" onclick="${call}"><span class="dic">${o.ic}</span><small>${o.s}</small></button>`;
 });
 document.getElementById('cadDock').innerHTML=h;
}
function cadSetTool(t){cad.tool=t;cad.draft=null;document.getElementById('cadFinish').style.display='none';cadRenderTools();cadRenderViewport();cadPrompt();cadGuide();}
function cadPrompt(){const el=document.getElementById('cadPrompt');if(!el)return;const key=(cad.wb==='sketch'||cad.wb==='assembly'||cad.wb==='weld')?cad.tool:null;el.textContent=key&&TOOLHELP[key]?TOOLHELP[key]:(WBINTRO[cad.wb]||'Select an object or a command');}
/* guide */
function cadGuide(id){const key=id||((cad.wb==='sketch'||cad.wb==='assembly'||cad.wb==='weld')?cad.tool:null);let name,txt;
 if(key&&TOOLHELP[key]){name=(TOOLNAME(key)||key);txt=TOOLHELP[key];}else{name=WBNAME[cad.wb];txt=WBINTRO[cad.wb];}
 const a=document.getElementById('cadGuideTool'),b=document.getElementById('cadGuide');if(a)a.textContent=name;if(b)b.textContent=txt;cadFlow();}
function cadGuideActive(){cadGuide();}
function cadHoverHelp(id){cadGuide(id);}
function TOOLNAME(id){for(const wb in TOOLS){for(const o of TOOLS[wb]){if((o.t||o.act)===id)return o.n;}}return id;}
function cadFlow(){const el=document.getElementById('cadFlow');if(!el)return;const steps=['Pick plane','Sketch','Constrain','Pad','Dress-up'];
 let done=1;if(cad.ents.length)done=2;if(cad.ents.some(e=>e.green))done=3;if(cad.solid)done=4;if(cad.solid&&(cad.solid.fillet||cad.solid.chamfer||cad.solid.shell||cad.solid.holes&&cad.solid.holes.length))done=5;
 let h='';steps.forEach((s,i)=>{const cls=i<done?'done':(i===done?'cur':'');h+=`<span class="gstep ${cls}">${i+1} ${s}</span>`+(i<4?'<span class="garrow">›</span>':'');});el.innerHTML=h;}

function cadPt(e){const svg=document.getElementById('cadSvg');let x,y;try{const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;const q=pt.matrixTransform(svg.getScreenCTM().inverse());x=q.x;y=q.y;}catch(_){const r=svg.getBoundingClientRect();x=(e.clientX-r.left)/r.width*BW;y=(e.clientY-r.top)/r.height*BH;}if(cad.snap){x=Math.round(x/5)*5;y=Math.round(y/5)*5;}x=Math.max(0,Math.min(BW,x));y=Math.max(0,Math.min(BH,y));return{x,y};}

/* hit testing */
function cadHit(p){for(let i=cad.ents.length-1;i>=0;i--){const e=cad.ents[i];
 if(e.type==='rect'){if(p.x>=e.x-4&&p.x<=e.x+e.w+4&&p.y>=e.y-4&&p.y<=e.y+e.h+4)return e.id;}
 else if(e.type==='circle'){if(Math.abs(Math.hypot(p.x-e.cx,p.y-e.cy)-e.r)<7||Math.hypot(p.x-e.cx,p.y-e.cy)<e.r)return e.id;}
 else if(e.type==='line'||e.type==='axis'){if(distSeg(p,e)<7)return e.id;}
 else if(e.type==='point'){if(Math.hypot(p.x-e.x,p.y-e.y)<7)return e.id;}
 else if(e.type==='spline'||e.type==='profile'){for(const pt of e.pts)if(Math.hypot(p.x-pt[0],p.y-pt[1])<9)return e.id;}
 else if(e.type==='arc'){if(Math.abs(Math.hypot(p.x-e.cx,p.y-e.cy)-e.r)<8)return e.id;}
}return null;}
function distSeg(p,e){const x1=e.x1,y1=e.y1,x2=e.x2,y2=e.y2;const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy||1;let t=((p.x-x1)*dx+(p.y-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(x1+t*dx),p.y-(y1+t*dy));}
/* pointer */
function cadDown(e){e.preventDefault();
 if(cad.wb==='assembly'||cad.wb==='weld'){return asmDown(e);}
 if(cad.wb==='part'){return partDown(e);}
 if(cad.wb!=='sketch')return;
 const p=cadPt(e),t=cad.tool;
 if(t==='select'){const id=cadHit(p);cad.sel=id;cad.drag=id?{id,ox:p.x,oy:p.y}:null;cadDimClose();cadRenderViewport();cadUpdateInfo();return;}
 if(t==='trim'){const id=cadHit(p);if(id){cadPush();cad.ents=cad.ents.filter(x=>x.id!==id);cad.sel=null;cadRenderViewport();cadUpdateInfo();}return;}
 if(t==='dim'){const id=cadHit(p);if(id){cad.sel=id;cadOpenDim(id);cadRenderViewport();}else cadDimClose();return;}
 if(t==='point'){cadPush();cad.ents.push({id:cadId(),type:'point',x:p.x,y:p.y});cadRenderViewport();cadUpdateInfo();return;}
 if(t==='bitan'){cadBiTangent();return;}
 if(t==='spline'||t==='profile'){if(!cad.draft||cad.draft.type!==t){cad.draft={type:t,pts:[[p.x,p.y]]};document.getElementById('cadFinish').style.display='inline-flex';}else cad.draft.pts.push([p.x,p.y]);cadRenderViewport();return;}
 if(t==='arc'){if(!cad.draft||cad.draft.type!=='arc'){cad.draft={type:'arc',stage:1,cx:p.x,cy:p.y};}else if(cad.draft.stage===1){cad.draft.r=Math.hypot(p.x-cad.draft.cx,p.y-cad.draft.cy);cad.draft.a0=Math.atan2(p.y-cad.draft.cy,p.x-cad.draft.cx);cad.draft.stage=2;}else{const a1=Math.atan2(p.y-cad.draft.cy,p.x-cad.draft.cx);cadPush();cad.ents.push({id:cadId(),type:'arc',cx:cad.draft.cx,cy:cad.draft.cy,r:cad.draft.r,a0:cad.draft.a0,a1});cad.draft=null;}cadRenderViewport();return;}
 cad.draft={type:t,x0:p.x,y0:p.y,x1:p.x,y1:p.y};
}
function cadMove(e){const p=cadPt(e);const co=document.getElementById('cadCoord');if(co)co.textContent=`H ${Math.round(p.x-BW/2)} · V ${Math.round(BH/2-p.y)} mm`;
 if(cad.wb==='assembly'||cad.wb==='weld'){return asmMove(e);}
 if(cad.wb==='part'){return partMove(e);}
 if(cad.drag){const dx=p.x-cad.drag.ox,dy=p.y-cad.drag.oy;cadMoveEnt(cad.drag.id,dx,dy);cad.drag.ox=p.x;cad.drag.oy=p.y;cadRenderViewport();return;}
 if(cad.draft&&['rect','circle','line','axis'].includes(cad.draft.type)){cad.draft.x1=p.x;cad.draft.y1=p.y;cadRenderViewport();}
}
function cadUp(e){if(cad.wb==='assembly'||cad.wb==='weld'){cad.drag=null;return;}
 if(cad.wb==='part'){cad.drag=null;const sv=document.getElementById('cadSvg');if(sv)sv.style.cursor='grab';cadUpdateInfo();return;}
 if(cad.drag){cad.drag=null;cadUpdateInfo();return;}
 const d=cad.draft;if(!d||!['rect','circle','line','axis'].includes(d.type))return;cadPush();const before=cad.ents.length;
 if(d.type==='rect'){const x=Math.min(d.x0,d.x1),y=Math.min(d.y0,d.y1),w=Math.abs(d.x1-d.x0),h=Math.abs(d.y1-d.y0);if(w>4&&h>4)cad.ents.push({id:cadId(),type:'rect',x,y,w,h});}
 else if(d.type==='circle'){const r=Math.round(Math.hypot(d.x1-d.x0,d.y1-d.y0));if(r>4)cad.ents.push({id:cadId(),type:'circle',cx:d.x0,cy:d.y0,r});}
 else if(d.type==='line'){if(Math.hypot(d.x1-d.x0,d.y1-d.y0)>4)cad.ents.push({id:cadId(),type:'line',x1:d.x0,y1:d.y0,x2:d.x1,y2:d.y1});}
 else if(d.type==='axis'){if(Math.hypot(d.x1-d.x0,d.y1-d.y0)>4)cad.ents.push({id:cadId(),type:'axis',x1:d.x0,y1:d.y0,x2:d.x1,y2:d.y1});}
 if(cad.ents.length>before&&d.type!=='axis')cad.sel=cad.ents[cad.ents.length-1].id;

function cadFinishDraft(){const d=cad.draft;if(d&&(d.type==='spline'||d.type==='profile')&&d.pts.length>=2){cadPush();cad.ents.push({id:cadId(),type:d.type,pts:d.pts,closed:d.type==='profile'});cad.sel=cad.ents[cad.ents.length-1].id;}cad.draft=null;document.getElementById('cadFinish').style.display='none';cadRenderViewport();cadUpdateInfo();}
function cadMoveEnt(id,dx,dy){const e=cad.ents.find(x=>x.id===id);if(!e)return;
 if(e.type==='rect'){e.x+=dx;e.y+=dy;}else if(e.type==='circle'||e.type==='arc'){e.cx+=dx;e.cy+=dy;}else if(e.type==='point'){e.x+=dx;e.y+=dy;}else if(e.type==='line'||e.type==='axis'){e.x1+=dx;e.y1+=dy;e.x2+=dx;e.y2+=dy;}else if(e.type==='spline'||e.type==='profile'){e.pts=e.pts.map(p=>[p[0]+dx,p[1]+dy]);}}
/* dimension */
function cadOpenDim(id){const e=cad.ents.find(x=>x.id===id);if(!e)return;const d=document.getElementById('cadDim');let h='<h5>Constraint Definition</h5>';
 if(e.type==='rect')h+=`<label>Width (mm)</label><input id="dW" value="${Math.round(e.w)}"><label>Height (mm)</label><input id="dH" value="${Math.round(e.h)}">`;
 else if(e.type==='circle')h+=`<label>Diameter (mm)</label><input id="dD" value="${Math.round(e.r*2)}">`;
 else if(e.type==='line')h+=`<label>Length (mm)</label><input id="dL" value="${Math.round(Math.hypot(e.x2-e.x1,e.y2-e.y1))}">`;
 else if(e.type==='arc')h+=`<label>Radius (mm)</label><input id="dR" value="${Math.round(e.r)}">`;

 h+=`<div class="drow"><button class="btn primary mini" onclick="cadApplyDim('${id}')">OK</button><button class="btn dark mini" onclick="cadDimClose()">Cancel</button></div>`;

function cadDimClose(){const d=document.getElementById('cadDim');if(d)d.classList.remove('show');}
function cadApplyDim(id){const e=cad.ents.find(x=>x.id===id);if(!e)return;cadPush();
 if(e.type==='rect'){const w=+document.getElementById('dW').value,h=+document.getElementById('dH').value;if(w>0)e.w=w;if(h>0)e.h=h;}
 else if(e.type==='circle'){const dd=+document.getElementById('dD').value;if(dd>0)e.r=dd/2;}
 else if(e.type==='line'){const L=+document.getElementById('dL').value;const a=Math.atan2(e.y2-e.y1,e.x2-e.x1);e.x2=e.x1+L*Math.cos(a);e.y2=e.y1+L*Math.sin(a);}
 else if(e.type==='arc'){const r=+document.getElementById('dR').value;if(r>0)e.r=r;}
 e.green=true;cadDimClose();cadRenderViewport();cadUpdateInfo();toast('Constraint applied','ok');}
/* sketch ops */
function cadAct(a){
 if(cad.wb==='sketch'){
   if(a==='exit'){cadSetWB('part');return;}
   if(['smirror','offset','corner','schamfer'].includes(a)&&!cad.sel){toast('Select an element first','bad');return;}
   if(a==='smirror')return cadMirror();
   if(a==='offset')return cadOffset();
   if(a==='corner')return cadCorner('fillet');
   if(a==='schamfer')return cadCorner('chamfer');
 } else if(cad.wb==='part'){
   if(a==='newsketch'){cadSetWB('sketch');return;}
   if(a==='pad')return cadPad();
   if(a==='pocket')return cadPocket();
   if(a==='shaft')return cadShaft();
   if(a==='hole')return cadHole();
   if(a==='loft')return cadLoft();
   if(a==='fillet')return cadDress('fillet');
   if(a==='chamfer')return cadDress('chamfer');
   if(a==='shell')return cadDress('shell');
   if(a==='thread')return cadThread();
   if(a==='pmirror')return cadSolidMirror();
   if(a==='patR')return cadPattern('rect');
   if(a==='patC')return cadPattern('circ');
   if(a==='plane')return cadPlane();
 } else if(cad.wb==='assembly'){ return asmAct(a); }
 else if(cad.wb==='weld'){ if(a==='filletweld')return asmWeld(); }
 else if(cad.wb==='draft'){ if(a==='genviews')return cadGenViews(); }
}
function cadMirror(){const e=cad.ents.find(x=>x.id===cad.sel);if(!e)return;cadPush();const ax=BW/2,rx=v=>2*ax-v;const m=JSON.parse(JSON.stringify(e));m.id=cadId();
 if(m.type==='rect')m.x=rx(m.x+m.w);else if(m.type==='circle'||m.type==='arc')m.cx=rx(m.cx);else if(m.type==='point')m.x=rx(m.x);else if(m.type==='line'||m.type==='axis'){m.x1=rx(m.x1);m.x2=rx(m.x2);}else if(m.type==='spline'||m.type==='profile')m.pts=m.pts.map(p=>[rx(p[0]),p[1]]);
 cad.ents.push(m);cadRenderViewport();cadUpdateInfo();toast('Mirrored','ok');}
function cadOffset(){const e=cad.ents.find(x=>x.id===cad.sel);if(!e)return;const v=Math.max(1,+document.getElementById('cadVal').value||10);cadPush();const n=JSON.parse(JSON.stringify(e));n.id=cadId();
 if(n.type==='circle')n.r=Math.max(2,n.r+v);else if(n.type==='rect'){n.x-=v;n.y-=v;n.w+=2*v;n.h+=2*v;}else if(n.type==='line'){n.y1+=v;n.y2+=v;}else if(n.type==='spline'||n.type==='profile'){const b=bboxOf(n.pts.map(p=>({x:p[0],y:p[1]})));const cx=b.minx+b.w/2,cy=b.miny+b.h/2;const s=(Math.max(b.w,b.h)+2*v)/Math.max(b.w,b.h,1);n.pts=n.pts.map(p=>[cx+(p[0]-cx)*s,cy+(p[1]-cy)*s]);}
