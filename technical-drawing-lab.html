function cadCorner(kind){const e=cad.ents.find(x=>x.id===cad.sel);if(!e||e.type!=='rect'){toast('Select a rectangle to '+(kind==='fillet'?'round':'chamfer'),'bad');return;}cadPush();const v=Math.max(1,+document.getElementById('cadVal').value||8);e[kind==='fillet'?'rfillet':'rchamfer']=Math.min(v,Math.min(e.w,e.h)/2);cadRenderViewport();cadUpdateInfo();toast(kind==='fillet'?'Corners rounded':'Corners chamfered','ok');}
function cadBiTangent(){const cs=cad.ents.filter(e=>e.type==='circle').sort((a,b)=>b.r-a.r);if(cs.length<2){toast('Draw two circles first','bad');return;}cadPush();const c1=cs[0],c2=cs[1];const dx=c2.cx-c1.cx,dy=c2.cy-c1.cy,d=Math.hypot(dx,dy)||1;const base=Math.atan2(dy,dx);const g=Math.acos(Math.max(-1,Math.min(1,(c1.r-c2.r)/d)));const th=base+g;const p1=[c1.cx+c1.r*Math.cos(th),c1.cy+c1.r*Math.sin(th)];const p2=[c2.cx+c2.r*Math.cos(th),c2.cy+c2.r*Math.sin(th)];cad.ents.push({id:cadId(),type:'line',x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1]});cadRenderViewport();cadUpdateInfo();toast('Bi-tangent line','ok');}
/* profile extraction */
function circPoly(c){const p=[];for(let i=0;i<32;i++){const a=i/32*2*Math.PI;p.push({x:c.cx+c.r*Math.cos(a),y:c.cy+c.r*Math.sin(a)});}return p;}
function cadProfile(){
 const rects=cad.ents.filter(e=>e.type==='rect'&&!e.padded).sort((a,b)=>b.w*b.h-a.w*a.h);
 const circs=cad.ents.filter(e=>e.type==='circle'&&!e.padded).sort((a,b)=>b.r-a.r);
 const cv=cad.ents.filter(e=>(e.type==='spline'||e.type==='profile')&&!e.padded).sort((a,b)=>b.pts.length-a.pts.length)[0];
 const sel=cad.sel?cad.ents.find(e=>e.id===cad.sel&&!e.padded):null;
 let poly=null,main=null;
 if(sel&&sel.type==='rect'){main=sel;poly=rectPoly(sel);}
 else if(sel&&sel.type==='circle'){main=sel;poly=circPoly(sel);}
 else if(sel&&(sel.type==='spline'||sel.type==='profile')){main=sel;poly=sel.pts.map(p=>({x:p[0],y:p[1]}));}
 else if(rects.length&&!cv){main=rects[0];poly=rectPoly(main);}
 else if(cv){main=cv;poly=cv.pts.map(p=>({x:p[0],y:p[1]}));}
 else if(circs.length){main=circs[0];poly=circPoly(main);}
 else{const pts=[];cad.ents.forEach(e=>{if(e.type==='point')pts.push({x:e.x,y:e.y});if(e.type==='line'){pts.push({x:e.x1,y:e.y1});pts.push({x:e.x2,y:e.y2});}});if(pts.length>=3)poly=hull(pts);}
 if(!poly||poly.length<3)return null;
 const bb=bboxOf(poly);
 const holes=circs.filter(c=>c!==main&&inPoly(c.cx,c.cy,poly)&&c.r<Math.max(bb.w,bb.h)/3).map(c=>({cx:c.cx,cy:c.cy,r:c.r}));

function rectPoly(r){const rf=r.rfillet||0, rc=r.rchamfer||0;
 if(!rf&&!rc)return [{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}];
 const k=rf||rc,c=[{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}];const out=[];
 for(let i=0;i<4;i++){const p=c[i],pa=c[(i+3)%4],pb=c[(i+1)%4];const va=norm(pa.x-p.x,pa.y-p.y),vb=norm(pb.x-p.x,pb.y-p.y);const a=[p.x+va[0]*k,p.y+va[1]*k],b=[p.x+vb[0]*k,p.y+vb[1]*k];
  if(rf){for(let s=0;s<=4;s++){const tt=s/4;out.push({x:a[0]+(b[0]-a[0])*tt,y:a[1]+(b[1]-a[1])*tt});}}else{out.push({x:a[0],y:a[1]});out.push({x:b[0],y:b[1]});}}
 return out;}
function norm(x,y){const d=Math.hypot(x,y)||1;return [x/d,y/d];}
function bboxOf(poly){const xs=poly.map(p=>p.x),ys=poly.map(p=>p.y);const minx=Math.min(...xs),miny=Math.min(...ys);return{minx,miny,w:Math.max(...xs)-minx,h:Math.max(...ys)-miny};}
function inPoly(x,y,poly){let c=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){if(((poly[i].y>y)!==(poly[j].y>y))&&(x<(poly[j].x-poly[i].x)*(y-poly[i].y)/(poly[j].y-poly[i].y)+poly[i].x))c=!c;}return c;}
function hull(pts){pts=pts.slice().sort((a,b)=>a.x-b.x||a.y-b.y);const cr=(o,a,b)=>(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);const lo=[];for(const p of pts){while(lo.length>=2&&cr(lo[lo.length-2],lo[lo.length-1],p)<=0)lo.pop();lo.push(p);}const up=[];for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(up.length>=2&&cr(up[up.length-2],up[up.length-1],p)<=0)up.pop();up.push(p);}lo.pop();up.pop();return lo.concat(up);}
/* part features */
function feat(name){cad.feats.push(name);}
function cadPad(){const pr=cadProfile();if(!pr){toast('Draw a closed profile first','bad');return;}cadPush();const h=Math.max(1,+document.getElementById('cadVal').value||10);

 const body={id:cadId(),poly:pr.poly,h,holes:pr.holes||[],fillet:0,chamfer:0,shell:0,thread:false,mirror:false,pattern:null,revolve:false,off:{x:0,y:0},feat:fn};

function markPadded(pr){if(pr&&pr.main)pr.main.padded=true;(pr&&pr.holes||[]).forEach(hc=>{const e=cad.ents.find(x=>x.type==='circle'&&!x.padded&&Math.abs(x.cx-hc.cx)<1.5&&Math.abs(x.cy-hc.cy)<1.5&&Math.abs(x.r-hc.r)<1.5);if(e)e.padded=true;});}
function cadPocket(){if(!cad.solid){toast('Pad a profile first','bad');return;}const pr=cadProfile();cadPush();cad.solid.holes=pr?pr.holes:[];feat('Pocket.'+(cad.feats.filter(f=>f.startsWith('Pocket')).length+1));if(!cad.solid.holes.length)toast('Draw a small circle inside the profile to pocket','bad');else toast('Pocketed '+cad.solid.holes.length+' hole(s)','ok');cadRenderViewport();cadTree();cadUpdateInfo();}
function cadShaft(){const pr=cadProfile();if(!pr){toast('Draw a profile to revolve','bad');return;}cadPush();const bb=bboxOf(pr.poly);const fn='Shaft.'+(cad.feats.filter(f=>f.startsWith('Shaft')).length+1);const body={id:cadId(),poly:pr.poly,revolve:true,radius:Math.max(bb.w,bb.h)/2,height:Math.max(bb.w,bb.h),holes:[],fillet:0,chamfer:0,shell:0,thread:false,off:{x:0,y:0},feat:fn};cad.bodies.push(body);cad.activeBody=body.id;cad.bodySel=body.id;cad.solid=body;markPadded(pr);feat(fn);cadSetWB('part');cadRenderViewport();cadTree();cadUpdateInfo();toast('Shaft (revolved) added','ok');}
function cadHole(){if(!cad.solid){toast('Pad a profile first','bad');return;}cadPush();const dia=Math.max(2,+document.getElementById('cadVal').value||10);const bb=bboxOf(cad.solid.poly);const cx=bb.minx+bb.w/2,cy=bb.miny+bb.h/2;cad.solid.holes=cad.solid.holes||[];cad.solid.holes.push({cx,cy,r:dia/2});feat('Hole.'+(cad.feats.filter(f=>f.startsWith('Hole')).length+1));cadRenderViewport();cadTree();cadUpdateInfo();toast('Hole ø'+dia,'ok');}
function cadLoft(){const cands=cad.ents.filter(e=>e.type==='rect'||e.type==='spline'||e.type==='profile'||e.type==='circle');if(cands.length<2){toast('Multi-sections needs two profiles','bad');return;}cadPush();const polyOf=e=>e.type==='rect'?rectPoly(e):(e.type==='circle'?Array.from({length:24},(_,i)=>{const a=i/24*2*Math.PI;return{x:e.cx+e.r*Math.cos(a),y:e.cy+e.r*Math.sin(a)};}):e.pts.map(p=>({x:p[0],y:p[1]})));
 const areaOf=e=>{const b=bboxOf(polyOf(e));return b.w*b.h;};const sorted=cands.slice().sort((a,b)=>areaOf(b)-areaOf(a));const h=Math.max(20,+document.getElementById('cadVal').value||60);
 const fn='Multi-sections.'+(cad.feats.filter(f=>f.startsWith('Multi')).length+1);const body={id:cadId(),loft:true,polyA:resample(polyOf(sorted[0]),24),polyB:resample(polyOf(sorted[1]),24),h,holes:[],fillet:0,chamfer:0,shell:0,off:{x:0,y:0},feat:fn};cad.bodies.push(body);cad.activeBody=body.id;cad.bodySel=body.id;cad.solid=body;sorted.slice(0,2).forEach(e=>{e.padded=true;});feat(fn);cadSetWB('part');cadRenderViewport();cadTree();cadUpdateInfo();toast('Multi-sections solid added','ok');}
function resample(poly,n){const cx=poly.reduce((s,p)=>s+p.x,0)/poly.length,cy=poly.reduce((s,p)=>s+p.y,0)/poly.length;const out=[];for(let i=0;i<n;i++){const a=i/n*2*Math.PI;let best=poly[0],bd=1e9;poly.forEach(p=>{const pa=Math.atan2(p.y-cy,p.x-cx);let da=Math.abs(((pa-a+Math.PI)%(2*Math.PI))-Math.PI);if(da<bd){bd=da;best=p;}});out.push({x:best.x,y:best.y});}return out;}
function cadDress(kind){if(!cad.solid){toast('Pad a profile first','bad');return;}cadPush();const v=Math.max(0,+document.getElementById('cadVal').value||0);

function cadThread(){if(!cad.solid){toast('Pad a cylinder first','bad');return;}cadPush();cad.solid.thread=!cad.solid.thread;if(cad.solid.thread)feat('Thread.1');cadRenderViewport();cadTree();cadUpdateInfo();toast(cad.solid.thread?'Thread/Tap added':'Thread removed','ok');}
function cadSolidMirror(){if(!cad.solid){toast('Pad a profile first','bad');return;}cadPush();cad.solid.mirror=!cad.solid.mirror;feat('Mirror.1');cadRenderViewport();cadTree();cadUpdateInfo();toast('Mirror feature','ok');}
function cadPattern(kind){if(!cad.solid){toast('Pad a profile first','bad');return;}cadPush();cad.solid.pattern={kind,count:kind==='rect'?4:6};feat((kind==='rect'?'RectPattern':'CircPattern')+'.1');cadRenderViewport();cadTree();cadUpdateInfo();toast((kind==='rect'?'Rectangular':'Circular')+' pattern','ok');}

function cadRenderViewport(){if(cad.wb==='sketch')return cadRenderSketch();if(cad.wb==='part')return cadRenderSolid();if(cad.wb==='assembly'||cad.wb==='weld')return asmRender();if(cad.wb==='draft')return cadRenderViews();}
function cadGrid(){let g='';for(let x=0;x<=BW;x+=20)g+=`<line x1="${x}" y1="0" x2="${x}" y2="${BH}" stroke="rgba(255,255,255,${x%100?0.055:0.11})" stroke-width="1"/>`;for(let y=0;y<=BH;y+=20)g+=`<line x1="0" y1="${y}" x2="${BW}" y2="${y}" stroke="rgba(255,255,255,${y%100?0.055:0.11})" stroke-width="1"/>`;return g;}
function splinePath(pts,closed){if(!pts.length)return'';if(pts.length<2)return`M ${pts[0][0]} ${pts[0][1]}`;let d=`M ${pts[0][0]} ${pts[0][1]}`;const P=closed?pts.concat([pts[0]]):pts;for(let i=0;i<P.length-1;i++){const p0=P[i-1]||P[i],p1=P[i],p2=P[i+1],p3=P[i+2]||p2;const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0]} ${p2[1]}`;}return d;}
function arcPath(a){const x0=a.cx+a.r*Math.cos(a.a0),y0=a.cy+a.r*Math.sin(a.a0),x1=a.cx+a.r*Math.cos(a.a1),y1=a.cy+a.r*Math.sin(a.a1);let da=a.a1-a.a0;while(da<0)da+=2*Math.PI;return `M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${a.r} ${a.r} 0 ${da>Math.PI?1:0} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}`;}
function cadEntsSVG(){let s='';cad.ents.forEach(e=>{const on=e.id===cad.sel;const col=on?'#ffd23f':(e.green?'#7ee081':'#ffffff');const sw=on?2.6:1.7;
 if(e.type==='rect'){const p=rectPoly(e);const pts=p.map(q=>q.x.toFixed(1)+','+q.y.toFixed(1)).join(' ');s+=`<polygon points="${pts}" fill="rgba(255,255,255,.06)" stroke="${col}" stroke-width="${sw}"/><text x="${e.x+e.w/2}" y="${e.y-5}" fill="#d6ecff" font-family="monospace" font-size="10" text-anchor="middle">${Math.round(e.w)}×${Math.round(e.h)}</text>`;}
 else if(e.type==='circle'){s+=`<circle cx="${e.cx}" cy="${e.cy}" r="${e.r}" fill="rgba(255,255,255,.05)" stroke="${col}" stroke-width="${sw}"/><path d="M${e.cx-3} ${e.cy} h6 M${e.cx} ${e.cy-3} v6" stroke="${col}" stroke-width="1"/><text x="${e.cx}" y="${e.cy-e.r-5}" fill="#d6ecff" font-family="monospace" font-size="10" text-anchor="middle">ø${Math.round(e.r*2)}</text>`;}
 else if(e.type==='line'){s+=`<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="${col}" stroke-width="${sw}"/><text x="${(e.x1+e.x2)/2+4}" y="${(e.y1+e.y2)/2-4}" fill="#d6ecff" font-family="monospace" font-size="9.5">${Math.round(Math.hypot(e.x2-e.x1,e.y2-e.y1))}</text>`;}
 else if(e.type==='axis'){s+=`<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="${on?'#ffd23f':'#ffe07a'}" stroke-width="1.4" stroke-dasharray="8 4"/>`;}
 else if(e.type==='point'){s+=`<circle cx="${e.x}" cy="${e.y}" r="3" fill="${col}"/>`;}

 else if(e.type==='spline'||e.type==='profile'){s+=`<path d="${splinePath(e.pts,e.closed)}" fill="rgba(255,255,255,.05)" stroke="${col}" stroke-width="${sw}"/>`;e.pts.forEach(p=>s+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="${col}"/>`);}

function cadDraftSVG(){const d=cad.draft;if(!d)return'';const dc='#ffe07a';
 if(d.type==='rect'){const x=Math.min(d.x0,d.x1),y=Math.min(d.y0,d.y1),w=Math.abs(d.x1-d.x0),h=Math.abs(d.y1-d.y0);return`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${dc}" stroke-width="1.4" stroke-dasharray="5 3"/>`;}
 if(d.type==='circle'){const r=Math.hypot(d.x1-d.x0,d.y1-d.y0);return`<circle cx="${d.x0}" cy="${d.y0}" r="${r}" fill="none" stroke="${dc}" stroke-width="1.4" stroke-dasharray="5 3"/>`;}
 if(d.type==='line'||d.type==='axis'){return`<line x1="${d.x0}" y1="${d.y0}" x2="${d.x1}" y2="${d.y1}" stroke="${dc}" stroke-width="1.4" stroke-dasharray="5 3"/>`;}
 if(d.type==='spline'||d.type==='profile'){let s=`<path d="${splinePath(d.pts,false)}" fill="none" stroke="${dc}" stroke-width="1.4"/>`;d.pts.forEach(p=>s+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="${dc}"/>`);return s;}
 if(d.type==='arc'){let s=`<circle cx="${d.cx}" cy="${d.cy}" r="3" fill="${dc}"/>`;if(d.r)s+=`<circle cx="${d.cx}" cy="${d.cy}" r="${d.r}" fill="none" stroke="${dc}" stroke-width="1" stroke-dasharray="4 3"/>`;return s;}
 return'';}
function cadRenderSketch(){const svg=document.getElementById('cadSvg');if(!svg)return;const ox=BW/2,oy=BH/2;const P=PLANES[cad.plane]||PLANES.xy;

  +`<line x1="0" y1="${oy}" x2="${BW}" y2="${oy}" stroke="${P.hc}" stroke-opacity=".65" stroke-width="1.2"/>`
  +`<line x1="${ox}" y1="0" x2="${ox}" y2="${BH}" stroke="${P.vc}" stroke-opacity=".65" stroke-width="1.2"/>`

/* 3D */
function isoRaw(x,y,z){return [(x-y)*0.866,(x+y)*0.5-z];}
function fit3d(pts){const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);const bw=maxx-minx||1,bh=maxy-miny||1;const sc=Math.min(440/bw,300/bh);const tx=BW/2-(minx+bw/2)*sc,ty=BH/2-(miny+bh/2)*sc;return{sc,tx,ty};}
function fit2d(pts){const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);const bw=maxx-minx||1,bh=maxy-miny||1;const sc=Math.min(420/bw,270/bh);const tx=BW/2-(minx+bw/2)*sc,ty=BH/2-(miny+bh/2)*sc;return{sc,tx,ty};}
function unpaddedProfiles(){const out=[];cad.ents.forEach(e=>{if(e.padded)return;if(e.type==='rect'){out.push({pts:rectPoly(e).map(p=>[p.x,p.y]),closed:true});}else if(e.type==='circle'){out.push({pts:circPoly(e).map(p=>[p.x,p.y]),closed:true});}else if(e.type==='profile'||e.type==='spline'){if(e.pts&&e.pts.length>=2)out.push({pts:e.pts.slice(),closed:!!e.closed});}});return out;}
/* ---- orbit camera 3D ---- */
function projPt(x,y,z){const yaw=(cad.cam.yaw||0)*Math.PI/180,pit=(cad.cam.pitch||0)*Math.PI/180;const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pit),sp=Math.sin(pit);const x1=x*cy-y*sy,y1=x*sy+y*cy,z1=z;return {x:x1,y:(y1*sp-z1*cp),d:(z1*sp+y1*cp)};}
function fitProj(pts){const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);const minx=Math.min.apply(null,xs),maxx=Math.max.apply(null,xs),miny=Math.min.apply(null,ys),maxy=Math.max.apply(null,ys);const bw=(maxx-minx)||1,bh=(maxy-miny)||1;const sc=Math.min(470/bw,320/bh)*(cad.cam.zoom||1);const tx=BW/2-(minx+bw/2)*sc,ty=BH/2-(miny+bh/2)*sc;return{sc,tx,ty};}
function v_sub(a,b){return [a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function v_cross(a,b){return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function v_norm(a){const m=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/m,a[1]/m,a[2]/m];}
function shadeRGB(base,s){s=Math.max(0,Math.min(1,s));return `rgb(${Math.round(base[0]*s)},${Math.round(base[1]*s)},${Math.round(base[2]*s)})`;}
function faceShade(worldVerts){if(worldVerts.length<3)return 1;const n=v_norm(v_cross(v_sub(worldVerts[1],worldVerts[0]),v_sub(worldVerts[2],worldVerts[0])));const L=v_norm([-0.35,-0.5,0.82]);const d=Math.abs(n[0]*L[0]+n[1]*L[1]+n[2]*L[2]);return 0.44+0.56*d;}
function bodyVerts(b){const out=[];if(b.revolve){const bb=bboxOf(b.poly);const c={x:bb.minx+bb.w/2,y:bb.miny+bb.h/2};const r=b.radius||Math.max(bb.w,bb.h)/2,h=b.height||Math.max(bb.w,bb.h);for(let i=0;i<12;i++){const a=i/12*2*Math.PI;out.push([c.x+r*Math.cos(a),c.y+r*Math.sin(a),0]);out.push([c.x+r*Math.cos(a),c.y+r*Math.sin(a),h]);}return out;}
 if(b.loft){b.polyA.forEach(p=>out.push([p.x,p.y,0]));b.polyB.forEach(p=>out.push([p.x,p.y,b.h]));return out;}
 b.poly.forEach(p=>{out.push([p.x,p.y,0]);out.push([p.x,p.y,b.h]);});return out;}
function bodyFaces(b){const o=b.off||{x:0,y:0,z:0};const A=(p,z)=>[p.x+(o.x||0),p.y+(o.y||0),(z||0)+(o.z||0)];const sel=(b.id===cad.bodySel);const kind=sel?'sel':'metal';let F=[];
 if(b.loft){const P=b.polyA,Q=b.polyB,h=b.h,n=Math.min(P.length,Q.length);for(let i=0;i<n;i++){const j=(i+1)%n;F.push({w:[A(P[i],0),A(P[j],0),A(Q[j],h),A(Q[i],h)],k:kind});}F.push({w:Q.map(p=>A(p,h)),k:kind});F.push({w:P.map(p=>A(p,0)).reverse(),k:kind});return F;}
 if(b.revolve){const bb=bboxOf(b.poly);const c={x:bb.minx+bb.w/2,y:bb.miny+bb.h/2};const r=b.radius||Math.max(bb.w,bb.h)/2,h=b.height||Math.max(bb.w,bb.h);const N=30;const ring=z=>Array.from({length:N},(_,i)=>{const a=i/N*2*Math.PI;return A({x:c.x+r*Math.cos(a),y:c.y+r*Math.sin(a)},z);});const bt=ring(0),tp=ring(h);for(let i=0;i<N;i++){const j=(i+1)%N;F.push({w:[bt[i],bt[j],tp[j],tp[i]],k:kind});}F.push({w:tp,k:kind});F.push({w:bt.slice().reverse(),k:kind});return F;}
 const poly=b.poly,h=b.h;for(let i=0;i<poly.length;i++){const j=(i+1)%poly.length;F.push({w:[A(poly[i],0),A(poly[j],0),A(poly[j],h),A(poly[i],h)],k:kind});}
 F.push({w:poly.map(p=>A(p,h)),k:kind});F.push({w:poly.map(p=>A(p,0)).reverse(),k:kind});
 (b.holes||[]).forEach(hc=>{const N=16,dep=Math.min(h,8);const ring=z=>Array.from({length:N},(_,i)=>{const a=i/N*2*Math.PI;return A({x:hc.cx+hc.r*Math.cos(a),y:hc.cy+hc.r*Math.sin(a)},z);});const tp=ring(h),bt=ring(h-dep);for(let i=0;i<N;i++){const j=(i+1)%N;F.push({w:[tp[i],tp[j],bt[j],bt[i]],k:'hole'});}F.push({w:bt,k:'hole'});});
 if(b.thread){const bb=bboxOf(poly);const rr=Math.min(bb.w,bb.h)/2;for(let z=6;z<h;z+=6){F.push({w:[A({x:bb.minx+bb.w/2-rr,y:bb.miny+bb.h/2},z),A({x:bb.minx+bb.w/2+rr,y:bb.miny+bb.h/2},z),A({x:bb.minx+bb.w/2+rr,y:bb.miny+bb.h/2},z+1)],k:'thread'});}}

function cadRenderSolid(){const svg=document.getElementById('cadSvg');if(!svg)return;
 const un=unpaddedProfiles();
 if(!cad.bodies.length){
   const pr=cadProfile();
   if(pr){const flat=pr.poly.map(p=>[p.x,p.y]);const f=fit2d(flat);const T=p=>[(p[0]*f.sc+f.tx).toFixed(1),(p[1]*f.sc+f.ty).toFixed(1)];
     let hs='';(pr.holes||[]).forEach(hc=>{const cc=T([hc.cx,hc.cy]);hs+=`<circle cx="${cc[0]}" cy="${cc[1]}" r="${(hc.r*f.sc).toFixed(1)}" fill="#3f6ea6" stroke="#ffb84d" stroke-width="1.4" stroke-dasharray="4 3"/>`;});
     svg.innerHTML=`<g><polygon points="${flat.map(p=>T(p).join(',')).join(' ')}" fill="rgba(255,176,70,.14)" stroke="#ffb84d" stroke-width="2.4" stroke-dasharray="7 3"/>${hs}</g>`
      +`<text x="${BW/2}" y="34" fill="#eef6ff" font-family="monospace" font-size="13" text-anchor="middle">✓ Sketch selected — ready to Pad</text>`
      +`<text x="${BW/2}" y="${BH-22}" fill="#eef6ff" font-family="monospace" font-size="12" text-anchor="middle">Set the thickness in the Value box (top right), then click ⬆ Pad</text>`;
   } else { svg.innerHTML=`<text x="${BW/2}" y="${BH/2-6}" fill="#eef6ff" font-family="monospace" font-size="13" text-anchor="middle">No profile found</text><text x="${BW/2}" y="${BH/2+16}" fill="#cfe0f5" font-family="monospace" font-size="11" text-anchor="middle">Go to the Sketcher and draw a rectangle, circle or closed profile first</text>`; }
   cad._fit=null;return;
 }
 let faces=[];cad.bodies.forEach(b=>bodyFaces(b).forEach(fc=>faces.push(fc)));
 let ptsAll=[];
 faces.forEach(fc=>{fc.pv=fc.w.map(v=>{const q=projPt(v[0],v[1],v[2]);ptsAll.push(q);return q;});});
 un.forEach(pr=>{pr.pv=pr.pts.map(p=>{const q=projPt(p[0],p[1],0);ptsAll.push(q);return q;});});
 if(!ptsAll.length){svg.innerHTML='';cad._fit=null;return;}

 const S=q=>`${(f.tx+q.x*f.sc).toFixed(1)},${(f.ty+q.y*f.sc).toFixed(1)}`;
 let sk='';un.forEach(pr=>{sk+=`<polygon points="${pr.pv.map(S).join(' ')}" fill="rgba(255,176,70,.10)" stroke="#ffb84d" stroke-width="1.5" stroke-dasharray="6 3"/>`;});
 if(un.length)sk+=`<text x="${BW-14}" y="22" fill="#ffcf8a" font-family="monospace" font-size="10.5" text-anchor="end">${un.length} open sketch(es) — Pad to solidify</text>`;
 faces.forEach(fc=>{fc.depth=fc.pv.reduce((s,q)=>s+q.d,0)/fc.pv.length;fc.shade=faceShade(fc.w);});
 faces.sort((a,b)=>b.depth-a.depth);
 let bd='';faces.forEach(fc=>{let col,edge,ew;if(fc.k==='hole'){col=shadeRGB([34,40,50],Math.max(.5,fc.shade));edge='#20303f';ew=0.7;}else if(fc.k==='thread'){col='none';edge='#8a8770';ew=0.6;}else{const base=fc.k==='sel'?[214,192,110]:[186,182,164];col=shadeRGB(base,fc.shade);edge=fc.k==='sel'?'#b8912a':'rgba(38,36,30,.55)';ew=fc.k==='sel'?1.1:0.7;}bd+=`<polygon points="${fc.pv.map(S).join(' ')}" fill="${col}" stroke="${edge}" stroke-width="${ew}"/>`;});
 svg.innerHTML=sk+bd+axisTriad()+partLabel();
}
function axisTriad(){const o={x:56,y:BH-40},L=24;const arr=(vx,vy,vz,col,lbl)=>{const q=projPt(vx,vy,vz);const ex=o.x+q.x*L,ey=o.y+q.y*L;return `<line x1="${o.x}" y1="${o.y}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="${col}" stroke-width="2"/><circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="2" fill="${col}"/><text x="${(ex+(q.x>=0?4:-9)).toFixed(1)}" y="${(ey+4).toFixed(1)}" fill="${col}" font-family="monospace" font-size="10">${lbl}</text>`;};return `<g opacity="0.96">${arr(1,0,0,'#ff6a6a','X')}${arr(0,1,0,'#6ee08a','Y')}${arr(0,0,1,'#7bb0ff','Z')}</g>`;}
function partLabel(){const n=cad.bodies.length;const sel=cad.bodies.find(b=>b.id===cad.bodySel);let t=`▸ ${n} solid${n>1?'s':''} · drag empty space to rotate · scroll to zoom`;if(sel)t=`▸ ${sel.feat} selected — drag to move · drag empty space to rotate`;return `<text x="14" y="${BH-14}" fill="#e6f0fb" font-family="monospace" font-size="11">${t}</text>`;}
function cadPartHit(p){const f=cad._fit;if(!f)return null;let found=null,fd=1e9;cad.bodies.forEach(b=>{const o=b.off||{x:0,y:0,z:0};const verts=bodyVerts(b).map(v=>{const q=projPt(v[0]+(o.x||0),v[1]+(o.y||0),v[2]+(o.z||0));return {x:f.tx+q.x*f.sc,y:f.ty+q.y*f.sc,d:q.d};});const h=hull(verts);if(h.length>=3&&inPoly(p.x,p.y,h)){const ad=verts.reduce((s,q)=>s+q.d,0)/verts.length;if(ad<fd){fd=ad;found=b.id;}}});return found;}
function partDown(e){const p=cadPtRaw(e);const id=cadPartHit(p);if(id){cad.bodySel=id;cad.activeBody=id;cad.solid=cad.bodies.find(b=>b.id===id);cad.drag={mode:'move',id,ox:p.x,oy:p.y};toast('Selected '+cad.solid.feat+' — drag to move it, or drag empty space to rotate','ok');}else{cad.bodySel=null;cad.drag={mode:'orbit',ox:p.x,oy:p.y};const sv=document.getElementById('cadSvg');if(sv)sv.style.cursor='grabbing';}cadRenderViewport();cadTree();cadUpdateInfo();}
function partMove(e){if(!cad.drag)return;const p=cadPtRaw(e);const dx=p.x-cad.drag.ox,dy=p.y-cad.drag.oy;
 if(cad.drag.mode==='orbit'){cad.cam.yaw=(cad.cam.yaw+dx*0.55)%360;cad.cam.pitch=Math.max(-89,Math.min(89,cad.cam.pitch-dy*0.55));cad.drag.ox=p.x;cad.drag.oy=p.y;cadRenderViewport();return;}
 if(cad.drag.mode==='move'){const b=cad.bodies.find(x=>x.id===cad.drag.id);if(b){const f=cad._fit||{sc:1};const yaw=cad.cam.yaw*Math.PI/180,pit=cad.cam.pitch*Math.PI/180;const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pit),sp=Math.sin(pit);const R=[cy,-sy,0],U=[sy*sp,cy*sp,-cp];const wx=dx/f.sc,wy=dy/f.sc;b.off=b.off||{x:0,y:0,z:0};b.off.x+=wx*R[0]+wy*U[0];b.off.y+=wx*R[1]+wy*U[1];b.off.z=(b.off.z||0)+wx*R[2]+wy*U[2];cad.drag.ox=p.x;cad.drag.oy=p.y;cadRenderViewport();}}}
function cadWheel(e){if(cad.wb!=='part')return;e.preventDefault();const s=e.deltaY<0?1.12:0.89;cad.cam.zoom=Math.max(0.35,Math.min(4.5,(cad.cam.zoom||1)*s));cadRenderViewport();}
function cadView(v){const M={iso:[35,28],front:[0,2],back:[180,2],top:[0,89],bottom:[0,-89],right:[90,2],left:[-90,2]};const a=M[v]||M.iso;cad.cam.yaw=a[0];cad.cam.pitch=a[1];cadRenderViewport();toast(v.charAt(0).toUpperCase()+v.slice(1)+' view','ok');}

function cadGenViews(){cad.drafted=true;cadRenderViews();cadUpdateInfo();toast('Views generated','ok');}
function cadRenderViews(){const svg=document.getElementById('cadSvg');if(!cad.solid){svg.innerHTML=`<text x="${BW/2}" y="${BH/2}" fill="#eef" font-family="monospace" font-size="13" text-anchor="middle">Create a part first (Part Design ▸ Pad)</text>`;return;}
 const s=cad.solid;let poly=s.poly||s.polyA||[{x:0,y:0},{x:80,y:0},{x:80,y:50},{x:0,y:50}];const bb=bboxOf(poly);const h=s.h||s.height||20;
 const sc=Math.min(150/Math.max(bb.w,1),110/Math.max(bb.h,1),1.4);const W=bb.w*sc,Hh=bb.h*sc,TH=h*sc;
 function frame(x,y,w,hh,label){return `<rect x="${x}" y="${y}" width="${w}" height="${hh}" fill="#fff" stroke="#333" stroke-width="1"/><text x="${x+6}" y="${y+16}" font-family="monospace" font-size="11" fill="#333">${label}</text>`;}
 const topPts=poly.map(p=>`${(60+(p.x-bb.minx)*sc).toFixed(1)},${(70+(p.y-bb.miny)*sc).toFixed(1)}`).join(' ');
 let svgh=`<rect x="0" y="0" width="${BW}" height="${BH}" fill="#f4f4ee"/>`;
 svgh+=frame(30,40,200,150,'TOP VIEW')+`<polygon points="${topPts}" fill="none" stroke="#c0202f" stroke-width="1.4"/>`;
 svgh+=frame(260,40,180,150,'FRONT VIEW')+`<rect x="290" y="90" width="${W.toFixed(1)}" height="${TH.toFixed(1)}" fill="none" stroke="#c0202f" stroke-width="1.4"/>`;
 svgh+=frame(30,210,200,150,'SIDE VIEW')+`<rect x="70" y="250" width="${TH.toFixed(1)}" height="${Hh.toFixed(1)}" fill="none" stroke="#c0202f" stroke-width="1.4"/>`;
 svgh+=frame(260,210,180,150,'ISOMETRIC')+`<text x="300" y="290" font-family="monospace" font-size="10" fill="#666">length ${Math.round(bb.w)} · width ${Math.round(bb.h)} · thk ${Math.round(h)}</text>`;
 svg.innerHTML=svgh;}
/* Assembly */
const ASMLIB=[{n:'Main Plate',w:150,h:60,c:'#9fb6cf',hole:1},{n:'Cover Plate',w:180,h:34,c:'#b7c8dc',hole:1},{n:'Rivet',w:22,h:70,c:'#d08b3a'},{n:'Bell Crank',w:90,h:70,c:'#c0b28a',hole:1},{n:'Push-Pull Rod',w:200,h:22,c:'#a9c0a0'},{n:'Aileron',w:110,h:44,c:'#8ea9c6'}];
function asmAct(a){if(a==='insert')return asmInsert();const c=cad.asm.find(x=>x.id===cad.asmSel);if(!c){toast('Select a component first','bad');return;}
 const fix=cad.asm.find(x=>x.fixed&&x.id!==c.id)||cad.asm.find(x=>x.id!==c.id);cadPush();
 if(a==='fix'){c.fixed=!c.fixed;asmCn('Fix',c);toast(c.fixed?'Fixed':'Unfixed','ok');}
 else if(a==='coinc'){if(fix){const hx=fix.x+fix.w/2,hy=fix.y+fix.h/2;c.x=hx-c.w/2;c.y=hy-c.h/2;asmCn('Coincidence',c,fix);toast(c.base==='Rivet'?'Rivet snapped into the hole':'Coincidence applied','ok');}else toast('Add another component to constrain to','bad');}
 else if(a==='contact'){if(fix){c.x=fix.x+fix.w/2-c.w/2;c.y=fix.y-c.h;asmCn('Contact',c,fix);toast('Contact','ok');}}
 else if(a==='aoffset'){if(fix){c.x=fix.x+fix.w+18;c.y=fix.y;asmCn('Offset',c,fix);toast('Offset','ok');}}
 else if(a==='angle'){c.angle=((c.angle||0)+20)%360;asmCn('Angle',c);toast('Angle +20°','ok');}
 asmRender();cadTree();cadUpdateInfo();}
function asmInsert(){cadPush();const lib=ASMLIB[cad.insIdx%ASMLIB.length];cad.insIdx++;const n=cad.asm.filter(x=>x.base===lib.n).length;cad.asm.push({id:cadId(),base:lib.n,name:lib.n+(n?'.'+(n+1):'.1'),x:90+cad.asm.length*26,y:150+cad.asm.length*16,w:lib.w,h:lib.h,c:lib.c,hole:lib.hole,angle:0,fixed:false});cad.asmSel=cad.asm[cad.asm.length-1].id;asmRender();cadTree();cadUpdateInfo();toast('Inserted '+lib.n,'ok');}
function asmCn(kind,c,t){cad.asmC.push(kind+'.'+cad.asmC.length+' ('+(c?c.name:'')+(t?' → '+t.name:'')+')');}
function asmWeld(){if(cad.asm.length<2){toast('Insert two components to weld','bad');return;}const c=cad.asm.find(x=>x.id===cad.asmSel)||cad.asm[cad.asm.length-1];const o=cad.asm.find(x=>x.id!==c.id);cadPush();cad.welds.push({x:c.x,y:c.y});asmCn('FilletWeld',c,o);asmRender();cadTree();cadUpdateInfo();toast('Fillet weld applied','ok');}
function asmDown(e){const p=cadPt(e);let hit=null;for(let i=cad.asm.length-1;i>=0;i--){const c=cad.asm[i];if(p.x>=c.x&&p.x<=c.x+c.w&&p.y>=c.y&&p.y<=c.y+c.h){hit=c;break;}}cad.asmSel=hit?hit.id:null;if(hit&&cad.tool==='manip'&&!hit.fixed)cad.drag={id:hit.id,ox:p.x,oy:p.y,asm:true};asmRender();cadUpdateInfo();}
function asmMove(e){if(cad.drag&&cad.drag.asm){const p=cadPt(e);const c=cad.asm.find(x=>x.id===cad.drag.id);if(c){c.x+=p.x-cad.drag.ox;c.y+=p.y-cad.drag.oy;cad.drag.ox=p.x;cad.drag.oy=p.y;asmRender();}}}
function asmRender(){const svg=document.getElementById('cadSvg');if(!svg)return;let s=cadGrid();
 cad.asm.forEach(c=>{const on=c.id===cad.asmSel;const cx=c.x+c.w/2,cy=c.y+c.h/2;s+=`<g transform="rotate(${c.angle||0} ${cx} ${cy})"><rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="4" fill="${c.c}" stroke="${on?'#ffd23f':'#22364d'}" stroke-width="${on?2.6:1.4}" opacity="0.94"/>`;
  if(c.hole)s+=`<circle cx="${cx}" cy="${cy}" r="6" fill="none" stroke="#22364d" stroke-width="1.2"/>`;
  s+=`<text x="${cx}" y="${c.y-5}" font-family="monospace" font-size="10" fill="#eef5ff" text-anchor="middle">${c.name}${c.fixed?' ⚓':''}</text></g>`;});
 cad.welds.forEach(w=>{s+=`<polygon points="${w.x},${w.y} ${w.x+16},${w.y} ${w.x},${w.y+16}" fill="#e0402a"/>`;});
 if(!cad.asm.length)s+=`<text x="${BW/2}" y="${BH/2}" fill="#eef5ff" font-family="monospace" font-size="13" text-anchor="middle">Insert components (Existing Component), then apply constraints</text>`;
 svg.innerHTML=s;}

function cadTree(){const el=document.getElementById('cadTree');if(!el)return;let h='';
 if(cad.wb==='assembly'||cad.wb==='weld'){

 else {

   if(!cad.ents.length&&!cad.feats.length)h+=`<div class="node" style="opacity:.65">(pick a plane, then draw)</div>`;

 }
 el.innerHTML=h;}

function cadRenderProcedure(){const el=document.getElementById('cadProcedure');if(!el)return;const ch=CADCH.find(c=>c.id===cad.challenge);if(!ch){el.innerHTML='';return;}const done=cad.procDone[ch.id]||(cad.procDone[ch.id]={});const who=cad.student?`<span class="proc-sub">Signed in: ${cad.student.name} · ${cad.student.reg}</span>`:'<span class="proc-sub">Follow these steps in the studio above</span>';let h=`<div class="proc-head"><span class="proc-tag">PROCEDURE</span><b>${ch.name}</b>${who}<button class="proc-save" onclick="cadSavePDF()">💾 Save my design (PDF)</button></div><ol class="proc-list">`;ch.steps.forEach((st,i)=>{const dn=done[i]?'done':'';h+=`<li class="${dn}" onclick="cadToggleStep(${i})"><span class="proc-ck">${done[i]?'✓':(i+1)}</span><span class="proc-txt">${st}</span></li>`;});h+='</ol>';el.innerHTML=h;}

let camState={rot:0,playing:true,raf:null,last:0};
function drawCam(){
 const cx=200,cy=185,R0=54,bump=20,rollR=11;
 const camR=a=>R0+bump*Math.cos(a);
 let pts='';
 for(let i=0;i<=72;i++){const a=i/72*2*Math.PI;const r=camR(a-camState.rot);pts+=(cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)+' ';}
 const contact=camR(-Math.PI/2-camState.rot);
 const rollerY=cy-contact-rollR;
 const lift=contact-(R0-bump);
 const angDeg=Math.round(((camState.rot*180/Math.PI)%360+360)%360);
 const kx=cx+R0*Math.cos(-camState.rot), ky=cy+R0*Math.sin(-camState.rot);
 document.getElementById('camStage').innerHTML=`<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
   <line x1="60" y1="185" x2="340" y2="185" stroke="#4a3d40" stroke-width="1" stroke-dasharray="3 3"/>
   <polygon points="${pts}" fill="rgba(255,59,70,.12)" stroke="#ff3b46" stroke-width="2.2"/>
   <line x1="${cx}" y1="${cy}" x2="${kx.toFixed(1)}" y2="${ky.toFixed(1)}" stroke="#7a5b5d" stroke-width="1.5"/>
   <circle cx="${cx}" cy="${cy}" r="6" fill="#ff8087"/>
   <line x1="${cx}" y1="${(rollerY-46).toFixed(1)}" x2="${cx}" y2="${rollerY.toFixed(1)}" stroke="#c6b3b4" stroke-width="5"/>
   <rect x="${cx-17}" y="${(rollerY-62).toFixed(1)}" width="34" height="16" fill="none" stroke="#c6b3b4" stroke-width="2"/>
   <circle cx="${cx}" cy="${rollerY.toFixed(1)}" r="${rollR}" fill="rgba(200,180,180,.1)" stroke="#c6b3b4" stroke-width="2.4"/>
   <text x="150" y="305" fill="#8a6f70" font-family="monospace" font-size="11">rotary → reciprocating motion</text></svg>`;
 document.getElementById('camAngle').textContent=angDeg+'°';
 document.getElementById('camLift').textContent=lift.toFixed(0);
}
function camLoop(ts){
 if(!camState.last)camState.last=ts;const dt=(ts-camState.last)/1000;camState.last=ts;
 const el=document.getElementById('camSpeed');const sp=el?(+el.value)/100:.45;
 if(camState.playing) camState.rot+=dt*sp*3.2;
 if(document.getElementById('camStage')) drawCam();
 camState.raf=requestAnimationFrame(camLoop);
}
function toggleCam(){camState.playing=!camState.playing;const b=document.getElementById('camPlay');b.textContent=camState.playing?'⏸ Pause':'▶ Play';b.classList.toggle('on',camState.playing);}
function renderLink(){
 const t=(+document.getElementById('linkInput').value)/100;
 const bellDeg=t*28, ailDeg=t*20;
 const pivot={x:175,y:185}, R=44, b=bellDeg*Math.PI/180;
 const inBase=142*Math.PI/180, outBase=38*Math.PI/180;
 const inEnd={x:pivot.x+R*Math.cos(inBase+b), y:pivot.y-R*Math.sin(inBase+b)};
 const outEnd={x:pivot.x+R*Math.cos(outBase+b), y:pivot.y-R*Math.sin(outBase+b)};
 const pilot={x:52, y:inEnd.y};
 const hornBase={x:300, y:outEnd.y};
 const hinge={x:322,y:150}, al=52, ar=ailDeg*Math.PI/180;
 const tip={x:hinge.x+al*Math.cos(ar), y:hinge.y+al*Math.sin(ar)};
 document.getElementById('linkStage').innerHTML=`<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
   <circle cx="${pilot.x}" cy="${pilot.y.toFixed(1)}" r="8" fill="#ff8087"/><text x="34" y="${(pilot.y-14).toFixed(1)}" fill="#8a6f70" font-family="monospace" font-size="10">pilot</text>
   <line x1="${pilot.x}" y1="${pilot.y.toFixed(1)}" x2="${inEnd.x.toFixed(1)}" y2="${inEnd.y.toFixed(1)}" stroke="#ff3b46" stroke-width="4"/>
   <polygon points="${pivot.x},${pivot.y} ${inEnd.x.toFixed(1)},${inEnd.y.toFixed(1)} ${outEnd.x.toFixed(1)},${outEnd.y.toFixed(1)}" fill="rgba(255,59,70,.14)" stroke="#ff5560" stroke-width="2"/>
   <circle cx="${pivot.x}" cy="${pivot.y}" r="5" fill="#ff8087"/><text x="${pivot.x-24}" y="${pivot.y+22}" fill="#8a6f70" font-family="monospace" font-size="9">bell crank</text>
   <line x1="${outEnd.x.toFixed(1)}" y1="${outEnd.y.toFixed(1)}" x2="${hornBase.x}" y2="${hornBase.y.toFixed(1)}" stroke="#ff3b46" stroke-width="4"/>
   <line x1="${hornBase.x}" y1="${hornBase.y.toFixed(1)}" x2="${hinge.x}" y2="${hinge.y}" stroke="#c6b3b4" stroke-width="3"/>
   <rect x="${hinge.x}" y="${hinge.y-9}" width="4" height="18" fill="#ff8087"/>
   <line x1="${hinge.x}" y1="${hinge.y}" x2="${tip.x.toFixed(1)}" y2="${tip.y.toFixed(1)}" stroke="#c6b3b4" stroke-width="8" stroke-linecap="round"/>
   <text x="270" y="${hinge.y-16}" fill="#8a6f70" font-family="monospace" font-size="9">aileron</text>
   <text x="120" y="305" fill="#8a6f70" font-family="monospace" font-size="11">pilot → rod → bell crank → rod → aileron</text></svg>`;
 document.getElementById('linkBell').textContent=Math.round(bellDeg)+'°';
 document.getElementById('linkAil').textContent=(ailDeg>0?'+':'')+Math.round(ailDeg)+'°';
}
let rivType='lap';
function setRiv(t){rivType=t;document.getElementById('rivLap').classList.toggle('on',t==='lap');document.getElementById('rivButt').classList.toggle('on',t==='butt');renderRiv();}
function renderRiv(){

/* ================= TOOLTIP ================= */
function initTooltip(){
 if(document.getElementById('svgtip')) return;
 const tip=document.createElement('div');tip.id='svgtip';document.body.appendChild(tip);
 document.addEventListener('mousemove',e=>{
   let node=e.target,t=null,hop=0;
   while(node&&node.getAttribute&&hop<5){const v=node.getAttribute('data-tip');if(v){t=v;break;}node=node.parentNode;hop++;}
   if(t){tip.textContent=t;tip.classList.add('show');tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+16)+'px';}
   else tip.classList.remove('show');
 });
}

/* ===== student sign-in + save design as PDF ===== */
function cadEnterStudio(){cad.student=cad.student||load('student',null);if(!cad.student){const m=document.getElementById('studentModal');if(m){const nm=document.getElementById('stName'),rg=document.getElementById('stReg');if(nm)nm.value='';if(rg)rg.value='';m.classList.add('show');}}else{cadRenderProcedure();}}
function saveStudent(){const nm=document.getElementById('stName'),rg=document.getElementById('stReg');const n=(nm&&nm.value||'').trim(),r=(rg&&rg.value||'').trim();if(!n||!r){toast('Please enter both your name and register number','bad');return;}cad.student={name:n,reg:r};save('student',cad.student);const m=document.getElementById('studentModal');if(m)m.classList.remove('show');cadRenderProcedure();toast('Welcome, '+n.split(' ')[0]+'! You can now save your designs.','ok');}
function cadRequireStudent(){cad.student=cad.student||load('student',null);if(!cad.student){cadEnterStudio();toast('Enter your name and register number first','bad');return false;}return true;}
function cadSavePDF(){if(!cadRequireStudent())return;const svg=document.getElementById('cadSvg');if(!svg||!svg.innerHTML.trim()){toast('Draw or model something first','bad');return;}const ch=CADCH.find(c=>c.id===cad.challenge);const clone=svg.cloneNode(true);clone.setAttribute('xmlns','http://www.w3.org/2000/svg');clone.setAttribute('width',BW);clone.setAttribute('height',BH);const xml=new XMLSerializer().serializeToString(clone);let src;try{src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));}catch(e){toast('Could not encode the drawing','bad');return;}const img=new Image();img.onload=function(){try{const scale=2,cw=BW*scale,chh=BH*scale;const cv=document.createElement('canvas');cv.width=cw;cv.height=chh;const ctx=cv.getContext('2d');ctx.fillStyle='#3f6ea6';ctx.fillRect(0,0,cw,chh);ctx.drawImage(img,0,0,cw,chh);const png=cv.toDataURL('image/jpeg',0.92);buildDesignPDF(png,ch);}catch(err){toast('Could not capture the viewport','bad');}};img.onerror=function(){toast('Could not render the drawing to an image','bad');};img.src=src;}
function buildDesignPDF(png,ch){const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});const W=297,H=210;doc.setFillColor(16,10,11);doc.rect(0,0,W,26,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(15);doc.text('Technical Drawing Lab · CATIA V5',14,12);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(224,60,70);doc.text('Course 24PBAV32 · Student Design Record',14,19.5);doc.setTextColor(22,15,14);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('Name: '+cad.student.name,14,36);doc.text('Register No: '+cad.student.reg,150,36);doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(90,80,78);const exp=ch?ch.name.replace(/·/g,'-'):'Free modelling';doc.text('Experiment: '+exp,14,43);doc.text('Date: '+new Date().toLocaleString(),150,43);const iw=213,ih=iw*BH/BW,ix=(W-iw)/2,iy=49;doc.setDrawColor(150,150,150);doc.setLineWidth(0.4);doc.rect(ix-1,iy-1,iw+2,ih+2);doc.addImage(png,'JPEG',ix,iy,iw,ih);doc.setFontSize(8);doc.setTextColor(120,110,108);doc.text('Generated in the CATIA V5 Studio · for learning use only — not valid for job or internship applications.',14,H-7);const safe=(cad.student.reg||'design').replace(/[^\w-]+/g,'_');doc.save('CATIA_Design_'+safe+'_'+(ch?ch.id:'part')+'.pdf');toast('Design saved as PDF','ok');}
