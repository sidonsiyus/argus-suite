<!doctype html>
<html lang="en" data-theme="night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>Wind Tunnel Simulator</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Wind Tunnel Simulator","short_name":"WindTunnel","start_url":".","display":"standalone","background_color":"%230b0b0d","theme_color":"%230b0b0d"}'>
<style>
:root{
  --bg:#0b0b0d; --panel:#141418; --panel2:#1b1b21; --raise:#26262e; --ink:#f0eef1; --muted:#98949c; --faint:#615d68; --line:#2a2a32; --steel:#45424d; --canvasbg:#070709;
  --flow:#ff3b47; --lift:#35d07f; --drag:#ffa733; --shock:#ff4d6d; --mach:#b57bff; --glow:255,59,71;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --cond:"Arial Narrow","Roboto Condensed",system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
  --rail:80px;
}
html[data-theme="day"]{
  --bg:#e8e5e8; --panel:#ffffff; --panel2:#f3f0f3; --raise:#eae5ea; --ink:#191418; --muted:#5f5964; --faint:#8b8590; --line:#ddd7dd; --steel:#c3bcc6; --canvasbg:#141018;
  --flow:#d61f2b; --lift:#1f9d5f; --drag:#c9701a; --shock:#d61f45; --mach:#6d4fc8; --glow:214,31,43;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;color:inherit}
h1,h2,h3,h4{margin:0}
.mono{font-family:var(--mono)}
.cond{font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.hidden{display:none!important}
:focus-visible{outline:2px solid var(--flow);outline-offset:2px}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

#app{display:grid;grid-template-columns:var(--rail) 1fr;height:100%}
.rail{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:5px;overflow:auto}
.brandmark{width:48px;height:48px;border-radius:13px;background:linear-gradient(150deg,color-mix(in srgb,var(--flow) 30%,var(--panel2)),var(--panel));box-shadow:0 0 20px -6px rgba(var(--glow),.5);border:1px solid var(--line);display:grid;place-items:center;position:relative;margin-bottom:8px;flex:none}
.brandmark svg{width:28px;height:28px}
.rail-btn{width:60px;min-height:54px;border-radius:12px;background:transparent;border:1px solid transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.15s;flex:none;padding:5px}
.rail-btn svg{width:22px;height:22px}
.rail-btn span{font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;font-size:9px;font-weight:700;text-align:center;line-height:1.05}
.rail-btn:hover{color:var(--ink);background:var(--panel2)}
.rail-btn.on{color:var(--flow);background:var(--panel2);border-color:color-mix(in srgb,var(--flow) 35%,var(--line));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--flow) 45%,transparent),0 0 22px -8px rgba(var(--glow),.6)}
.rail .spacer{flex:1;min-height:8px}
.rail-mini{width:46px;height:40px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;flex:none;margin-top:5px}
.rail-mini svg{width:19px;height:19px}
.rail-mini:hover{color:var(--ink)}

main{overflow:auto;position:relative}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:16px 34px;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);flex-wrap:wrap}
.topbar .tt{display:flex;flex-direction:column;line-height:1.15}
.topbar .tt .ey{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--flow);text-transform:uppercase}
.topbar .tt h1{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:20px;font-weight:700}
.topbar .fill{flex:1}
.chip{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:var(--panel);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.chip b{color:var(--ink)}
.chip .airdot{width:8px;height:8px;border-radius:50%;background:var(--flow)}
.view{padding:34px 38px 56px;max-width:1380px;margin:0 auto}

.lab{display:grid;grid-template-columns:1fr 356px;gap:26px}
@media(max-width:960px){.lab{grid-template-columns:1fr}}
.stage{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:14px;position:relative}
.stage canvas{width:100%;display:block;border-radius:12px;background:var(--canvasbg);touch-action:none}

.stage .cap{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
.side{display:flex;flex-direction:column;gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.card h3{font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .i{color:var(--flow)}

.ctrl{margin:10px 0}
.ctrl .lab-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px}
.ctrl .lab-row .v{font-family:var(--mono);color:var(--flow)}
.slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--flow);border:2px solid var(--bg);cursor:pointer}
.slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--flow);border:2px solid var(--bg);cursor:pointer}
select,input[type=text],input[type=number]{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);font-family:var(--sans);font-size:14px}
select:focus,input:focus{outline:none;border-color:var(--flow)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-wrap:wrap}
.seg button{padding:7px 11px;background:var(--panel2);border:none;font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;font-weight:700;font-size:11px;color:var(--muted)}
.seg button.on{background:var(--flow);color:#150406}
#subView button{flex:1;padding:7px 3px;font-size:10px;letter-spacing:.01em}
.btn{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-weight:700;font-size:12px;border-radius:9px;padding:9px 14px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.15s}
.btn:hover{border-color:var(--steel)}
.btn.pri{background:var(--flow);color:#150406;border-color:var(--flow);box-shadow:0 0 18px -6px rgba(var(--glow),.7)}
.btn.pri:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--shock);border-color:color-mix(in srgb,var(--shock) 45%,var(--line))}
.btn.sm{padding:6px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap}

.gauges{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.g .gv{font-family:var(--cond);font-size:22px;font-weight:700;line-height:1}
.g .gl{font-family:var(--mono);font-size:9px;letter-spacing:.09em;color:var(--faint);text-transform:uppercase;margin-top:3px}
.g.flow .gv{color:var(--flow)} .g.lift .gv{color:var(--lift)} .g.drag .gv{color:var(--drag)} .g.shock .gv{color:var(--shock)} .g.mach .gv{color:var(--mach)}

.plots{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.plots{grid-template-columns:1fr}}
.analysis{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:22px}
@media(max-width:900px){.analysis{grid-template-columns:1fr}}
.stage.d3 canvas{cursor:grab}
.stage.d3 canvas:active{cursor:grabbing}
.viewbar{position:absolute;top:14px;right:14px;display:flex;gap:6px;z-index:3}
.vbtn{background:color-mix(in srgb,var(--panel2) 82%,transparent);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 9px;font-size:11px;font-family:var(--cond);letter-spacing:.03em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(4px)}
.vbtn:hover{color:var(--ink);border-color:var(--flow)}
.vbtn.on{color:var(--flow);border-color:color-mix(in srgb,var(--flow) 45%,var(--line))}
.d3hint{position:absolute;bottom:12px;left:14px;font-size:11px;color:var(--faint);font-family:var(--mono);pointer-events:none}
.probebar{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:12px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;min-height:44px}
.probebar .pk{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--flow);font-weight:700}
.probebar .pv{font-size:12px;font-family:var(--mono)}
.probebar .pu{display:flex;flex-direction:column;line-height:1.15}
.probebar .pu b{font-family:var(--mono);font-size:15px;color:var(--ink);font-weight:600}
.probebar .pu i{font-style:normal;font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.fieldpanel{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:12px;padding:12px 15px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
@media(max-width:620px){.fieldpanel{grid-template-columns:1fr}}
.fieldpanel .fp-h{font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;font-size:11px;color:var(--muted);margin-bottom:7px}
.fieldpanel .fp-stats{display:flex;gap:16px;margin-top:8px;font-size:11px;font-family:var(--mono);color:var(--faint)}
.fieldpanel .fp-stats b{color:var(--ink);font-size:13px}
.circuitcard{margin-top:22px}
.circuithead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.circuithead h3{margin:0}
.circuitnote{color:var(--muted);font-size:13px;line-height:1.6;margin:14px 2px 2px}
.circuitnote b{color:var(--ink)}
.plot{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px}
.plot .pt{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-bottom:6px}
.plot canvas{width:100%;display:block;border-radius:6px;background:var(--panel2)}

.labstep{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--muted);transition:background .15s}
.labstep:hover{background:var(--panel2)}
.labstep.done{color:var(--ink)}
.labstep .lschk{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;color:var(--flow);font-size:12px;flex:none}
.labstep.done .lschk{border-color:var(--flow);background:color-mix(in srgb,var(--flow) 18%,transparent)}
.labstep .lstx{flex:1}
.badgeline{display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 0}
.badgeline .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none}
.badgeline.done .dot{background:var(--lift)}
.pill{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-weight:700;font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
.pill.ok{color:var(--lift);border-color:color-mix(in srgb,var(--lift) 45%,var(--line))}
.pill.warn{color:var(--drag);border-color:color-mix(in srgb,var(--drag) 45%,var(--line))}
.pill.shock{color:var(--shock);border-color:color-mix(in srgb,var(--shock) 45%,var(--line))}

.sec-head{display:flex;align-items:center;gap:14px;margin:40px 2px 20px}
.sec-head .n{font-family:var(--mono);font-size:12px;color:var(--flow);letter-spacing:.1em}
.sec-head h2{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:17px}
.sec-head .rule{flex:1;height:1px;background:var(--line)}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
.tbl th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}
.tbl td.mono{font-family:var(--mono)}

.lib{display:flex;flex-direction:column;gap:8px}
.lib-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
.lib-item.on{border-color:var(--flow)}
.lib-item .nm{font-weight:600;font-size:14px}
.lib-item .mt{font-family:var(--mono);font-size:11px;color:var(--muted)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px}
.tcard .tn{font-family:var(--mono);font-size:11px;color:var(--flow);letter-spacing:.06em}
.tcard h4{margin:6px 0 6px;font-size:15px}
.tcard p{margin:0;font-size:13px;color:var(--muted)}
.quiz{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:10px}
.quiz .q{font-size:14px;margin-bottom:8px}
.qopt{display:block;width:100%;text-align:left;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--panel);margin:6px 0;font-size:13px}
.qopt.correct{border-color:var(--lift);color:var(--lift)} .qopt.wrong{border-color:var(--shock);color:var(--shock)}

.cert-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;text-align:center;margin-top:8px}
.cert-box canvas{max-width:100%;border-radius:10px;border:1px solid var(--line);margin:14px auto 0;display:block}

.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(4,7,11,.66);backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(500px,100%);padding:26px;position:relative;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;font-size:20px;margin-bottom:4px}
.modal .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-bottom:6px}
.modal .x{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px}
.adm-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.adm-item:last-child{border-bottom:none}
.adm-item .ai-t{font-size:14px}.adm-item .ai-d{font-size:12px;color:var(--muted)}
.switch{width:42px;height:24px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);position:relative;transition:.15s;flex:none}
.switch.on{background:var(--flow);border-color:var(--flow)}
.switch i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--ink);transition:.15s}
.switch.on i{left:20px;background:#150406}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:var(--raise);border:1px solid var(--steel);border-radius:11px;padding:12px 18px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .ic{color:var(--flow);margin-right:8px}

@media(max-width:720px){:root{--rail:62px}.view{padding:16px}.topbar{padding:11px 14px}.gauges{grid-template-columns:1fr 1fr}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>
<div id="app">
  <nav class="rail" id="rail">
    <div class="brandmark"><svg viewBox="0 0 24 24" fill="none" stroke="var(--flow)" stroke-width="1.7"><path d="M2 8c6 0 6 3 12 3s6-3 8-3M2 13c6 0 6 3 12 3s6-3 8-3M2 18c5 0 6 2 10 2"/></svg></div>
    <button class="rail-btn on" data-nav="airfoil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 15c6-9 15-9 18-6-6 1-9 4-18 6z"/><path d="M3 15h18"/></svg><span>Airfoil</span></button>
    <button class="rail-btn" data-nav="subsonic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 7h20M2 12h20M2 17h20"/><path d="M9 12c3-4 6-4 8 0"/></svg><span>Subsonic</span></button>
    <button class="rail-btn" data-nav="supersonic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4l8 8-8 8"/><path d="M10 6l6 6-6 6"/></svg><span>Supersonic</span></button>
    <button class="rail-btn" data-nav="transonic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 14c4-8 7-8 9 0"/><path d="M13 6v12"/><path d="M13 8l6 4-6 4"/></svg><span>Transonic</span></button>
    <button class="rail-btn" data-nav="nozzle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 6l7 6-7 6M21 6l-7 6 7 6"/></svg><span>Nozzle</span></button>
    <button class="rail-btn" data-nav="wing3d"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12l9-4 11 2-7 3-4 5-2-4z"/></svg><span>3D Wing</span></button>
    <button class="rail-btn" data-nav="labs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/></svg><span>Labs</span></button>
    <button class="rail-btn" data-nav="data"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-8"/></svg><span>Data</span></button>
    <button class="rail-btn" data-nav="theory"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 5h13a2 2 0 0 1 2 2v13H6a2 2 0 0 1-2-2z"/><path d="M8 9h7M8 13h5"/></svg><span>Theory</span></button>
    <div class="spacer"></div>
    <button class="rail-mini" id="themeBtn" title="Day / night"><svg id="themeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    <button class="rail-mini" id="adminBtn" title="Admin" style="margin-top:5px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg></button>
    <button class="rail-mini" id="soundBtn" title="Sound" style="margin-top:5px"><svg id="soundIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 9v6h4l5 4V5L8 9z"/><path d="M17 8a5 5 0 0 1 0 8"/></svg></button>
  </nav>
  <main>
    <div class="topbar">
      <div class="tt"><span class="ey" id="tbEy">Test Section</span><h1 id="tbTitle">Airfoil Lab</h1></div>
      <div class="fill"></div>
      <div class="chip"><span class="airdot"></span>AIRFOIL <b id="tbAirfoil">—</b></div>
      <div class="chip" id="chipProg">EXPERIMENTS <b id="tbProg">0/4</b></div>
    </div>
    <section id="v-airfoil" class="view"></section>
    <section id="v-subsonic" class="view hidden"></section>
    <section id="v-supersonic" class="view hidden"></section>
    <section id="v-transonic" class="view hidden"></section>
    <section id="v-nozzle" class="view hidden"></section>
    <section id="v-wing3d" class="view hidden"></section>
    <section id="v-labs" class="view hidden"></section>
    <section id="v-data" class="view hidden"></section>
    <section id="v-theory" class="view hidden"></section>
  </main>
</div>
<div id="toast"></div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const LS="windtunnel_v1";
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=(v,d=2)=>(v==null||isNaN(v))?"—":(+v).toFixed(d);
function getVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||"#888"; }

function ISA(alt){ const g=9.80665,R=287.05,T0=288.15,p0=101325,L=0.0065; let T,p;
  if(alt<11000){ T=T0-L*alt; p=p0*Math.pow(T/T0,g/(R*L)); }
  else { const T11=T0-L*11000, p11=p0*Math.pow(T11/T0,g/(R*L)); T=T11; p=p11*Math.exp(-g*(alt-11000)/(R*T11)); }
  return {alt,T,p,rho:p/(R*T),a:Math.sqrt(1.4*R*T)}; }

const GAM=1.4;
function naca4(m,p,t,N){
  const xs=[]; for(let i=0;i<=N;i++) xs.push(0.5*(1-Math.cos(Math.PI*i/N)));
  const yt=x=>5*t*(0.2969*Math.sqrt(Math.max(x,0))-0.1260*x-0.3516*x*x+0.2843*x*x*x-0.1036*x*x*x*x);
  const cam=x=>{ if(p<=0)return[0,0]; let yc,dy; if(x<p){yc=m/(p*p)*(2*p*x-x*x);dy=2*m/(p*p)*(p-x);}else{yc=m/((1-p)*(1-p))*((1-2*p)+2*p*x-x*x);dy=2*m/((1-p)*(1-p))*(p-x);} return[yc,Math.atan(dy)];};
  const up=[],lo=[]; xs.forEach(x=>{const[yc,th]=cam(x);const q=yt(x);up.push([x-q*Math.sin(th),yc+q*Math.cos(th)]);lo.push([x+q*Math.sin(th),yc-q*Math.cos(th)]);});
  const nodes=[]; for(let i=lo.length-1;i>=0;i--)nodes.push(lo[i]); for(let i=1;i<up.length;i++)nodes.push(up[i]); return nodes;
}
function afParams(af){ if(af.type==="naca")return{m:af.m/100,p:af.p/10,t:af.t/100}; if(af.type==="ellipse"||af.type==="wedge")return{m:0,p:0,t:af.t/100}; if(af.type==="points"&&af.mppt)return{m:af.mppt.m,p:af.mppt.p||0.3,t:af.mppt.t}; return{m:0,p:0,t:0.03}; }
function afNodes(af,N){ N=N||90; if(af.type==="points"&&af.coords)return af.coords.map(c=>[c[0],c[1]]); const {m,p,t}=afParams(af);
  if(af.type==="naca")return naca4(m,p,t,N);
  const xs=[]; for(let i=0;i<=N;i++) xs.push(0.5*(1-Math.cos(Math.PI*i/N)));
  const half=x=>{ if(af.type==="ellipse")return (t/2)*Math.sqrt(Math.max(0,1-(2*x-1)*(2*x-1))); if(af.type==="wedge")return (t/2)*(x<0.5? x/0.5 : (1-x)/0.5); return (t/2)*Math.sqrt(Math.max(0,1-(2*x-1)*(2*x-1))); };
  const up=xs.map(x=>[x,half(x)]),lo=xs.map(x=>[x,-half(x)]); const nodes=[]; for(let i=lo.length-1;i>=0;i--)nodes.push(lo[i]); for(let i=1;i<up.length;i++)nodes.push(up[i]); return nodes;
}
function alphaL0(m,p){ if(p<=0||m<=0)return 0; const dy=x=>(x<p)?2*m/(p*p)*(p-x):2*m/((1-p)*(1-p))*(p-x);
  let s=0,Nn=200; for(let i=1;i<Nn;i++){const th=Math.PI*i/Nn;const x=0.5*(1-Math.cos(th));s+=dy(x)*(Math.cos(th)-1)*(Math.PI/Nn);} return -(1/Math.PI)*s; }
function aeroForces(af,alphaDeg){ const {m,p,t}=afParams(af); const a0=alphaL0(m,p); const a=alphaDeg*Math.PI/180;
  const aStall=(14 - t*18)*Math.PI/180 + a0;            // thicker stalls a touch earlier; camber shifts
  const aNstall=(-15*Math.PI/180)+a0;
  const clLin=2*Math.PI*(a-a0);
  let cl, stalled=false;
  if(a>aStall){ stalled=true; const clMax=2*Math.PI*(aStall-a0); const over=(a-aStall); cl=clMax*Math.exp(-3.5*over)+ (2*Math.PI*over)*0.15; }
  else if(a<aNstall){ stalled=true; const clMin=2*Math.PI*(aNstall-a0); const over=(aNstall-a); cl=clMin*Math.exp(-3.5*over)-(2*Math.PI*over)*0.15; }
  else cl=clLin;
  const cd0=0.006+0.01*t;                                // parasite grows with thickness
  const sepDrag=stalled? 0.9*Math.pow(Math.abs(a-(a>0?aStall:aNstall)),1.3):0;
  const cd=cd0+0.02*cl*cl+sepDrag;
  const cm=-0.25*(clLin)*0.0 - (m>0?0.05+2*m:0.0);       // approx quarter-chord moment (camber)
  return {cl,cd,cm:cm||-0.02,alpha0:a0*180/Math.PI,aStallDeg:aStall*180/Math.PI,stalled};
}
function flowField(af,alphaDeg,V){ const {m,p,t}=afParams(af); const F=aeroForces(af,alphaDeg); const a=alphaDeg*Math.PI/180;
  const Gtot=0.5*F.cl*V*1.0; const NV=44, vor=[]; let ws=0; const w=[];
  for(let i=0;i<NV;i++){const x=(i+0.5)/NV;const wi=Math.sqrt((1-x)/Math.max(x,1e-3));w.push([x,wi]);ws+=wi;}
  const yc=x=>{ if(p<=0)return 0; return (x<p)? m/(p*p)*(2*p*x-x*x): m/((1-p)*(1-p))*((1-2*p)+2*p*x-x*x); };
  w.forEach(([x,wi])=>vor.push({x,y:yc(x),G:Gtot*wi/ws}));
  const NS=44,src=[]; const yt=x=>5*t*(0.2969*Math.sqrt(Math.max(x,1e-6))-0.1260*x-0.3516*x*x+0.2843*x*x*x-0.1036*x*x*x*x);
  for(let i=0;i<NS;i++){const x=(i+0.5)/NS;const dx=2e-3;const dsdx=(yt(x+dx)-yt(x-dx))/(2*dx);src.push({x,y:yc(x),q:2*V*dsdx*(1/NS)});}
  return {F,a,vor,src,V,
    vel(px,py){ let u=V*Math.cos(a),v=V*Math.sin(a);
      for(const s of src){const dx=px-s.x,dy=py-s.y,r2=dx*dx+dy*dy+2e-3;u+=s.q/(2*Math.PI)*dx/r2;v+=s.q/(2*Math.PI)*dy/r2;}
      for(const o of vor){const dx=px-o.x,dy=py-o.y,r2=dx*dx+dy*dy+2e-3;u+=o.G/(2*Math.PI)*dy/r2;v+=-o.G/(2*Math.PI)*dx/r2;}
      return [u,v]; } };
}
// compressible
const pmNu=M=> M<=1?0: Math.sqrt((GAM+1)/(GAM-1))*Math.atan(Math.sqrt((GAM-1)/(GAM+1)*(M*M-1)))-Math.atan(Math.sqrt(M*M-1));
const thetaBM=(b,M)=>Math.atan(2/Math.tan(b)*((M*M*Math.sin(b)*Math.sin(b)-1)/(M*M*(GAM+Math.cos(2*b))+2)));
function obliqueShock(thetaDeg,M){ if(M<=1)return{sub:true}; const th=thetaDeg*Math.PI/180; const bmin=Math.asin(1/M)+1e-4,bmax=Math.PI/2-1e-4;
  let tmax=-1,bAt=0; for(let b=bmin;b<bmax;b+=0.0015){const tt=thetaBM(b,M);if(tt>tmax){tmax=tt;bAt=b;}}
  if(th>tmax) return {detached:true,thetaMax:tmax*180/Math.PI};
  if(th<=1e-4){ const b=bmin; return {detached:false,betaDeg:b*180/Math.PI,M2:M,p2p1:1,T2T1:1,thetaMax:tmax*180/Math.PI}; }
  let lo=bmin,hi=bAt; for(let k=0;k<60;k++){const mid=(lo+hi)/2; if(thetaBM(mid,M)<th)lo=mid;else hi=mid;}
  const b=(lo+hi)/2,Mn1=M*Math.sin(b); const p2p1=1+2*GAM/(GAM+1)*(Mn1*Mn1-1);
  const Mn2=Math.sqrt((1+(GAM-1)/2*Mn1*Mn1)/(GAM*Mn1*Mn1-(GAM-1)/2)); const M2=Mn2/Math.sin(b-th);
  const rho=( (GAM+1)*Mn1*Mn1)/((GAM-1)*Mn1*Mn1+2); const T2T1=p2p1/rho;
  return {detached:false,betaDeg:b*180/Math.PI,M2,p2p1,T2T1,thetaMax:tmax*180/Math.PI}; }
function normalShock(M){ if(M<=1)return{M2:M,p2p1:1,T2T1:1}; const p2p1=1+2*GAM/(GAM+1)*(M*M-1);
  const M2=Math.sqrt((1+(GAM-1)/2*M*M)/(GAM*M*M-(GAM-1)/2)); const rho=((GAM+1)*M*M)/((GAM-1)*M*M+2); return {M2,p2p1,T2T1:p2p1/rho}; }
const AAstar=M=> (1/M)*Math.pow(2/(GAM+1)*(1+(GAM-1)/2*M*M),(GAM+1)/(2*(GAM-1)));
const pRatio=M=> Math.pow(1+(GAM-1)/2*M*M,-GAM/(GAM-1));   // p/p0
function machFromArea(ar,sup){ if(ar<=1)return 1; let lo=sup?1:1e-4,hi=sup?12:1; for(let k=0;k<70;k++){const mm=(lo+hi)/2;const f=AAstar(mm)-ar; if(sup){if(f>0)hi=mm;else lo=mm;}else{if(f<0)hi=mm;else lo=mm;}} return (lo+hi)/2; }

function afMetrics(af){ const {m,p,t}=afParams(af); const nodes=afNodes(af,80); let maxT=0; for(let i=0;i<nodes.length;i++){ } return {thickPct:(t*100).toFixed(1),camberPct:(m*100).toFixed(1),leR:(1.1019*t*t*100).toFixed(2)}; }
function mapAF(W,H,pad){ pad=pad||40; const x0=pad,x1=W-pad; const sc=(x1-x0); return {sx:x=>x0+x*sc, sy:y=>H/2 - y*sc}; }
function drawAirfoilShape(ctx,W,H,af,opts){ opts=opts||{}; const {sx,sy}=mapAF(W,H,opts.pad); const nodes=afNodes(af,120);
  ctx.beginPath(); nodes.forEach((n,i)=>{ const X=sx(n[0]),Y=sy(n[1]); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }); ctx.closePath();

/* .dat import (UIUC Selig / Lednicer) */
function parseDat(txt){ const lines=txt.split(/\r?\n/).map(l=>l.trim());
  const isPair=l=>{const m=l.match(/-?\d*\.?\d+(?:[eE][-+]?\d+)?/g);return m&&m.length>=2;};
  let name="",start=0; if(lines.length&&lines[0]&&!isPair(lines[0])){ name=lines[0]; start=1; }
  const rows=[]; for(let i=start;i<lines.length;i++){ const l=lines[i]; if(!l)continue; const m=l.match(/-?\d*\.?\d+(?:[eE][-+]?\d+)?/g); if(m&&m.length>=2)rows.push([parseFloat(m[0]),parseFloat(m[1])]); }
  if(rows.length<8)return{ok:false,msg:"Fewer than 8 coordinate points were found."};
  let coords; const f=rows[0]; const lednicer=f[0]>1.5&&f[1]>1.5;
  if(lednicer){ const nu=Math.round(f[0]),nl=Math.round(f[1]); const up=rows.slice(1,1+nu),lo=rows.slice(1+nu,1+nu+nl); if(up.length<3||lo.length<3)return{ok:false,msg:"Lednicer header counts don't match the point list."}; coords=up.slice().reverse().concat(lo.slice(1)); }
  else coords=rows.slice();
  let xmin=Infinity,xmax=-Infinity; coords.forEach(c=>{xmin=Math.min(xmin,c[0]);xmax=Math.max(xmax,c[0]);}); const sc=1/((xmax-xmin)||1);
  coords=coords.map(c=>[(c[0]-xmin)*sc,c[1]*sc]);
  let leI=0; coords.forEach((c,i)=>{if(c[0]<coords[leI][0])leI=i;});
  const top=coords.slice(0,leI+1).slice().sort((a,b)=>a[0]-b[0]); const bot=coords.slice(leI).slice().sort((a,b)=>a[0]-b[0]);
  const yAt=(arr,x)=>{ for(let i=0;i<arr.length-1;i++){ if(x>=arr[i][0]&&x<=arr[i+1][0]){ const t=(x-arr[i][0])/((arr[i+1][0]-arr[i][0])||1); return arr[i][1]+t*(arr[i+1][1]-arr[i][1]); } } return null; };
  let t=0,m=0,p=0.3; for(let i=1;i<=39;i++){ const x=i/40; const yu=yAt(top,x),yl=yAt(bot,x); if(yu==null||yl==null)continue; const th=Math.abs(yu-yl),cm=(yu+yl)/2; if(th>t)t=th; if(Math.abs(cm)>Math.abs(m)){m=cm;p=x;} }
  return{ok:true,name,coords,mppt:{m:Math.abs(m),p:clamp(p,0.05,0.95),t}};
}

let noz={AR:3.0,pb:0.5,phase:0,sol:null};
function machFromP(pr){ pr=clamp(pr,1e-4,1); let lo=0,hi=1; for(let k=0;k<60;k++){const M=(lo+hi)/2; if(pRatio(M)>pr)lo=M;else hi=M;} return (lo+hi)/2; }
function p02p01(M1){ const a=Math.pow((GAM+1)*M1*M1/((GAM-1)*M1*M1+2),GAM/(GAM-1)); const b=Math.pow((GAM+1)/(2*GAM*M1*M1-(GAM-1)),1/(GAM-1)); return a*b; }

function computeNozzle(){ const AR=noz.AR, pb=noz.pb; const Msub=machFromArea(AR,false), Msup=machFromArea(AR,true);
  const pbSub=pRatio(Msub), pbSup=pRatio(Msup); const nsE=normalShock(Msup); const pbNs=pbSup*nsE.p2p1;
  let regime, choked=true, shockAsr=null, Astar=1, p0p=1, Mexit, sol={};
  if(pb>=pbSub){ // unchoked venturi
    choked=false; const Me=machFromP(pb); Astar=AR/AAstar(Me); regime="Subsonic venturi (not choked)"; Mexit=Me;
  } else if(pb>=pbNs){ // normal shock inside diverging section
    regime="Normal shock in diffuser";
    let lo=1.001,hi=AR; for(let k=0;k<60;k++){ const As=(lo+hi)/2; const M1=machFromArea(As,true); const ns=normalShock(M1); const p0r=p02p01(M1); const AeAstar=AR*AAstar(ns.M2)/As; const Me=machFromArea(AeAstar,false); const pe=p0r*pRatio(Me); if(pe>pb)lo=As;else hi=As; }
    shockAsr=(lo+hi)/2; const M1=machFromArea(shockAsr,true); const ns=normalShock(M1); p0p=p02p01(M1); sol.M1s=M1; sol.M2s=ns.M2; sol.AstarAfter=shockAsr/AAstar(ns.M2); MexitObj:0;
    const AeAstar=AR/sol.AstarAfter; Mexit=machFromArea(AeAstar,false);
  } else if(pb>=pbSup){ regime="Overexpanded (shocks outside)"; Mexit=Msup; }
  else { regime= Math.abs(pb-pbSup)<1e-3?"Perfectly expanded":"Underexpanded (fans outside)"; Mexit=Msup; }
  // Mach & pressure distribution
  const Mx=[]; for(let i=0;i<=120;i++){ const x=i/120; const A=nozArea(x,AR); let M,p;
    if(!choked){ const AeA=A/Astar; M=machFromArea(AeA,false); p=pRatio(M); }
    else if(shockAsr!=null){ if(x<=0.4){ M=machFromArea(A/1,false); p=pRatio(M); } else if(A<=nozArea(0.4,AR)+1e-9){ M=1;p=pRatio(1);} else { // diverging
        // determine if before or after shock by area (shock at area shockAsr on the way out)
        const before = A< shockAsr; if(before && A>=1){ M=machFromArea(A,true); p=pRatio(M); } else { const AeA=A/sol.AstarAfter; M=machFromArea(AeA,false); p=p0p*pRatio(M); } }
    } else { // fully choked isentropic

    }
    Mx.push({x,A,M:M||0,p:p||0}); }
  if(noz._prevMe!=null && Mexit>1 && noz._prevMe<=1) AUDIO.boom(); noz._prevMe=Mexit;
  noz.sol={regime,choked,shockAsr,MexitVal:Mexit,pbSub,pbSup,pbNs,Mx};
  if(choked)completeChallenge("choke"); if(shockAsr!=null)completeChallenge("normalshock");
}

function machColor(M){ // blue subsonic -> white sonic -> red supersonic

function drawNoz(){ const cv=$("#nzCv"); if(!cv)return; const ctx=cv.getContext("2d"),W=cv.width,H=cv.height; const sol=noz.sol; if(!sol)return;

  const pad=30, x0=pad,x1=W-pad, midY=H/2; const rmax=Math.sqrt(noz.AR); const yscale=(H/2-20)/rmax;
  const rad=x=>Math.sqrt(nozArea(x,noz.AR))*yscale;

  for(let i=0;i<sol.Mx.length-1;i++){ const s=sol.Mx[i]; const px=x0+s.x*(x1-x0); const r=rad(s.x); ctx.fillStyle=machColor(s.M); ctx.fillRect(px, midY-r, (x1-x0)/120+1, 2*r); }

  ctx.beginPath(); for(let i=0;i<=120;i++){const x=i/120;const px=x0+x*(x1-x0);const r=rad(x); i?ctx.lineTo(px,midY+r):ctx.moveTo(px,midY+r);} ctx.stroke();

/* ==================== THEORY ==================== */
const THEORY=[
 {n:"A1",t:"Bernoulli vs. compressible flow",b:"At low speed (M≲0.3) density is nearly constant and Bernoulli links speed and pressure: faster flow over the upper surface means lower pressure, hence lift. Above M≈0.3 density changes matter and the compressible energy equation replaces Bernoulli."},
 {n:"A2",t:"Boundary layer & stall",b:"Air sticks to the surface in a thin boundary layer. Against a rising (adverse) pressure gradient it can separate. Past the stall angle the flow detaches over the upper surface, lift collapses and pressure drag rises sharply — you can watch the tufts reverse."},
 {n:"A3",t:"Why shocks form",b:"In supersonic flow pressure signals cannot travel upstream faster than the flow. Disturbances pile up into a near-discontinuous shock across which pressure, temperature and density jump and the flow slows — losing stagnation pressure."},
 {n:"A4",t:"Area–velocity relation",b:"dA/A = (M²−1) dV/V. Subsonic flow speeds up in a contraction; supersonic flow speeds up in an expansion. That sign flip is why a convergent–divergent nozzle is needed to reach supersonic speed."},
 {n:"A5",t:"Oblique vs normal shocks",b:"A wedge turns the flow through angle θ, producing an oblique shock at angle β from the θ–β–M relation. Exceed the maximum θ for that Mach number and no attached solution exists — the shock detaches into a curved bow shock (a normal shock on the centreline)."},
 {n:"A6",t:"Choking & the throat",b:"Once the throat reaches M=1 the nozzle is choked: mass flow is fixed and lowering the back pressure only changes what happens downstream — a subsonic exit, a normal shock parked in the diverging section, or full supersonic expansion."}
];
const QUIZ=[
 {id:"q1",q:"An airfoil is pushed past its stall angle. What happens to lift?",opts:["It keeps rising linearly","It collapses as flow separates","It is unaffected"],a:1},
 {id:"q2",q:"To accelerate a gas from subsonic to supersonic you need a duct that…",opts:["Only converges","Only diverges","Converges then diverges"],a:2},

let wing={AR:7,taper:0.5,sweep:6,alpha:5,cam:{yaw:-0.72,pitch:0.42,zoom:1},drag:false,lastX:0,lastY:0,sol:null,phase:0};
function _cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function _sub(a,b){return[a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function _dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function _nrm(a){return Math.hypot(a[0],a[1],a[2]);}
function _seg(P,A,B){ const r1=_sub(P,A),r2=_sub(P,B),r0=_sub(B,A); const c=_cross(r1,r2),c2=_dot(c,c); if(c2<1e-9)return[0,0,0]; const K=(1/(4*Math.PI))*(_dot(r0,r1)/_nrm(r1)-_dot(r0,r2)/_nrm(r2))/c2; return[c[0]*K,c[1]*K,c[2]*K]; }
function _hshoe(P,A,B){ const F=100,Af=[A[0]+F,A[1],A[2]],Bf=[B[0]+F,B[1],B[2]]; const v1=_seg(P,Af,A),v2=_seg(P,A,B),v3=_seg(P,B,Bf); return[v1[0]+v2[0]+v3[0],v1[1]+v2[1]+v3[1],v1[2]+v2[2]+v3[2]]; }
function gaussSolve(A,b){ const n=b.length,M=A.map((r,i)=>r.concat(b[i])); for(let c=0;c<n;c++){ let p=c; for(let r=c+1;r<n;r++)if(Math.abs(M[r][c])>Math.abs(M[p][c]))p=r; const t=M[c];M[c]=M[p];M[p]=t; for(let r=0;r<n;r++)if(r!==c){const f=M[r][c]/M[c][c];for(let k=c;k<=n;k++)M[r][k]-=f*M[c][k];} } return M.map((r,i)=>r[n]/r[i]); }
function solveWing(){ const AR=wing.AR,taper=wing.taper,M=14; const cr=1,ct=taper,cmean=0.5*(cr+ct); const span=AR*cmean,s=span/2,S=span*cmean;
  const Lam=wing.sweep*Math.PI/180, a0=aeroForces(activeAF(),0).alpha0*Math.PI/180, al=wing.alpha*Math.PI/180;
  const chord=y=>cr*(1-(1-taper)*(Math.abs(y)/s)), xqc=y=>Math.abs(y)*Math.tan(Lam);
  const edges=[]; for(let i=0;i<=2*M;i++){const th=Math.PI*i/(2*M);edges.push(-s*Math.cos(th));}
  const pan=[]; for(let i=0;i<2*M;i++){const yl=edges[i],yr=edges[i+1],ym=0.5*(yl+yr);pan.push({A:[xqc(yl),yl,0],B:[xqc(yr),yr,0],cp:[xqc(ym)+0.5*chord(ym),ym,0],ym,yl,yr,dy:Math.abs(yr-yl),c:chord(ym),th:Math.acos(clamp(-ym/s,-1,1))});}
  const n=pan.length,Am=[],rhs=[]; for(let i=0;i<n;i++){const row=[];for(let j=0;j<n;j++)row.push(_hshoe(pan[i].cp,pan[j].A,pan[j].B)[2]);Am.push(row);rhs.push(-Math.sin(al-a0));}
  const G=gaussSolve(Am,rhs); let CL=0; for(let i=0;i<n;i++)CL+=G[i]*pan[i].dy; CL=2*CL/S;
  const ks=[]; for(let k=1;k<=2*M-1;k+=2)ks.push(k); const P=ks.length,NN=[],rr=[];
  for(let a=0;a<P;a++){const row=[];for(let bb=0;bb<P;bb++){let s2=0;for(let i=0;i<n;i++)s2+=Math.sin(ks[a]*pan[i].th)*Math.sin(ks[bb]*pan[i].th);row.push(s2);}NN.push(row);let s3=0;for(let i=0;i<n;i++)s3+=(G[i]/(2*span))*Math.sin(ks[a]*pan[i].th);rr.push(s3);}
  const Ac=gaussSolve(NN,rr); const A1=Ac[0]; let sumn=0; for(let a=0;a<P;a++)sumn+=ks[a]*Ac[a]*Ac[a];
  const CDi=Math.max(Math.PI*AR*sumn,1e-6), e=clamp(A1*A1/sumn,0,1);
  pan.forEach(p=>{p.cl=2*(G[pan.indexOf(p)]||0)/p.c; p.G=G[pan.indexOf(p)];});
  wing.sol={CL,CDi,e,AR,span,s,cr,ct,S,Lam,pan,chord,xqc,clMax:Math.max(...pan.map(p=>p.cl),0.01)};
}
function renderWing3d(){ const v=$("#v-wing3d");
  v.innerHTML=`<div class="lab">
    <div class="stage"><canvas id="wgCv" width="820" height="500"></canvas><div class="cap">Drag to orbit · scroll to zoom · trailing & tip vortices from a vortex-lattice solution</div></div>
    <div class="side">
      <div class="card"><h3><span class="i">◆</span> Planform</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Section: <b style="color:var(--ink)" id="wgAF">${activeAF().name}</b></div>
        ${slider("Aspect ratio","wgAR",wing.AR,3,12,0.5,"")}
        ${slider("Taper ratio","wgTap",wing.taper,0.2,1,0.05,"")}
        ${slider("Sweep Λ","wgSw",wing.sweep,0,40,1,"°")}
        ${slider("Angle of attack α","wgAl",wing.alpha,0,14,0.5,"°")}

  bindSlider("wgAR",x=>{wing.AR=x;solveWing();}); bindSlider("wgTap",x=>{wing.taper=x;solveWing();});
  bindSlider("wgSw",x=>{wing.sweep=x;solveWing();}); bindSlider("wgAl",x=>{wing.alpha=x;solveWing();});
  const cv=$("#wgCv",v); attachWingPointer(cv);

function attachWingPointer(cv){ const rc=()=>cv.getBoundingClientRect();
  cv.addEventListener("pointerdown",e=>{cv.setPointerCapture(e.pointerId);wing.drag=true;wing.lastX=e.clientX;wing.lastY=e.clientY;});
  cv.addEventListener("pointermove",e=>{ if(!wing.drag)return; wing.cam.yaw+=(e.clientX-wing.lastX)*0.01; wing.cam.pitch=clamp(wing.cam.pitch+(e.clientY-wing.lastY)*0.01,-0.2,1.4); wing.lastX=e.clientX;wing.lastY=e.clientY; });
  const end=()=>wing.drag=false; cv.addEventListener("pointerup",end); cv.addEventListener("pointercancel",end);
  cv.addEventListener("wheel",e=>{e.preventDefault(); wing.cam.zoom=clamp(wing.cam.zoom*(e.deltaY>0?0.93:1.07),0.4,3);},{passive:false});
}
function loopWing(){ wing.phase+=1; drawWing(); rafId=requestAnimationFrame(loopWing); }
function wproj(p,W,H,sc,cx){ const al=wing.alpha*Math.PI/180; // geometric pitch about spanwise (y)
  let x=p[0]-cx, y=p[1], z=p[2]; const ca=Math.cos(-al),sa=Math.sin(-al); let xr=x*ca+z*sa, zr=-x*sa+z*ca; x=xr;z=zr;
  const cy=Math.cos(wing.cam.yaw),sy=Math.sin(wing.cam.yaw); let x1=x*cy-y*sy,y1=x*sy+y*cy,z1=z;
  const cp=Math.cos(wing.cam.pitch),sp=Math.sin(wing.cam.pitch); let y2=y1*cp-z1*sp,z2=y1*sp+z1*cp;
  const persp=sc*wing.cam.zoom/(1+y2*0.04); return [W/2+x1*persp, H*0.56 - z2*persp, y2]; }
function drawWing(){ const cv=$("#wgCv"); if(!cv)return; const ctx=cv.getContext("2d"),W=cv.width,H=cv.height; const sol=wing.sol; if(!sol)return;
  ctx.fillStyle=getVar("--canvasbg"); ctx.fillRect(0,0,W,H);
  const sc=(W*0.9)/(sol.span+2), cx=sol.cr*0.4; const P=p=>wproj(p,W,H,sc,cx);
  // reference floor grid
  ctx.strokeStyle=`rgba(${rgbVar("--line")},0.5)`; ctx.lineWidth=1;
  for(let gx=-3;gx<=6;gx+=1){ const a=P([gx,-sol.s-1,-0.6]),b=P([gx,sol.s+1,-0.6]); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); }
  for(let gy=-Math.ceil(sol.s+1);gy<=Math.ceil(sol.s+1);gy++){ const a=P([-3,gy,-0.6]),b=P([6,gy,-0.6]); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); }
  // trailing vortices + tip roll-up
  const wake=6; sol.pan.forEach((p,i)=>{ const edgeY = i%3===0; if(!edgeY)return; const strength=Math.abs(p.G)/ (Math.max(...sol.pan.map(q=>Math.abs(q.G)))||1);
    const y=p.yr; const le=[sol.xqc(y),y,0]; ctx.strokeStyle=`rgba(${rgbVar("--flow")},${0.12+0.5*strength})`; ctx.lineWidth=1; ctx.beginPath();
    for(let t=0;t<=wake;t+=0.3){ const roll=Math.max(0,(Math.abs(y)>sol.s*0.7? (t*0.04):0)); const yy=y - Math.sign(y)*roll*Math.min(t/wake,1)* (Math.abs(y)>sol.s*0.7?0.6:0); const pt=P([sol.xqc(y)+0.25+t, yy, 0 + Math.sin(t*2+wing.phase*0.05)*0.02*strength]); t===0?ctx.moveTo(pt[0],pt[1]):ctx.lineTo(pt[0],pt[1]); } ctx.stroke(); });
  // tip vortex spirals (both tips)
  [sol.s,-sol.s].forEach(yt=>{ ctx.strokeStyle=`rgba(${rgbVar("--flow")},0.8)`; ctx.lineWidth=1.6; ctx.beginPath(); let first=true;
    for(let t=0;t<=wake;t+=0.15){ const r=0.05+0.16*Math.min(t/2,1); const ang=t*3 - wing.phase*0.08; const pt=P([sol.xqc(yt)+0.25+t, yt - Math.sign(yt)*(0.05+0.1*Math.min(t/2,1)) + r*Math.cos(ang), r*Math.sin(ang)]); if(first){ctx.moveTo(pt[0],pt[1]);first=false;}else ctx.lineTo(pt[0],pt[1]); } ctx.stroke(); });
  // wing surface panels colored by local cl
  const order=sol.pan.map((p,i)=>i).sort((a,b)=>P(sol.pan[b].cp)[2]-P(sol.pan[a].cp)[2]);
  order.forEach(i=>{ const p=sol.pan[i]; const yl=p.yl,yr=p.yr; const le1=[sol.xqc(yl)-0.25*sol.chord(yl),yl,0],te1=[sol.xqc(yl)+0.75*sol.chord(yl),yl,0],te2=[sol.xqc(yr)+0.75*sol.chord(yr),yr,0],le2=[sol.xqc(yr)-0.25*sol.chord(yr),yr,0];
    const a=P(le1),b=P(te1),c=P(te2),d=P(le2); const t=clamp(p.cl/sol.clMax,0,1);
    const col=[getVar("--steel"),getVar("--flow")]; ctx.fillStyle=`rgba(${rgbVar("--flow")},${0.25+0.6*t})`;
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.lineTo(c[0],c[1]);ctx.lineTo(d[0],d[1]);ctx.closePath();ctx.fill();
    ctx.strokeStyle=`rgba(${rgbVar("--ink")},0.15)`;ctx.lineWidth=0.5;ctx.stroke(); });
  // quarter-chord bound line
  ctx.strokeStyle=getVar("--shock");ctx.lineWidth=2;ctx.beginPath(); for(let k=0;k<=40;k++){const y=-sol.s+2*sol.s*k/40;const pt=P([sol.xqc(y),y,0]);k?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]);}ctx.stroke();
  // spanwise lift distribution curve (z ~ cl)
  ctx.strokeStyle=getVar("--lift");ctx.lineWidth=2.4;ctx.beginPath(); sol.pan.forEach((p,k)=>{ const pt=P([sol.xqc(p.ym),p.ym, 0.15+ p.cl/sol.clMax*0.55]); k?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]); }); ctx.stroke();
  ctx.strokeStyle=`rgba(${rgbVar("--lift")},0.35)`;ctx.lineWidth=1; sol.pan.forEach((p,k)=>{ if(k%2)return; const a=P([sol.xqc(p.ym),p.ym,0.15]),b=P([sol.xqc(p.ym),p.ym,0.15+p.cl/sol.clMax*0.55]); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); });
  // labels
  ctx.fillStyle=getVar("--flow");ctx.font="11px monospace";ctx.fillText("→ freestream",14,H-16);
  ctx.fillStyle=getVar("--lift");ctx.fillText("lift distribution",W-130,24);
  ctx.fillStyle=getVar("--shock");ctx.fillText("¼-chord (bound Γ)",W-130,40);
  updateWingGauges();
}
function updateWingGauges(){ const g=$("#wgG"); if(!g)return; const s=wing.sol; const ld=s.CDi>1e-6?s.CL/s.CDi:0;
  g.innerHTML=`<div class="g lift"><div class="gv">${fmt(s.CL,3)}</div><div class="gl">C_L</div></div><div class="g drag"><div class="gv">${fmt(s.CDi,4)}</div><div class="gl">C_Di (induced)</div></div><div class="g flow"><div class="gv">${fmt(s.e,3)}</div><div class="gl">Span eff. e</div></div><div class="g"><div class="gv">${fmt(s.AR,1)}</div><div class="gl">Aspect ratio</div></div><div class="g"><div class="gv">${fmt(ld,0)}</div><div class="gl">C_L/C_Di</div></div><div class="g mach"><div class="gv">${fmt(aeroForces(activeAF(),0).alpha0,1)}°</div><div class="gl">Section α₀</div></div>`;

}

    <div class="cards" style="grid-template-columns:1fr 1fr">
    ${LABS.map(l=>{ const st=labState(l.id); const dn=l.steps.filter((s,i)=>st[i]||(s.link&&S.challenges[s.link])).length; const full=dn===l.steps.length;
      return `<div class="card" style="display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;align-items:flex-start;gap:10px"><span class="pill ${full?'ok':''}" style="flex:none">${dn}/${l.steps.length}</span>
          <div><div style="font-weight:600">${l.name}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${l.goal}</div></div></div>
        <div style="display:flex;flex-direction:column;gap:2px">
        ${l.steps.map((s,i)=>{ const auto=s.link&&S.challenges[s.link]; const done=st[i]||auto;
          return `<div class="labstep ${done?'done':''}" data-lab="${l.id}" data-step="${i}" ${auto?'data-auto="1"':''}><span class="lschk">${done?'✓':''}</span><span class="lstx">${s.t}</span>${auto?'<span class="pill ok" style="flex:none">auto</span>':''}</div>`; }).join("")}
        </div>
        <button class="btn" data-goto="${l.tab}" style="align-self:flex-start">Open ${TITLES[l.tab][1]} →</button>
      </div>`; }).join("")}
    </div>`;
  $$(".labstep",v).forEach(el=>{ if(el.dataset.auto)return; el.onclick=()=>{ const st=labState(el.dataset.lab); const i=+el.dataset.step; st[i]=!st[i]; save(); renderLabs(); }; });
  $$("[data-goto]",v).forEach(b=>b.onclick=()=>nav(b.dataset.goto));
}

/* ==================== SOUND (Web Audio) ==================== */
const AUDIO={ctx:null,noise:null,filt:null,gain:null,lfo:null,lfoGain:null,on:false,ready:false,
  init(){ if(this.ready)return; try{ const C=window.AudioContext||window.webkitAudioContext; this.ctx=new C();
      const bufSize=2*this.ctx.sampleRate; const buf=this.ctx.createBuffer(1,bufSize,this.ctx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
      this.noise=this.ctx.createBufferSource(); this.noise.buffer=buf; this.noise.loop=true;
      this.filt=this.ctx.createBiquadFilter(); this.filt.type="bandpass"; this.filt.frequency.value=300; this.filt.Q.value=0.7;
      this.gain=this.ctx.createGain(); this.gain.gain.value=0;
      this.lfo=this.ctx.createOscillator(); this.lfo.frequency.value=8; this.lfoGain=this.ctx.createGain(); this.lfoGain.gain.value=0;
      this.lfo.connect(this.lfoGain); this.lfoGain.connect(this.gain.gain);
      this.noise.connect(this.filt); this.filt.connect(this.gain); this.gain.connect(this.ctx.destination);
      this.noise.start(); this.lfo.start(); this.ready=true;
    }catch(e){} },
  setEnabled(v){ this.on=v; S.sound=v; save(); if(v){ this.init(); if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume(); } else if(this.gain){ this.gain.gain.setTargetAtTime(0,this.ctx.currentTime,0.05); } },
  roar(v,mach){ if(!this.on||!this.ready)return; const t=this.ctx.currentTime; const spd=Math.min(v/140,1);
    this.filt.frequency.setTargetAtTime(200+spd*1400+(mach>1?600:0),t,0.1); this.gain.gain.setTargetAtTime(0.02+spd*0.12,t,0.1); },
  buffet(on){ if(!this.ready)return; const t=this.ctx.currentTime; this.lfoGain.gain.setTargetAtTime(on&&this.on?0.09:0,t,0.05); this.lfo.frequency.setTargetAtTime(on?11:8,t,0.05); },
  boom(){ if(!this.on||!this.ready)return; const t=this.ctx.currentTime; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type="sawtooth"; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(30,t+0.4); g.gain.setValueAtTime(0.001,t); g.gain.exponentialRampToValueAtTime(0.5,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+0.55); }
};

/* ==================== BOOT ==================== */
function boot(){ applyTheme(); updateTop(); renderAnnounce();
  $$(".rail-btn").forEach(b=>b.onclick=()=>nav(b.dataset.nav));
  $("#themeBtn").onclick=toggleTheme; $("#adminBtn").onclick=openAdmin;
  AUDIO.on=!!S.sound; const sb=$("#soundBtn"); const refSnd=()=>{ sb.style.color=AUDIO.on?"var(--flow)":""; }; refSnd();
  sb.onclick=()=>{ AUDIO.setEnabled(!AUDIO.on); refSnd(); toast(AUDIO.on?"Sound on":"Sound off", AUDIO.on?"♪":"✕"); };
  window.addEventListener("keydown",e=>{ if(e.key>="1"&&e.key<="9"){ const map=["airfoil","subsonic","supersonic","transonic","nozzle","wing3d","labs","data","theory"]; nav(map[+e.key-1]); } });
  nav("airfoil");
}
boot();

</script>
