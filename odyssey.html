            ${[1,2].map(n=>`<div class="mstCol">
              <h5>ENG ${n}</h5>
              <div class="ann" id="ann${n}">
                <div data-a="valve">START VALVE</div>
                <div data-a="ign">IGN A</div>
                <div data-a="fuel">FUEL VALVE</div>
                <div data-a="oil">OIL PRESS</div>
                <div data-a="avail">AVAIL</div>
              </div>
              <button class="mstSw" id="mst${n}" title="ENG MASTER ${n}">
                <span class="pos u">ON</span><span class="knb"></span><span class="pos d">OFF</span>
              </button>
              <div style="font-family:var(--mono);font-size:6px;letter-spacing:.1em;color:#8a8a96;
                text-align:center;margin-top:5px">ENG MASTER ${n}</div>
            </div>`).join('')}
          </div>
        </div>
        <p class="hint" style="margin:9px 0 0">Selector to <b>IGN START</b> opens the path. Throw a
        <b>MASTER</b> and the start valve opens: bleed air spins N2, igniters arm at 16%, and the FADEC
        introduces fuel at <b>22% N2</b> — enough airflow to carry the heat away.</p>
        <div class="ctl" style="margin-top:10px"><div class="lbl">Who introduces the fuel?</div>
          <div class="seg" id="smSeg">
            <button data-v="auto" class="${F.startMode!=='man'?'on':''}">FADEC · automatic</button>
            <button data-v="man" class="${F.startMode==='man'?'on':''}">MANUAL</button></div></div>
        <p class="hint" style="margin:6px 0 0">In <b>MANUAL</b> you choose the moment. Go early, before the
        compressor is turning fast enough, and the fire has nowhere to dump its heat: <b>EGT spikes and you
        cook the turbine.</b></p>
        <div class="btnrow" id="manRow"></div>
        <div class="btnrow"><button class="btn primary" id="startE">▶ Auto-start both</button>
          <button class="btn" id="abortE">Abort start</button></div></div>
      <div class="card"><h3>Start sequence</h3>
        <div id="seqLog"></div>
        <div id="tRo" style="margin-top:9px"></div></div>
    </div>
    <div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Stand · ground services</span>
        <span class="live" id="tLive">ON STAND</span><canvas id="gsCv" height="300"></canvas></div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Engine ${'#'}<span id="engN">1</span> · cutaway</span>
        <span class="live" id="eLive">SHUT DOWN</span><canvas id="cutCv" height="230"></canvas></div>
      <div class="cv"><span class="tag">N1 / N2 / EGT / FF</span><span class="live" id="gLive">—</span>
        <canvas id="eCv" height="200"></canvas></div>
    </div>
  </div>`;

  function svc(){ $('#svc').innerHTML=SVC.map(([k,n,d])=>{ const p=F.turn.prog[k]||0;
    return `<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;margin-bottom:4px">
        <span style="color:${p>=100?'var(--green)':'var(--muted)'}">${n}</span>
        <span style="color:var(--faint)">${p>=100?'COMPLETE':F.turn.running[k]?Math.round(p)+'%':'~'+d+' min'}</span></div>
      <div class="steps"><div class="s ${p>=100?'done':F.turn.running[k]?'act':''}"><div class="f" style="width:${p}%"></div></div></div>
      ${p<100&&!F.turn.running[k]?`<button class="btn sm" style="margin-top:5px" data-s="${k}">Start</button>`:''}</div>`;}).join('');
    $$('#svc [data-s]').forEach(b=>b.onclick=()=>{F.turn.running[b.dataset.s]=1;svc();}); }
  svc();
  $('#allB').onclick=()=>{ SVC.forEach(([k])=>F.turn.running[k]=1); svc(); toast("All services running.","ok"); };
  if(!F.turn.anim) F.turn.anim={doors:1,bridge:1,chocks:1,tug:0};   // 1 = doors open / bridge on / chocks in
  const TA=F.turn.anim;
  $$('#seq .chk').forEach(c=>c.onclick=()=>{ const k=c.dataset.k;
    if(!SVC.every(([s])=>F.turn.prog[s]>=100)){ toast("Services still running.","warn"); return; }
    F.turn.seq[k]=!F.turn.seq[k]; c.classList.toggle('on',!!F.turn.seq[k]);
    const nm={doors:"Doors closed and armed",bridge:"Jetbridge retracted",
              chocks:"Chocks removed",push:"Tug connected, pushback clearance"}[k];
    if(F.turn.seq[k]) toast(nm+".","ok");
  });

  const E=F.eng.seq;
  function logSeq(txt,kind){ if(E.done.includes(txt))return; E.done.push(txt);
    const box=$('#seqLog'); if(box) box.innerHTML=E.done.map(d=>`<div class="bdg ${d.startsWith('⚠')?'bad':'ok'}" style="margin:0 4px 4px 0">${d}</div>`).join(''); }
  /* ── the pedestal: selector, masters, annunciators ── */
  if(!F.eng.mode) F.eng.mode='NORM';
  if(!F.eng.master) F.eng.master={1:false,2:false};
  function preStartOK(quiet){
    if(!SVC.every(([s])=>F.turn.prog[s]>=100)){ if(!quiet)toast("Ground services incomplete.","bad"); return false; }
    if(!['doors','bridge','chocks','push'].every(k=>F.turn.seq[k])){
      if(!quiet)toast("Departure sequence incomplete.","bad"); return false; }
    return true;
  }
  function beginEngine(n){
    if(F.eng.started||E.stage!=="OFF") return false;
    if(!preStartOK()) return false;
    if(F.eng.mode!=='IGN'){
      toast("Start valve stays shut — ENG MODE selector is at "+F.eng.mode+", not IGN START.","bad");
      logSeq("⚠ Master thrown with selector at "+F.eng.mode);
      return false;
    }
    E.stage="MOTOR"; E.t=0; E.valve=1; E.ign=0; E.fuelOn=0;
    E.n1=0; E.n2=0; E.egt=22; E.ff=0; E.n2AtFuel=null; E.hung=0;
    E.eng=n;
    F.eng.master[n]=true;
    logSeq("ENG "+n+" MASTER ON · start valve open");
    return true;
  }
  $$('#engMode button').forEach(b=>b.onclick=()=>{
    if(E.stage!=='OFF'&&!F.eng.started){ toast("Can't move the selector mid-start.","warn"); return; }
    F.eng.mode=b.dataset.m;
    $$('#engMode button').forEach(x=>x.classList.toggle('on',x===b));
    toast("ENG MODE selector → "+({CRANK:'CRANK (dry motoring, no ignition)',
      NORM:'NORM',IGN:'IGN START — start valve armed'})[F.eng.mode],
      F.eng.mode==='IGN'?"ok":"warn");
  });
  [1,2].forEach(n=>{ const b=$('#mst'+n); if(!b)return;
    b.onclick=()=>{
      if(F.eng.master[n]){ toast("ENG MASTER "+n+" is already ON.","warn"); return; }
      if(n===2&&!F.eng.master[1]){ toast("Start ENG 1 first — one engine at a time on a single bleed source.","bad"); return; }
      if(n===2&&E.stage!=='OFF'&&E.stage!=='AVAIL1'){ toast("ENG 1 still starting — wait for AVAIL.","warn"); return; }
      if(n===2&&E.stage==='AVAIL1'){
        F.eng.master[2]=true;
        E.eng=2; E.stage="MOTOR"; E.t=0; E.valve=1; E.ign=0; E.fuelOn=0;
        E.n1=0; E.n2=0; E.egt=22; E.ff=0; E.n2AtFuel=null; E.hung=0;
        logSeq("ENG 2 MASTER ON · start valve open");
        toast("Starting engine 2.","ok");
        return;
      }
      beginEngine(n);
    };
  });
  function annun(){
    [1,2].forEach(n=>{
      const box=$('#ann'+n); if(!box)return;
      const mine=E.eng===n && E.stage!=='OFF' && E.stage!=='AVAIL1';
      const run=F.eng.started || (E.eng>n) || (n===1&&E.stage==='AVAIL1');
      const st=E.stage;
      const set=(k,cls)=>{ const d=box.querySelector('[data-a="'+k+'"]');
        if(d) d.className=cls||''; };
      set('valve', mine&&['MOTOR','FUEL','LIGHT'].includes(st)?'lit':'');
      set('ign',   mine&&E.ign&&['LIGHT','FUEL','SPOOL'].includes(st)?'lit':'');
      set('fuel',  (mine&&E.fuelOn)||run?'lit':'');
      set('oil',   run?'lit':(mine&&E.n2>18?'lit':(mine?'amb':'')));
      set('avail', run?'lit':'');
      if(mine&&E.egt>860) set('oil','red');
      const sw=$('#mst'+n); if(sw) sw.classList.toggle('on',!!F.eng.master[n]);
    });
  }
  $('#startE').onclick=()=>{
    if(!preStartOK()) return;
    if(F.eng.started||E.stage!=="OFF") return;
    if(F.eng.mode!=='IGN'){
      F.eng.mode='IGN';
      $$('#engMode button').forEach(x=>x.classList.toggle('on',x.dataset.m==='IGN'));
      toast("ENG MODE selector → IGN START.","ok");
    }
    E.autoBoth=1;
    beginEngine(1);
    F.eng.starting=true;
    logSeq("ENG "+E.eng+" · start valve open");
    toast(F.startMode==='man'
      ? "Start valve open. Motoring N2 — introduce fuel when you judge it right."
      : "Start valve open — bleed air motoring N2. FADEC will put fuel in at 22%.","ok");
  };
  $$('#smSeg button').forEach(b=>b.onclick=()=>{ F.startMode=b.dataset.v;
    $$('#smSeg button').forEach(x=>x.classList.toggle('on',x===b)); });
  function manRow(){
    const r=$('#manRow'); if(!r)return;
    r.innerHTML=(F.startMode==='man'&&E.stage==='MOTOR')
      ? `<button class="btn primary" id="fuelOnB">⛽ FUEL ON &nbsp;<span style="opacity:.7">N2 ${Math.round(E.n2)}%</span></button>`
      : '';
    const fb=$('#fuelOnB');
    if(fb) fb.onclick=()=>{
      E.n2AtFuel=E.n2;
      E.stage="FUEL"; E.fuelOn=1;
      logSeq(`Fuel ON @ ${Math.round(E.n2)}% N2`);
      if(E.n2<18) toast(`Fuel in at ${Math.round(E.n2)}% N2 — that is early. Watch the EGT.`,"warn");
    };
  }
  $('#abortE').onclick=()=>{
    F.eng.master={1:false,2:false}; E.autoBoth=0;
    if(E.stage==="OFF"||F.eng.started){ toast("Nothing to abort.","warn"); return; }
    E.stage="OFF"; E.valve=0; E.fuelOn=0; E.ign=0; F.eng.starting=false;
    logSeq("⚠ START ABORTED");
    F.score.ops-=3; F.score.events.push("Engine start aborted");
    toast("Start aborted — dry motoring to cool.","warn");
  };

  /* ══ GROUND SERVICES SCENE — vehicles that actually do the job ══ */
  const gs=$('#gsCv'); let gt=0;
  anim(()=>{
    const {c,W,H}=fit(gs,300); if(!W)return; gt+=0.016;
    c.clearRect(0,0,W,H);
    const P=F.turn.prog, gy=H*0.70;
    // apron
    c.fillStyle='#100d16'; c.fillRect(0,gy,W,H-gy);
    c.strokeStyle='rgba(240,182,74,.16)'; c.lineWidth=1.4; c.setLineDash([12,10]);
    c.beginPath(); c.moveTo(0,gy+22); c.lineTo(W,gy+22); c.stroke(); c.setLineDash([]);

    // ── animate the departure sequence: doors swing shut, bridge pulls back, chocks come out ──
    const tgt={ doors:F.turn.seq.doors?0:1, bridge:F.turn.seq.bridge?0:1,
                chocks:F.turn.seq.chocks?0:1, tug:F.turn.seq.push?1:0 };
    ['doors','bridge','chocks','tug'].forEach(k=>{ TA[k]+=(tgt[k]-TA[k])*0.09; });

    // ── the ACTUAL aircraft for this type, sitting ON the tarmac ──
    const G=geo(F.type), M=acMetrics(F.type);
    const bw=Math.min(W*0.70, (gy-46)/M.total);      // fit above the apron line
    const bx=W*0.15;
    const by=gy-bw*M.down;                            // centreline so the wheels meet the ground
    const anch=drawAcSide(c,F.type,bx,by,bw,{
      paxFrac:(P.board||0)/100,
      doorsOpen:(G.doors||[]).map(()=>TA.doors),
      engRun:F.eng.started||E.n1>5, t:gt, gearDn:1
    });
    const fh=anch.h;
    // wing tank filling as the bowser pumps
    const ff=(P.fuel||0)/100;
    if(ff>0){
      const X=anch.X, Y=anch.Y;
      c.save();
      c.beginPath();
      c.moveTo(X(G.wingLE), Y(0.50)); c.lineTo(X(G.wingTE), Y(0.96));
      c.lineTo(X(G.wingTipX), Y(-G.dih*0.35)); c.lineTo(X(G.wingTipX-0.050), Y(-G.dih*0.60));
      c.closePath(); c.clip();
      const top=Y(-G.dih*0.60), bot=Y(0.96);
      const fy=bot-(bot-top)*ff;
      c.fillStyle='rgba(240,182,74,.55)'; c.fillRect(X(G.wingLE)-8, fy, bw, bot-fy+8);
      c.strokeStyle='rgba(255,224,155,.95)'; c.lineWidth=1.3; c.beginPath();
      for(let x=0;x<=bw;x+=4){ const yy=fy+Math.sin(x*0.16+gt*3)*1.3;
        x?c.lineTo(X(G.wingLE)-8+x,yy):c.moveTo(X(G.wingLE)-8+x,yy); }
      c.stroke(); c.restore();
    }
    // cargo hold door + bay filling
    const lf=(P.load||0)/100;
    c.strokeStyle='rgba(240,182,74,.6)'; c.lineWidth=1;
    c.strokeRect(anch.holdX, anch.holdY, anch.holdW, anch.holdH);
    c.fillStyle='rgba(240,182,74,'+(0.12+0.45*lf)+')';
    c.fillRect(anch.holdX+1, anch.holdY+1, (anch.holdW-2)*lf, anch.holdH-2);
    // chocks
    if(TA.chocks>0.02){
      const gyy=anch.groundY, mgx=anch.X(G.gearM);
      c.globalAlpha=TA.chocks;
      [-1,1].forEach(sd=>{ c.fillStyle='#ffb23e';
        const cxx=mgx+sd*fh*0.30;
        c.beginPath(); c.moveTo(cxx-5,gyy); c.lineTo(cxx+5,gyy); c.lineTo(cxx+sd*2,gyy-6); c.closePath(); c.fill(); });
      c.fillStyle='rgba(255,178,62,.9)'; c.font='6.5px ui-monospace'; c.textAlign='center';
      c.fillText('CHOCKS', mgx, gyy+13); c.textAlign='left'; c.globalAlpha=1;
    }
    // DOORS-CLOSED annunciator
    if(TA.doors<0.5){
      const dA=1-TA.doors*2;
      c.fillStyle='rgba(62,224,143,'+(0.9*dA)+')'; c.font='bold 8px ui-monospace';
      c.fillText('◉ DOORS CLOSED & ARMED', anch.X(0.20), anch.finTop-8);
    }

    /* ── BOWSER: drives in, deploys hose, pumps ── */
    (function(){ const p=P.fuel||0, run=F.turn.running.fuel;
      const ent=clamp(p/8,0,1);                       // drives in over the first 8%
      const vx=W*0.06+(W*0.30-W*0.06)*(run?ent:0);
      const vy=gy+6;
      if(!run&&p<=0) return;
      // truck body
      c.fillStyle='#2c2438'; c.strokeStyle='rgba(246,241,232,.6)'; c.lineWidth=1.2;
      rrect(c,vx-30,vy-16,46,15,3); c.fill(); c.stroke();     // tank
      rrect(c,vx+16,vy-14,13,13,2); c.fill(); c.stroke();      // cab
      c.fillStyle='rgba(240,182,74,.35)';
      const tf=p/100; c.fillRect(vx-29,vy-15+13*(1-tf)*0,44*(1-tf*0.0),13*0.0+1);
      // tank level (draining as it pumps)
      c.fillStyle='rgba(240,182,74,.30)';
      c.fillRect(vx-29,vy-15,44,13*(1-tf));
      c.fillStyle='#17131e';
      [vx-22,vx-6,vx+23].forEach(wx=>{ c.beginPath(); c.arc(wx,vy+1,4,0,7); c.fill();
        c.strokeStyle='rgba(246,241,232,.5)'; c.lineWidth=1; c.stroke(); });
      c.fillStyle='rgba(164,154,143,.85)'; c.font='6.5px ui-monospace'; c.textAlign='center';
      c.fillText('FUEL',vx-7,vy-6); c.textAlign='left';
      // hose to the wing once parked
      if(ent>=1){
        const hx0=vx-4, hy0=vy-16, hx1=anch.fuelX, hy1=anch.fuelY;
        c.strokeStyle='rgba(240,182,74,.8)'; c.lineWidth=2.2; c.lineCap='round';
        c.beginPath(); c.moveTo(hx0,hy0);
        c.quadraticCurveTo((hx0+hx1)/2,hy0-24+Math.sin(gt*2)*2,hx1,hy1); c.stroke();
        // fuel pulses travelling up the hose
        if(p<100) for(let i=0;i<4;i++){
          const q=((gt*0.5+i*0.25)%1);
          const px=hx0+(hx1-hx0)*q, py=hy0+(hy1-hy0)*q-Math.sin(q*Math.PI)*22;
          c.fillStyle='rgba(255,217,138,'+(0.9*(1-Math.abs(q-0.5)*1.2))+')';
          c.beginPath(); c.arc(px,py,2.4,0,7); c.fill(); }
        // bonding strap
        c.strokeStyle='rgba(62,224,143,.7)'; c.lineWidth=1; c.setLineDash([2,2]);
        c.beginPath(); c.moveTo(vx+6,vy+4); c.lineTo(bx+bw*0.10,gy-2); c.stroke(); c.setLineDash([]);
      }
      if(p>=100){ c.fillStyle='rgba(62,224,143,.9)'; c.font='7px ui-monospace';
        c.fillText('✓ FUELLED',vx-28,vy+14); }
    })();

    /* ── CATERING HI-LIFT: drives in, scissor-lifts to the door ── */
    (function(){ const p=P.cater||0, run=F.turn.running.cater;
      if(!run&&p<=0) return;
      const ent=clamp(p/10,0,1), lift=clamp((p-10)/25,0,1);
      const vx=W*0.86-(W*0.86-W*0.66)*(run?ent:0), vy=gy+6;
      const doorY=anch.doorTop+anch.doorH*0.30;
      const boxH=22, top=vy-14-(vy-14-doorY-boxH)*lift;
      // scissor legs
      c.strokeStyle='rgba(164,154,143,.75)'; c.lineWidth=1.6;
      const legs=3;
      for(let i=0;i<legs;i++){
        const y0=vy-6-(vy-6-top)*(i/legs), y1=vy-6-(vy-6-top)*((i+1)/legs);
        c.beginPath(); c.moveTo(vx-10,y0); c.lineTo(vx+10,y1); c.moveTo(vx+10,y0); c.lineTo(vx-10,y1); c.stroke();
      }
      // body box
      c.fillStyle='#2c2438'; c.strokeStyle='rgba(246,241,232,.6)'; c.lineWidth=1.2;
      rrect(c,vx-20,top-boxH,40,boxH,3); c.fill(); c.stroke();
      // trolleys sliding out when docked
      if(lift>=1){
        const n=Math.floor(((p-35)/65)*5);
        for(let i=0;i<Math.max(0,n);i++){
          c.fillStyle='rgba(107,183,255,.55)'; c.strokeStyle='rgba(246,241,232,.5)';
          const tx=vx-16+i*4-(i*10);
          rrect(c,vx-18-i*9,top-boxH+5,8,12,1.5); c.fill(); c.stroke(); }
        // bridge plate to the door
        c.fillStyle='rgba(164,154,143,.6)';
        c.fillRect(vx-22,top-boxH+4,-(vx-22-(bx+bw*0.78)),4);
      }
      // chassis
      c.fillStyle='#2c2438'; c.strokeStyle='rgba(246,241,232,.6)';
      rrect(c,vx-18,vy-8,36,9,2); c.fill(); c.stroke();
      c.fillStyle='#17131e';
      [vx-11,vx+11].forEach(wx=>{ c.beginPath(); c.arc(wx,vy+1,4,0,7); c.fill(); c.stroke(); });
      c.fillStyle='rgba(164,154,143,.85)'; c.font='6.5px ui-monospace'; c.textAlign='center';
      c.fillText('CATERING',vx,top-boxH-4); c.textAlign='left';
      if(p>=100){ c.fillStyle='rgba(62,224,143,.9)'; c.font='7px ui-monospace'; c.textAlign='center';
        c.fillText('✓',vx,vy+14); c.textAlign='left'; }
    })();

    /* ── BELT LOADER + BAGS travelling into the hold ── */
    (function(){ const p=P.load||0, run=F.turn.running.load;
      if(!run&&p<=0) return;
      const ent=clamp(p/8,0,1);
      const vx=W*0.94-(W*0.94-W*0.80)*(run?ent:0), vy=gy+8;
      const hx=anch.holdX+anch.holdW*0.5, hy=anch.holdY+anch.holdH;
      // belt
      c.strokeStyle='rgba(164,154,143,.8)'; c.lineWidth=3; c.lineCap='round';
      c.beginPath(); c.moveTo(vx-4,vy-10); c.lineTo(hx+6,hy+4); c.stroke();
      c.strokeStyle='rgba(58,50,71,.9)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(vx-4,vy-10); c.lineTo(hx+6,hy+4); c.stroke();
      // bags riding up
      if(ent>=1&&p<100){
        for(let i=0;i<5;i++){
          const q=((gt*0.35+i*0.2)%1);
          const px=vx-4+((hx+6)-(vx-4))*q, py=(vy-10)+((hy+4)-(vy-10))*q;
          c.fillStyle=['#6bb7ff','#f0b64a','#3ee08f'][i%3];
          c.save(); c.translate(px,py); c.rotate(-0.42);
          rrect(c,-4,-3,8,6,1.5); c.fill(); c.restore(); }
      }
      // truck
      c.fillStyle='#2c2438'; c.strokeStyle='rgba(246,241,232,.6)'; c.lineWidth=1.2;
      rrect(c,vx-16,vy-9,32,10,2); c.fill(); c.stroke();
      c.fillStyle='#17131e';
      [vx-9,vx+9].forEach(wx=>{ c.beginPath(); c.arc(wx,vy+2,4,0,7); c.fill(); c.stroke(); });
      c.fillStyle='rgba(164,154,143,.85)'; c.font='6.5px ui-monospace'; c.textAlign='center';
      c.fillText('BELT',vx,vy-12); c.textAlign='left';
      if(p>=100){ c.fillStyle='rgba(62,224,143,.9)'; c.font='7px ui-monospace'; c.textAlign='center';
        c.fillText('✓',vx,vy+14); c.textAlign='left'; }
    })();

    /* ── JETBRIDGE + PASSENGERS walking aboard ── */
    (function(){ const p=P.board||0, run=F.turn.running.board;
      const doorX=anch.doorX(0), doorY=anch.doorTop+anch.doorH*0.35;
      const ext=TA.bridge;
      const retr=ext<0.35;
      const jx=W*0.02, jw=(doorX-jx)*ext;
      c.fillStyle='rgba(44,36,56,.95)'; c.strokeStyle='rgba(246,241,232,.5)'; c.lineWidth=1.2;
      rrect(c,jx,doorY-9,Math.max(14,jw),17,3); c.fill(); c.stroke();
      c.strokeStyle='rgba(58,50,71,.9)';
      for(let x=jx+6;x<jx+jw-2;x+=9){ c.beginPath(); c.moveTo(x,doorY-9); c.lineTo(x,doorY+8); c.stroke(); }
      c.strokeStyle='rgba(164,154,143,.6)'; c.lineWidth=1.6;
      c.beginPath(); c.moveTo(jx+jw*0.5,doorY+8); c.lineTo(jx+jw*0.5,gy-2); c.stroke();
      // pax silhouettes shuffling along
      if(run&&p<100&&!retr){
        const n=6;
        for(let i=0;i<n;i++){
          const q=((gt*0.20+i/n)%1);
          const px=jx+8+(jw-14)*q, py=doorY;
          c.fillStyle='rgba(255,217,138,'+(0.55+0.35*Math.sin(gt*4+i))+')';
          c.beginPath(); c.arc(px,py-4,2,0,7); c.fill();
          c.fillRect(px-1.4,py-2,2.8,6);
          const st=Math.sin(gt*9+i)*1.6;
          c.fillRect(px-1.4+st*0.4,py+4,1.2,3); c.fillRect(px+0.4-st*0.4,py+4,1.2,3);
        }
      }
      c.fillStyle='rgba(164,154,143,.85)'; c.font='6.5px ui-monospace';
      c.fillText(retr?'BRIDGE RETRACTED':'JETBRIDGE',jx+3,doorY-13);
      if(run||p>0){ c.fillStyle=p>=100?'rgba(62,224,143,.9)':'rgba(240,182,74,.9)'; c.font='7px ui-monospace';
        c.fillText(Math.round((F.ls?F.ls.paxN:0)*p/100)+' / '+(F.ls?F.ls.paxN:0)+' boarded',jx+3,gy+14); }
    })();

    // GPU / pushback tug rolls in
    if(TA.tug>0.02){
      c.globalAlpha=TA.tug;
      const tx=bx-W*0.13+W*0.04*TA.tug;
      c.fillStyle='#2c2438'; c.strokeStyle='rgba(246,241,232,.6)'; c.lineWidth=1.2;
      rrect(c,tx-16,gy-12,32,11,2); c.fill(); c.stroke();
      c.fillStyle='#17131e';
      [tx-9,tx+9].forEach(wx=>{ c.beginPath(); c.arc(wx,gy,4,0,7); c.fill(); c.stroke(); });
      c.strokeStyle='rgba(164,154,143,.8)'; c.lineWidth=2;
      c.beginPath(); c.moveTo(tx+16,gy-6); c.lineTo(bx+bw*0.10,gy-3); c.stroke();
      c.fillStyle='rgba(240,182,74,.9)'; c.font='6.5px ui-monospace'; c.textAlign='center';
      c.fillText('TUG',tx,gy-15); c.textAlign='left';
      c.globalAlpha=1;
    }
    const lv=$('#tLive');
    if(lv) lv.textContent=F.eng.started?'ENGINES RUNNING':F.turn.seq.push?'READY FOR START':
      SVC.every(([s])=>F.turn.prog[s]>=100)?'SERVICES COMPLETE':'SERVICES RUNNING';
  });

  /* ══ ENGINE CUTAWAY — the start sequence made visible ══ */
  const cut=$('#cutCv'); let ct=0;
  anim(()=>{
    const {c,W,H}=fit(cut,230); if(!W)return; ct+=0.016;
    c.clearRect(0,0,W,H);
    const cx=W*0.5, cy=H*0.5, L=W*0.78, R=H*0.30;
    // nacelle
    c.fillStyle='#181420'; c.strokeStyle='rgba(246,241,232,.5)'; c.lineWidth=1.4;
    c.beginPath();
    c.moveTo(cx-L/2,cy-R);
    c.quadraticCurveTo(cx-L/2-14,cy,cx-L/2,cy+R);
    c.lineTo(cx+L/2*0.86,cy+R*0.72);
    c.quadraticCurveTo(cx+L/2,cy,cx+L/2*0.86,cy-R*0.72);
    c.closePath(); c.fill(); c.stroke();
    // core casing
    c.fillStyle='#241d2e';
    rrect(c,cx-L*0.14,cy-R*0.42,L*0.44,R*0.84,4); c.fill();
    c.strokeStyle='rgba(164,154,143,.4)'; c.stroke();

    const spin=(rpm)=>ct*rpm;
    // N1 FAN (left) — big, slow
    const fx=cx-L/2+16;
    c.save(); c.translate(fx,cy);
    c.strokeStyle='rgba(246,241,232,'+(0.35+0.4*clamp(E.n1/100,0,1))+')'; c.lineWidth=1.6;
    for(let i=0;i<16;i++){
      const th=spin(E.n1*0.10)+i*Math.PI/8;
      c.beginPath(); c.moveTo(Math.cos(th)*4,Math.sin(th)*4);
      c.lineTo(Math.cos(th)*R*0.92,Math.sin(th)*R*0.92); c.stroke();
    }
    c.fillStyle='#3a3247'; c.beginPath(); c.arc(0,0,5,0,7); c.fill();
    c.strokeStyle='rgba(240,182,74,.9)'; c.lineWidth=1.4;
    c.beginPath(); c.moveTo(0,0); c.lineTo(Math.cos(spin(E.n1*0.10))*5,Math.sin(spin(E.n1*0.10))*5); c.stroke();
    c.restore();
    // N2 SPOOL (compressor discs) — small, fast
    for(let d=0;d<4;d++){
      const dx=cx-L*0.10+d*(L*0.075);
      c.save(); c.translate(dx,cy);
      c.strokeStyle='rgba(107,183,255,'+(0.30+0.45*clamp(E.n2/100,0,1))+')'; c.lineWidth=1.2;
      for(let i=0;i<10;i++){
        const th=spin(E.n2*0.30)+i*Math.PI/5+d*0.3;
        c.beginPath(); c.moveTo(0,0);
        c.lineTo(Math.cos(th)*R*0.34,Math.sin(th)*R*0.34); c.stroke(); }
      c.restore();
    }
    // COMBUSTOR
    const bx2=cx+L*0.20;
    const lit=E.fuelOn&&E.egt>120;
    const flame=lit?clamp((E.egt-100)/500,0,1):0;
    c.fillStyle='#100d16'; rrect(c,bx2-L*0.03,cy-R*0.32,L*0.14,R*0.64,3); c.fill();
    if(flame>0){
      const g=c.createRadialGradient(bx2+L*0.04,cy,2,bx2+L*0.04,cy,R*0.7);
      g.addColorStop(0,'rgba(255,240,180,'+(0.85*flame)+')');
      g.addColorStop(0.4,'rgba(255,140,40,'+(0.6*flame)+')');
      g.addColorStop(1,'rgba(255,60,30,0)');
      c.fillStyle=g; c.beginPath(); c.arc(bx2+L*0.04,cy,R*0.7,0,7); c.fill();
      // flicker tongues
      for(let i=0;i<7;i++){
        const yy=cy-R*0.26+i*(R*0.52/6);
        const len=(L*0.10)*(0.5+0.5*Math.sin(ct*14+i*1.7))*flame;
        c.strokeStyle='rgba(255,190,90,'+(0.5*flame)+')'; c.lineWidth=1.6;
        c.beginPath(); c.moveTo(bx2+L*0.02,yy); c.lineTo(bx2+L*0.02+len,yy); c.stroke(); }
    }
    // IGNITER sparks
    if(E.ign&&!lit){
      if(Math.sin(ct*30)>0.6){
        c.strokeStyle='#ffd98a'; c.lineWidth=1.4;
        c.beginPath(); c.moveTo(bx2,cy-R*0.28); c.lineTo(bx2+4,cy-R*0.16); c.lineTo(bx2-2,cy-R*0.10); c.stroke();
        c.fillStyle='rgba(255,217,138,.5)'; c.beginPath(); c.arc(bx2+2,cy-R*0.18,5,0,7); c.fill(); }
    }
    // FUEL line (glows when fuel is introduced)
    c.strokeStyle=E.fuelOn?'rgba(240,182,74,.95)':'rgba(58,50,71,.9)'; c.lineWidth=2;
    c.beginPath(); c.moveTo(bx2+L*0.02,cy+R*0.9); c.lineTo(bx2+L*0.02,cy+R*0.34); c.stroke();
    if(E.fuelOn) for(let i=0;i<3;i++){ const q=((ct*1.6+i*0.33)%1);
      c.fillStyle='rgba(255,217,138,.9)';
      c.beginPath(); c.arc(bx2+L*0.02,cy+R*0.9-(R*0.56)*q,2,0,7); c.fill(); }
    c.fillStyle=E.fuelOn?'#f0b64a':'rgba(106,99,119,.9)'; c.font='7px ui-monospace'; c.textAlign='center';
    c.fillText('FUEL',bx2+L*0.02,cy+R*1.15); c.textAlign='left';
    // BLEED AIR (start valve) — arrows into the N2 spool
    c.strokeStyle=E.valve?'rgba(107,183,255,.9)':'rgba(58,50,71,.9)'; c.lineWidth=2;
    c.beginPath(); c.moveTo(cx-L*0.30,cy+R*0.9); c.lineTo(cx-L*0.30,cy+R*0.36); c.stroke();
    if(E.valve) for(let i=0;i<4;i++){ const q=((ct*2.2+i*0.25)%1);
      c.fillStyle='rgba(107,183,255,'+(0.9*(1-q))+')';
      c.beginPath(); c.arc(cx-L*0.30,cy+R*0.9-(R*0.54)*q,2.2,0,7); c.fill(); }
    c.fillStyle=E.valve?'#6bb7ff':'rgba(106,99,119,.9)'; c.font='7px ui-monospace'; c.textAlign='center';
    c.fillText('BLEED / STARTER',cx-L*0.30,cy+R*1.15); c.textAlign='left';
    // ─── GAS PATH: air actually flows through the engine ───
    const flow=clamp(E.n2/62,0,1);
    if(flow>0.03){
      const nP=22;
      for(let i=0;i<nP;i++){
        const q=((ct*(0.28+0.5*flow)+i/nP)%1);
        const px2=cx-L/2+8+q*(L*1.10);
        // core stream vs bypass stream
        const core=(i%3===0);
        const spread=core?R*0.30:R*0.80;
        const yy=cy+Math.sin(i*2.4)*spread*(0.35+0.65*q);
        // colour by gas temperature along the path
        let col;
        if(px2<bx2){ col='rgba(107,183,255,'+(0.30+0.35*flow)+')'; }        // cold section
        else if(px2<cx+L*0.34&&flame>0){
          const h=clamp((px2-bx2)/(L*0.16),0,1);
          col=`rgba(255,${Math.round(200-110*h)},${Math.round(90-70*h)},${0.55*flame})`; }
        else if(flame>0){ col='rgba(255,150,60,'+(0.35*flame)+')'; }
        else { col='rgba(107,183,255,'+(0.22*flow)+')'; }
        c.strokeStyle=col; c.lineWidth=core?1.6:1.1; c.lineCap='round';
        const ln=6+10*flow;
        c.beginPath(); c.moveTo(px2,yy); c.lineTo(px2-ln,yy+(core?0:Math.sin(i)*1.5)); c.stroke();
      }
    }
    // EXHAUST plume
    if(flame>0){
      const g2=c.createLinearGradient(cx+L*0.36,cy,cx+L*0.68,cy);
      g2.addColorStop(0,'rgba(255,140,40,'+(0.55*flame)+')');
      g2.addColorStop(0.5,'rgba(255,90,40,'+(0.22*flame)+')');
      g2.addColorStop(1,'rgba(255,140,40,0)');
      c.fillStyle=g2;
      c.beginPath(); c.moveTo(cx+L*0.36,cy-R*0.30); c.lineTo(cx+L*0.70,cy-R*0.50);
      c.lineTo(cx+L*0.70,cy+R*0.50); c.lineTo(cx+L*0.36,cy+R*0.30); c.closePath(); c.fill();
      // shock diamonds when spooled
      if(E.n1>15) for(let i=0;i<3;i++){
        const dx2=cx+L*0.40+i*L*0.075;
        c.fillStyle='rgba(255,230,180,'+(0.28*flame*(1-i*0.3))+')';
        c.beginPath(); c.ellipse(dx2,cy,L*0.020,R*0.14,0,0,7); c.fill();
      }
    }
    // ─── EGT THERMAL BAR along the gas path ───
    (function(){
      const bx3=cx-L*0.14, bw3=L*0.60, by3=cy+R*1.45;
      const gT=c.createLinearGradient(bx3,0,bx3+bw3,0);
      gT.addColorStop(0,'#6bb7ff'); gT.addColorStop(0.45,'#3ee08f');
      gT.addColorStop(0.72,'#ffb23e'); gT.addColorStop(1,'#ff5470');
      c.fillStyle=gT; c.globalAlpha=.30; rrect(c,bx3,by3,bw3,5,2.5); c.fill(); c.globalAlpha=1;
      const f=clamp(E.egt/900,0,1);
      c.fillStyle=E.egt>760?'#ff5470':E.egt>600?'#ffb23e':'#3ee08f';
      rrect(c,bx3,by3,bw3*f,5,2.5); c.fill();
      // 860 redline tick
      const rl=bx3+bw3*(860/900);
      c.strokeStyle='#ff5470'; c.lineWidth=1.6;
      c.beginPath(); c.moveTo(rl,by3-3); c.lineTo(rl,by3+8); c.stroke();
      c.fillStyle='rgba(106,99,119,.95)'; c.font='7px ui-monospace';
      c.fillText('EGT '+Math.round(E.egt)+'°C',bx3,by3-4);
      c.textAlign='right'; c.fillStyle='#ff5470';
      c.fillText('860 LIMIT',bx3+bw3,by3-4); c.textAlign='left';
    })();
    // labels
    c.fillStyle='rgba(106,99,119,.95)'; c.font='7px ui-monospace'; c.textAlign='center';
    c.fillText('N1 FAN',fx,cy+R+16);
    c.fillText('N2 COMPRESSOR',cx-L*0.02,cy-R-8);
    c.fillText('COMBUSTOR',bx2+L*0.04,cy-R-8);
    c.textAlign='left';
    // stage banner
    const SN={OFF:'SHUT DOWN',MOTOR:'MOTORING — N2 RISING',IGN:'IGNITION',FUEL:'FUEL INTRODUCED',
      LIGHT:'LIGHT-UP — EGT RISING',SPOOL:'SPOOLING TO IDLE',STAB:'STABILISED',ENG2:'STARTING ENGINE 2'};
    const bn=SN[E.stage]||E.stage;
    c.font='bold 9px ui-monospace';
    const bw2=c.measureText(bn).width+18;
    c.fillStyle='rgba(8,7,10,.8)'; rrect(c,W/2-bw2/2,6,bw2,17,8); c.fill();
    c.strokeStyle=E.stage==='OFF'?'rgba(106,99,119,.6)':'rgba(240,182,74,.8)'; c.lineWidth=1; c.stroke();
    c.fillStyle=E.stage==='OFF'?'rgba(106,99,119,.95)':'#f0b64a'; c.textAlign='center';
    c.fillText(bn,W/2,18); c.textAlign='left';
    const en=$('#engN'); if(en) en.textContent=E.eng;
    const el2=$('#eLive');
    if(el2){ el2.textContent=F.eng.started?'BOTH RUNNING':E.stage==='OFF'?'SHUT DOWN':'STARTING';
      el2.style.color=F.eng.started?'var(--green)':E.stage==='OFF'?'var(--faint)':'var(--amber)'; }
  });

  /* ══ start-sequence state machine + gauges ══ */
  let last=performance.now();
  anim(ts=>{
    const dt=Math.min(.05,(ts-last)/1000); last=ts;
    let ch=false;
    SVC.forEach(([k,n,d])=>{ if(F.turn.running[k]&&(F.turn.prog[k]||0)<100){
      F.turn.prog[k]=Math.min(100,(F.turn.prog[k]||0)+dt*(100/(d*.5))); ch=true;
      if(F.turn.prog[k]>=100) toast(n+" complete.","ok"); }});
    if(ch) svc();

    /* the real sequence: motor → 22% N2 fuel+ign → light-up → EGT peak → idle */
    if(E.stage!=="OFF"&&!F.eng.started){
      E.t+=dt;
      if(E.stage==="MOTOR"){
        /* the starter can only motor the spool so far — it cuts out around 50% N2.
           Sit here too long without fuel and you get a hung start.                  */
        E.n2=Math.min(46,E.n2+dt*11);
        E.egt=Math.max(22,E.egt-dt*2);
        if(E.n2>=16&&!E.ign){ E.ign=1; logSeq("Igniters ON"); }
        if(F.startMode!=='man' && E.n2>=22){ E.n2AtFuel=E.n2; E.stage="FUEL"; E.fuelOn=1;
          logSeq("Fuel ON @ 22% N2 (FADEC)"); }
        if(F.startMode==='man' && E.n2>=45 && !E.hung){ E.hung=1;
          E.stage="OFF"; E.valve=0; E.ign=0; F.eng.starting=false;
          logSeq("⚠ HUNG START — no fuel, starter cut out");
          F.score.ops-=5; F.score.events.push("Hung start — fuel never introduced");
          F.delayMin+=6;
          toast("Hung start — the starter cut out and you never put fuel in. Dry motor, then try again.","bad");
          renderHUD(); }
      }
      else if(E.stage==="FUEL"){
        E.n2=Math.min(E.n2AtFuel+16,E.n2+dt*9);
        E.egt+=dt*260;
        E.ff=Math.min(340,E.ff+dt*400);
        if(E.egt>=180){ E.stage="LIGHT"; logSeq("LIGHT-UP");
          toast("Light-up — EGT rising. Watch the peak.","ok"); }
      }
      else if(E.stage==="LIGHT"){
        E.n2=Math.min(56,E.n2+dt*7);
        /* PEAK EGT — the physical heart of the start.
           Airflow through the compressor is what carries the combustion heat away.
           Light the fire before N2 is high enough and there isn't enough air:
           the heat goes into the turbine instead of out of the tailpipe.          */
        const early=Math.max(0,22-(E.n2AtFuel||22));
        const peak=520+((F.oat||25)-15)*1.6 + early*42;
        E.peak=peak;
        E.egt+=dt*(E.egt<peak?190:-45);
        E.ff=Math.min(420,E.ff+dt*90);
        if(E.egt>860){ E.stage="OFF"; E.fuelOn=0; E.valve=0; E.ign=0; F.eng.starting=false;
          logSeq("⚠ HOT START — EGT EXCEEDED 860°C");
          F.score.safety-=14;
          F.score.events.push("Hot start — EGT limit exceeded (fuel in at "+Math.round(E.n2AtFuel)+"% N2)");
          F.delayMin+=25;
          modal(`<h3 style="color:var(--red)">Hot start</h3>
            <p>You introduced fuel at <b>${Math.round(E.n2AtFuel)}% N2</b>. The compressor wasn't turning fast enough
            to push air through the engine, so the combustion heat had nowhere to go but into the turbine.
            EGT peaked at <b>${Math.round(E.egt)}°C</b> against an <b>860°C</b> limit.</p>
            <p>That's an over-temperature event. The engine is shut down, the start is abandoned, and engineering
            has to inspect the turbine before this aircraft flies. <b>25 minutes lost.</b></p>
            <p>This is exactly why the FADEC waits for <b>22% N2</b>.</p>
            <div class="btnrow"><button class="btn primary" id="hsOk">Understood</button></div>`);
          const hs=$('#hsOk'); if(hs) hs.onclick=closeModal;
          toast("HOT START — EGT exceeded. Engine shut down.","bad"); renderHUD(); }
        else if(E.n2>=50){ E.stage="SPOOL"; logSeq("EGT peak "+Math.round(E.egt)+"°C"); }
      }
      else if(E.stage==="SPOOL"){
        E.valve=0;
        E.n2=Math.min(62,E.n2+dt*5);
        E.n1=Math.min(21,E.n1+dt*8);
        E.egt+=(430-E.egt)*dt*1.2;
        E.ff+=(380-E.ff)*dt*1.4;
        if(E.n2>=61&&E.n1>=20){ E.stage="STAB"; logSeq("ENG "+E.eng+" stabilised at idle"); }
      }
      else if(E.stage==="STAB"){
        E.egt+=(430-E.egt)*dt*2;
        if(E.t>0.6){
          if(E.eng===1){
            // hand over to engine 2 — but only the AUTO path throws its own master
            if(!E.autoBoth && !F.eng.master[2]){
              E.stage="AVAIL1"; E.n1=21; E.n2=62; E.egt=430; E.ff=380;
              logSeq("ENG 1 AVAIL — throw ENG MASTER 2");
              toast("Engine 1 stable and AVAIL. Throw ENG MASTER 2.","ok");
              return;
            }
            E.eng=2; E.stage="MOTOR"; E.t=0; E.valve=1; E.ign=0; E.fuelOn=0;
            E.n2=0; E.n1=0; E.egt=22; E.ff=0; E.n2AtFuel=null; E.hung=0;
            F.eng.master[2]=true;
            logSeq("ENG 2 MASTER ON · start valve open");
            toast("Engine 1 stable. Starting engine 2.","ok");
          } else {
            F.eng.started=true; F.eng.starting=false;
            F.eng.n1=21; F.eng.n2=62; F.eng.egt=430;
            E.stage="RUN"; E.n1=21; E.n2=62; E.egt=430; E.ff=380;
            logSeq("BOTH ENGINES RUNNING");
            toast("Both engines started and stable. Ready to taxi.","ok"); renderHUD();
          }
        }
      }
    }
    if(F.eng.started){ E.egt=430+Math.sin(ts/700)*7; E.n1=21+Math.sin(ts/900)*0.4;
      F.eng.n1=E.n1; F.eng.n2=E.n2; F.eng.egt=E.egt; }

    /* ═══ EICAS gauges — needle, trend vector, redline, amber band ═══ */
    if(!E.hist) E.hist={n1:[],n2:[],egt:[],ff:[]};
    ['n1','n2','egt','ff'].forEach(k=>{ E.hist[k].push(E[k]); if(E.hist[k].length>40) E.hist[k].shift(); });
    const G=fit($('#eCv'),200);
    if(G.W){ const {c,W,H}=G;
      c.clearRect(0,0,W,H);
      const gauge=(cx,cy,r,v,mx,lab,u,col,amber,red,hist)=>{
        const A0=Math.PI*0.75, A1=Math.PI*2.25, SPAN=A1-A0;
        // bezel
        c.strokeStyle='rgba(58,50,71,.95)'; c.lineWidth=8; c.lineCap='butt';
        c.beginPath(); c.arc(cx,cy,r,A0,A1); c.stroke();
        // amber band
        if(amber!=null){ c.strokeStyle='rgba(255,178,62,.35)';
          c.beginPath(); c.arc(cx,cy,r,A0+SPAN*clamp(amber/mx,0,1),A0+SPAN*clamp((red!=null?red:mx)/mx,0,1)); c.stroke(); }
        // redline arc + tick
        if(red!=null){ const ra=A0+SPAN*clamp(red/mx,0,1);
          c.strokeStyle='rgba(255,84,112,.75)'; c.lineWidth=8;
          c.beginPath(); c.arc(cx,cy,r,ra,A1); c.stroke();
          c.strokeStyle='#ff5470'; c.lineWidth=2.4;
          c.beginPath(); c.moveTo(cx+Math.cos(ra)*(r-7),cy+Math.sin(ra)*(r-7));
          c.lineTo(cx+Math.cos(ra)*(r+7),cy+Math.sin(ra)*(r+7)); c.stroke(); }
        // graduations
        for(let i=0;i<=10;i++){ const th=A0+SPAN*i/10, maj=i%5===0;
          c.strokeStyle='rgba(164,154,143,'+(maj?.75:.35)+')'; c.lineWidth=maj?1.6:1;
          c.beginPath();
          c.moveTo(cx+Math.cos(th)*(r-6),cy+Math.sin(th)*(r-6));
          c.lineTo(cx+Math.cos(th)*(r-(maj?12:9)),cy+Math.sin(th)*(r-(maj?12:9))); c.stroke(); }
        // filled arc to value
        const f=clamp(v/mx,0,1);
        c.strokeStyle=col; c.lineWidth=8; c.lineCap='round';
        c.beginPath(); c.arc(cx,cy,r,A0,A0+SPAN*f); c.stroke();
        c.lineCap='butt';
        // glow when high
        if(red!=null&&v>red*0.9){ c.strokeStyle=col; c.globalAlpha=.25; c.lineWidth=16;
          c.beginPath(); c.arc(cx,cy,r,A0,A0+SPAN*f); c.stroke(); c.globalAlpha=1; }
        // TREND VECTOR — where the needle is heading
        if(hist&&hist.length>6){
          const rate=(hist[hist.length-1]-hist[hist.length-6])/5;
          const proj=clamp((v+rate*14)/mx,0,1);
          if(Math.abs(proj-f)>0.012){
            c.strokeStyle=rate>0?'rgba(62,224,143,.8)':'rgba(107,183,255,.8)'; c.lineWidth=2.4;
            c.beginPath(); c.arc(cx,cy,r+9,A0+SPAN*f,A0+SPAN*proj,proj<f); c.stroke();
            const ta=A0+SPAN*proj;
            c.fillStyle=rate>0?'#3ee08f':'#6bb7ff';
            c.beginPath();
            c.arc(cx+Math.cos(ta)*(r+9),cy+Math.sin(ta)*(r+9),2.6,0,7); c.fill();
          }
        }
        // NEEDLE
        const th=A0+SPAN*f;
        c.save(); c.translate(cx,cy); c.rotate(th);
        c.fillStyle=col;
        c.beginPath(); c.moveTo(-3,0); c.lineTo(r-11,-1.6); c.lineTo(r-6,0); c.lineTo(r-11,1.6); c.closePath(); c.fill();
        c.restore();
        c.fillStyle='#1d1826'; c.strokeStyle=col; c.lineWidth=1.4;
        c.beginPath(); c.arc(cx,cy,4.5,0,7); c.fill(); c.stroke();
        // digital readout
        c.fillStyle='#08070a'; rrect(c,cx-24,cy+r*0.42,48,17,4); c.fill();
        c.strokeStyle='rgba(164,154,143,.35)'; c.lineWidth=1; c.stroke();
        c.fillStyle=(red!=null&&v>red)?'#ff5470':col;
        c.font='bold 12px ui-monospace'; c.textAlign='center';
        c.fillText(Math.round(v),cx,cy+r*0.42+13);
        c.fillStyle='rgba(106,99,119,.95)'; c.font='8px ui-monospace';
        c.fillText(lab,cx,cy-r*0.50);
        c.fillStyle='rgba(106,99,119,.7)'; c.font='7px ui-monospace';
        c.fillText(u,cx,cy-r*0.50+9);
        c.textAlign='left';
      };
      const gy2=H/2+4, r0=Math.min(42,W/9.4);
      gauge(W*.135,gy2,r0,E.n1,100,'N1','%'  ,'#f0b64a',null,null,E.hist.n1);
      gauge(W*.375,gy2,r0,E.n2,100,'N2','%'  ,'#6bb7ff',null,null,E.hist.n2);
      gauge(W*.625,gy2,r0,E.egt,1000,'EGT','°C',E.egt>760?'#ff5470':E.egt>600?'#ffb23e':'#3ee08f',700,860,E.hist.egt);
      gauge(W*.865,gy2,r0,E.ff,600,'FF','KG/H','#3ee08f',null,null,E.hist.ff);
      const gl=$('#gLive');
      if(gl){ gl.textContent=E.egt>860?'⚠ EGT LIMIT':E.egt>760?'EGT HIGH':F.eng.started?'IDLE · STABLE':E.stage==='OFF'?'—':'STARTING';
        gl.style.color=E.egt>760?'var(--red)':F.eng.started?'var(--green)':'var(--gold)'; }
    }
    manRow(); annun();
    const el3=Math.round((Date.now()-F.startedAt)/60000);
    F.delayMin=Math.max(F.delayMin, el3>34?el3-34:0);
    const ro=$('#tRo');
    if(ro) ro.innerHTML=`<div class="ro">
      <span class="k">Services complete</span><span class="v ${SVC.every(([s])=>F.turn.prog[s]>=100)?'ok':''}">${SVC.filter(([s])=>F.turn.prog[s]>=100).length} / 4</span>
      <span class="k">Boarded</span><span class="v">${Math.round((F.ls?F.ls.paxN:0)*(F.turn.prog.board||0)/100)} / ${F.ls?F.ls.paxN:0}</span>
      ${E.n2AtFuel!=null?`<span class="k">Fuel introduced at</span><span class="v ${E.n2AtFuel<18?'bad':'ok'}">${Math.round(E.n2AtFuel)} % N2</span>`:''}
      ${E.peak?`<span class="k">Peak EGT / limit</span><span class="v ${E.peak>860?'bad':E.peak>760?'wr':'ok'}">${Math.round(E.peak)} / 860 °C</span>`:''}
      <span class="k">Engines</span><span class="v ${F.eng.started?'ok':''}">${F.eng.started?'RUNNING':E.stage==='OFF'?'SHUT DOWN':'STARTING'}</span>
      <span class="k">Delay</span><span class="v ${F.delayMin>15?'bad':F.delayMin?'wr':'ok'}">${F.delayMin} min ${F.delayCode||''}</span>
    </div>`;
  });
  keys([...globalKeys(),
    ['s','All services',()=>$('#allB').click()],
    ['1','',()=>{const c=$$('#seq .chk')[0]; if(c)c.click();}],
    ['2','',()=>{const c=$$('#seq .chk')[1]; if(c)c.click();}],
    ['3','',()=>{const c=$$('#seq .chk')[2]; if(c)c.click();}],
    ['4','Seq 1-4',()=>{const c=$$('#seq .chk')[3]; if(c)c.click();}],
    ['m','Auto / manual start',()=>{ F.startMode=F.startMode==='man'?'auto':'man';
      $$('#smSeg button').forEach(x=>x.classList.toggle('on',x.dataset.v===(F.startMode||'auto')));
      toast(F.startMode==='man'?"MANUAL start — you introduce the fuel.":"FADEC start.","ok"); }],
    ['e','Auto-start both',()=>$('#startE').click(), {live:()=>!F.eng.started&&E.stage==='OFF'}],
    ['i','ENG MODE → IGN',()=>{ const b=$('#engMode [data-m="IGN"]'); if(b)b.click(); },
      {live:()=>F.eng.mode!=='IGN'&&!F.eng.started}],
    ['[','ENG MASTER 1',()=>{ const b=$('#mst1'); if(b)b.click(); },
      {live:()=>!F.eng.master[1]&&!F.eng.started}],
    [']','ENG MASTER 2',()=>{ const b=$('#mst2'); if(b)b.click(); },
      {live:()=>!F.eng.master[2]&&!F.eng.started}],
    ['f','FUEL ON',()=>{ const b=$('#fuelOnB'); if(b) b.click(); else toast("Not motoring.","warn"); },
      {live:()=>F.startMode==='man'&&E.stage==='MOTOR'}],
    ['x','Abort start',()=>$('#abortE').click(), {live:()=>E.stage!=='OFF'&&!F.eng.started}]
  ]);
  foot("Run the <b>four services</b>, complete the <b>sequence</b>, then <b>start engines</b> — fuel goes in at 22% N2.");
}

/* ══════════════════════════════════════════════════════════════
   STATION 08 · FLIGHT DECK — takeoff → cruise → landing, one screen
   ══════════════════════════════════════════════════════════════ */
function sFly(el){
  const a=FLEET[F.type], dep=APT[F.route.from], des=APT[F.route.to];
  const lrwys=Object.keys(des.rwys);
  F.landRwy=F.landRwy&&des.rwys[F.landRwy]?F.landRwy:lrwys[0];
  F.landFlap=F.landFlap||3; F.brake=F.brake||'MED'; F.wet=F.wet||false;
  const S=F.fly||(F.fly={
    ph:"HOLD", v:0, alt:dep.elev, vs:0, pitch:0, dist:0, roll:0, rollout:0, touch:0,
    fuel:F.block-(F.fuelUsed||0), fl:(F.cruiseFL&&F.cruiseFL>=100)?F.cruiseFL:a.cruise.fl,
    warp:1, t:0, gear:1, failed:null, calls:[], hist:[]
  });
  const missed=F.ramp.missed||[];
  const bite=missed.length?DEFECTS.find(d=>d.id===missed[0]):null;
  const total=F.route.dist;

  el.innerHTML=`
  <div class="stn-h"><div><div class="kick">Station 08 · Flight deck</div><h2>Takeoff · Cruise · Landing</h2>
    <p>V1 is the decision speed: before it you can stop, after it you fly. Whatever you missed on the ramp is about to introduce itself.</p></div>
    <div style="display:flex;gap:7px"><button class="btn" id="wp">⏩ Time ×<span id="wpV">1</span></button></div></div>
  <div class="g gC">
    <div>
      <div class="card hl" style="margin-bottom:12px"><h3>Flight controls</h3>
        <div class="btnrow" id="ctlRow"></div>
        <div id="callB" style="margin-top:11px"></div>
      </div>
      <div class="card" style="margin-bottom:12px"><h3>Landing config</h3>
        <div class="ctl"><div class="lbl">Runway · ${des.iata}</div>
          <div class="seg" id="lrS">${lrwys.map(r=>`<button data-v="${r}" class="${F.landRwy===r?'on':''}">${r}·${fmt(des.rwys[r].len)}m</button>`).join('')}</div></div>
        <div class="ctl"><div class="lbl">Flap / autobrake / surface</div>
          <div class="seg" id="lfS"><button data-v="3" class="${F.landFlap===3?'on':''}">CONF 3</button><button data-v="4" class="${F.landFlap===4?'on':''}">FULL</button></div>
          <div class="seg" id="lbS" style="margin-left:4px">${['LOW','MED','MAX'].map(b=>`<button data-v="${b}" class="${F.brake===b?'on':''}">${b}</button>`).join('')}</div>
          <div class="seg" id="lwS" style="margin-left:4px"><button data-v="0" class="${!F.wet?'on':''}">DRY</button><button data-v="1" class="${F.wet?'on':''}">WET</button></div></div>
        <div id="ldBox"></div>
      </div>
      <div class="card" id="atcCard" style="margin-bottom:12px;display:none">
        <h3>ATC · <span id="atcTwr" style="color:var(--gold)"></span> tower</h3>
        <div id="atcBox"></div>
      </div>
      <div class="card" style="margin-bottom:12px"><h3>Weather · flown, not assumed</h3><div id="fwxBox"></div></div>
      <div class="card"><h3>Instruments</h3><div id="fRo"></div></div>
    </div>
    <div>
      <div class="cv" style="margin-bottom:12px">
        <span class="tag" id="owTag">Out of the windscreen</span>
        <span class="live" id="owLive">GROUND</span>
        <canvas id="oCv" height="340"></canvas>
        <div id="owFoot" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px"></div>
      </div>
      <div class="cv" style="margin-bottom:12px"><span class="tag" id="pfdTag">Primary flight display</span>
        <span class="live" id="fLive">HOLDING</span><canvas id="fCv" height="400"></canvas></div>
      <div class="cv"><span class="tag">Flight profile · fuel vs plan</span><span class="live">TRACKING</span>
        <canvas id="prCv" height="200"></canvas></div>
    </div>
  </div>`;

  function call(txt,k){ S.calls.push({txt,k});
    $('#callB').innerHTML=S.calls.slice(-6).map(c=>`<div class="bdg ${c.k||''}" style="margin:0 4px 4px 0">${c.txt}</div>`).join(''); }
  function ldCalc(){
    const ldw=F.ls.zfw+Math.max(0,S.fuel);
    F.ldwNow=ldw;
    /* the wind is no longer a hardcoded 8 knots down the runway. It is the wind
       that is actually blowing at the destination, resolved onto the runway we
       have chosen — so a tailwind lengthens the landing distance, as it must. */
    const dwx=wxAt(des.icao);
    const comp=windComp(dwx, des.rwys[F.landRwy].hdg);
    F.landWind=comp;
    const ldr=OPS.landing(a,ldw,F.landFlap,comp.head,F.wet,F.brake);
    const lda=des.rwys[F.landRwy].len;
    F.ldr=ldr; F.lda=lda; F.ldOk=ldr<=lda-150;
    /* VREF ≈ VREF(MLW) × √(W/MLW) — a 177 t A330 does not cross the fence at an A320's speed */
    F.vref=Math.round((a.vrefMLW||(a.v2ref||a.vref)*0.9)*Math.sqrt(ldw/a.mldw));
    const box=$('#ldBox'); if(!box)return;
    box.innerHTML=`<div class="ro">
      <span class="k">Landing weight</span><span class="v ${ldw>a.mldw?'bad':''}">${fmt(ldw)} kg</span>
      <span class="k">VREF</span><span class="v g">${F.vref} kt</span>
      <span class="k">LDR required</span><span class="v ${F.ldOk?'':'bad'}">${fmt(ldr)} m</span>
      <span class="k">LDA available</span><span class="v">${fmt(lda)} m</span>
      <span class="k">Wind on ${F.landRwy}</span><span class="v ${comp.head<0?'bad':''}">${comp.head>=0?'H':'T'}${Math.abs(Math.round(comp.head))} · X${Math.abs(Math.round(comp.cross))} kt</span>
      <span class="k">Margin</span><span class="v ${F.ldOk?'ok':'bad'}">${lda-ldr>=0?'+':''}${fmt(lda-ldr)} m</span>
    </div><div style="margin-top:8px">
      ${comp.head<-3?'<span class="bdg bad">⚠ TAILWIND '+Math.abs(Math.round(comp.head))+' kt</span>':''}
      ${Math.abs(comp.cross)>(a.xwind||35)?'<span class="bdg bad">⚠ CROSSWIND LIMIT</span>':Math.abs(comp.cross)>20?'<span class="bdg warn">STRONG CROSSWIND</span>':''}${F.ldOk?'<span class="bdg ok">LANDING DISTANCE OK</span>':'<span class="bdg bad">⚠ INSUFFICIENT — OVERRUN LIKELY</span>'}
    ${ldw>a.mldw?'<span class="bdg bad">OVERWEIGHT</span>':''}${F.wet?'<span class="bdg warn">WET</span>':''}</div>`;
  }
  /* ── the tower ──────────────────────────────────────────────
     If PYRGOS is working this flight, the flight deck does what it is told.
     The runway is the tower's to assign, the approach is the tower's to
     release, and you do not land without a landing clearance.            */
  let ATC=null;
  function pullATC(){
    const prev=ATC; ATC=myATC();
    const card=$('#atcCard'); if(!card) return;
    if(!ATC){ card.style.display='none'; return; }
    card.style.display='';
    $('#atcTwr').textContent=ATC.tower;

    /* the tower may not give us the runway we filed. It is the tower's field. */
    if(ATC.role==="arr" && ATC.rwy && des.rwys[ATC.rwy] && F.landRwy!==ATC.rwy){
      const was=F.landRwy; F.landRwy=ATC.rwy;
      $$('#lrS button').forEach(x=>x.classList.toggle('on', x.dataset.v===ATC.rwy));
      ldCalc();
      toast(ATC.tower+" assigned runway "+ATC.rwy+" (you filed "+was+"). Numbers rerun.","warn");
      call("Runway change — "+ATC.rwy,"warn");
    }
    const cl=ATC.cleared||{};
    const newMsg = ATC.log && ATC.log.length ? ATC.log[ATC.log.length-1] : null;
    if(newMsg && (!prev || !prev.log || !prev.log.length ||
        prev.log[prev.log.length-1].t !== newMsg.t)){
      call("ATC: "+newMsg.msg, "g");
      toast(ATC.tower+": "+newMsg.msg, "ok");
    }
    const badge=(ok,t)=>`<span class="bdg ${ok?'ok':''}" style="margin:0 4px 4px 0">${t}</span>`;
    $('#atcBox').innerHTML=`
      <div class="ro">
        <span class="k">Runway assigned</span><span class="v g">${ATC.rwy||'—'}</span>
        ${ATC.seq?`<span class="k">Sequence</span><span class="v">number ${ATC.seq}</span>`:''}
        <span class="k">Tower wind</span><span class="v">${pad(ATC.wind?ATC.wind.dir:0,3)}/${ATC.wind?ATC.wind.spd:0} kt</span>
      </div>
      <div style="margin-top:8px">
        ${ATC.holding?'<span class="bdg warn" style="margin:0 4px 4px 0">⏸ HOLDING — await approach clearance</span>':''}
        ${cl.appr?badge(1,'✓ APPROACH'):'<span class="bdg" style="margin:0 4px 4px 0;opacity:.45">approach</span>'}
        ${cl.land?badge(1,'✓ LAND'):'<span class="bdg" style="margin:0 4px 4px 0;opacity:.45">land</span>'}
        ${cl.takeoff?badge(1,'✓ TAKEOFF'):''}
        ${cl.lineup?badge(1,'✓ LINE UP'):''}
      </div>
      ${ATC.log&&ATC.log.length?`<div style="margin-top:9px;border-top:1px solid var(--line);padding-top:8px">
        ${ATC.log.slice(-4).map(l=>`<div style="font-family:var(--mono);font-size:9.5px;color:var(--muted);line-height:1.6">
          <span style="color:var(--gold)">${ATC.tower}:</span> ${l.msg}</div>`).join('')}</div>`:''}
      <div class="hint" style="margin-top:8px">A controller in PYRGOS is working this flight. The runway, the sequence and the clearances are theirs to give.</div>`;
    ctls();
  }
  /* localStorage fires `storage` in OTHER tabs — so the clearance lands the
     instant the controller issues it, with no polling lag. Poll anyway as a
     backstop, because same-tab writes do not raise the event. */
  const onStore=e=>{ if(!e.key||e.key===ATC_KEY) pullATC(); };
  window.addEventListener('storage', onStore);
  const atcT=setInterval(pullATC, 2000);
  stopFns.push(()=>{ window.removeEventListener('storage', onStore); clearInterval(atcT); });

  function ctls(){
    const B=[];
    const b=(id,l,cls,dis)=>B.push(`<button class="btn ${cls||''}" id="${id}" ${dis?'disabled':''}>${l}</button>`);
    const cl=(ATC&&ATC.cleared)||null;
    const controlled=!!ATC;                       // is a tower actually working us?
    const needAppr = controlled && ATC.role==="arr" && !(cl&&cl.appr);
    const needLand = controlled && ATC.role==="arr" && !(cl&&cl.land);
    const needTO   = controlled && ATC.role==="dep" && !(cl&&cl.takeoff);
    if(S.ph==="HOLD") b('taxiB','Taxi to holding point');
    else if(S.ph==="TAXI") b('lineB','Line up '+F.rwy);
    else if(S.ph==="LINEUP") b('toB', needTO?'⏸ await takeoff clearance':'TAKE OFF · set thrust','primary',needTO);
    else if(S.ph==="ROLL"){ b('rejB','REJECT','danger'); }
    else if(S.ph==="CLIMB"||S.ph==="CRUISE"){ b('stepB','⤴ Step climb'); b('todB','Begin descent (TOD)'); }
    else if(S.ph==="DESCENT") b('apprB', needAppr?'⏸ await approach clearance':'Establish approach','',needAppr);
    else if(S.ph==="APPROACH"||S.ph==="FLARE"){
      b('landB', needLand?'⏸ await landing clearance':'Land','primary',needLand);
      b('gaB','GO AROUND','danger'); }
    $('#ctlRow').innerHTML=B.join('');
    const h=(id,fn)=>{ const e=$('#'+id); if(e) e.onclick=fn; };
    h('taxiB',()=>{S.ph="TAXI";call("Taxi via A1, hold short "+F.rwy);ctls();});
    h('lineB',()=>{S.ph="LINEUP";call("Line up and wait "+F.rwy,"g");ctls();});
    h('toB',()=>{S.ph="ROLL";call("Thrust set · "+(F.flex?"FLEX "+F.flex+"°":"TOGA"),"g");toast("Rolling.","ok");ctls();});
    h('rejB',()=>{ if(S.v>=F.perf.v1){ toast("Past V1 — you are going flying.","bad");
        F.score.safety-=15;F.score.events.push("Attempted reject above V1");renderHUD();return; }
      S.ph="REJECT";call("REJECT · idle, max brakes, reverse","bad");toast("Rejected below V1. Good call.","warn");ctls(); });
    h('stepB',()=>{ if(S.fl>=410){toast("At ceiling.","warn");return;} S.fl+=20;S.step=(S.step||0)+1;
      toast("Step climb approved — FL"+S.fl,"ok"); });
    h('todB',()=>{S.ph="DESCENT";call("Descending "+des.icao,"g");toast("Top of descent.","ok");ctls();});
    h('apprB',()=>{ if(S.alt>13000){toast("Too high — continue descent.","warn");return;}
      S.ph="APPROACH";call("Established on final · gear down","g");toast("Established.","ok");ctls(); });
    h('landB',()=>{ if(S.alt>1600){toast("Too high to land — continue approach.","warn");return;}
      S.ph="FLARE";call("Flare — retard","g");ctls(); });
    h('gaB',()=>{ S.ph="GOAROUND";F.gaCount++;F.score.ops-=6;F.delayMin+=9;
      call("GO AROUND — TOGA, gear up","bad");toast("Going around.","warn");ctls(); });
  }
  $('#wp').onclick=()=>{ S.warp=S.warp>=16?1:S.warp*2; $('#wpV').textContent=S.warp; };
  $$('#lrS button').forEach(b=>b.onclick=()=>{F.landRwy=b.dataset.v;$$('#lrS button').forEach(x=>x.classList.toggle('on',x===b));ldCalc();});
  $$('#lfS button').forEach(b=>b.onclick=()=>{F.landFlap=+b.dataset.v;$$('#lfS button').forEach(x=>x.classList.toggle('on',x===b));ldCalc();});
  $$('#lbS button').forEach(b=>b.onclick=()=>{F.brake=b.dataset.v;$$('#lbS button').forEach(x=>x.classList.toggle('on',x===b));ldCalc();});
  $$('#lwS button').forEach(b=>b.onclick=()=>{F.wet=b.dataset.v==='1';$$('#lwS button').forEach(x=>x.classList.toggle('on',x===b));ldCalc();});

  /* if it is raining at the destination, the runway is wet. You do not get to
     assume a dry surface because it is convenient. */
  (function autoWet(){
    const dw=wxAt(des.icao);
    if((dw.rain||dw.snow) && !F.wet && !F._wetSet){
      F.wet=true; F._wetSet=true;
      $$('#lwS button').forEach(x=>x.classList.toggle('on', x.dataset.v==='1'));
      toast("Rain at "+des.iata+" — runway set WET. Landing distance rerun.","warn");
    }
  })();
  ldCalc(); pullATC();

  let last=performance.now();
  anim(ts=>{
    /* fixed-timestep substepping: time-warp changes how MANY steps we run,
       never how big they are — so the flare and the rollout stay accurate at ×16 */
    const raw=Math.min(.05,(ts-last)/1000)*S.warp; last=ts;
    const NS=Math.min(64,Math.max(1,Math.ceil(raw/0.02)));
    const dt=raw/NS;
    for(let _s=0;_s<NS;_s++){ if(!F.flyDone||S.ph==="ROLLOUT"||S.ph==="REJECT") step(dt); }
    S.t+=raw;
    function step(dt){
    /* ─── physics ─── */
    if(S.ph==="ROLL"){
      if(bite&&!S.failed&&S.v>80){ S.failed=bite; call("⚠ "+bite.hit,"bad");
        toast("⚠ "+bite.hit+" — the defect you missed on the walkaround.","bad");
        F.score.safety-=bite.sev; F.score.events.push("In-flight consequence: "+bite.hit); renderHUD(); }
      const acc=(F.thrust==="FLEX"?2.0:2.4)*(S.failed&&S.failed.id==="fod"?.7:1);
      S.v+=acc*dt*11; S.roll+=S.v*.514*dt*3.6;   // 3.6 = sim time-compression, keeps roll consistent with TODR
      if(S.v>=F.perf.v1&&!S.c1){S.c1=1;call("V1","g");}
      if(S.v>=F.perf.vr&&!S.c2){S.c2=1;call("ROTATE","g");S.ph="ROTATE";ctls();}
    }
    else if(S.ph==="ROTATE"){
      S.v+=1.6*dt*11; S.roll+=S.v*.514*dt*3.6;
      S.pitch=Math.min(15,S.pitch+dt*9);
      if(S.pitch>6) S.alt+=Math.max(30,S.v-F.perf.v2+30)*dt*4.5;
      if(S.alt>dep.elev+18&&!S.c3){S.c3=1;call("POSITIVE RATE — GEAR UP","g");S.gear=0;}
      if(S.alt>dep.elev+400){S.ph="CLIMB";call("Climbing "+F.sid,"g");ctls();}
    }
    else if(S.ph==="CLIMB"){
      if(!(S.fl>=100)) S.fl=a.cruise.fl;      // never let a bad level collapse the profile
      S.v=Math.min(290,S.v+8*dt);
      S.alt+=(S.failed&&S.failed.id==="pins"?150:300)*dt;
      S.dist+=S.v*dt/3600*60;
      S.pitch=11;
      if(S.alt>=S.fl*100){ S.alt=S.fl*100; S.ph="CRUISE"; S.pitch=2;
        call("Level FL"+S.fl,"g"); toast("Level at cruise. Watch the fuel.","ok"); ctls(); }
    }
    else if(S.ph==="CRUISE"){
      const tgt=S.fl*100;
      if(Math.abs(S.alt-tgt)>40) S.alt+=Math.sign(tgt-S.alt)*1500*dt;
      const ciF=.92+F.ci/99*.16;
      S.v=a.cruise.tas*ciF;
      S.dist+=S.v/3600*dt*60;
      S.pitch=2;
      const tod=total-(total>1500?190:120);
      if(S.dist>=tod&&!S.todCall){ S.todCall=1; call("Top of descent — "+Math.round(total-S.dist)+" nm to run","warn");
        toast("Top of descent reached. Begin your descent.","warn"); }
    }
    else if(S.ph==="DESCENT"){
      S.vs=-1900; S.alt=Math.max(des.elev+2200,S.alt+S.vs/60*dt*12);
      S.dist=Math.min(total-9,S.dist+250/3600*dt*60);
      S.v+=(250-S.v)*Math.min(1,dt*0.30); S.pitch=-2;     // managed to 250 kt below FL100
      if(S.alt<=des.elev+2300&&!S.dCall){S.dCall=1;toast("Platform altitude — establish the approach.","ok");}
    }
    else if(S.ph==="APPROACH"){
      S.vs=-760; S.alt=Math.max(des.elev,S.alt+S.vs/60*dt*12);
      S.dist=Math.min(total-.3,S.dist+dt*.45);
      /* managed onto VREF — a real approach is speed-controlled, so the aeroplane
         is always stabilised at the threshold regardless of how it got there      */
      S.v+=(F.vref-S.v)*Math.min(1,dt*0.42);
      S.pitch=-3; S.gear=1;
      if(S.alt<=des.elev+250){ S.ph="FLARE"; ctls(); }
    }
    else if(S.ph==="FLARE"){
      const agl=Math.max(0,S.alt-des.elev);
      if(agl>250){ S.vs=-760; S.alt+=S.vs/60*dt*12; S.v=Math.max(F.vref,S.v-dt*5); }
      else {
        /* flare law: commanded sink is proportional to height, so the aircraft
           always arrives at the surface at ~100 fpm no matter the timestep    */
        const tgt=-clamp(agl*2.5+95,95,700);
        S.vs+=(tgt-S.vs)*Math.min(1,dt*5.5);
        S.alt=Math.max(des.elev,S.alt+S.vs/60*dt*12);
        S.v+=((F.vref-16)-S.v)*Math.min(1,dt*1.2);        // retard to touchdown speed
        S.pitch=Math.min(6,S.pitch+dt*5);
      }
      if(S.alt<=des.elev){ S.ph="ROLLOUT"; S.touch=Math.abs(S.vs); S.vTouch=S.v;
        if(S.v>F.vref+25){ F.score.safety-=10; F.score.events.push("Unstabilised approach — fast at touchdown ("+Math.round(S.v)+" kt)");
          toast("Unstabilised — you crossed the threshold "+Math.round(S.v-F.vref)+" kt fast.","bad"); }
        const firm=S.touch>200;
        toast(firm?"Firm touchdown — "+Math.round(S.touch)+" fpm.":"Smooth touchdown — "+Math.round(S.touch)+" fpm.",firm?"warn":"ok");
        if(firm){F.score.ops-=4;F.score.events.push("Firm landing ("+Math.round(S.touch)+" fpm)");}
        ctls(); }
    }
    else if(S.ph==="ROLLOUT"){
      const dec={LOW:2.4,MED:3.4,MAX:4.6}[F.brake]*(F.wet?.72:1);
      S.v=Math.max(0,S.v-dec*dt*11);
      S.rollout+=S.v*.514*dt*12;       // scaled to the sim's time-compression; ground roll ≈ 55% of the factored LDR
      S.pitch=0;
      if(S.v<=22&&!F.flyDone){
        F.flyDone=true;
        if(S.rollout>F.lda||!F.ldOk){ call("RUNWAY OVERRUN","bad"); toast("Overran — landing distance exceeded.","bad");
          F.score.safety-=22; F.score.events.push("Runway overrun on landing"); }
        else { call("Vacated · welcome to "+des.iata,"ok"); toast("Landed and vacated. Nicely flown.","ok"); }
        F.fuelOnLanding=S.fuel; F.ldwFinal=F.ldwNow;
        renderHUD(); ctls();
      }
    }
    else if(S.ph==="GOAROUND"){
      S.vs=1900; S.alt+=S.vs/60*dt*12; S.v=Math.min(220,S.v+dt*8); S.pitch=12; S.gear=0;
      S.dist=Math.max(total-14,S.dist-dt*.4);
      if(S.alt>des.elev+3000){ S.ph="APPROACH"; call("Re-established","g"); ctls(); }
    }
    else if(S.ph==="REJECT"){
      S.v=Math.max(0,S.v-3.4*dt*11); S.roll+=S.v*.514*dt*3.6;
      if(S.v<=0&&!F.flyDone){ F.flyDone=true;
        if(S.roll>F.perf.tora){ call("RUNWAY OVERRUN","bad"); F.score.safety-=25;
          F.score.events.push("Overrun on rejected takeoff"); toast("Overran on the reject.","bad"); }
        else { call("Stopped · "+Math.round(F.perf.tora-S.roll)+"m remaining","ok");
          toast("Stopped safely with "+Math.round(F.perf.tora-S.roll)+"m to spare.","ok"); }
        F.fuelOnLanding=S.fuel; renderHUD(); ctls(); }
    }
    // fuel burn
    if(["ROLL","ROTATE","CLIMB"].includes(S.ph)) { const b=a.cruise.burn/3600*dt*2.4; S.fuel-=b; F.fuelUsed+=b; }
    else if(["CRUISE","DESCENT","APPROACH","FLARE","GOAROUND"].includes(S.ph)){
      const ciF=.92+F.ci/99*.16, off=Math.abs(S.fl-a.cruise.fl)/10;
      const b=a.cruise.burn*ciF*(1+off*.018)*(S.ph==="CRUISE"?1:.65)/3600*dt; S.fuel-=b; F.fuelUsed+=b; }
    if(S.dist>2){ S.hist.push({d:S.dist,a:S.alt,f:S.fuel}); if(S.hist.length>900) S.hist.shift(); }
    }   /* ── end step() ── */

    /* ─── OUT OF THE WINDSCREEN ─────────────────────────────────
       Everything here is derived from the flight state, not decorated onto it.
       The distance to the threshold comes off the nominal 3° path, so the view
       and the glideslope agree with each other and the PAPI tells the truth.  */
    const O=fit($('#oCv'),340);
    if(O.W){
      const {c:oc,W:OW,H:OH}=O;
      const arriving = ["DESCENT","APPROACH","FLARE","ROLLOUT","GOAROUND"].includes(S.ph);
      const fld = arriving ? des : dep;
      const rwyId = arriving ? F.landRwy : F.rwy;
      const rwy = fld.rwys[rwyId] || Object.values(fld.rwys)[0];
      const wx = wxAt(fld.icao);
      const agl = Math.max(0, S.alt - fld.elev);

      /* distance to the threshold, in metres */
      let distM;
      if(S.ph==="ROLLOUT"||S.ph==="REJECT") distM = -(S.rollout||0);
      else if(S.ph==="ROLL"||S.ph==="ROTATE") distM = -(S.roll||0);
      else if(S.ph==="LINEUP"||S.ph==="TAXI"||S.ph==="HOLD") distM = -60;
      else if(arriving) distM = Math.max(30, agl*FT2M/Math.tan(3*Math.PI/180));
      else distM = -(S.roll||0) - agl*FT2M/Math.tan(12*Math.PI/180);   // climbing away

      /* crab: with a crosswind the nose is not where the aeroplane is going,
         and on short final you will see the centreline offset because of it */
      const comp = windComp(wx, rwy.hdg);
      const tas = Math.max(60, S.v);
      const crab = Math.asin(clamp(comp.cross/tas, -0.35, 0.35));
      const fpa = S.v>40 ? Math.atan2(S.vs/60*FT2M, S.v*0.514)*180/Math.PI : 0;
      const night = (()=>{ const h=new Date().getUTCHours()+(fld.lon/15);
        const lh=((h%24)+24)%24; return lh<6.2||lh>18.4; })();

      const gm=geo(F.type);
      const eyeH=(gm.gndH||3.2)+(gm.fusDia||3.9)/2;     // cockpit eye above the tarmac, metres
      drawOutside(oc, OW, OH, {
        agl, distM, pitch:S.pitch, crab, night, wx, t:S.t, eyeH,
        rwyLen:rwy.len, rwyW:45, rwyName:rwyId.replace('-INT',''),
        elev:fld.elev, wet:F.wet, fpa, ias:S.v
      });

      const st = papiState(agl, Math.max(1,distM));
      const nW = st.filter(x=>x).length;
      /* the PAPI only tells you anything if you can actually SEE it: not from
         inside cloud, not above the deck, and not from beyond the visibility */
      const inCld = wx.ceil!=null && agl > wx.ceil-120;
      const papiVisible = arriving && distM>50 && distM<9000 && agl>10
                          && !inCld && distM < wx.vis*1.6;
      const papiTxt = papiVisible
        ? (nW===2?'PAPI 2W/2R · ON SLOPE':nW>2?'PAPI '+nW+'W · HIGH':'PAPI '+(4-nW)+'R · LOW')
        : (arriving && inCld ? 'PAPI — IN CLOUD' : '');
      const tag=$('#owTag'), lv=$('#owLive'), ft=$('#owFoot');
      if(tag) tag.textContent = "Out of the windscreen · "+fld.iata+" RWY "+rwyId;
      if(lv) lv.textContent = wx.live?"LIVE WX":"SIM WX";
      if(ft) ft.innerHTML=[
        papiTxt?`<span class="bdg ${!papiVisible?'':nW===2?'ok':'warn'}">${papiTxt}</span>`:'',
        `<span class="bdg">VIS ${wx.vis>=9000?'10 km+':(wx.vis>=1000?(wx.vis/1000).toFixed(1)+' km':wx.vis+' m')}</span>`,
        wx.ceil!=null?`<span class="bdg ${wx.ceil<400?'bad':wx.ceil<1000?'warn':''}">${wx.cover} ${wx.ceil} ft</span>`:'<span class="bdg ok">NO CEILING</span>',
        Math.abs(comp.cross)>1?`<span class="bdg ${Math.abs(comp.cross)>20?'warn':''}">XWIND ${Math.abs(Math.round(comp.cross))} kt · CRAB ${Math.abs(Math.round(crab*180/Math.PI))}°</span>`:'',
        wx.rain?'<span class="bdg warn">RAIN</span>':'', wx.fog?'<span class="bdg bad">FOG</span>':'',
        night?'<span class="bdg">NIGHT</span>':''
      ].filter(Boolean).join(' ');
    }

    /* ─── weather panel ─── */
    const wxb=$('#fwxBox');
    if(wxb && (!wxb._t || performance.now()-wxb._t>1500)){
      wxb._t=performance.now();
      const mk=(lbl,fld,rid)=>{
        const w=wxAt(fld.icao);
        const rw=fld.rwys[rid]||Object.values(fld.rwys)[0];
        const cp=windComp(w, rw.hdg);
        return `<div style="margin-bottom:9px">
          <div class="lbl">${lbl} · ${fld.iata} ${w.live?'<span style="color:var(--green)">● LIVE</span>':'<span style="color:var(--amber)">● SIM</span>'}</div>
          <div class="ro" style="margin-top:4px">
            <span class="k">Wind</span><span class="v">${pad(w.wdir,3)}/${w.wspd}${w.gust?'G'+w.gust:''} kt</span>
            <span class="k">Component</span><span class="v ${cp.head<0?'bad':'g'}">${cp.head>=0?'HEAD':'TAIL'} ${Math.abs(Math.round(cp.head))} · X ${Math.abs(Math.round(cp.cross))}</span>
            <span class="k">Vis / cloud</span><span class="v ${w.vis<2000?'bad':''}">${w.vis>=9000?'CAVOK':(w.vis>=1000?(w.vis/1000).toFixed(1)+'km':w.vis+'m')} · ${w.ceil!=null?w.cover+' '+w.ceil:'—'}</span>
          </div></div>`;
      };
      wxb.innerHTML=mk('DEPARTURE',dep,F.rwy)+mk('DESTINATION',des,F.landRwy)+
        `<div class="hint">These are the numbers the aeroplane is flying — the wind resolves onto the runway, and the visibility is what you will see out of the window.</div>`;
    }

    /* ─── PFD / HUD ─── */
    const P=fit($('#fCv'),400);
    if(P.W){ const {c,W,H}=P;
      c.clearRect(0,0,W,H);
      const agl=S.alt-((S.ph==="DESCENT"||S.ph==="APPROACH"||S.ph==="FLARE"||S.ph==="ROLLOUT"||S.ph==="GOAROUND")?des.elev:dep.elev);
      const hz=H*.50+clamp(S.pitch,-15,20)*5.5+clamp(agl*.02,-90,150);
      const sky=c.createLinearGradient(0,0,0,Math.max(1,hz));
      sky.addColorStop(0,'#0b1420');sky.addColorStop(1,'#2a2436');
      c.fillStyle=sky;c.fillRect(0,0,W,Math.max(0,hz));
      c.fillStyle='#100d16';c.fillRect(0,Math.max(0,hz),W,H-Math.max(0,hz));
      // runway
      const onRwy=["HOLD","TAXI","LINEUP","ROLL","ROTATE","REJECT","FLARE","ROLLOUT","APPROACH"].includes(S.ph);
      if(onRwy&&agl<4200){
        const prox=1-clamp(agl/4200,0,1), van=W/2, sp=W*.32*prox*prox+8;
        c.fillStyle='#1a1620';
        c.beginPath();c.moveTo(van-9*prox,hz);c.lineTo(van+9*prox,hz);
        c.lineTo(van+sp,H);c.lineTo(van-sp,H);c.closePath();c.fill();
        c.strokeStyle='rgba(246,241,232,'+(.5*prox)+')';c.lineWidth=2.2;c.setLineDash([22,18]);
        c.lineDashOffset=-((S.roll+S.rollout)*1.5)%40;
        c.beginPath();c.moveTo(van,hz);c.lineTo(van,H);c.stroke();c.setLineDash([]);
        for(let i=0;i<12;i++){ const f=i/12,y=hz+(H-hz)*f*f, hw=9+(sp-9)*f*f;
          c.fillStyle='rgba(255,217,138,'+(.55*prox)+')';
          c.fillRect(van-hw,y,3,3);c.fillRect(van+hw,y,3,3); }
        if(S.ph==="APPROACH"||S.ph==="FLARE"){
          const dme=Math.max(.2,total-S.dist);
          const slope=agl/(dme*318);
          for(let i=0;i<4;i++){ const hi=(i<2)===(slope>1.05);
            c.fillStyle=hi?'#ff5470':'#f6f1e8';
            c.beginPath();c.arc(van-sp-26+i*11,hz+15,3.4,0,7);c.fill(); }
        }
      }
      // horizon
      c.strokeStyle='rgba(246,241,232,.4)';c.lineWidth=1.6;
      c.beginPath();c.moveTo(0,hz);c.lineTo(W,hz);c.stroke();
      const cx=W/2, cy=H*.44;
      // ─── PITCH LADDER (HUD green, climbs/dives with the aircraft) ───
      c.save(); c.beginPath(); c.rect(W*0.17,26,W*0.66,H-70); c.clip();
      for(let p=-20;p<=25;p+=5){
        if(p===0) continue;
        const py=hz-p*5.5;
        if(py<20||py>H-30) continue;
        const half=p>0?30:24;
        c.strokeStyle=p>0?'rgba(62,224,143,.55)':'rgba(62,224,143,.30)';
        c.lineWidth=1.2;
        if(p<0) c.setLineDash([5,4]);
        c.beginPath();
        c.moveTo(cx-half-16,py+(p>0?0:0)); c.lineTo(cx-16,py);
        c.moveTo(cx+16,py); c.lineTo(cx+half+16,py);
        c.stroke();
        // tick ends turn toward the horizon
        c.beginPath();
        c.moveTo(cx-half-16,py); c.lineTo(cx-half-16,py+(p>0?5:-5));
        c.moveTo(cx+half+16,py); c.lineTo(cx+half+16,py+(p>0?5:-5));
        c.stroke(); c.setLineDash([]);
        c.fillStyle='rgba(62,224,143,.7)'; c.font='8px ui-monospace'; c.textAlign='right';
        c.fillText(Math.abs(p),cx-half-20,py+3);
        c.textAlign='left'; c.fillText(Math.abs(p),cx+half+20,py+3);
      }
      c.restore();
      // ─── FLIGHT PATH VECTOR — where the aeroplane is actually going ───
      const fpaDeg=(S.v>40)?clamp(Math.atan2(S.vs/60,S.v*1.688)*180/Math.PI,-14,14):0;
      const fx=cx, fy=hz-fpaDeg*5.5;
      c.strokeStyle='#3ee08f'; c.lineWidth=1.8;
      c.beginPath(); c.arc(fx,fy,6,0,7); c.stroke();
      c.beginPath();
      c.moveTo(fx-6,fy); c.lineTo(fx-15,fy);
      c.moveTo(fx+6,fy); c.lineTo(fx+15,fy);
      c.moveTo(fx,fy-6); c.lineTo(fx,fy-12);
      c.stroke();
      // ─── boresight (aircraft symbol) ───
      c.strokeStyle='#f0b64a';c.lineWidth=2.6;
      c.beginPath();c.moveTo(cx-46,cy);c.lineTo(cx-16,cy);c.lineTo(cx-8,cy+7);
      c.moveTo(cx+46,cy);c.lineTo(cx+16,cy);c.lineTo(cx+8,cy+7);
      c.stroke();
      // tapes
      const unrel=S.failed&&(S.failed.id==="pitot"||S.failed.id==="stat");
      /* rolling tapes: the scale physically slides past a fixed index — like the real thing */
      const tape=(x,val,lab,step,unit,marks,side)=>{
        const TH=190, px=1.05;           // px per unit
        c.fillStyle='rgba(8,7,10,.72)'; c.fillRect(x-32,cy-TH/2,64,TH);
        c.strokeStyle='rgba(240,182,74,.35)'; c.lineWidth=1; c.strokeRect(x-32,cy-TH/2,64,TH);
        c.save(); c.beginPath(); c.rect(x-32,cy-TH/2,64,TH); c.clip();
        // sliding scale
        const first=Math.floor((val-TH/2/px)/step)*step;
        for(let v=first; v<val+TH/2/px; v+=step){
          const y=cy+(val-v)*px;
          if(y<cy-TH/2-8||y>cy+TH/2+8) continue;
          const maj=(v%(step*2)===0);
          c.strokeStyle='rgba(246,241,232,'+(maj?.55:.28)+')'; c.lineWidth=1;
          c.beginPath();
          if(side==='L'){ c.moveTo(x+32,y); c.lineTo(x+32-(maj?11:6),y); }
          else { c.moveTo(x-32,y); c.lineTo(x-32+(maj?11:6),y); }
          c.stroke();
          if(maj&&v>=0){ c.fillStyle='rgba(246,241,232,.8)'; c.font='9px ui-monospace';
            c.textAlign=side==='L'?'right':'left';
            c.fillText(v, side==='L'?x+18:x-18, y+3); }
        }
        // speed/alt bugs
        (marks||[]).forEach(m=>{ const y=cy+(val-m.v)*px;
          if(y<cy-TH/2||y>cy+TH/2) return;
          c.fillStyle=m.c;
          c.beginPath();
          if(side==='L'){ c.moveTo(x+32,y); c.lineTo(x+24,y-4); c.lineTo(x+24,y+4); }
          else { c.moveTo(x-32,y); c.lineTo(x-24,y-4); c.lineTo(x-24,y+4); }
          c.closePath(); c.fill();
          c.font='8px ui-monospace'; c.textAlign=side==='L'?'left':'right';
          c.fillText(m.l, side==='L'?x-30:x+30, y+3);
        });
        c.restore();
        // fixed index box with rolling last digit
        const w=54;
        c.fillStyle='#08070a';
        c.beginPath();
        if(side==='L'){ c.moveTo(x+32,cy); c.lineTo(x+24,cy-11); c.lineTo(x-30,cy-11);
          c.lineTo(x-30,cy+11); c.lineTo(x+24,cy+11); }
        else { c.moveTo(x-32,cy); c.lineTo(x-24,cy-11); c.lineTo(x+30,cy-11);
          c.lineTo(x+30,cy+11); c.lineTo(x-24,cy+11); }
        c.closePath(); c.fill();
        c.strokeStyle='#f0b64a'; c.lineWidth=1.4; c.stroke();
        c.fillStyle='#f6f1e8'; c.font='bold 15px ui-monospace'; c.textAlign='center';
        c.fillText(Math.round(val), x-(side==='L'?2:-2), cy+5);
        c.fillStyle='rgba(106,99,119,.95)'; c.font='8px ui-monospace';
        c.fillText(lab, x, cy-TH/2-7);
        c.fillText(unit, x, cy+TH/2+13);
        c.textAlign='left';
      };
      const spdMarks = (S.ph==="ROLL"||S.ph==="LINEUP"||S.ph==="ROTATE")
        ? [{v:F.perf.v1,l:'1',c:'#ffd98a'},{v:F.perf.vr,l:'R',c:'#3ee08f'},{v:F.perf.v2,l:'2',c:'#6bb7ff'}]
        : [{v:F.vref||0,l:'REF',c:'#3ee08f'}];
      tape(W*.14, unrel?S.v*(.6+.3*Math.sin(S.t*7)):S.v, unrel?'IAS ⚠':'IAS', 10,'KT', spdMarks,'L');
      tape(W*.86, unrel?S.alt*(.8+.4*Math.random()):S.alt,'ALT',500,'FT',
        [{v:S.fl*100,l:'SEL',c:'#f0b64a'}],'R');
      /* VSI needle strip */
      (function(){
        const vx=W*.86+42, TH=190;
        c.fillStyle='rgba(8,7,10,.55)'; c.fillRect(vx-1,cy-TH/2,13,TH);
        c.strokeStyle='rgba(164,154,143,.30)'; c.lineWidth=1;
        [-2000,-1000,0,1000,2000].forEach(v=>{ const y=cy-clamp(v,-2500,2500)/2500*(TH/2-8);
          c.beginPath(); c.moveTo(vx,y); c.lineTo(vx+(v===0?11:6),y); c.stroke(); });
        const vy2=cy-clamp(S.vs,-2500,2500)/2500*(TH/2-8);
        c.strokeStyle=S.vs>100?'#3ee08f':S.vs<-1200?'#ffb23e':'#f0b64a'; c.lineWidth=2.4;
        c.beginPath(); c.moveTo(vx+1,cy); c.lineTo(vx+11,vy2); c.stroke();
      })();
      // warning banners: a single centred stack in the reserved top band
      const warn=[];
      if(unrel) warn.push(['⚠ UNRELIABLE AIRSPEED','#ff5470']);
      if(S.gear&&agl>30) warn.push(['GEAR DOWN','#ffb23e']);
      if(S.failed&&S.failed.id==='pins'&&agl>30) warn.push(['GEAR WILL NOT RETRACT','#ff5470']);
      warn.slice(0,2).forEach(([t2,col],i)=>{
        c.font='bold 10px ui-monospace';
        const bw=c.measureText(t2).width+20;
        c.fillStyle='rgba(8,7,10,.8)';
        rrect(c,W/2-bw/2,16+i*22,bw,18,9); c.fill();
        c.strokeStyle=col; c.lineWidth=1; c.stroke();
        c.fillStyle=col; c.textAlign='center'; c.fillText(t2,W/2,29+i*22); c.textAlign='left';
      });
      // phase strip along the bottom, in its own reserved band — no collisions
      c.fillStyle='rgba(164,154,143,.9)'; c.font='9px ui-monospace'; c.textAlign='center';
      c.fillText(Math.round(S.vs)+' fpm', W*.86, cy+118);
      c.textAlign='left';
      c.fillStyle='rgba(62,224,143,.9)'; c.font='9px ui-monospace';
      c.fillText('FPA '+fpaDeg.toFixed(1)+'°', 12, H-10);
      c.textAlign='center'; c.fillStyle='rgba(240,182,74,.9)';
      c.fillText('CONF '+F.flap+'  ·  THS '+(F.trim||0).toFixed(1), W/2, H-10);
      c.textAlign='right'; c.fillStyle='rgba(164,154,143,.9)';
      c.fillText('G/S '+Math.round(S.v*1.02)+' kt', W-12, H-10);
      c.textAlign='left';
      const lv=$('#fLive');
      if(lv){ const nm={HOLD:'AT GATE',TAXI:'TAXIING',LINEUP:'LINED UP',ROLL:'TAKEOFF ROLL',ROTATE:'ROTATING',
        CLIMB:'CLIMBING',CRUISE:'CRUISE',DESCENT:'DESCENDING',APPROACH:'ON APPROACH',FLARE:'FLARE',
        ROLLOUT:'ROLLOUT',GOAROUND:'GO AROUND',REJECT:'REJECTED TAKEOFF'};
        lv.textContent=nm[S.ph]||S.ph;
        lv.style.color=(S.ph==='REJECT'||S.ph==='GOAROUND')?'var(--red)':'var(--gold)'; }
    }
    /* ─── profile + fuel ─── */
    const G=fit($('#prCv'),200);
    if(G.W){ const {c,W,H}=G;
      c.clearRect(0,0,W,H);
      const padL=40,padR=42,padB=24,padT=16;
      const X=(d)=>padL+clamp(d/total,0,1)*(W-padL-padR);
      const Y=(al)=>H-padB-clamp(al/42000,0,1)*(H-padT-padB);
      const YF=(f)=>H-padB-clamp(f/F.block,0,1)*(H-padT-padB);
      c.strokeStyle='rgba(58,50,71,.5)';c.lineWidth=1;
      for(let i=0;i<=4;i++){const y=padT+(H-padT-padB)*i/4;c.beginPath();c.moveTo(padL,y);c.lineTo(W-padR,y);c.stroke();}
      c.beginPath();c.moveTo(padL,H-padB);c.lineTo(W-padR,H-padB);c.strokeStyle='rgba(164,154,143,.5)';c.stroke();
      // planned fuel line
      const res=F.fuelCalc.fr+F.fuelCalc.altn;
      c.strokeStyle='rgba(107,183,255,.55)';c.setLineDash([4,4]);c.lineWidth=1.3;
      c.beginPath();c.moveTo(X(0),YF(F.block));c.lineTo(X(total),YF(F.block-F.fuelCalc.trip-F.fuelCalc.taxi));c.stroke();c.setLineDash([]);
      c.strokeStyle='rgba(255,84,112,.7)';c.lineWidth=1.3;
      c.beginPath();c.moveTo(padL,YF(res));c.lineTo(W-padR,YF(res));c.stroke();
      c.fillStyle='rgba(255,84,112,.85)';c.font='7.5px ui-monospace';c.fillText('RESERVE+ALTN',padL+3,YF(res)-4);
      // altitude trace
      if(S.hist.length>1){
        c.strokeStyle='#f0b64a';c.lineWidth=2;c.beginPath();
        S.hist.forEach((h,i)=>{const px=X(h.d),py=Y(h.a);i?c.lineTo(px,py):c.moveTo(px,py);});c.stroke();
        const g=c.createLinearGradient(0,padT,0,H-padB);
        g.addColorStop(0,'rgba(240,182,74,.15)');g.addColorStop(1,'rgba(240,182,74,.01)');
        c.lineTo(X(S.dist),H-padB);c.lineTo(padL,H-padB);c.closePath();c.fillStyle=g;c.fill();
        // fuel trace
        c.strokeStyle='#3ee08f';c.lineWidth=1.6;c.beginPath();
        S.hist.forEach((h,i)=>{const px=X(h.d),py=YF(h.f);i?c.lineTo(px,py):c.moveTo(px,py);});c.stroke();
      }
      const ax=X(S.dist),ay=Y(S.alt);
      c.save();c.translate(ax,ay);c.rotate(-S.pitch*Math.PI/180*.5);
      c.fillStyle='#ffd98a';c.beginPath();c.moveTo(8,0);c.lineTo(-6,4.5);c.lineTo(-2.5,0);c.lineTo(-6,-4.5);c.closePath();c.fill();c.restore();
      c.fillStyle='rgba(240,182,74,.9)';c.font='8px ui-monospace';c.textAlign='center';
      c.fillText(APT[F.route.from].iata,padL,H-8);
      c.fillText(APT[F.route.to].iata,W-padR,H-8);c.textAlign='left';
      c.fillStyle='rgba(62,224,143,.9)';c.font='7.5px ui-monospace';c.textAlign='right';
      c.fillText(fmt(Math.max(0,S.fuel))+'kg',W-4,YF(Math.max(0,S.fuel))+3);c.textAlign='left';
    }
    // readouts
    const rem=Math.max(0,total-S.dist);
    const atDest=S.fuel-(rem/a.cruise.tas*a.cruise.burn);
    const res2=F.fuelCalc.fr+F.fuelCalc.altn;
    const ro=$('#fRo');
    if(ro) ro.innerHTML=`<div class="ro">
      <span class="k">IAS</span><span class="v g">${Math.round(S.v)} kt</span>
      <span class="k">Altitude</span><span class="v">${fmt(S.alt)} ft</span>
      <span class="k">Distance run / remaining</span><span class="v">${fmt(S.dist)} / ${fmt(rem)} nm</span>
      <span class="k">Fuel on board</span><span class="v ${S.fuel<res2?'bad':'g'}">${fmt(Math.max(0,S.fuel))} kg</span>
      <span class="k">Predicted at destination</span><span class="v ${atDest<F.fuelCalc.fr?'bad':atDest<res2?'wr':'ok'}">${fmt(Math.max(0,atDest))} kg</span>
      ${S.ph==="ROLL"||S.ph==="REJECT"?`<span class="k">Runway used</span><span class="v ${S.roll>F.perf.tora?'bad':''}">${fmt(S.roll)} / ${fmt(F.perf.tora)} m</span>`:''}
      ${S.touch?`<span class="k">Touchdown rate</span><span class="v ${S.touch>200?'wr':'ok'}">${Math.round(S.touch)} fpm</span>`:''}
      ${S.rollout?`<span class="k">Rollout</span><span class="v ${S.rollout>F.lda?'bad':'ok'}">${fmt(S.rollout)} / ${fmt(F.lda)} m</span>`:''}
      <span class="k">Defect active</span><span class="v ${S.failed?'bad':'ok'}">${S.failed?S.failed.nm:'None'}</span>
    </div>${atDest<F.fuelCalc.fr&&!F.flyDone?'<div class="bdg bad" style="margin-top:8px">⚠ PREDICTED BELOW FINAL RESERVE</div>':''}`;
  });
  ldCalc(); ctls();
  const K=(id)=>()=>{ const b=$('#'+id); if(b) b.click(); else toast("Not available in this phase.","warn"); };
  keys([...globalKeys(),
    ['t','Taxi',K('taxiB'),{live:()=>S.ph==='HOLD'}],
    ['l','Line up',K('lineB'),{live:()=>S.ph==='TAXI'}],
    [' ','Take off / Land',()=>{ if(S.ph==='LINEUP') K('toB')();
        else if(S.ph==='APPROACH'||S.ph==='FLARE') K('landB')();
        else toast("Nothing to do with that right now.","warn"); },
      {live:()=>['LINEUP','APPROACH','FLARE'].includes(S.ph)}],
    ['r','REJECT',K('rejB'),{live:()=>S.ph==='ROLL'}],
    ['c','Step climb',K('stepB'),{live:()=>['CLIMB','CRUISE'].includes(S.ph)}],
    ['v','Top of descent',K('todB'),{live:()=>['CLIMB','CRUISE'].includes(S.ph)}],
    ['a','Approach',K('apprB'),{live:()=>S.ph==='DESCENT'}],
    ['x','GO AROUND',K('gaB'),{live:()=>['APPROACH','FLARE'].includes(S.ph)}],
    [['+','='],'Faster',()=>{ S.warp=Math.min(16,S.warp*2); $('#wpV').textContent=S.warp; }],
    [['-','_'],'Slower',()=>{ S.warp=Math.max(1,S.warp/2); $('#wpV').textContent=S.warp; }]
  ]);
