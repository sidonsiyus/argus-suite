    </div>
    <div class="pGrid" style="grid-template-columns:1.5fr 1fr;margin-bottom:9px">
      <div class="pBox"><h5>CG Chart — Operational Limits</h5>
        <div class="in" style="padding:4px"><canvas id="sheetCv" class="pCv" height="330"></canvas></div>
        <div class="in" style="padding:0 5px 5px"><canvas id="sheetThs" class="pCv" height="72"></canvas></div>
      </div>
      <div>
        <div class="pBox" style="margin-bottom:9px"><h5>Dry Operating Weight</h5><div class="in">
          <div class="pFormula">I = <span class="pFrac"><span class="n">(H-arm − ${a.REF}) × W</span><span class="d">${a.C}</span></span> + ${a.K}</div>
          <table class="pT"><tbody>
            <tr><td class="lab">Weight (kg)</td><td><b>${fmt(a.dow)}</b></td></tr>
            <tr><td class="lab">H-arm (m)</td><td><b>${a.dowArm}</b></td></tr>
            <tr class="tot"><td class="lab">Dry Operating Index</td><td><b id="doiC">50.0</b></td></tr>
          </tbody></table></div></div>
        ${a.fwdPerf!=null?`<div class="pCaution"><b>CAUTION:</b> when the T.O. CG is lower than
          <b>${a.fwdPerf} % MAC</b> the basic performance must be corrected. T.O.: make CG correction or use the
          appropriate RTOW chart. LDG: make CG correction on landing speed and distance.
          <div id="cauLive" style="margin-top:4px"></div></div>`
        :`<div class="pCaution"><b>NOTES:</b> ${a.notes||''} This sheet carries <b>no forward-CG performance
          caution</b> — unlike the A320-233 sheet, which requires a correction below 27 % MAC.
          <div id="cauLive" style="margin-top:4px"></div></div>`}
        <div class="pBox" style="margin-top:9px"><h5>Result</h5><div class="in">
          <table class="pT" id="resTbl"></table></div></div>
      </div>
    </div>
    ${lookupTablesHTML(a)}
    <div style="height:9px"></div>
    ${lmcTableHTML(a)}`;
  el.innerHTML=`<div class="g gC">
    <div>${LI.html}
      <div class="card" style="margin-top:12px"><h3>Sheet actions</h3>
        <p class="hint">The document fills itself as you load. Every figure is traceable to the form.</p>
        <div class="btnrow"><button class="btn primary" id="signB2">Sign the sheet</button>
          <button class="btn" id="autoL2">⚡ Auto-trim</button><button class="btn" id="clrL2">Clear</button></div></div>
    </div>
    <div id="paperWrap">${paperShell(a,inner,'sheet')}</div></div>`;
  LI.bind();
  drawZoneDiagram(a);
  drawTrimChart('#sheetCv',null,a,{h:330,paper:true});
  drawThsScale('#sheetThs',a,true);
  function fill(){
    const ls=calcLoad(a);
    const cell=(v,cls)=>`<td class="${cls||''}"><span class="v">${v}</span></td>`;
    const rows=[];
    rows.push(`<tr><th></th><th>(−)</th><th>(+)</th></tr>`);
    rows.push(`<tr><td class="lab">Corrected index (DOI)</td><td class="shade"></td>${cell(ls.doi.toFixed(1),'pos')}</tr>`);
    Object.keys(a.holds).forEach(k=>{ const v=ls.hi[k];
      rows.push(`<tr><td class="lab">${k.replace('CPT','Cargo ')}</td>
        ${v<0?cell(v.toFixed(1),'neg'):'<td class="shade"></td>'}
        ${v>=0?cell(v>0?'+'+v.toFixed(1):'0.0','pos'):'<td class="shade"></td>'}</tr>`); });
    const cSum=Object.keys(a.holds).reduce((t,k)=>t+ls.hi[k],0);
    rows.push(`<tr class="tot"><td class="lab">Dead load index</td><td colspan="2"><b>${(ls.doi+cSum).toFixed(1)}</b></td></tr>`);
    Object.keys(a.zones).forEach(z=>{ const v=ls.zi[z];
      rows.push(`<tr><td class="lab">Cabin ${z}</td>
        ${v<0?cell(v.toFixed(1),'neg'):'<td class="shade"></td>'}
        ${v>=0?cell(v>0?'+'+v.toFixed(1):'0.0','pos'):'<td class="shade"></td>'}</tr>`); });
    rows.push(`<tr class="tot"><td class="lab">Loaded index ZFW</td><td colspan="2"><b>${ls.zfwIdx.toFixed(1)}</b></td></tr>`);
    rows.push(`<tr><td class="lab">(±) Fuel index</td><td colspan="2">${ls.fIdx>=0?'+':''}${ls.fIdx.toFixed(1)}</td></tr>`);
    rows.push(`<tr class="tot"><td class="lab">Loaded index TOW</td><td colspan="2"><b>${ls.towIdx.toFixed(1)}</b></td></tr>`);
    $('#icTbl').innerHTML=rows.join('');
    $$('#icTbl .v').forEach(v=>{ v.parentElement.classList.add('hot');
      setTimeout(()=>v.parentElement.classList.remove('hot'),560); });
    $('#doiC').textContent=ls.doi.toFixed(1);
    $('#resTbl').innerHTML=`<tbody>
      <tr><td class="lab">Zero fuel weight</td><td class="${F.limFlags.limZ?'pos':'neg'}"><b>${fmt(ls.zfw)}</b></td></tr>
      <tr><td class="lab">Take-off fuel</td><td>${fmt(F.block)}</td></tr>
      <tr><td class="lab">Take-off weight</td><td class="${F.limFlags.limT?'pos':'neg'}"><b>${fmt(ls.tow)}</b></td></tr>
      <tr class="tot"><td class="lab">TAKEOFF CG % MAC</td><td class="${F.lsOk?'pos':'neg'}"><b>${ls.towMac.toFixed(1)}</b></td></tr>
      <tr class="tot"><td class="lab">PITCH TRIM (THS)</td><td><b>${F.trim.toFixed(1)} ${F.trim>=0?'UP':'DN'}</b></td></tr>
      <tr><td class="lab">ZFW CDU input</td><td>${ls.zfwMac.toFixed(1)} / ${(ls.zfw/1000).toFixed(1)}</td></tr>
    </tbody>`;
    const cau=$('#cauLive');
    if(cau) cau.innerHTML = a.fwdPerf==null
      ? '<span style="color:#1a7a3c">✓ No performance correction required on this type.</span>'
      : F.perfCorr ? `<b>▲ APPLIES — CG is forward of ${a.fwdPerf} %MAC. Performance corrected.</b>`
      : `<span style="color:#1a7a3c">✓ Does not apply — CG is aft of ${a.fwdPerf} %MAC.</span>`;
    const st=$('#pStamp');
    if(st){ st.className='pStamp'+(F.lsSigned?' on':'')+(F.lsOk?'':' rej');
      st.textContent=F.lsSigned?'SIGNED':(F.lsOk?'':'REJECTED');
      if(!F.lsOk) st.classList.add('on'); }
  }
  $('#signB2').onclick=()=>{ if(signLoadsheet(a)){ fill();
    const st=$('#pStamp'); if(st){ st.className='pStamp on'; st.textContent='SIGNED'; } } else fill(); };
  $('#autoL2').onclick=()=>autoTrim(a);
  $('#clrL2').onclick=()=>{ resetLoad(); go('load'); toast("Load cleared.","warn"); };
  fill();
  foot("This is the operator's actual form — <b>every field fills itself live</b> from your load. Switch to <b>WORK IT</b> to complete it yourself.");
}

/* ══════════════════════════════════════════════════════════════
   MODE 3 · WORK IT — the student completes the sheet by hand.
   Graded against the sheet's OWN PRINTED COLUMNS (±1, the sheet's
   own rounding), not against my formula.
   ══════════════════════════════════════════════════════════════ */
function workMode(el,a){
  // a fixed exercise load — generated once, so the numbers are stable while you work
  if(!F.ex || F.exType!==F.type){
    F.exType=F.type;
    const a0=FLEET[F.type];
    const pax={}, holds={};
    Object.keys(a0.zones).forEach(z=>{ const s=a0.zones[z].seats;
      pax[z]=Math.max(1,Math.round(s*(0.35+Math.random()*0.55))); });
    // fill the holds, respecting each compartment max AND the sheet's combined-hold limits
    const PRS=a0.pairs||(a0.pairMax?[{ks:a0.pairMax.ks,max:a0.pairMax.max}]:[]);
    Object.keys(a0.holds).forEach(k=>{
      const step=a0.holds[k].max>6000?100:50;
      holds[k]=Math.round(a0.holds[k].max*(0.05+Math.random()*0.40)/step)*step; });
    PRS.forEach(p=>{ let sum=p.ks.reduce((t,k)=>t+holds[k],0);
      while(sum>p.max){ const k=p.ks[0]; holds[k]=Math.max(0,holds[k]-100);
        sum=p.ks.reduce((t,kk)=>t+holds[kk],0); } });
    const fmax=Math.min(a0.maxFuel, a0.fuelGrid?a0.fuelGrid.rows[a0.fuelGrid.rows.length-1][0]:20000);
    F.ex={ pax, holds, fuel: Math.round((fmax*(0.25+Math.random()*0.45))/1000)*1000 };
    F.exAns={}; F.exDone=false; F.exScore=0;
  }
  const E=F.ex;
  const P=a.printed;
  // truth from the PRINTED columns — this is what the student is graded against
  const truth={};
  Object.keys(a.holds).forEach(k=>truth[k]=OPS.readCol(P[k],E.holds[k]));
  Object.keys(a.zones).forEach(z=>truth[z]=OPS.readCol(P[z],E.pax[z]));
  const doi=+(a.K+OPS.idx(a.dow,a.dowArm,a)).toFixed(1);
  truth.dead=+(doi+Object.keys(a.holds).reduce((t,k)=>t+truth[k],0)).toFixed(1);
  truth.zfwIdx=+(truth.dead+Object.keys(a.zones).reduce((t,z)=>t+truth[z],0)).toFixed(1);
  truth.fuel=OPS.readFuelGrid(a,E.fuel,0.785);
  truth.towIdx=+(truth.zfwIdx+truth.fuel).toFixed(1);
  const zfw=a.dow+Object.keys(a.zones).reduce((t,z)=>t+E.pax[z]*a.paxWt,0)
                 +Object.keys(a.holds).reduce((t,k)=>t+E.holds[k],0);
  const tow=zfw+E.fuel;
  truth.zfw=zfw; truth.tow=tow;
  truth.mac=+OPS.macFrom(tow,truth.towIdx,a).toFixed(1);
  truth.ths=OPS.trim(truth.mac,a);
  F.exTruth=truth;

  const cellIn=(id,ph)=>`<input class="cell" id="w_${id}" placeholder="${ph||'—'}" autocomplete="off">`;
  const inner=`
    <div class="pBox" style="margin-bottom:9px"><h5>Exercise — load to be sheeted</h5><div class="in">
      <table class="pT"><thead><tr><th>Cabin OA</th><th>Cabin OB</th><th>Cabin OC</th>
        ${Object.keys(a.holds).map(k=>`<th>${k.replace('CPT','Cargo ')}</th>`).join('')}<th>Fuel</th></tr></thead>
      <tbody><tr>
        <td><b>${E.pax.OA}</b> pax</td><td><b>${E.pax.OB}</b> pax</td><td><b>${E.pax.OC}</b> pax</td>
        ${Object.keys(a.holds).map(k=>`<td><b>${fmt(E.holds[k])}</b> kg</td>`).join('')}
        <td><b>${fmt(E.fuel)}</b> kg</td>
      </tr></tbody></table>
      <div class="pHint">Read each index correction off the printed columns below (or work the formula), enter it, and total the sheet.</div>
    </div></div>

    <div class="pGrid" style="grid-template-columns:1fr 1fr;margin-bottom:9px">
      <div class="pBox"><h5>Index Calculation Table — complete it</h5><div class="in">
        <table class="pT">
          <thead><tr><th></th><th>Load</th><th>Index</th></tr></thead>
          <tbody>
            <tr><td class="lab">Corrected index (DOI)</td><td>${fmt(a.dow)} kg</td><td><b>${doi.toFixed(1)}</b></td></tr>
            ${Object.keys(a.holds).map(k=>`<tr><td class="lab">${k.replace('CPT','Cargo ')}</td>
              <td>${fmt(E.holds[k])} kg</td><td>${cellIn(k)}</td></tr>`).join('')}
            <tr class="tot"><td class="lab">Dead load index</td><td>=</td><td>${cellIn('dead')}</td></tr>
            ${Object.keys(a.zones).map(z=>`<tr><td class="lab">Cabin ${z}</td>
              <td>${E.pax[z]} pax</td><td>${cellIn(z)}</td></tr>`).join('')}
            <tr class="tot"><td class="lab">Loaded index ZFW</td><td>=</td><td>${cellIn('zfwIdx')}</td></tr>
            <tr><td class="lab">(±) Fuel index</td><td>${fmt(E.fuel)} kg</td><td>${cellIn('fuel')}</td></tr>
            <tr class="tot"><td class="lab">Loaded index TOW</td><td>=</td><td>${cellIn('towIdx')}</td></tr>
          </tbody></table></div></div>
      <div class="pBox"><h5>Weights &amp; result</h5><div class="in">
        <table class="pT"><tbody>
          <tr><td class="lab">Dry operating weight</td><td>${fmt(a.dow)} kg</td></tr>
          <tr><td class="lab">Passenger weight (${E.pax.OA+E.pax.OB+E.pax.OC} @ ${a.paxWt}kg)</td>
              <td>${fmt((E.pax.OA+E.pax.OB+E.pax.OC)*a.paxWt)} kg</td></tr>
          <tr><td class="lab">Cargo</td><td>${fmt(Object.values(E.holds).reduce((x,y)=>x+y,0))} kg</td></tr>
          <tr class="tot"><td class="lab">ZERO FUEL WEIGHT</td><td><b>${fmt(zfw)}</b> kg</td></tr>
          <tr><td class="lab">Take-off fuel</td><td>${fmt(E.fuel)} kg</td></tr>
          <tr class="tot"><td class="lab">TAKE-OFF WEIGHT</td><td><b>${fmt(tow)}</b> kg</td></tr>
        </tbody></table>
        <div class="pHint" style="margin-top:6px"><b>Now plot it.</b> Click the CG chart where your <b>Loaded index TOW</b>
          meets the <b>take-off weight</b> line. Then read the %MAC and the THS off the scale.</div>
        <table class="pT" style="margin-top:5px"><tbody>
          <tr><td class="lab">Plotted CG (%MAC)</td><td>${cellIn('mac','click chart')}</td></tr>
          <tr class="tot"><td class="lab">PITCH TRIM (THS)</td><td>${cellIn('ths')}</td></tr>
        </tbody></table></div></div>
    </div>

    <div class="pBox" style="margin-bottom:9px"><h5>CG Chart — plot your point</h5>
      <div class="in" style="padding:4px">
        <canvas id="workCv" class="pCv" height="330" style="cursor:crosshair"></canvas></div>
      <div class="in" style="padding:0 5px 5px"><canvas id="workThs" class="pCv" height="72"></canvas></div>
      <div class="in" style="padding:0 7px 7px"><div class="pHint" id="plotHint">No point plotted yet.</div></div>
    </div>

    ${a.fwdPerf!=null?`<div class="pCaution" style="margin-bottom:9px"><b>CAUTION:</b> when the T.O. CG is lower
      than <b>${a.fwdPerf} % MAC</b> the basic performance must be corrected.</div>`
    :`<div class="pCaution" style="margin-bottom:9px"><b>NOTES:</b> ${a.notes||''} No forward-CG performance caution on this type.</div>`}

    ${lookupTablesWork(a,E)}`;
  el.innerHTML=`<div class="g gC">
    <div>
      <div class="card hl" style="margin-bottom:12px"><h3>Load controller exercise</h3>
        <p class="hint">The sheet is blank. Complete the INDEX CALCULATION TABLE the way a load controller does —
        read each correction off the printed column, total it, plot it, read the trim.</p>
        <div id="exProg"></div>
        <div class="btnrow">
          <button class="btn primary" id="chkB">Check my sheet</button>
          <button class="btn" id="newExB">New exercise</button>
          <button class="btn" id="revB">Reveal answers</button>
        </div>
        <div id="exResult" style="margin-top:11px"></div>
      </div>
      <div class="card"><h3>How the index works</h3>
        <p class="hint" style="margin:0">Each item shifts the index by
        <span style="font-family:var(--mono);color:var(--gold)">ΔI = W × (H-arm − ${a.REF}) / ${a.C}</span>.
        Forward of the reference datum the index goes <b style="color:var(--red)">down</b>; aft of it,
        <b style="color:var(--green)">up</b>. The printed columns are just that formula, pre-computed and rounded —
        which is why your read-off and the formula agree to within ±1.</p>
        <table class="tbl" style="margin-top:9px"><thead><tr><th>Station</th><th>H-arm</th><th>Sense</th></tr></thead><tbody>
          ${Object.keys(a.zones).map(z=>`<tr><td>Cabin ${z}</td><td>${a.zones[z].arm.toFixed(2)} m</td>
            <td class="${a.zones[z].arm<a.REF?'neg':'pos'}">${a.zones[z].arm<a.REF?'fwd (−)':'aft (+)'}</td></tr>`).join('')}
          ${Object.keys(a.holds).map(k=>`<tr><td>${k}</td><td>${a.holds[k].arm.toFixed(2)} m</td>
            <td class="${a.holds[k].arm<a.REF?'neg':'pos'}">${a.holds[k].arm<a.REF?'fwd (−)':'aft (+)'}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
    <div>${paperShell(a,inner,'work')}</div></div>`;

  /* ---- the plotting chart ---- */
  const cv=$('#workCv');
  let plot=F.exAns.plot||null;
  let t=0;
  const geom={};
  anim(()=>{
    const {c,W,H}=fit(cv,330); if(!W)return; t+=.03;
    c.clearRect(0,0,W,H); c.fillStyle='#fffdf7'; c.fillRect(0,0,W,H);
    const padL=44,padR=64,padT=30,padB=32;
    const wLo=38,wHi=80;
    let iLo=1e9,iHi=-1e9;
    a.env.forEach(([m,wt])=>{const ix=OPS.idxAt(m,wt*1000,a);iLo=Math.min(iLo,ix);iHi=Math.max(iHi,ix);});
    iLo-=8;iHi+=8;
    const X=i=>padL+(i-iLo)/(iHi-iLo)*(W-padL-padR);
    const Y=w=>H-padB-(w-wLo)/(wHi-wLo)*(H-padT-padB);
    Object.assign(geom,{padL,padR,padT,padB,wLo,wHi,iLo,iHi,W,H});
    // grid
    c.strokeStyle='#d8d2c2';c.lineWidth=1;
    for(let i=Math.ceil(iLo/10)*10;i<=iHi;i+=10){const px=X(i);if(px<padL||px>W-padR)continue;
      c.beginPath();c.moveTo(px,padT);c.lineTo(px,H-padB);c.stroke();
      c.fillStyle='#4a4437';c.font='8px Arial';c.textAlign='center';c.fillText(i,px,H-padB+13);}
    for(let w=40;w<=wHi;w+=5){const py=Y(w);if(py<padT||py>H-padB)continue;
      c.strokeStyle='#d8d2c2';c.beginPath();c.moveTo(padL,py);c.lineTo(W-padR,py);c.stroke();
      c.fillStyle='#4a4437';c.font='8px Arial';c.textAlign='right';c.fillText(w,padL-6,py+3);}
    c.textAlign='left';
    c.fillStyle='#4a4437';c.font='7.5px Arial';c.textAlign='center';
    c.fillText('INDEX',(padL+W-padR)/2,H-6);c.textAlign='left';
    // %MAC fan
    for(let m=16;m<=40;m+=2){
      const x0=X(OPS.idxAt(m,wLo*1000,a)),y0=Y(wLo),x1=X(OPS.idxAt(m,wHi*1000,a)),y1=Y(wHi);
      const maj=m%4===0;
      c.save();c.beginPath();c.rect(padL,padT,W-padL-padR,H-padT-padB);c.clip();
      c.strokeStyle=maj?'#9b9484':'#c9c3b3';c.lineWidth=maj?.9:.6;
      c.beginPath();c.moveTo(x0,y0);c.lineTo(x1,y1);c.stroke();c.restore();
      if(maj&&x1>padL&&x1<W-padR){c.fillStyle='#4a4437';c.font='7.5px Arial';c.textAlign='center';
        c.fillText(m+'%',x1,padT-7);}
    }
    c.textAlign='left';
    // envelope
    c.beginPath();
    a.env.forEach(([m,wt],i)=>{const px=X(OPS.idxAt(m,wt*1000,a)),py=Y(wt);i?c.lineTo(px,py):c.moveTo(px,py);});
    c.closePath();c.fillStyle='rgba(26,122,60,.07)';c.fill();
    c.strokeStyle='#1a7a3c';c.lineWidth=1.4;c.stroke();
    // limit lines
    [[a.mtow,'MTOW'],[a.mldw,'MLW'],[a.mzfw,'MZFW']].forEach(([w,lab])=>{
      const py=Y(w/1000);if(py<padT||py>H-padB)return;
      c.strokeStyle='#b3202e';c.setLineDash([4,3]);c.lineWidth=.9;
      c.beginPath();c.moveTo(padL,py);c.lineTo(W-padR,py);c.stroke();c.setLineDash([]);
      c.fillStyle='#b3202e';c.font='7px Arial';c.fillText(lab,W-padR+4,py+2.5);});
    // target weight guide line (the TOW the student must plot on)
    const ty=Y(truth.tow/1000);
    c.strokeStyle='#0d2f6b';c.lineWidth=1.4;c.setLineDash([6,3]);
    c.beginPath();c.moveTo(padL,ty);c.lineTo(W-padR,ty);c.stroke();c.setLineDash([]);
    c.fillStyle='#0d2f6b';c.font='bold 7.5px Arial';
    c.fillText('TOW '+fmt(truth.tow)+' kg — plot on this line',padL+5,ty-4);
    // plotted point
    if(plot){
      const px=X(plot.idx),py=Y(plot.w);
      const good=F.exDone&&Math.abs(plot.idx-truth.towIdx)<=2.5;
      c.strokeStyle=F.exDone?(good?'#1a7a3c':'#b3202e'):'#c8971f';
      c.lineWidth=1.2;
      c.beginPath();c.moveTo(px-9,py);c.lineTo(px+9,py);c.moveTo(px,py-9);c.lineTo(px,py+9);c.stroke();
      c.fillStyle=F.exDone?(good?'#1a7a3c':'#b3202e'):'#c8971f';
      c.globalAlpha=.25+.15*Math.sin(t*3);c.beginPath();c.arc(px,py,9,0,7);c.fill();c.globalAlpha=1;
      c.beginPath();c.arc(px,py,3.4,0,7);c.fill();
      c.font='bold 8px Arial';c.fillText(plot.mac.toFixed(1)+'%',px+12,py-6);
    }
    // reveal the correct point after checking
    if(F.exDone){
      const cx2=X(truth.towIdx),cy2=Y(truth.tow/1000);
      c.strokeStyle='#1a7a3c';c.lineWidth=1.6;
      c.beginPath();c.arc(cx2,cy2,7,0,7);c.stroke();
      c.fillStyle='#1a7a3c';c.font='bold 7.5px Arial';
      c.fillText('correct: '+truth.towIdx.toFixed(1)+' / '+truth.mac.toFixed(1)+'%',cx2+10,cy2+12);
    }
  });
  cv.onclick=e=>{
    const r=cv.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const {padL,padR,padT,padB,wLo,wHi,iLo,iHi,W,H}=geom;
    if(mx<padL||mx>W-padR||my<padT||my>H-padB) return;
    const idx=iLo+(mx-padL)/(W-padL-padR)*(iHi-iLo);
    const w=wLo+((H-padB)-my)/(H-padT-padB)*(wHi-wLo);
    const mac=OPS.macFrom(w*1000,idx,a);
    plot={idx,w,mac}; F.exAns.plot=plot;
    const macIn=$('#w_mac'); if(macIn) macIn.value=mac.toFixed(1);
    $('#plotHint').innerHTML=`Plotted at index <b>${idx.toFixed(1)}</b>, weight <b>${fmt(w*1000)} kg</b> →
      CG <b>${mac.toFixed(1)} %MAC</b>. ${Math.abs(w*1000-truth.tow)>1500?'<span style="color:#b3202e">You are not on the TOW line — plot on the blue dashed line.</span>':''}`;
    prog();
  };
  drawThsScale('#workThs',a,true);

  /* ---- cells ---- */
  const keys=[...Object.keys(a.holds),'dead',...Object.keys(a.zones),'zfwIdx','fuel','towIdx','mac','ths'];
  keys.forEach(k=>{ const inp=$('#w_'+k); if(!inp)return;
    if(F.exAns[k]!==undefined) inp.value=F.exAns[k];
    inp.oninput=()=>{ F.exAns[k]=inp.value; inp.className='cell'; prog(); };
  });
  function prog(){
    const n=keys.filter(k=>{const v=F.exAns[k];return v!==undefined&&String(v).trim()!=='';}).length;
    $('#exProg').innerHTML=`<div class="steps">${keys.map((k,i)=>
      `<div class="s ${(F.exAns[k]!==undefined&&String(F.exAns[k]).trim()!=='')?'done':''}"><div class="f"></div></div>`).join('')}</div>
      <div class="hint" style="margin-top:6px">${n} / ${keys.length} fields complete</div>`;
  }
  prog();

  $('#chkB').onclick=()=>{
    let right=0, wrong=[];
    keys.forEach(k=>{
      const inp=$('#w_'+k); if(!inp)return;
      const val=parseFloat(String(F.exAns[k]??'').replace(/[^\d.+-]/g,''));
      let exp, tol=1.0;
      if(k==='mac'){ exp=truth.mac; tol=1.2; }
      else if(k==='ths'){ exp=truth.ths; tol=0.6; }
      else exp=truth[k];
      if(!isNaN(val)&&Math.abs(val-exp)<=tol){ inp.className='cell good'; right++; }
      else { inp.className='cell bad'; wrong.push({k,exp}); }
    });
    F.exDone=true;
    const pc=Math.round(right/keys.length*100);
    F.exScore=pc;
    const hints={dead:"Dead load index = DOI + all four cargo corrections.",
      zfwIdx:"Loaded index ZFW = dead load index + the three cabin zones.",
      towIdx:"Loaded index TOW = loaded index ZFW + the fuel index.",
      mac:"Plot index vs TOW on the chart and read the %MAC diagonal.",
      ths:"Read the THS straight off the pitch-trim scale under the chart."};
    $('#exResult').innerHTML=`
      <div style="font-family:var(--mono);font-size:22px;font-weight:800;color:${pc>=90?'var(--green)':pc>=65?'var(--amber)':'var(--red)'}">${pc}%</div>
      <div class="lbl" style="margin-top:2px">${right} of ${keys.length} correct</div>
      ${pc===100?'<div class="bdg ok" style="margin-top:8px">✓ SHEET CORRECT — LOAD CONTROLLER STANDARD</div>':''}
      ${wrong.length?`<div style="margin-top:9px"><div class="lbl">Check these</div>
        ${wrong.slice(0,6).map(w=>`<div class="bdg bad" style="margin:0 4px 4px 0">${w.k.toUpperCase()}</div>`).join('')}
        ${wrong.some(w=>hints[w.k])?`<div class="hint" style="margin-top:6px">${hints[wrong.find(w=>hints[w.k]).k]}</div>`:
          '<div class="hint" style="margin-top:6px">Re-read the printed column — step down to the row at or below your load, not the nearest one.</div>'}
      </div>`:''}`;
    const st=$('#pStamp');
    if(st){ st.className='pStamp on'+(pc>=90?'':' rej'); st.textContent=pc>=90?'CORRECT':'RECHECK'; }
    toast(pc===100?"Sheet correct — load controller standard.":pc>=65?`${pc}% — close. Check the flagged cells.`:`${pc}% — re-read the printed columns.`,
      pc>=90?"ok":pc>=65?"warn":"bad");
  };
  $('#revB').onclick=()=>{
    keys.forEach(k=>{ const inp=$('#w_'+k); if(!inp)return;
      const v=(k==='mac')?truth.mac.toFixed(1):(k==='ths')?truth.ths.toFixed(1):String(truth[k]);
      inp.value=v; F.exAns[k]=v; inp.className='cell good'; });
    plot={idx:truth.towIdx,w:truth.tow/1000,mac:truth.mac}; F.exAns.plot=plot; F.exDone=true;
    prog(); toast("Answers revealed. Try a new exercise to test yourself.","warn");
  };
  $('#newExB').onclick=()=>{ F.ex=null; F.exAns={}; F.exDone=false; go('load'); toast("New exercise generated.","ok"); };
  foot("Read each correction off the <b>printed column</b>, total the sheet, <b>plot your point</b>, then check it.");
}
function lookupTablesWork(a,E){
  const col=(k,unit,hdr,cur)=>{ const T=a.printed[k];
    let hi=-1; T.forEach(([q],i)=>{ if(cur>=q) hi=i; });
    return `<div><div style="font-family:Arial;font-size:7.5px;font-weight:700;margin-bottom:2px">${hdr}
      <span style="color:#0d2f6b">(${fmt(cur)})</span></div>
      <div class="lookWrap"><table class="lookT"><thead><tr><th>${unit}</th><th>idx</th></tr></thead><tbody>
      ${T.map(([q,i],n)=>`<tr class="${n===hi?'hi':''}"><td>${fmt(q)}</td><td>${i>0?'+':''}${i}</td></tr>`).join('')}
      </tbody></table></div></div>`; };
  return `<div class="pBox"><h5>Printed index correction columns — read your value from these</h5><div class="in">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">
      ${Object.keys(a.holds).map(k=>col(k,'kg',k.replace('CPT','Cargo '),E.holds[k])).join('')}
      ${Object.keys(a.zones).map(z=>col(z,'pax','Cabin '+z,E.pax[z])).join('')}
    </div>
    <div class="pHint">Step <b>down</b> to the row at or below your load — that's the value. The highlighted row is the one you want.</div>
  </div></div>`;
}


/* ══════════════════════════════════════════════════════════════
   STATION 02 · DISPATCH
   ══════════════════════════════════════════════════════════════ */
function sDisp(el){
  const a=FLEET[F.type];
  const legal=ROUTES.filter(r=>r.dist<=a.range*0.92 && (r.dist<=2500||a.etops));
  F.cruiseFL=F.cruiseFL||a.cruise.fl;
  el.innerHTML=`
  <div class="stn-h"><div><div class="kick">Station 02 · Dispatch</div><h2>Flight Plan &amp; Fuel</h2>
    <p>Fuel is a legal minimum, not a guess: trip + 5% contingency + alternate + 30-minute final reserve + taxi.
    Every extra kilo you carry costs fuel to carry. Every kilo you skip, you'll want back at the destination.</p></div></div>
  <div class="g gB">
    <div>
      <div class="card hl" style="margin-bottom:12px"><h3>Sector</h3>
        <p class="hint">Within range of the ${F.type}${a.etops?' · ETOPS certified':''}.</p>
        <div id="rtList"></div></div>
      <div class="card"><h3>Cruise</h3>
        <div class="ctl"><label>Level <b id="flV">FL${F.cruiseFL}</b></label>
          <input type="range" id="flIn" min="280" max="410" step="10" value="${F.cruiseFL}"></div>
        <div class="ctl"><label>Cost index <b id="ciV">${F.ci}</b></label>
          <input type="range" id="ciIn" min="0" max="99" value="${F.ci}"></div>
        <div class="hint" id="crNote" style="margin:8px 0 0"></div></div>
    </div>
    <div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Vertical profile</span><span class="live">PLAN</span>
        <canvas id="rtCv" height="200"></canvas></div>
      <div class="g g2">
        <div class="card"><h3>Weather</h3>
          <p class="hint">Live METAR, departure / destination / alternate.</p>
          <div id="wxBox"><div class="hint">Select a sector.</div></div>
          <div class="btnrow"><button class="btn sm" id="wxB">⟳ Pull METAR</button></div></div>
        <div class="card hl"><h3>Fuel plan</h3>
          <div class="ctl"><label>Extra (discretion) <b id="exV">${fmt(F.fuelExtra)} kg</b></label>
            <input type="range" id="exIn" min="0" max="4000" step="100" value="${F.fuelExtra}"></div>
          <div id="fuBox"></div></div>
      </div>
    </div>
  </div>`;

  function list(){ $('#rtList').innerHTML=legal.map((r,i)=>{
    const on=F.route&&F.route.from===r.from&&F.route.to===r.to;
    return `<div class="chk ${on?'on':''}" data-i="${i}"><span class="bx">✓</span>
      <span class="nm">${APT[r.from].iata} → ${APT[r.to].iata} <span style="color:var(--faint)">${r.dist} nm</span></span>
      <span class="st2">${r.dist>2500?'ETOPS':''} ALTN ${APT[r.alt].iata}</span></div>`;}).join('');
    $$('#rtList .chk').forEach(c=>c.onclick=()=>{ F.route=legal[+c.dataset.i];
      F.perf=null;F.perfAccepted=false;F.rwy=null; list(); calc(); pull(false); renderHUD();
      toast("Sector "+APT[F.route.from].iata+" → "+APT[F.route.to].iata,"ok"); }); }
  list();

  function calc(){ if(!F.route){ $('#fuBox').innerHTML='<div class="hint">Select a sector.</div>'; return; }
    const f=OPS.fuel(a,F.route.dist,F.route.altDist,F.fuelExtra,F.taxiMin);
    F.fuelCalc=f; F.block=Math.min(f.block,a.maxFuel);
    const cap=f.block>a.maxFuel;
    const mins=Math.round(F.route.dist/a.cruise.tas*60);
    $('#fuBox').innerHTML=`<div class="ro">
      <span class="k">Trip (${Math.floor(mins/60)}h${pad(mins%60)})</span><span class="v">${fmt(f.trip)}</span>
      <span class="k">Contingency 5%</span><span class="v">${fmt(f.cont)}</span>
      <span class="k">Alternate ${APT[F.route.alt].iata}</span><span class="v">${fmt(f.altn)}</span>
      <span class="k">Final reserve 30′</span><span class="v">${fmt(f.fr)}</span>
      <span class="k">Taxi</span><span class="v">${fmt(f.taxi)}</span>
      <span class="k">Extra</span><span class="v ${f.extra?'wr':''}">${fmt(f.extra)}</span>
      <span class="k tot"><b style="color:var(--gold)">BLOCK FUEL</b></span><span class="v tot g">${fmt(F.block)} kg</span>
    </div>${cap?'<div class="bdg bad" style="margin-top:8px">CAPPED AT MAX FUEL</div>':''}
    ${f.extra?`<div class="hint" style="margin-top:8px">Carrying ${fmt(f.extra)} kg extra burns roughly <b style="color:var(--amber)">${fmt(f.extra*0.04)} kg</b> more.</div>`:''}`;
    F.lsSigned=false; renderHUD(); }

  async function pull(manual){ if(!F.route)return;
    const ids=[F.route.from,F.route.to,F.route.alt].join(',');
    $('#wxBox').innerHTML='<div class="hint">Fetching…</div>';
    try{
      const r=await fetch(`https://flight-proxy.jhrishi7.workers.dev/metar?ids=${ids}`);
      const d=await r.json(); const arr=d.metar||[]; if(!arr.length) throw 0;
      F.wx={}; arr.forEach(m=>F.wx[m.icaoId]={raw:m.rawOb||'',wdir:m.wdir,wspd:m.wspd,temp:m.temp});
      show(true); if(manual) toast("Live METAR received.","ok");
    }catch(e){
      F.wx={};
      [F.route.from,F.route.to,F.route.alt].forEach(ic=>{ const wd=Math.round(Math.random()*36)*10,
        ws=3+Math.round(Math.random()*14), tp=(ic==='VNKT'?12:22)+Math.round(Math.random()*14);
        F.wx[ic]={raw:`${ic} ${nowZ()} ${pad(wd,3)}${pad(ws)}KT CAVOK ${tp}/12 Q1013 NOSIG`,wdir:wd,wspd:ws,temp:tp,sim:true}; });
      show(false); if(manual) toast("Live feed unavailable — simulated weather.","warn");
    } }
  function show(live){ const roles=['DEP','DEST','ALTN'];
    $('#wxBox').innerHTML=[F.route.from,F.route.to,F.route.alt].map((ic,i)=>{ const w=F.wx[ic]; if(!w)return '';
      return `<div style="margin-bottom:8px"><div class="lbl">${roles[i]} · ${APT[ic].iata}</div>
        <div style="font-family:var(--mono);font-size:9.5px;color:var(--ink);line-height:1.5;word-break:break-all">${w.raw}</div></div>`;
    }).join('')+`<span class="bdg ${live?'ok':'warn'}">${live?'● LIVE':'● SIMULATED'}</span>`;
    F.oat=F.wx[F.route.from]?F.wx[F.route.from].temp:25; }
  $('#wxB').onclick=()=>pull(true);
  $('#exIn').oninput=e=>{ F.fuelExtra=+e.target.value; $('#exV').textContent=fmt(F.fuelExtra)+' kg'; calc(); };
  $('#flIn').oninput=e=>{ F.cruiseFL=+e.target.value; $('#flV').textContent='FL'+F.cruiseFL; note(); };
  $('#ciIn').oninput=e=>{ F.ci=+e.target.value; $('#ciV').textContent=F.ci; note(); };
  function note(){ const d=Math.abs(F.cruiseFL-a.cruise.fl);
    $('#crNote').innerHTML=(d===0?'<span style="color:var(--green)">Optimum level.</span>'
      :d<=20?'Near optimum.':`<span style="color:var(--amber)">${d*0.12>0?'~'+(d*0.12).toFixed(1)+'% extra burn':''}</span>`)
      +(F.ci<15?' Low CI — slow and efficient.':F.ci>60?' High CI — fast and thirsty.':' Balanced CI.'); }
  note();
  // profile canvas
  (function(){ const cv=$('#rtCv'); let t=0;
    anim(()=>{ const {c,W,H}=fit(cv,200); if(!W)return; t+=0.01;
      c.clearRect(0,0,W,H);
      c.strokeStyle='rgba(58,50,71,.4)';c.lineWidth=1;
      for(let x=0;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
      if(!F.route){ c.fillStyle='rgba(106,99,119,.8)';c.font='10px ui-monospace';c.textAlign='center';
        c.fillText('SELECT A SECTOR',W/2,H/2);c.textAlign='left';return; }
      const gy=H-32,x0=48,x1=W-48, top=28+(410-F.cruiseFL)/130*36;
      c.strokeStyle='#f0b64a';c.lineWidth=2;
      c.beginPath();c.moveTo(x0,gy);c.lineTo(x0+(x1-x0)*.18,top);c.lineTo(x1-(x1-x0)*.22,top);c.lineTo(x1,gy);c.stroke();
      const g=c.createLinearGradient(0,top,0,gy);g.addColorStop(0,'rgba(240,182,74,.18)');g.addColorStop(1,'rgba(240,182,74,.01)');
      c.fillStyle=g;c.lineTo(x0,gy);c.fill();
      c.strokeStyle='rgba(164,154,143,.45)';c.lineWidth=1.4;c.beginPath();c.moveTo(18,gy);c.lineTo(W-18,gy);c.stroke();
      const ap=(x,code,el2)=>{ c.fillStyle='#f0b64a';c.beginPath();c.moveTo(x,gy-8);c.lineTo(x+4.5,gy);c.lineTo(x-4.5,gy);c.fill();
        c.fillStyle='#f6f1e8';c.font='bold 10px ui-monospace';c.textAlign='center';c.fillText(code,x,gy+16);
        c.fillStyle='rgba(106,99,119,.9)';c.font='8px ui-monospace';c.fillText(el2+'ft',x,gy+27);c.textAlign='left'; };
      ap(x0,APT[F.route.from].iata,APT[F.route.from].elev);
      ap(x1,APT[F.route.to].iata,APT[F.route.to].elev);
      c.fillStyle='#f0b64a';c.font='10px ui-monospace';c.textAlign='center';
      c.fillText('FL'+F.cruiseFL+' · M'+a.cruise.mach.toFixed(2)+' · '+F.route.dist+'nm',(x0+x1)/2,top-8);
      c.fillStyle='rgba(164,154,143,.75)';c.font='8px ui-monospace';
      c.fillText(F.route.awy,(x0+x1)/2,top+14);c.textAlign='left';
      const p=(t*0.12)%1; let px,py;
      if(p<.18){px=x0+(x1-x0)*p;py=gy+(top-gy)*(p/.18);}
      else if(p<.78){px=x0+(x1-x0)*p;py=top;}
      else {px=x0+(x1-x0)*p;py=top+(gy-top)*((p-.78)/.22);}
      c.save();c.translate(px,py);c.fillStyle='#ffd98a';
      c.beginPath();c.moveTo(6,0);c.lineTo(-4,3.5);c.lineTo(-1.5,0);c.lineTo(-4,-3.5);c.closePath();c.fill();c.restore();
    }); })();
  if(F.route){ calc(); if(Object.keys(F.wx).length) show(!F.wx[F.route.from].sim); else pull(false); }
  else $('#fuBox').innerHTML='<div class="hint">Select a sector.</div>';
  foot("Pick a <b>sector</b>, set the <b>cruise level</b>, confirm the <b>block fuel</b>.");
}

        <canvas id="wCv" height="190"></canvas></div>
      <div class="card hl"><h3>Takeoff card</h3><div id="pBox"></div>
        <div class="btnrow"><button class="btn primary" id="accB">Accept card</button></div></div>
    </div>
  </div>`;

  const wcFor=(r)=>{ const h=dep.rwys[r].hdg, wd=wx.wdir||270, ws=wx.wspd||0;
    const ang=(wd-h)*Math.PI/180;
    return {head:Math.round(ws*Math.cos(ang)), cross:Math.round(ws*Math.sin(ang))}; };
  const perfFor=(r)=>{
    const rwy=dep.rwys[r], w=wcFor(r), tow=F.ls?F.ls.tow:a.dow;
    let p=OPS.vspeeds(a,tow,F.flap,dep.elev,F.oat,w.head,F.cont);
    if(!F.bleed) p.todr=Math.round(p.todr*.96);
    if(F.ai) p.todr=Math.round(p.todr*1.05);
    if(F.perfCorr) p.todr=Math.round(p.todr*1.06);
    let flex=null;
    if(F.thrust==='FLEX'){ const fx=OPS.flexTemp(a,rwy.len,p.todr,F.oat);
      if(fx){ flex=fx; p.todr=Math.round(p.todr*(1+(fx-F.oat)*.011)); } }
    const margin=rwy.len-p.todr;
    const xw=Math.abs(w.cross);
    const ok=margin>=200 && xw<=35 && w.head>-10;
    return {...p,rwy:r,tora:rwy.len,margin,wc:w,flex,ok,xwLim:xw>35,tailLim:w.head<-10};
  };

  function rwyTable(){
    const all=rwys.map(r=>({r,p:perfFor(r)}));
    // rank: legal first, then greatest margin
    const ranked=[...all].sort((x,y)=>(y.p.ok-x.p.ok)||(y.p.margin-x.p.margin));
    const best=ranked[0];
    $('#rwyTbl').innerHTML=`<thead><tr><th>RWY</th><th>TORA</th><th>Wind</th><th>TODR</th><th>Margin</th><th>Status</th></tr></thead>
      <tbody>${all.map(({r,p})=>{
        const sel=r===F.rwy;
        const st=p.ok?(p.margin>800?'<span class="bdg ok">AMPLE</span>':'<span class="bdg ok">OK</span>')
          :p.xwLim?'<span class="bdg bad">X-WIND</span>'
          :p.tailLim?'<span class="bdg bad">TAILWIND</span>'
          :'<span class="bdg bad">TOO SHORT</span>';
        return `<tr data-r="${r}" style="cursor:pointer;${sel?'background:rgba(240,182,74,.10);box-shadow:inset 2px 0 0 var(--gold)':''}">
          <td style="color:${sel?'var(--gold)':'var(--ink)'};font-weight:700">${dep.rwys[r].name||r}${best.r===r&&!sel?' <span style="color:var(--green);font-size:8px">★best</span>':''}</td>
          <td>${fmt(p.tora)}</td>
          <td class="${p.wc.head<0?'neg':''}">${p.wc.head>=0?'+':''}${p.wc.head}/X${Math.abs(p.wc.cross)}</td>
          <td>${fmt(p.todr)}</td>
          <td class="${p.margin>=200?'pos':'neg'}">${p.margin>=0?'+':''}${fmt(p.margin)}</td>
          <td>${st}</td></tr>`;}).join('')}</tbody>`;
    $$('#rwyTbl tbody tr').forEach(tr=>tr.onclick=()=>{ F.rwy=tr.dataset.r; calc(); toast("Runway "+(dep.rwys[F.rwy].name||F.rwy)+" selected.","ok"); });
  }

  function calc(){
    const p=perfFor(F.rwy);
    F.perf=p; F.perfOk=p.ok; F.flex=p.flex;
    const w=p.wc;
    $('#wcT').innerHTML=`METAR ${pad(wx.wdir||0,3)}°/${wx.wspd||0}kt → <b style="color:${w.head<0?'var(--red)':'var(--gold)'}">${w.head>=0?w.head+'kt HEAD':Math.abs(w.head)+'kt TAIL'}</b> · ${Math.abs(w.cross)}kt cross`;
    $('#pBox').innerHTML=`<div class="ro">
      <span class="k">Runway / TORA</span><span class="v g">${dep.rwys[F.rwy].name||F.rwy} · ${fmt(p.tora)} m</span>
      <span class="k">TOW (from loadsheet)</span><span class="v">${fmt(F.ls?F.ls.tow:a.dow)} kg</span>
      <span class="k">CG / THS</span><span class="v ${F.perfCorr?'wr':''}">${F.ls?F.ls.towMac.toFixed(1):'—'}% · THS ${(F.trim||0).toFixed(1)}</span>
      <span class="k">Config</span><span class="v">CONF ${F.flap} · ${F.thrust}${p.flex?' '+p.flex+'°':''}</span>
      <span class="k tot"><b style="color:var(--gold)">V1</b></span><span class="v tot g">${p.v1} kt</span>
      <span class="k tot" style="padding-top:2px"><b style="color:var(--gold)">VR</b></span><span class="v tot g" style="padding-top:2px">${p.vr} kt</span>
      <span class="k tot" style="padding-top:2px;padding-bottom:8px"><b style="color:var(--gold)">V2</b></span><span class="v tot g" style="padding-top:2px;padding-bottom:8px">${p.v2} kt</span>
      <span class="k">TODR required</span><span class="v ${p.margin>=200?'':'bad'}">${fmt(p.todr)} m</span>
      <span class="k">Margin</span><span class="v ${p.margin>=200?'ok':'bad'}">${p.margin>=0?'+':''}${fmt(p.margin)} m</span>
    </div>
    <div style="margin-top:9px;display:flex;gap:5px;flex-wrap:wrap">
      ${p.margin>=200?'<span class="bdg ok">FIELD LENGTH OK</span>':'<span class="bdg bad">⚠ INSUFFICIENT RUNWAY</span>'}
      ${p.xwLim?'<span class="bdg bad">CROSSWIND LIMIT</span>':'<span class="bdg ok">CROSSWIND OK</span>'}
      ${p.tailLim?'<span class="bdg bad">TAILWIND LIMIT</span>':''}
      ${p.flex?`<span class="bdg g">FLEX ${p.flex}°C</span>`:'<span class="bdg">TOGA</span>'}
      ${F.perfCorr?'<span class="bdg warn">FWD CG CORRECTION</span>':''}
      ${F.cont?'<span class="bdg warn">CONTAMINATED</span>':''}
    </div>`;
    const lv=$('#pLive'); if(lv){lv.textContent=p.ok?'WITHIN LIMITS':'CHECK FAILED';lv.style.color=p.ok?'var(--gold)':'var(--red)';}
    rwyTable(); renderHUD();
  }

  /* runway canvas — labels in reserved bands, no overlap */
  let roll=0;
  anim(()=>{
    const {c,W,H}=fit($('#pCv'),270); if(!W||!F.perf)return; roll=(roll+.004)%1;
    c.clearRect(0,0,W,H);
    const L=Labels(c);
    const p=F.perf, padL=30,padR=30, y=H*.56, rw=W-padL-padR;
    const sc=rw/Math.max(p.tora,p.todr*1.06);
    L.block(0,0,W,26);                       // top band = conditions strip
    c.fillStyle='rgba(164,154,143,.85)'; c.font='8.5px ui-monospace';
    c.fillText('OAT '+F.oat+'°C  ·  '+(p.wc.head>=0?'HEAD ':'TAIL ')+Math.abs(p.wc.head)+'kt  ·  X'+Math.abs(p.wc.cross)+'kt  ·  '+(F.cont?'WET':'DRY'),padL,18);
    c.textAlign='right'; c.fillStyle='rgba(240,182,74,.9)';
    c.fillText('RWY '+(dep.rwys[F.rwy].name||F.rwy),W-padR,18); c.textAlign='left';
    // runway body
    c.fillStyle='#191620'; c.fillRect(padL,y-24,p.tora*sc,48);
    c.strokeStyle='rgba(164,154,143,.45)'; c.lineWidth=1; c.strokeRect(padL,y-24,p.tora*sc,48);
    c.strokeStyle='rgba(246,241,232,.4)'; c.setLineDash([13,11]); c.lineWidth=1.5;
    c.beginPath(); c.moveTo(padL,y); c.lineTo(padL+p.tora*sc,y); c.stroke(); c.setLineDash([]);
    // TODR bar
    const tw=Math.min(p.todr*sc,rw), col=p.margin>=200?'240,182,74':'255,84,112';
    const g=c.createLinearGradient(padL,0,padL+tw,0);
    g.addColorStop(0,`rgba(${col},.10)`); g.addColorStop(1,`rgba(${col},.45)`);
    c.fillStyle=g; c.fillRect(padL,y-24,tw,48);
    c.strokeStyle=`rgb(${col})`; c.lineWidth=2;
    c.beginPath(); c.moveTo(padL+tw,y-32); c.lineTo(padL+tw,y+32); c.stroke();
    // V-speed ticks ABOVE the runway, labels stacked in the upper band
    [[padL+tw*.60,'V1 '+p.v1,'#ffd98a'],[padL+tw*.76,'VR '+p.vr,'#3ee08f']].forEach(([x,l,cc])=>{
      c.strokeStyle=cc; c.setLineDash([3,3]); c.lineWidth=1;
      c.beginPath(); c.moveTo(x,y-24); c.lineTo(x,y-36); c.stroke(); c.setLineDash([]);
      L.put(l,x,y-40,{font:'8.5px ui-monospace',col:cc,align:'center',cands:[[0,0],[0,-11],[22,0],[-22,0]]});
    });
    // distance labels BELOW, in their own band
    L.put(fmt(p.tora)+'m TORA',padL+p.tora*sc,y+40,{font:'8.5px ui-monospace',col:'rgba(246,241,232,.75)',
      align:'right',cands:[[0,0],[0,11]]});
    L.put('TODR '+fmt(p.todr)+'m',padL+tw,y+40,{font:'8.5px ui-monospace',col:`rgb(${col})`,
      align:'left',cands:[[4,0],[4,11],[-4,22]]});
    L.put(p.margin>=0?'margin +'+fmt(p.margin)+'m':'OVERRUN '+fmt(-p.margin)+'m',
      padL+(tw+p.tora*sc)/2, y+55,{font:'8.5px ui-monospace',
      col:p.margin>=200?'rgba(62,224,143,.9)':'#ff5470',align:'center',cands:[[0,0],[0,11]]});
    // rolling aircraft
    const ax=padL+tw*roll;
    c.save(); c.translate(ax,y); c.fillStyle='#ffd98a';
    c.beginPath(); c.moveTo(11,0); c.lineTo(-8,6); c.lineTo(-4,0); c.lineTo(-8,-6); c.closePath(); c.fill(); c.restore();
    c.fillStyle='rgba(246,241,232,.9)'; c.font='8.5px ui-monospace'; c.textAlign='center';
    c.fillText(Math.round(p.vr*roll*1.05)+' kt',ax,y-10); c.textAlign='left';
  });

  /* wind rose */
  anim(()=>{
    const {c,W,H}=fit($('#wCv'),190); if(!W||!F.perf)return;
    c.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2+4, R=Math.min(W,H)*0.34;
    c.strokeStyle='rgba(58,50,71,.8)'; c.lineWidth=1;
    [R,R*.66,R*.33].forEach(r=>{ c.beginPath(); c.arc(cx,cy,r,0,7); c.stroke(); });
    // runway bar
    const h=dep.rwys[F.rwy].hdg;
    c.save(); c.translate(cx,cy); c.rotate((h-90)*Math.PI/180);
    c.fillStyle='rgba(246,241,232,.18)'; c.fillRect(-R*1.05,-7,R*2.1,14);
    c.strokeStyle='rgba(240,182,74,.85)'; c.lineWidth=1.6;
    c.strokeRect(-R*1.05,-7,R*2.1,14);
    c.setLineDash([6,5]); c.strokeStyle='rgba(246,241,232,.5)'; c.lineWidth=1;
    c.beginPath(); c.moveTo(-R*1.0,0); c.lineTo(R*1.0,0); c.stroke(); c.setLineDash([]);
    c.restore();
    // wind arrow
    const wd=wx.wdir||270, ws=wx.wspd||0;
    c.save(); c.translate(cx,cy); c.rotate((wd+90)*Math.PI/180);
    c.strokeStyle='#6bb7ff'; c.lineWidth=2.4; c.lineCap='round';
    c.beginPath(); c.moveTo(-R*1.15,0); c.lineTo(-R*0.35,0); c.stroke();
    c.fillStyle='#6bb7ff';
    c.beginPath(); c.moveTo(-R*0.28,0); c.lineTo(-R*0.48,6); c.lineTo(-R*0.48,-6); c.closePath(); c.fill();
    c.restore();
    // components
    const w=F.perf.wc;
    c.fillStyle='rgba(106,99,119,.9)'; c.font='8px ui-monospace';
    c.fillText('RWY '+(dep.rwys[F.rwy].name||F.rwy)+' · '+pad(h,3)+'°',10,16);
    c.textAlign='right';
    c.fillStyle='#6bb7ff'; c.fillText('WIND '+pad(wd,3)+'°/'+ws+'kt',W-10,16); c.textAlign='left';
    c.font='bold 10px ui-monospace';
    c.fillStyle=w.head>=0?'var(--green)':'#ff5470';
    c.fillStyle=w.head>=0?'#3ee08f':'#ff5470';
    c.fillText((w.head>=0?'HEAD ':'TAIL ')+Math.abs(w.head)+' kt',12,H-12);
    c.textAlign='right';
    c.fillStyle=Math.abs(w.cross)>35?'#ff5470':'#ffb23e';
    c.fillText('CROSS '+Math.abs(w.cross)+' kt',W-12,H-12); c.textAlign='left';
    const lv=$('#wLive');
    if(lv){ lv.textContent=Math.abs(w.cross)>35?'X-WIND LIMIT':w.head<0?'TAILWIND':'FAVOURABLE';
      lv.style.color=(Math.abs(w.cross)>35||w.head<-10)?'var(--red)':'var(--gold)'; }
  });

  $$('#fSeg button').forEach(b=>b.onclick=()=>{F.flap=+b.dataset.v;$$('#fSeg button').forEach(x=>x.classList.toggle('on',x===b));calc();});
  $$('#tSeg button').forEach(b=>b.onclick=()=>{F.thrust=b.dataset.v;$$('#tSeg button').forEach(x=>x.classList.toggle('on',x===b));calc();});
  $$('#bSeg button').forEach(b=>b.onclick=()=>{F.bleed=b.dataset.v==='1';$$('#bSeg button').forEach(x=>x.classList.toggle('on',x===b));calc();});
  $$('#iSeg button').forEach(b=>b.onclick=()=>{F.ai=b.dataset.v==='1';$$('#iSeg button').forEach(x=>x.classList.toggle('on',x===b));calc();});
  $$('#cSeg button').forEach(b=>b.onclick=()=>{F.cont=b.dataset.v==='1';$$('#cSeg button').forEach(x=>x.classList.toggle('on',x===b));calc();});
  $('#oIn').oninput=e=>{F.oat=+e.target.value;$('#oV').textContent=F.oat+'°C';calc();};
  $('#optB').onclick=()=>{
    let best=null;
    rwys.forEach(r=>{ [3,2,1].forEach(fl=>{ const sv=F.flap; F.flap=fl;
      const p=perfFor(r); F.flap=sv;
      if(p.ok && (!best||p.margin>best.p.margin)) best={r,fl,p}; }); });
    if(!best){ toast("No legal runway/flap combination at this weight. Offload or wait for the wind.","bad"); return; }
    F.rwy=best.r; F.flap=best.fl; F.thrust='TOGA';
    $$('#fSeg button').forEach(x=>x.classList.toggle('on',+x.dataset.v===F.flap));
    $$('#tSeg button').forEach(x=>x.classList.toggle('on',x.dataset.v==='TOGA'));
    calc();
    toast("Optimised: RWY "+(dep.rwys[best.r].name||best.r)+" · CONF "+best.fl+" · margin +"+fmt(best.p.margin)+"m","ok");
  };
  $('#accB').onclick=()=>{ calc();
    if(!F.perfOk){ toast("Cannot accept — the check FAILED on this runway.","bad");
      F.score.safety-=6; F.score.events.push("Takeoff card attempted outside limits"); renderHUD(); return; }
    F.perfAccepted=true;
    toast("Card accepted. V1 "+F.perf.v1+" · VR "+F.perf.vr+" · V2 "+F.perf.v2,"ok");
    foot(`Accepted — RWY <b>${dep.rwys[F.rwy].name||F.rwy}</b> · V1 <b>${F.perf.v1}</b> / VR <b>${F.perf.vr}</b> / V2 <b>${F.perf.v2}</b>`); };
  calc();
  keys([...globalKeys(),
    ['o','Optimise',()=>$('#optB').click()],
    ['enter','Accept card',()=>$('#accB').click(), {live:()=>!!F.perfOk, why:()=>"The check fails on this runway."}],
    ['[','Prev runway',()=>{ const i=rwys.indexOf(F.rwy); F.rwy=rwys[(i+rwys.length-1)%rwys.length]; calc(); }],
    [']','Next runway',()=>{ const i=rwys.indexOf(F.rwy); F.rwy=rwys[(i+1)%rwys.length]; calc(); }],
    ['f','Cycle flap',()=>{ F.flap=F.flap>=3?1:F.flap+1;
      $$('#fSeg button').forEach(x=>x.classList.toggle('on',+x.dataset.v===F.flap)); calc(); }],
    ['t','TOGA / FLEX',()=>{ F.thrust=F.thrust==='TOGA'?'FLEX':'TOGA';
      $$('#tSeg button').forEach(x=>x.classList.toggle('on',x.dataset.v===F.thrust)); calc(); }]
  ]);
  foot("Compare <b>every runway</b> in the table, set your <b>config</b>, then <b>accept the card</b>.");
}

/* ══════════════════════════════════════════════════════════════
   STATION 05 · RAMP SAFETY   ★
   ══════════════════════════════════════════════════════════════ */
const DEFECTS=[
  {id:"pitot",nm:"Pitot cover still fitted",      hit:"Unreliable airspeed on the takeoff roll",sev:22},
  {id:"tyre", nm:"Nose tyre worn to the cords",   hit:"Tyre burst during the roll",             sev:16},
  {id:"hyd",  nm:"Hydraulic leak at the gear",    hit:"Green system pressure loss in the climb",sev:14},
  {id:"pins", nm:"Gear safety pins not removed",  hit:"Gear will not retract after takeoff",    sev:18},
  {id:"fod",  nm:"FOD in the No.1 intake",        hit:"Engine surge / reduced acceleration",    sev:20},
  {id:"stat", nm:"Static port taped over",        hit:"Erroneous altitude and airspeed",        sev:20},
  {id:"ctrl", nm:"Aileron gust lock engaged",     hit:"Restricted roll control after rotation", sev:24},
  {id:"dent", nm:"Impact damage on the leading edge",hit:"Lift degradation — deferred defect",  sev:10}
];
const SPOTS=[
  {id:"pitot",x:.14,y:.40,r:16,nm:"Pitot probes"},
  {id:"stat", x:.20,y:.55,r:15,nm:"Static ports"},
  {id:"tyre", x:.24,y:.74,r:16,nm:"Nose gear & tyres"},
  {id:"fod",  x:.38,y:.66,r:19,nm:"No.1 engine intake"},
  {id:"hyd",  x:.51,y:.78,r:17,nm:"Main gear bay"},
  {id:"pins", x:.57,y:.80,r:15,nm:"Gear safety pins"},
  {id:"ctrl", x:.67,y:.41,r:18,nm:"Wing & control surfaces"},
  {id:"dent", x:.81,y:.30,r:17,nm:"Leading edge & empennage"}
];
function sRamp(el){
  const R=F.ramp;
  if(!R.seeded){ R.seeded=1;
    const pool=[...DEFECTS].sort(()=>Math.random()-.5);
    R.defects=pool.slice(0,1+Math.floor(Math.random()*3)).map(d=>d.id);
    R.fodN=2+Math.floor(Math.random()*4); R.fodFound=0;
    R.fodPts=Array.from({length:R.fodN},()=>({x:.15+Math.random()*.72,y:.84+Math.random()*.11,got:0}));
    R.lightning=Math.random()<.25;
    R.icing=(F.oat!=null&&F.oat<6);
    R.found=[]; R.inspected=[]; R.disc={};
    R.gse=[{nm:"BOWSER",x:.30,y:.30},{nm:"BELT",x:.62,y:.72},{nm:"GPU",x:.44,y:.22},{nm:"STEPS",x:.20,y:.70}];
  }
  el.innerHTML=`
  <div class="stn-h"><div><div class="kick">Station 05 · Ramp safety</div><h2>Walkaround &amp; Aircraft Acceptance</h2>
    <p>The most dangerous place in aviation. Defects are <b>hidden and randomised</b> — what you fail to find here will find you in the air. Then clear the stand: danger arcs, FOD, chocks, cones, GSE.</p></div>
    <div><button class="btn" id="rHelp">Ramp brief</button></div></div>
  <div class="g gB">
    <div>
      <div class="card hl" style="margin-bottom:12px"><h3>Walkaround</h3>
        <p class="hint">Click every station on the airframe. A station you don't check is a defect you don't find.</p>
        <div class="steps" id="wSteps">${SPOTS.map(()=>'<div class="s"><div class="f"></div></div>').join('')}</div>
        <div class="ro" style="margin-top:10px">
          <span class="k">Stations inspected</span><span class="v" id="wN">0 / ${SPOTS.length}</span>
          <span class="k">Defects found</span><span class="v g" id="wD">0</span>
          <span class="k">FOD collected</span><span class="v" id="wF">0 / ${R.fodN}</span>
        </div>
        <div id="wLog" style="margin-top:9px"></div>
      </div>
      <div class="card"><h3>Stand discipline</h3>
        <div id="dC">
          ${[["ppe","PPE — hi-vis & ear defenders"],["chocks","Chocks in place (nose & mains)"],
             ["cones","Wingtip & engine cones set"],["bond","Bowser bonded before fuelling"],
             ["gpu","GPU connected, clear of arcs"]].map(([k,n])=>
            `<div class="chk ${R.disc[k]?'on':''}" data-k="${k}"><span class="bx">✓</span><span class="nm">${n}</span><span class="st2">REQUIRED</span></div>`).join('')}
        </div>
      </div>
    </div>
    <div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Stand — click the ? markers</span><span class="live">WALKAROUND</span>
        <canvas id="rCv" height="300" style="cursor:crosshair"></canvas></div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Engine danger arcs — click GSE to reposition</span>
        <span class="live" id="aLive">STAND CLEAR</span><canvas id="aCv" height="240" style="cursor:pointer"></canvas></div>
      <div class="card hl"><h3>Ramp conditions</h3><div id="cBox"></div>
        <div class="btnrow" id="cBtn"></div>
        <div class="btnrow"><button class="btn primary" id="clrB">Accept aircraft &amp; clear ramp</button></div></div>
    </div>
  </div>`;
  $('#rHelp').onclick=()=>modal(`<h3>Ramp brief</h3>
    <p><b>Walkaround:</b> eight stations, randomised defects. Missing one doesn't fail you here — it fails you later, in the air.</p>
    <p><b>Danger arcs:</b> red is intake suction, amber is jet blast. Anything inside at engine start is an incident.</p>
    <p><b>Hold-over time:</b> after de-icing a clock runs. Get airborne before it expires or go back for a re-spray.</p>
    <p><b>Lightning:</b> a storm within 5 nm suspends all ramp operations. You wait — and the delay clock keeps running.</p>`);

  /* ---- walkaround canvas ---- */
  const cv=$('#rCv'); let t=0;
  anim(()=>{ const {c,W,H}=fit(cv,300); if(!W)return; t+=.02;
    c.clearRect(0,0,W,H);
    const gy=H*.86;
    c.fillStyle='#100d16'; c.fillRect(0,gy,W,H-gy);
    c.strokeStyle='rgba(240,182,74,.22)';c.lineWidth=1.5;c.setLineDash([10,8]);
    c.beginPath();c.moveTo(0,gy+15);c.lineTo(W,gy+15);c.stroke();c.setLineDash([]);
    // the ACTUAL aircraft you're walking around, wheels on the tarmac
    const Mr=acMetrics(F.type);
    const bw=Math.min(W*.82,(gy-26)/Mr.total);
    const bx=(W-bw)/2;
    const by=gy-bw*Mr.down;
    drawAcSide(c,F.type,bx,by,bw,{t,gearDn:1,paxFrac:0});
    R.fodPts.forEach(p=>{ if(p.got)return; const px=p.x*W,py=p.y*H;
      c.fillStyle='#ff5470';c.globalAlpha=.35+.28*Math.sin(t*3+px);c.beginPath();c.arc(px,py,8,0,7);c.fill();c.globalAlpha=1;
      c.fillStyle='#ffd98a';c.beginPath();c.arc(px,py,2.5,0,7);c.fill(); });
    SPOTS.forEach(h=>{ const px=h.x*W,py=h.y*H;
      const ins=R.inspected.includes(h.id), fnd=R.found.includes(h.id);
      const col=fnd?'#ff5470':ins?'#3ee08f':'#f0b64a';
      if(!ins){ c.globalAlpha=.28+.25*Math.sin(t*2.2+px*.05); c.fillStyle=col;
        c.beginPath();c.arc(px,py,h.r+5,0,7);c.fill();c.globalAlpha=1; }
      c.strokeStyle=col;c.lineWidth=1.6;c.beginPath();c.arc(px,py,h.r,0,7);c.stroke();
      c.fillStyle=col;c.font='9px ui-monospace';c.textAlign='center';
      c.fillText(fnd?'!':ins?'✓':'?',px,py+3.5);c.textAlign='left'; });
    const hint='Click each ? to inspect  ·  click red FOD to collect';
    c.font='8.5px ui-monospace';
    const hw=c.measureText(hint).width;
    c.fillStyle='rgba(8,7,10,.75)'; rrect(c,8,H-22,hw+16,16,8); c.fill();
    c.fillStyle='rgba(164,154,143,.9)'; c.fillText(hint,16,H-11);
  });
  cv.onclick=e=>{ const r=cv.getBoundingClientRect(), W=r.width, H=300;
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    for(const p of R.fodPts){ if(p.got)continue;
      if(Math.hypot(mx-p.x*W,my-p.y*H)<14){ p.got=1; R.fodFound++; upd(); toast("FOD collected.","ok"); return; } }
    for(const h of SPOTS){ if(Math.hypot(mx-h.x*W,my-h.y*H)<h.r+6){
      if(R.inspected.includes(h.id)){ toast(h.nm+" — already inspected.","warn"); return; }
      R.inspected.push(h.id);
      if(R.defects.includes(h.id)){ R.found.push(h.id);
        const d=DEFECTS.find(x=>x.id===h.id);
        modal(`<h3 style="color:var(--red)">Defect found</h3><p><b>${d.nm}</b> at ${h.nm}.</p>
          <p>Caught on the walkaround. Engineering will rectify before departure — this would otherwise have caused: <i>${d.hit}</i>.</p>
          <div class="btnrow"><button class="btn primary" id="okD">Rectify &amp; continue</button></div>`);
        $('#okD').onclick=closeModal;
        toast("DEFECT — "+d.nm,"bad");
      } else toast(h.nm+" — serviceable.","ok");
      upd(); return; } }
  };
  function upd(){ const n=R.inspected.length;
    $('#wN').textContent=n+' / '+SPOTS.length;
    $('#wD').textContent=R.found.length;
    $('#wF').textContent=R.fodFound+' / '+R.fodN;
    $$('#wSteps .s').forEach((s,i)=>s.classList.toggle('done',i<n));
    $('#wLog').innerHTML=R.found.map(id=>{const d=DEFECTS.find(x=>x.id===id);
      return `<div class="bdg bad" style="margin:0 4px 4px 0">✓ RECTIFIED — ${d.nm}</div>`;}).join('');
    cond();
  }
  /* ---- danger arcs ---- */
  const ac=$('#aCv');
  anim(()=>{ const {c,W,H}=fit(ac,240); if(!W)return;
    c.clearRect(0,0,W,H);
    const cx=W/2,cy=H/2;
    c.strokeStyle='rgba(246,241,232,.5)';c.fillStyle='#241d2e';c.lineWidth=1.4;
    c.beginPath();c.ellipse(cx,cy,W*.052,H*.30,0,0,7);c.fill();c.stroke();
    [[-1],[1]].forEach(([s])=>{
      c.beginPath();c.moveTo(cx+s*W*.042,cy-H*.02);c.lineTo(cx+s*W*.27,cy+H*.14);
      c.lineTo(cx+s*W*.25,cy+H*.20);c.lineTo(cx+s*W*.038,cy+H*.10);c.closePath();c.fill();c.stroke(); });
    const eng=[[cx-W*.165,cy+H*.08],[cx+W*.165,cy+H*.08]];
    let breach=false;
    eng.forEach(([ex,ey])=>{
      const R1=W*.085;
      const gi=c.createRadialGradient(ex,ey,4,ex,ey-R1*.4,R1);
      gi.addColorStop(0,'rgba(255,84,112,.35)');gi.addColorStop(1,'rgba(255,84,112,0)');
      c.fillStyle=gi;c.beginPath();c.arc(ex,ey-R1*.15,R1,0,7);c.fill();
      c.strokeStyle='rgba(255,84,112,.6)';c.setLineDash([3,3]);c.lineWidth=1;
      c.beginPath();c.arc(ex,ey-R1*.15,R1,0,7);c.stroke();c.setLineDash([]);
      c.beginPath();c.moveTo(ex-10,ey+8);c.lineTo(ex-W*.06,ey+H*.44);
      c.lineTo(ex+W*.06,ey+H*.44);c.lineTo(ex+10,ey+8);c.closePath();
      const gb=c.createLinearGradient(ex,ey,ex,ey+H*.44);
      gb.addColorStop(0,'rgba(255,178,62,.28)');gb.addColorStop(1,'rgba(255,178,62,0)');
      c.fillStyle=gb;c.fill();
      c.strokeStyle='rgba(255,178,62,.45)';c.setLineDash([3,3]);c.stroke();c.setLineDash([]);
      c.fillStyle='#3a3247';c.strokeStyle='rgba(246,241,232,.7)';
      c.beginPath();c.arc(ex,ey,9,0,7);c.fill();c.stroke();
      R.gse.forEach(g=>{ const gx=g.x*W,gy=g.y*H;
        const inI=Math.hypot(gx-ex,gy-(ey-R1*.15))<R1;
        const inB=(gy>ey+8&&gy<ey+H*.44&&Math.abs(gx-ex)<W*.06+((gy-ey)/(H*.44))*W*.03);
        if(inI||inB){ g.bad=1; breach=true; } });
    });
    R.gse.forEach(g=>{ if(!eng.some(([ex,ey])=>{ const R1=W*.085; const gx=g.x*W,gy=g.y*H;
        return Math.hypot(gx-ex,gy-(ey-R1*.15))<R1 || (gy>ey+8&&gy<ey+H*.44&&Math.abs(gx-ex)<W*.06+((gy-ey)/(H*.44))*W*.03); })) g.bad=0;
      const gx=g.x*W,gy=g.y*H, col=g.bad?'#ff5470':'#3ee08f';
      c.fillStyle=g.bad?'rgba(255,84,112,.2)':'rgba(62,224,143,.15)';
      c.strokeStyle=col;c.lineWidth=1.4;rrect(c,gx-24,gy-9,48,18,4);c.fill();c.stroke();
      c.fillStyle=col;c.font='8px ui-monospace';c.textAlign='center';c.fillText(g.nm,gx,gy+3);c.textAlign='left'; });
    R.arcBreach=breach;
    const lv=$('#aLive');
    if(lv){ lv.textContent=breach?'⚠ GSE IN DANGER ZONE':'STAND CLEAR'; lv.style.color=breach?'var(--red)':'var(--gold)'; }
  });
  ac.onclick=e=>{ const r=ac.getBoundingClientRect(),W=r.width,H=240;
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    for(const g of R.gse){ if(Math.abs(mx-g.x*W)<26&&Math.abs(my-g.y*H)<11){
      const sp=[[.08,.14],[.92,.14],[.08,.88],[.92,.88],[.5,.05]][Math.floor(Math.random()*5)];
      g.x=sp[0];g.y=sp[1]; toast(g.nm+" repositioned clear of the arcs.","ok"); return; } } };
  $$('#dC .chk').forEach(c=>{ const k=c.dataset.k;
    c.onclick=()=>{ R.disc[k]=!R.disc[k]; c.classList.toggle('on',!!R.disc[k]); cond(); }; });
  function cond(){
    const lig=R.lightning&&!R.ligClear;
    let h=`<div class="ro">
      <span class="k">Temperature</span><span class="v ${R.icing?'wr':''}">${F.oat}°C ${R.icing?'· ICING':''}</span>
      <span class="k">Thunderstorm &lt; 5 nm</span><span class="v ${lig?'bad':'ok'}">${lig?'YES — RAMP SUSPENDED':'No'}</span>`;
    if(R.deice){ const rem=Math.max(0,Math.round(R.hot-(Date.now()-R.deiceAt)/1000));
      h+=`<span class="k">Hold-over remaining</span><span class="v ${rem<120?'bad':'ok'}">${Math.floor(rem/60)}:${pad(rem%60)}</span>`; }
    h+=`</div>`;
    if(lig) h+='<div class="bdg bad" style="margin-top:8px">⚡ RAMP OPERATIONS SUSPENDED</div>';
    if(R.icing&&!R.deice) h+='<div class="bdg warn" style="margin-top:8px">❄ DE-ICING REQUIRED</div>';
    $('#cBox').innerHTML=h;
    const b=[];
    if(lig) b.push('<button class="btn" id="wLig">Wait out the storm (+12 min)</button>');
    if(R.icing&&!R.deice) b.push('<button class="btn" id="deB">De-ice (Type II)</button>');
    $('#cBtn').innerHTML=b.join('');
    if($('#wLig')) $('#wLig').onclick=()=>{ R.ligClear=1; F.delayMin+=12; F.delayCode="71 · Weather";
      toast("Storm cleared. 12 min lost — code 71.","warn"); cond(); };
    if($('#deB')) $('#deB').onclick=()=>{ R.deice=1; R.hot=900; R.deiceAt=Date.now(); F.delayMin+=8;
      toast("De-iced. Hold-over 15:00 — beat the clock.","ok"); cond(); };
  }
  $('#clrB').onclick=()=>{
    if(R.inspected.length<SPOTS.length){ toast(`Walkaround incomplete — ${SPOTS.length-R.inspected.length} station(s) unchecked.`,"bad"); return; }
    const need=['ppe','chocks','cones','bond','gpu'].filter(k=>!R.disc[k]);
    if(need.length){ toast("Stand discipline incomplete: "+need.join(', ').toUpperCase(),"bad"); return; }
    if(R.lightning&&!R.ligClear){ toast("Cannot clear — thunderstorm within 5 nm.","bad"); return; }
    if(R.icing&&!R.deice){ toast("Cannot depart contaminated — de-ice first.","bad"); return; }
    if(R.arcBreach){ R.breaches=(R.breaches||0)+1; F.score.safety-=12;
      F.score.events.push("GSE inside engine danger arc at clearance");
      toast("INCIDENT — GSE left inside a danger arc.","bad"); }
    R.missed=R.defects.filter(d=>!R.found.includes(d));
    R.fodLeft=R.fodN-R.fodFound;
    if(R.missed.length){ F.score.safety-=R.missed.length*6; F.score.events.push(R.missed.length+" defect(s) missed on walkaround"); }
    if(R.fodLeft>0){ F.score.safety-=R.fodLeft*3; F.score.events.push(R.fodLeft+" FOD item(s) left on stand"); }
    R.cleared=1; renderHUD();
    if(R.missed.length) toast(`Ramp cleared — but ${R.missed.length} defect(s) went unfound.`,"warn");
    else toast("Aircraft accepted. All defects found.","ok");
    foot(`Ramp cleared · <b>${R.found.length}</b> found · <b>${R.fodFound}/${R.fodN}</b> FOD · Safety <b>${Math.round(F.score.safety)}%</b>`);
  };
  upd();
  keys([...globalKeys(),
    ['n','Next uninspected',()=>{ const sp=SPOTS.find(x=>!R.inspected.includes(x.id));
      if(!sp){ toast("Walkaround complete.","ok"); return; }
      const r=cv.getBoundingClientRect();
      cv.dispatchEvent(new MouseEvent('click',{clientX:r.left+sp.x*r.width,clientY:r.top+sp.y*300,bubbles:true})); }],
    ['f','Collect FOD',()=>{ const p=R.fodPts.find(x=>!x.got);
      if(!p){ toast("No FOD left.","ok"); return; }
      const r=cv.getBoundingClientRect();
      cv.dispatchEvent(new MouseEvent('click',{clientX:r.left+p.x*r.width,clientY:r.top+p.y*300,bubbles:true})); }],
    ['enter','Accept aircraft',()=>$('#clrB').click()]
  ]);
  foot("Inspect <b>all 8 stations</b>, clear the <b>FOD</b> and <b>danger arcs</b>, complete <b>discipline</b>.");
}

const PANEL=[
  {k:"adirs", nm:"ADIRS", sub:"3 × IR/ADR to NAV", grp:"OVHD", x:.14, y:.20, type:"rot", pos:["OFF","NAV","ATT"], want:1},

function sPrep(el){

  /* field → which MCDU key fills it, and what F.fmc flag it sets */
  const FIELDS={

  el.innerHTML=`

            <div class="lsk R">${[1,2,3,4,5,6].map(i=>`<button data-s="R" data-l="${i}" title="LSK ${i}R"></button>`).join('')}</div>

  /* ═══ MCDU rendering ═══ */
  function mcduLines(){
    const v=V(), pg=M.page;
    const L=[];
    const dash=(f)=>F.fmc[f]?null:'□□□□□';
    if(pg===0){
      L.push(['','INIT',''],
        ['CO RTE','FROM/TO'],[v.coRte,v.fromTo,'g'],
        ['ALTN/CO RTE','FLT NBR'],[v.altn+'/NONE',v.flt,'b'],
        ['LAT','LONG'],['----.-','-----.-','d'],
        ['COST INDEX','ZFW/ZFWCG'],[v.ci, F.fmc.zfw?(v.zfw+'/'+v.zfwcg):'--.-/--.-', F.fmc.zfw?'y':'d'],
        ['CRZ FL/TEMP','BLOCK'],[v.crz+'/-56°', F.fmc.fuel?v.block:'--.-', F.fmc.fuel?'y':'d'],
        ['','']);
    } else if(pg===1){
      L.push(['','F-PLN  '+dep.icao+'/'+des.icao,''],
        ['','TIME  SPD/ALT'],
        [F.fmc.route?v.sid:'□□□□□','---- ---/-----', F.fmc.route?'g':'d'],
        ['','C'],
        [dep.icao+'  '+v.rwy,'0000  ---/'+dep.elev,'b'],
        ['',''],
        [v.rte,'----  M'+a.cruise.mach.toFixed(2)+'/'+v.crz,'b'],
        ['',''],
        [des.icao,'----  ---/'+des.elev,'b'],
        ['',''],
        ['DEST   EFOB','DIST'],
        [des.icao+'  '+((F.block-F.fuelCalc.trip)/1000).toFixed(1),String(F.route.dist),'y']);
    } else if(pg===2){
      L.push(['','TAKE OFF',''],
        ['V1','FLP RETR'],
        [F.fmc.vspd?v.v1:'□□□','F=---','y'],
        ['VR','SLT RETR'],
        [F.fmc.vspd?v.vr:'□□□','S=---','y'],
        ['V2','CLEAN'],
        [F.fmc.vspd?v.v2:'□□□','O=---','y'],
        ['FLAPS/THS','FLEX TO TEMP'],
        [F.fmc.trim?(v.flap+'/'+v.ths):'□□□□/□□□', v.flex, F.fmc.trim?'g':'d'],
        ['THR RED/ACC','ENG OUT ACC'],
        ['1500/1500','1500','b'],
        ['RWY','TRANS ALT'],
        [v.rwy,'5000','b']);
    } else {
      L.push(['','FUEL PRED',''],
        ['AT','UTC   EFOB'],
        [des.icao,'----  '+((F.block-F.fuelCalc.trip)/1000).toFixed(1),'g'],
        ['',''],
        [APT[F.route.alt].icao,'----  '+((F.block-F.fuelCalc.trip-F.fuelCalc.altn)/1000).toFixed(1),'b'],
        ['RTE RSV/%','BLOCK'],
        [(F.fuelCalc.cont/1000).toFixed(1)+'/5.0', F.fmc.fuel?v.block:'--.-', F.fmc.fuel?'y':'d'],
        ['ALTN','TRIP/TIME'],
        [(F.fuelCalc.altn/1000).toFixed(1), v.trip,'b'],

        [(F.fuelCalc.fr/1000).toFixed(1)+'/0030',(F.ls.tow/1000).toFixed(1),'y'],

  }
  const CLR={g:'#3ee08f',b:'#6bb7ff',y:'#ffd98a',d:'#4a5a4a',w:'#f6f1e8'};
  (function(){ const cv=$('#mcCv'); let bt=0;
    anim(()=>{ const {c,W,H}=fit(cv,336); if(!W)return; bt+=0.05;
      c.fillStyle='#04120a'; c.fillRect(0,0,W,H);

      const PAD=9;
      // title + page counter (real MCDUs always tell you where you are)

      c.fillText(L[0][1],W/2,15);
      c.fillStyle='#3ee08f'; c.font='8px ui-monospace'; c.textAlign='right';
      c.fillText((M.page+1)+'/'+PAGES.length, W-PAD, 15);
      c.textAlign='left';
      c.strokeStyle='rgba(62,224,143,.22)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(PAD,20); c.lineTo(W-PAD,20); c.stroke();
      // six label / value pairs, geometrically locked to the LSK buttons beside them:
      // .lsk has 30px top pad, 34px bottom, six 17px keys, space-between  →  centre = 38.5 + 51k
      const LSK0=38.5, LSKSTEP=(H-30-34-6*17)/5+17;
      for(let i=1;i<L.length;i+=2){
        const k=(i-1)/2;
        const lab=L[i], val=L[i+1];
        if(!lab) break;
        const cy=LSK0+k*LSKSTEP;
        const y=cy-7;
        c.font='7px ui-monospace'; c.fillStyle='#59705c';
        c.fillText(lab[0]||'',PAD,y);
        c.textAlign='right'; c.fillText(lab[1]||'',W-PAD,y); c.textAlign='left';
        if(val){
          c.font='12px ui-monospace';
          const cl=CLR[val[2]||'w']||'#f6f1e8';
          const vy=cy+5;
          // LSK arrows: the screen shows you which side is selectable
          if(val[0]){ c.fillStyle=cl; c.fillText('←'+(val[0]||''),PAD,vy); }
          if(val[1]){ c.fillStyle=CLR[val[3]||val[2]||'w']||'#f6f1e8';
            c.textAlign='right'; c.fillText((val[1]||'')+'→',W-PAD,vy); c.textAlign='left'; }
        }
      }
      // scratchpad
      c.strokeStyle='rgba(62,224,143,.22)';
      c.beginPath(); c.moveTo(PAD,H-23); c.lineTo(W-PAD,H-23); c.stroke();
      c.font='12px ui-monospace';
      if(M.msg){ c.fillStyle='#ffb23e'; c.fillText(M.msg,PAD,H-8); }
      else { c.fillStyle='#f6f1e8'; c.fillText(M.scratch,PAD,H-8);
        if(Math.sin(bt)>0){ c.fillStyle='#3ee08f';
          c.fillRect(PAD+c.measureText(M.scratch).width+1,H-18,7,12); } }
      for(let sy=0;sy<H;sy+=3){ c.fillStyle='rgba(0,0,0,.20)'; c.fillRect(0,sy,W,1); }
      const gg=c.createRadialGradient(W/2,H/2,10,W/2,H/2,H*0.85);
      gg.addColorStop(0,'rgba(62,224,143,.06)'); gg.addColorStop(1,'rgba(62,224,143,0)');
      c.fillStyle=gg; c.fillRect(0,0,W,H);
    });
  })();
  // MCDU keypad
  $('#mKeys').innerHTML=['A','B','C','D','E','F','G','1','2','3','H','I','J','K','L','M','N','4','5','6',
    'O','P','Q','R','S','T','U','7','8','9','V','W','X','Y','Z','/','.','CLR','0','←']
    .map(k=>`<button data-k="${k}">${k}</button>`).join('');
  $$('#mKeys button').forEach(b=>b.onclick=()=>typeKey(b.dataset.k));
  function typeKey(k){
    M.msg="";
    if(k==='CLR'||k==='←'){ M.scratch=M.scratch.slice(0,-1); return; }
    if(M.scratch.length<22) M.scratch+=k;
  }
  $$('.mPg button').forEach(b=>b.onclick=()=>{ M.page=+b.dataset.p; M.msg="";
    $$('.mPg button').forEach(x=>x.classList.toggle('on',x===b)); });
  $$('.lsk button').forEach(b=>b.onclick=()=>lsk(b.dataset.s,+b.dataset.l));

  function lsk(side,line){
    // which field lives at this page/side/line?
    const hit=Object.entries(FIELDS).find(([k,f])=>f.pg===M.page&&f.side===side&&f.line===line);
    if(!hit){ M.msg="NOT ALLOWED"; setTimeout(()=>{M.msg="";},1300); return; }
    const [key,f]=hit;
    const want=f.get(V());
    if(M.scratch){
      if(M.scratch.replace(/\s/g,'').toUpperCase()===want.replace(/\s/g,'').toUpperCase()){
        F.fmc[f.flag]=true; M.scratch=""; M.msg="";
        toast(f.lbl+" entered.","ok"); chk(); fmcList();
      } else { M.msg="ENTRY OUT OF RANGE"; setTimeout(()=>{M.msg="";},1600);
        toast("The box rejected that. It wants "+want+".","warn"); }
    } else {
      // empty scratchpad on an empty field = pull the computed value into the scratchpad
      M.scratch=want; M.msg="";
      toast("Computed value in the scratchpad. Press the LSK again to insert it.","ok");
    }
  }
  function fmcList(){
    $('#fmcL').innerHTML=Object.entries(FIELDS).map(([k,f])=>{
      const v=f.get(V());
      return `<div class="chk ${F.fmc[f.flag]?'on':''}" data-f="${k}"><span class="bx">✓</span>
        <span class="nm">${f.lbl} <span style="color:var(--faint)">· ${PAGES[f.pg].ttl} · ${f.side}${f.line}</span></span>
        <span class="st2">${v}</span></div>`;}).join('');
    $$('#fmcL .chk').forEach(c=>c.onclick=()=>{ const f=FIELDS[c.dataset.f];
      M.page=f.pg; $$('.mPg button').forEach(x=>x.classList.toggle('on',+x.dataset.p===f.pg));
      M.scratch=f.get(V());
      toast("Jumped to "+PAGES[f.pg].ttl+". Press "+f.side+f.line+" to insert.","ok"); });
  }
  fmcList();

  /* ═══ OVERHEAD PANEL — switches that actually move ═══ */
  const anim0={};
  PANEL.forEach(p=>anim0[p.k]=F.prep[p.k]?1:0);
  const pn=$('#pnCv');
  anim(()=>{
    const {c,W,H}=fit(pn,330); if(!W)return;
    c.clearRect(0,0,W,H);
    // brushed-metal panel face
    const pg=c.createLinearGradient(0,0,0,H);
    pg.addColorStop(0,'#43434a'); pg.addColorStop(.5,'#35353b'); pg.addColorStop(1,'#2b2b31');
    c.fillStyle=pg; c.fillRect(0,0,W,H);
    for(let i=0;i<W;i+=3){ c.fillStyle='rgba(255,255,255,'+(Math.random()*0.012)+')'; c.fillRect(i,0,1,H); }
    // sub-panel bays, screwed down
    const bays=[[0,0,W/4,H/2],[W/4,0,W/4,H/2],[W/2,0,W/4,H/2],[3*W/4,0,W/4,H/2],
                [0,H/2,W/4,H/2],[W/4,H/2,W/4,H/2],[W/2,H/2,W/4,H/2],[3*W/4,H/2,W/4,H/2]];
    bays.forEach(([bx,by,bw,bh])=>{
      c.strokeStyle='rgba(20,20,24,.85)'; c.lineWidth=1.5;
      c.strokeRect(bx+3,by+3,bw-6,bh-6);
      c.strokeStyle='rgba(255,255,255,.06)';
      c.strokeRect(bx+4,by+4,bw-8,bh-8);
      [[bx+9,by+9],[bx+bw-9,by+9],[bx+9,by+bh-9],[bx+bw-9,by+bh-9]].forEach(([sx,sy])=>{
        c.fillStyle='#24242a'; c.beginPath(); c.arc(sx,sy,2.2,0,7); c.fill();
        c.strokeStyle='rgba(255,255,255,.15)'; c.lineWidth=.8;
        c.beginPath(); c.moveTo(sx-1.4,sy); c.lineTo(sx+1.4,sy); c.stroke(); });
    });
    const L2=Labels(c);
    PANEL.forEach(p=>{
      const on=!!F.prep[p.k];
      anim0[p.k]+=((on?1:0)-anim0[p.k])*0.18;
      const a0=anim0[p.k];
      const x=W*p.x, y=H*p.y;

      if(p.type==='six'){
        // six pump push-buttons, each with an OFF legend that goes dark as it's pressed in
        for(let i=0;i<6;i++){
          const bx=x-21+(i%3)*15, by=y-9+Math.floor(i/3)*16;
          const lit=a0>((i+0.5)/6);
          c.fillStyle='#1a1a1e'; c.strokeStyle='rgba(0,0,0,.8)'; c.lineWidth=1;
          rrect(c,bx,by,12,13,2); c.fill(); c.stroke();
          c.fillStyle=lit?'rgba(255,255,255,.10)':'rgba(255,255,255,.72)';   // OFF legend
          c.fillRect(bx+1.5,by+6.5,9,5);
          if(lit){ c.fillStyle='rgba(62,224,143,.9)'; c.fillRect(bx+1.5,by+1.5,9,4.5); }
          c.strokeStyle='rgba(255,255,255,.12)'; c.strokeRect(bx+.5,by+.5,11,12);
        }
      } else if(p.type==='tri'){
        // three hydraulic pump buttons: FAULT (amber) over ON
        for(let i=0;i<3;i++){
          const bx=x-23+i*16;
          const lit=a0>((i+0.5)/3);
          c.fillStyle='#1a1a1e'; c.strokeStyle='rgba(0,0,0,.8)'; c.lineWidth=1;
          rrect(c,bx,y-11,13,22,2); c.fill(); c.stroke();
          c.fillStyle=lit?'rgba(255,178,62,.10)':'rgba(255,178,62,.55)';     // FAULT
          c.fillRect(bx+2,y-8,9,7);
          c.fillStyle=lit?'rgba(62,224,143,.92)':'rgba(255,255,255,.16)';    // ON
          c.fillRect(bx+2,y+1,9,7);
          c.fillStyle=lit?'#0d2a1a':'rgba(255,255,255,.45)'; c.font='4.5px ui-monospace';
          c.textAlign='center'; c.fillText('ON',bx+6.5,y+6.4); c.textAlign='left';
        }
      } else if(p.type==='rot'){
        // rotary selector with detents and a real pointer
        c.fillStyle='#1c1c20'; c.beginPath(); c.arc(x,y,17,0,7); c.fill();
        c.strokeStyle='rgba(0,0,0,.9)'; c.lineWidth=1.5; c.stroke();
        const A0=Math.PI*0.80, A1=Math.PI*2.20;
        (p.pos||[]).forEach((nm,i)=>{
          const th=A0+(A1-A0)*(i/((p.pos.length-1)||1));
          c.strokeStyle='rgba(255,255,255,.45)'; c.lineWidth=1;
          c.beginPath(); c.moveTo(x+Math.cos(th)*17,y+Math.sin(th)*17);
          c.lineTo(x+Math.cos(th)*21,y+Math.sin(th)*21); c.stroke();
          c.fillStyle=(a0>0.5?i===1:i===0)?'#3ee08f':'rgba(255,255,255,.55)';
          c.font='5px ui-monospace'; c.textAlign='center';
          c.fillText(nm, x+Math.cos(th)*27, y+Math.sin(th)*27+2); c.textAlign='left';
        });
        // knob
        const kg=c.createRadialGradient(x-4,y-4,1,x,y,13);
        kg.addColorStop(0,'#5c5c66'); kg.addColorStop(1,'#2a2a30');
        c.fillStyle=kg; c.beginPath(); c.arc(x,y,12,0,7); c.fill();
        c.strokeStyle='rgba(0,0,0,.7)'; c.lineWidth=1; c.stroke();
        const th=A0+(A1-A0)*(a0*0.5);
        c.strokeStyle=a0>0.5?'#3ee08f':'#d8d8de'; c.lineWidth=2.6; c.lineCap='round';
        c.beginPath(); c.moveTo(x,y); c.lineTo(x+Math.cos(th)*10,y+Math.sin(th)*10); c.stroke();
        c.lineCap='butt';
      } else {
        // guarded toggle switch — the guard lifts as you set it
        c.fillStyle='#1a1a1e'; c.strokeStyle='rgba(0,0,0,.8)'; c.lineWidth=1;
        rrect(c,x-13,y-16,26,32,3); c.fill(); c.stroke();
        // the annunciator legend above it
        c.fillStyle=a0>0.5?'rgba(62,224,143,.92)':'rgba(255,255,255,.14)';
        c.fillRect(x-10,y-13,20,7);
        c.fillStyle=a0>0.5?'#0d2a1a':'rgba(255,255,255,.42)';
        c.font='5px ui-monospace'; c.textAlign='center';
        c.fillText('ON',x,y-7.6); c.textAlign='left';
        // toggle body, physically throwing
        const ty=y+9-13*a0;
        c.strokeStyle='#0a0a0c'; c.lineWidth=5.5; c.lineCap='round';
        c.beginPath(); c.moveTo(x,y+8); c.lineTo(x,ty); c.stroke();
        const tg=c.createLinearGradient(x-3,0,x+3,0);
        tg.addColorStop(0,'#8e8e98'); tg.addColorStop(.5,'#d5d5dc'); tg.addColorStop(1,'#7a7a84');
        c.strokeStyle=tg; c.lineWidth=3.6;
        c.beginPath(); c.moveTo(x,y+8); c.lineTo(x,ty); c.stroke();
        c.fillStyle='#e2e2e8'; c.beginPath(); c.arc(x,ty,3.4,0,7); c.fill();
        c.strokeStyle='rgba(0,0,0,.55)'; c.lineWidth=1; c.stroke();
        c.lineCap='butt';
      }
      // legends — placed so they can never collide
      L2.put(p.nm, x, y-26, {font:'bold 8px ui-monospace',
        col:on?'#8fe9bd':(p.optional?'rgba(220,220,228,.65)':'rgba(255,255,255,.9)'),
        align:'center', cands:[[0,0],[0,-9]], must:true});
      L2.put(p.sub, x, y+33, {font:'6.5px ui-monospace', col:'rgba(200,200,212,.62)',
        align:'center', cands:[[0,0],[0,9],[0,18]]});
    });
    const lv=$('#pnLive');
    if(lv){ const need=PANEL.filter(p=>!p.optional);
      const got=need.filter(p=>F.prep[p.k]).length;
      lv.textContent=got+' / '+need.length+(got===need.length?' · FLOW COMPLETE':' SET');
      lv.style.color=got===need.length?'var(--green)':'var(--gold)'; }
  });
  pn.onclick=e=>{
    const r=pn.getBoundingClientRect(), W=r.width, H=330;
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    for(const p of PANEL){
      if(Math.abs(mx-W*p.x)<28 && Math.abs(my-H*p.y)<24){
        F.prep[p.k]=!F.prep[p.k]; chk(); pnList();
        toast(p.nm+" "+(F.prep[p.k]?"SET":"off"), F.prep[p.k]?"ok":"warn");
        return; }
    }
  };
  function pnList(){
    $('#pnList').innerHTML=PANEL.map(p=>
      `<div class="chk ${F.prep[p.k]?'on':''}" data-k="${p.k}"><span class="bx">✓</span>
        <span class="nm">${p.nm} <span style="color:var(--faint)">${p.sub}</span></span>
        <span class="st2">${p.optional?'OPTIONAL':'REQUIRED'}</span></div>`).join('');
    $$('#pnList .chk').forEach(c=>c.onclick=()=>{ F.prep[c.dataset.k]=!F.prep[c.dataset.k]; chk(); pnList(); });
  }
  pnList();

  function chk(){
    const need=PANEL.filter(p=>!p.optional).map(p=>p.k);
    F.prepDone = need.every(k=>F.prep[k]) && Object.values(FIELDS).every(f=>F.fmc[f.flag]);
    renderHUD();
  }
  chk();

  function cb(){ $('#clrB2').innerHTML=!F.clearance?'<div class="hint">No clearance received.</div>':
    `<div class="ro"><span class="k">Cleared to</span><span class="v g">${des.icao}</span>
     <span class="k">Departure</span><span class="v">${F.sid}</span>
     <span class="k">Initial climb</span><span class="v">5000 ft</span>
     <span class="k">Squawk</span><span class="v g">${F.squawk}</span>
     <span class="k">ATIS</span><span class="v">Information ${F.atis}</span></div>
     <div class="bdg ok" style="margin-top:8px">CLEARANCE READ BACK</div>`; }
  $('#getC').onclick=()=>{ F.squawk=String(1000+Math.floor(Math.random()*6000));
    F.atis=String.fromCharCode(65+Math.floor(Math.random()*26)); F.clearance=true; cb(); chk();
    const rec=pushHandoff('planned'), tg=handoffTargets();
    if(rec&&tg.length) toast("Flight plan filed — "+tg.map(t=>t.icao+" tower").join(" & ")+" will see "+rec.cs+".","ok");
    toast(F.callsign+" cleared to "+des.icao+" via "+F.sid+", squawk "+F.squawk,"ok"); };
  cb();

  /* ---- keyboard: the MCDU is a keyboard device, so it gets real key handling ---- */
  const LSKL=['1','2','3','4','5','6'], LSKR=['q','w','e','r','t','y'];
  keys([...globalKeys(),
    ['arrowleft','◀ page',()=>{ M.page=(M.page+PAGES.length-1)%PAGES.length; M.msg="";
      $$('.mPg button').forEach(x=>x.classList.toggle('on',+x.dataset.p===M.page)); }],
    ['arrowright','page ▶',()=>{ M.page=(M.page+1)%PAGES.length; M.msg="";
      $$('.mPg button').forEach(x=>x.classList.toggle('on',+x.dataset.p===M.page)); }],
    ...LSKL.map((k,i)=>[k,i===0?'LSK L':'',()=>lsk('L',i+1)]),
    ...LSKR.map((k,i)=>[k,i===0?'LSK R':'',()=>lsk('R',i+1)]),
    ['enter','insert',()=>{ // insert into the first empty field on this page
      const f=Object.values(FIELDS).find(f=>f.pg===M.page&&!F.fmc[f.flag]);
      if(f) lsk(f.side,f.line); else toast("Nothing left to enter on this page.","warn"); }],
    ['backspace','clear',()=>{ M.scratch=M.scratch.slice(0,-1); }],
    ['c','clearance',()=>$('#getC').click(), {live:()=>!F.clearance}],
    ['p','panel flow',()=>{ PANEL.filter(p=>!p.optional).forEach(p=>F.prep[p.k]=true);
      chk(); pnList(); toast("Panel flow complete.","ok"); }]
  ]);
  // letters/digits go to the scratchpad when not bound to an LSK
  const scratchKeys=(e)=>{
    if(!/^[a-z0-9./]$/.test(e.key.toLowerCase())) return;
    const k=e.key.toLowerCase();
    if(LSKL.includes(k)||LSKR.includes(k)) return;      // those are LSKs
    if(['h','d','p','c'].includes(k)) return;           // reserved
    typeKey(e.key.toUpperCase());
  };
  addEventListener('keydown',scratchKeys);
  stopFns.push(()=>removeEventListener('keydown',scratchKeys));

  foot("Fill the <b>5 FMC fields</b> with the <b>line-select keys</b>, run the <b>panel flow</b>, get your <b>clearance</b>.");
}

/* ══════════════════════════════════════════════════════════════
   STATION 07 · TURNAROUND
   ══════════════════════════════════════════════════════════════ */
const SVC=[["fuel","Fuelling",20],["cater","Catering",13],["board","Boarding",25],["load","Hold loading",17]];
function sTurn(el){
  const a=FLEET[F.type];
  if(!F.eng.seq) F.eng.seq={stage:"OFF",t:0,eng:1,ign:0,valve:0,fuelOn:0,n1:0,n2:0,egt:22,ff:0,done:[]};
  el.innerHTML=`
  <div class="stn-h"><div><div class="kick">Station 07 · Turnaround</div><h2>Services, Pushback &amp; Start</h2>

    <b>bleed air spins N2, fuel goes in at 22%, and you watch the EGT like a hawk.</b></p></div></div>
  <div class="g gB">
    <div>
      <div class="card hl" style="margin-bottom:12px"><h3>Ground services</h3>

        <div class="btnrow"><button class="btn" id="allB">▶ Start all services</button></div></div>

          ["chocks","Chocks removed"],["push","Pushback clearance & tug on"]].map(([k,n])=>
          `<div class="chk ${F.turn.seq[k]?'on':''}" data-k="${k}"><span class="bx">✓</span><span class="nm">${n}</span><span class="st2">—</span></div>`).join('')}</div>
      </div>

      <div class="card hl" style="margin-bottom:12px"><h3>Engine start panel</h3>
        <div class="ped">
          <div class="pedT">ENG START · PEDESTAL</div>
          <div class="modeSel" id="engMode">
            ${[["CRANK","CRANK"],["NORM","NORM"],["IGN","IGN START"]].map(([k,n])=>
              `<button data-m="${k}" class="${(F.eng.mode||'NORM')===k?'on':''}"><span class="dt"></span>${n}</button>`).join('')}
          </div>
          <div class="mstRow">
