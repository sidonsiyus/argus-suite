  foot("<b>T</b> taxi · <b>L</b> line up · <b>SPACE</b> take off · <b>R</b> reject below V1 · <b>V</b> descend · <b>A</b> approach · <b>SPACE</b> land.");
}

/* ══════════════════════════════════════════════════════════════
   STATION 09 · DEBRIEF
   ══════════════════════════════════════════════════════════════ */
function sBrief(el){
  const a=FLEET[F.type];
  const blockMin=Math.max(35,Math.round((Date.now()-F.startedAt)/60000)+Math.round(F.route.dist/a.cruise.tas*60));
  const used=Math.round(F.fuelUsed||F.fuelCalc.trip);
  const planned=F.fuelCalc.trip+F.fuelCalc.taxi;
  const dF=used-planned;
  const otp=F.delayMin<=15?100:Math.max(0,100-(F.delayMin-15)*3);
  const safety=Math.max(0,Math.round(F.score.safety));
  const ops=Math.max(0,Math.round(F.score.ops));
  const fuelScore=Math.max(0,100-Math.abs(dF)/25);
  const total=Math.round(safety*.42+otp*.20+ops*.20+fuelScore*.18);
  const grade=total>=92?'A · Line Captain':total>=82?'B · Command Ready':total>=70?'C · Line Standard':
              total>=58?'D · Additional Training':'E · Retraining Required';
  if(!F.logged){ F.logged=true;
    CAREER.flights++; CAREER.hours=(CAREER.hours||0)+blockMin/60;
    CAREER.best=Math.max(CAREER.best||0,total);
    CAREER.safety=Math.round(((CAREER.safety||100)*(CAREER.flights-1)+safety)/CAREER.flights);
    CAREER.otp=Math.round(((CAREER.otp||100)*(CAREER.flights-1)+otp)/CAREER.flights);
    CAREER.log=[{cs:F.callsign,type:F.type,rt:APT[F.route.from].iata+'-'+APT[F.route.to].iata,
      score:total,grade:grade.split('·')[0].trim(),d:new Date().toISOString().slice(0,10)},...(CAREER.log||[])].slice(0,10);
    saveCareer(); }
  F.score.total=total;
  const hRec=pushHandoff('flown'), hTg=handoffTargets();
  el.innerHTML=`
  <div class="stn-h"><div><div class="kick">Station 09 · Debrief</div><h2>Flight Debrief</h2>
    <p>${F.callsign} · ${APT[F.route.from].iata} → ${APT[F.route.to].iata} · ${a.name}</p></div>
    <div style="display:flex;gap:7px"><button class="btn" id="dcB">📄 Documents</button>
      <button class="btn primary" id="nfB">New flight</button></div></div>
  ${hTg.length?`<div class="card" style="margin-bottom:12px;border-color:rgba(240,182,74,.45)">
    <h3>◆ Handed to PYRGOS</h3>
    <p class="hint" style="margin:0 0 8px">This flight is now a live strip in the tower simulator. Open
      <b>PYRGOS</b>, select the field below, and start a shift — <b>${hRec?hRec.cs:F.callsign}</b> will be
      on the board with the type, runway, SID and V-speeds you actually filed.</p>
    ${hTg.map(t=>`<div class="chk on" style="cursor:default">
      <span class="bx">◆</span>
      <span class="nm">${APT[t.icao]?APT[t.icao].name:t.icao} · ${t.icao}</span>
      <span class="st2">${t.role==='departure'
        ? 'at the gate · DEP '+(F.rwy||'—')+(F.sid?' · '+F.sid:'')
        : 'inbound · ARR'}</span></div>`).join('')}
  </div>`:''}
  <div class="card hl" style="margin-bottom:12px;text-align:center;padding:26px">
    <div class="lbl">Overall score</div>
    <div style="font-size:58px;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-.02em" id="bigScore">0</div>
    <div style="font-family:var(--mono);font-size:13px;letter-spacing:.1em;margin-top:8px">${grade}</div>
    <div class="steps" style="max-width:420px;margin:16px auto 0">
      ${[safety,otp,ops,Math.round(fuelScore)].map(v=>`<div class="s"><div class="f" style="width:${v}%"></div></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:center;gap:22px;margin-top:8px;font-family:var(--mono);font-size:8.5px;color:var(--faint);letter-spacing:.1em">
      <span>SAFETY</span><span>OTP</span><span>OPS</span><span>FUEL</span></div>
  </div>
  <div class="g g2">
    <div class="card"><h3>Operations</h3><div class="ro">
      <span class="k">Block time</span><span class="v">${Math.floor(blockMin/60)}h ${pad(blockMin%60)}m</span>
      <span class="k">Delay</span><span class="v ${F.delayMin>15?'bad':'ok'}">${F.delayMin} min ${F.delayCode||''}</span>
      <span class="k">On-time performance</span><span class="v ${otp>=90?'ok':'wr'}">${otp}%</span>
      <span class="k">Go-arounds</span><span class="v">${F.gaCount||0}</span>
      <span class="k">Passengers carried</span><span class="v">${F.ls.paxN}</span></div></div>
    <div class="card"><h3>Fuel</h3><div class="ro">
      <span class="k">Block loaded</span><span class="v">${fmt(F.block)} kg</span>
      <span class="k">Planned burn</span><span class="v">${fmt(planned)} kg</span>
      <span class="k">Actual burn</span><span class="v">${fmt(used)} kg</span>
      <span class="k">Variance</span><span class="v ${Math.abs(dF)>400?'bad':dF>0?'wr':'ok'}">${dF>=0?'+':''}${fmt(dF)} kg</span>
      <span class="k">On landing</span><span class="v ${(F.fuelOnLanding||0)<F.fuelCalc.fr?'bad':'ok'}">${fmt(Math.max(0,F.fuelOnLanding||0))} kg</span></div></div>
    <div class="card"><h3>Load &amp; trim</h3><div class="ro">
      <span class="k">ZFW / index</span><span class="v">${fmt(F.ls.zfw)} kg · ${F.ls.zfwIdx.toFixed(1)}</span>
      <span class="k">TOW / index</span><span class="v">${fmt(F.ls.tow)} kg · ${F.ls.towIdx.toFixed(1)}</span>
      <span class="k">CG at take-off</span><span class="v ok">${F.ls.towMac.toFixed(1)} %MAC</span>
      <span class="k">THS trim</span><span class="v">${F.trim.toFixed(1)} ${F.trim>=0?'UP':'DN'}</span>
      <span class="k">Fwd perf correction</span><span class="v ${F.perfCorr?'wr':'ok'}">${F.perfCorr?'APPLIED':'Not required'}</span>
      <span class="k">V1 / VR / V2</span><span class="v">${F.perf.v1} / ${F.perf.vr} / ${F.perf.v2}</span>
      <span class="k">Landing weight</span><span class="v">${fmt(F.ldwFinal||F.ls.tow)} kg</span></div></div>
    <div class="card ${safety<80?'':'hl'}"><h3>Safety index · ${safety}%</h3><div class="ro">
      <span class="k">Defects planted</span><span class="v">${(F.ramp.defects||[]).length}</span>
      <span class="k">Defects found</span><span class="v ${(F.ramp.found||[]).length===(F.ramp.defects||[]).length?'ok':'bad'}">${(F.ramp.found||[]).length}</span>
      <span class="k">Defects missed</span><span class="v ${(F.ramp.missed||[]).length?'bad':'ok'}">${(F.ramp.missed||[]).length}</span>
      <span class="k">FOD left on stand</span><span class="v ${(F.ramp.fodLeft||0)?'bad':'ok'}">${F.ramp.fodLeft||0}</span>
      <span class="k">Danger-zone breaches</span><span class="v ${F.ramp.breaches?'bad':'ok'}">${F.ramp.breaches||0}</span></div>
      ${F.score.events.length?`<div style="margin-top:11px"><div class="lbl">Events logged</div>
        ${F.score.events.map(e=>`<div class="bdg bad" style="margin:0 4px 4px 0">${e}</div>`).join('')}</div>`
        :'<div class="bdg ok" style="margin-top:11px">Clean flight — no safety events</div>'}</div>
  </div>
  <div class="card" style="margin-top:12px"><h3>Career log</h3>
    <div class="ro" style="margin-bottom:11px">
      <span class="k">Total flights</span><span class="v g">${CAREER.flights}</span>
      <span class="k">Block hours</span><span class="v">${CAREER.hours.toFixed(1)}h</span>
      <span class="k">Best score</span><span class="v g">${CAREER.best}</span>
      <span class="k">Average safety</span><span class="v ${CAREER.safety>=85?'ok':'wr'}">${CAREER.safety}%</span>
      <span class="k">Average OTP</span><span class="v ${CAREER.otp>=90?'ok':'wr'}">${CAREER.otp}%</span></div>
    <table class="tbl"><thead><tr><th>Date</th><th>Callsign</th><th>Type</th><th>Sector</th><th>Score</th><th>Grade</th></tr></thead>
    <tbody>${(CAREER.log||[]).map(l=>`<tr><td>${l.d}</td><td>${l.cs}</td><td>${l.type}</td><td>${l.rt}</td>
      <td style="color:var(--gold)">${l.score}</td><td>${l.grade}</td></tr>`).join('')}</tbody></table></div>`;
  let n=0; const iv=setInterval(()=>{ n+=Math.max(1,Math.round(total/28)); if(n>=total){n=total;clearInterval(iv);}
    const e=$('#bigScore'); if(e)e.textContent=n; },28);
  stopFns.push(()=>clearInterval(iv));
  $('#dcB').onclick=showDocs;
  $('#nfB').onclick=()=>{ newFlight(); toast("New rotation. Ops Board ready.","ok"); };
  keys([...globalKeys(), ['n','New flight',()=>$('#nfB').click()]]);
  foot(`Flight complete · score <b>${total}</b> · ${grade}`);
}

    ${ofp}${ls}${tc}<div class="btnrow"><button class="btn" id="prn">🖨 Print / save as PDF</button></div>`);

/* ── boot sequence ── */
(function(){
  const cv=$('#bootCv'), c=cv.getContext('2d');
  let t=0, raf;
  const draw=()=>{ t+=0.03;
    c.clearRect(0,0,300,300);
    const cx=150, cy=150;
    // meridian rings
    c.save(); c.translate(cx,cy); c.rotate(-0.35);
    c.strokeStyle='rgba(240,182,74,.20)'; c.lineWidth=1;
    c.beginPath(); c.ellipse(0,0,86,36,0,0,7); c.stroke();
    c.beginPath(); c.ellipse(0,0,54,80,0,0,7); c.stroke();
    c.restore();
    c.strokeStyle='rgba(240,182,74,.12)'; c.lineWidth=1;
    c.beginPath(); c.arc(cx,cy,96,0,7); c.stroke();
    // sweep
    c.strokeStyle='rgba(240,182,74,.7)'; c.lineWidth=2; c.lineCap='round';
    c.beginPath(); c.arc(cx,cy,96,t*1.4,t*1.4+1.3); c.stroke();
    // orbiting aircraft + trail
    for(let i=7;i>=0;i--){
      const aa=t*1.7-i*0.09;
      const px=cx+Math.cos(aa)*86, py=cy+Math.sin(aa)*62;
      if(i===0){ c.save(); c.translate(px,py); c.rotate(aa+Math.PI/2);
        c.fillStyle='#ffd98a';
        c.beginPath(); c.moveTo(0,-9); c.lineTo(6.5,6); c.lineTo(0,3); c.lineTo(-6.5,6); c.closePath(); c.fill();
        c.restore();
      } else { c.fillStyle='rgba(255,217,138,'+(0.3*(1-i/8))+')';
        c.beginPath(); c.arc(px,py,3*(1-i/10),0,7); c.fill(); }
    }
    const pl=.8+.2*Math.sin(t*2.2);
    c.fillStyle='rgba(240,182,74,'+(0.09*pl)+')';
    c.beginPath(); c.arc(cx,cy,44,0,7); c.fill();
    c.fillStyle='#f0b64a'; c.beginPath(); c.arc(cx,cy,3,0,7); c.fill();
    raf=requestAnimationFrame(draw); };
  draw();
  const steps=[[0,'loading flight kernel'],[18,'reading A320-233 trim sheet'],[40,'verifying index tables'],
    [62,'building CG envelope'],[80,'arming ops board'],[100,'ready']];
  let i=0;
  const iv=setInterval(()=>{
    if(i>=steps.length){ clearInterval(iv);
      setTimeout(()=>{ $('#boot').classList.add('gone'); cancelAnimationFrame(raf); },420);
      return; }
    $('#bootBar').style.width=steps[i][0]+'%';
    $('#bootMsg').textContent=steps[i][1];
    i++;
  },250);
})();

/* pointer-tracked glow on the board cards */
document.addEventListener('pointermove',e=>{
  const card=e.target.closest && e.target.closest('.st');
  if(!card) return;
  const r=card.getBoundingClientRect();
  card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
  card.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
});

</script>
