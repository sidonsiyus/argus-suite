    zoneY:{OA:[.10,.23],OB:[.23,.62],OC:[.62,.90]} }
};
function geo(t){ return GEO[t]||GEO.A320; }

/* Derived metrics, all in FRACTIONS OF LENGTH so a caller can frame the
   aircraft without guessing. finH falls out of the published height —
   that's what keeps the drawing honest.                                  */
function acMetrics(type){
  const g=geo(type), L=g.len;
  const r=g.fusDia/2;                       // fuselage radius, m
  const finH=(g.height-g.gndH-r)/L;         // fin above fuselage crown, as fraction of length
  return {
    g, rF:r/L,                              // fuselage radius / length
    finH,
    up:  r/L + finH,                        // crown-to-fin-tip above centreline
    down:g.gndH/L,                          // centreline to ground
    total:(r/L+finH)+(g.gndH/L)
  };
}
/* Frame helper: given a canvas and a desired length, where does the centreline go? */
function acFit(type,L,pad){ const m=acMetrics(type); pad=pad||0;
  return { yC: pad + L*m.up, h: L*m.total + pad*2, up:L*m.up, down:L*m.down }; }

/* ══════════════════════════════════════════════════════════════
   SIDE VIEW — nose left, drawn in fuselage-radius units.
   ══════════════════════════════════════════════════════════════ */
function drawAcSide(c,type,x0,yC,L,opt){
  opt=opt||{};
  const M=acMetrics(type), g=M.g;
  const h=L*M.rF;                                  // fuselage half-depth, px
  const X=(f)=>x0+L*f;                             // f = fraction of length
  const Y=(u)=>yC+h*u;                             // u = fuselage radii
  const m2u=(m)=>m/(g.fusDia/2);                   // metres → fuselage radii
  const ink=opt.ink||'rgba(246,241,232,.72)';
  const skin=opt.skin||'#2b2437', shade=opt.shade||'#221c2c', dark=opt.dark||'#17131e';
  const groundY = Y(m2u(g.gndH));
  const finTop  = Y(-1) - L*M.finH;

  /* ── WING — behind the fuselage ── */
  c.fillStyle=shade; c.strokeStyle=ink; c.lineWidth=1.1;
  c.beginPath();
  c.moveTo(X(g.wingLE),          Y(0.50));
  c.lineTo(X(g.wingTE),          Y(0.96));
  c.lineTo(X(g.wingTipX),        Y(-g.dih*0.35));
  c.lineTo(X(g.wingTipX-0.050),  Y(-g.dih*0.60));
  c.closePath(); c.fill(); c.stroke();
  if(g.winglet==='sharklet'||g.winglet==='blended'){
    c.strokeStyle='rgba(240,182,74,.75)'; c.lineWidth=2;
    c.beginPath(); c.moveTo(X(g.wingTipX-0.045), Y(-g.dih*0.60));
    c.lineTo(X(g.wingTipX-0.030), Y(-g.dih*0.60-m2u(g.winglet==='blended'?2.4:2.4)));
    c.stroke();
  }

  /* ── HORIZONTAL STABILISER ── */
  c.fillStyle=shade; c.strokeStyle=ink; c.lineWidth=1.1;
  c.beginPath();
  c.moveTo(X(g.stabLE),        Y(-0.45));
  c.lineTo(X(g.stabTE),        Y(-0.28));
  c.lineTo(X(g.stabTE),        Y(-0.52));
  c.lineTo(X(g.stabLE+0.060),  Y(-0.72));
  c.closePath(); c.fill(); c.stroke();

  /* ── VERTICAL FIN ── */
  c.fillStyle=skin; c.strokeStyle=ink; c.lineWidth=1.2;
  c.beginPath();
  c.moveTo(X(g.finLE),    Y(-0.90));
  c.bezierCurveTo(X(g.finLE+0.09), Y(-0.99), X(g.finTipLE-0.03), finTop+L*0.012, X(g.finTipLE), finTop);
  c.lineTo(X(g.finTE),    finTop);
  c.lineTo(X(g.finTE),    Y(-0.52));
  c.closePath(); c.fill(); c.stroke();
  c.fillStyle='rgba(240,182,74,.55)';
  const fh2=(Y(-0.52)-finTop);
  c.beginPath();
  c.moveTo(X(g.finTipLE+0.005), finTop+2);
  c.lineTo(X(g.finTE-0.004),    finTop+2);
  c.lineTo(X(g.finTE-0.004),    finTop+fh2*0.42);
  c.lineTo(X(g.finTipLE-0.055), finTop+fh2*0.42);
  c.closePath(); c.fill();

  /* ── FUSELAGE ── */
  c.fillStyle=skin; c.strokeStyle=ink; c.lineWidth=1.4;
  c.beginPath();
  c.moveTo(X(0.004), Y(0.36));
  c.bezierCurveTo(X(-0.002),Y(-0.28), X(0.028),Y(-0.86), X(0.082),Y(-0.97));
  c.lineTo(X(0.66), Y(-1.0));
  c.bezierCurveTo(X(0.85),Y(-1.0), X(0.945),Y(-0.82), X(0.998),Y(-0.36));
  c.lineTo(X(0.997), Y(-0.20));
  c.bezierCurveTo(X(0.905),Y(0.36), X(0.825),Y(0.82), X(0.730),Y(0.98));
  c.lineTo(X(0.115), Y(1.0));
  c.bezierCurveTo(X(0.042),Y(1.0), X(0.006),Y(0.80), X(0.004),Y(0.36));
  c.closePath(); c.fill(); c.stroke();
  c.strokeStyle='rgba(240,182,74,.32)'; c.lineWidth=Math.max(1,h*0.055);
  c.beginPath(); c.moveTo(X(0.085),Y(0.24)); c.lineTo(X(0.74),Y(0.28)); c.stroke();

  /* ── COCKPIT WINDOWS ── */
  c.fillStyle='rgba(150,205,255,.8)'; c.strokeStyle='rgba(8,7,10,.75)'; c.lineWidth=0.8;
  c.beginPath();
  c.moveTo(X(0.028), Y(-0.48));
  c.lineTo(X(0.050), Y(-0.79));
  c.lineTo(X(0.094), Y(-0.75));
  c.lineTo(X(0.074), Y(-0.44));
  c.closePath(); c.fill(); c.stroke();
  c.beginPath(); c.moveTo(X(0.054),Y(-0.47)); c.lineTo(X(0.068),Y(-0.78)); c.stroke();

  /* ── CABIN WINDOWS ── */
  const wA=0.112, wB=0.735, n=Math.round(g.rows*0.85);
  const wStep=(wB-wA)/n, wR=Math.max(0.9, h*0.085);
  const frac=opt.paxFrac!=null?opt.paxFrac:0;
  for(let i=0;i<n;i++){
    c.fillStyle=(i/n)<frac?'rgba(255,224,155,.95)':'rgba(125,180,238,.40)';
    c.beginPath(); c.arc(X(wA+i*wStep), Y(-0.32), wR, 0, 7); c.fill();
  }

  /* ── DOORS ── */
  const dOpen=opt.doorsOpen||[], dW=Math.max(0.010, m2u(1.0)*h/L*0.9);
  g.doors.forEach((d,i)=>{
    const o=dOpen[i]!==undefined?dOpen[i]:0;
    c.strokeStyle='rgba(246,241,232,.5)'; c.lineWidth=1;
    c.strokeRect(X(d)-L*dW/2, Y(-0.76), L*dW, h*1.34);
    if(o>0.02){
      c.save(); c.translate(X(d)-L*dW/2, Y(-0.76)); c.rotate(-1.05*o);
      c.fillStyle='rgba(240,182,74,.30)'; c.strokeStyle='rgba(240,182,74,.9)'; c.lineWidth=1.2;
      c.fillRect(0,0,L*dW,h*1.34); c.strokeRect(0,0,L*dW,h*1.34);
      c.restore();
    }
  });
  for(let e=0;e<(g.exits||0);e++){
    c.strokeStyle='rgba(246,241,232,.32)'; c.lineWidth=0.9;
    c.strokeRect(X(g.wingLE-0.025+e*0.038), Y(-0.60), L*0.011, h*0.66);
  }

  /* ── ENGINE ── */
  const eR=h*m2u(g.fanD/2)*1.18;                 // nacelle radius (fan + cowl)
  const eY=Y(m2u(g.engCL));
  const eA=X(g.engX), eB=X(g.engX+g.nacL/g.len);   // nacelle length is METRES/metres, not metres/pixels
  // pylon
  c.fillStyle=shade; c.strokeStyle=ink; c.lineWidth=1;
  c.beginPath();
  c.moveTo(eA+(eB-eA)*0.35, eY-eR*0.80);
  c.lineTo(X(g.wingLE+0.030), Y(0.62));
  c.lineTo(X(g.wingLE+0.070), Y(0.74));
  c.lineTo(eA+(eB-eA)*0.80, eY-eR*0.74);
  c.closePath(); c.fill(); c.stroke();
  // nacelle
  const nl=eB-eA;
  c.fillStyle=skin; c.strokeStyle=ink; c.lineWidth=1.3;
  c.beginPath();
  if(g.flatNac){
    c.moveTo(eA+nl*0.02, eY-eR*0.42);
    c.bezierCurveTo(eA-nl*0.06, eY-eR*1.00, eA+nl*0.10, eY-eR*1.06, eA+nl*0.22, eY-eR*1.02);
    c.lineTo(eB-nl*0.10, eY-eR*0.92);
    c.quadraticCurveTo(eB, eY-eR*0.45, eB, eY+eR*0.02);
    c.quadraticCurveTo(eB, eY+eR*0.52, eB-nl*0.10, eY+eR*0.62);
    c.lineTo(eA+nl*0.20, eY+eR*0.70);
    c.bezierCurveTo(eA+nl*0.02, eY+eR*0.70, eA-nl*0.05, eY+eR*0.20, eA+nl*0.02, eY-eR*0.42);
  } else {
    c.moveTo(eA+nl*0.03, eY-eR*0.52);
    c.bezierCurveTo(eA-nl*0.07, eY-eR*1.02, eA+nl*0.08, eY-eR*1.10, eA+nl*0.22, eY-eR*1.03);
    c.lineTo(eB-nl*0.12, eY-eR*0.94);
    c.quadraticCurveTo(eB+nl*0.02, eY-eR*0.48, eB, eY);
    c.quadraticCurveTo(eB+nl*0.02, eY+eR*0.48, eB-nl*0.12, eY+eR*0.94);
    c.lineTo(eA+nl*0.22, eY+eR*1.03);
    c.bezierCurveTo(eA+nl*0.08, eY+eR*1.10, eA-nl*0.07, eY+eR*1.02, eA+nl*0.03, eY+eR*0.52);
    c.quadraticCurveTo(eA-nl*0.02, eY, eA+nl*0.03, eY-eR*0.52);
  }
  c.closePath(); c.fill(); c.stroke();
  // intake
  c.fillStyle=dark; c.strokeStyle='rgba(240,182,74,'+(opt.engRun?.95:.55)+')'; c.lineWidth=1.5;
  c.beginPath(); c.ellipse(eA+nl*0.05, eY, eR*0.17, eR*0.90, 0, 0, 7); c.fill(); c.stroke();
  if(opt.engRun){
    const sp=(opt.t||0)*22;
    c.save(); c.beginPath(); c.ellipse(eA+nl*0.05, eY, eR*0.17, eR*0.90, 0, 0, 7); c.clip();
    c.strokeStyle='rgba(255,224,155,.85)'; c.lineWidth=1.2;
    for(let i=0;i<7;i++){ const th=sp+i*0.897;
      c.beginPath(); c.moveTo(eA+nl*0.05, eY);
      c.lineTo(eA+nl*0.05+Math.cos(th)*eR*0.17, eY+Math.sin(th)*eR*0.88); c.stroke(); }
    c.restore();
    const gx=c.createLinearGradient(eB,0,eB+nl*1.1,0);
    gx.addColorStop(0,'rgba(255,178,62,.42)'); gx.addColorStop(1,'rgba(255,178,62,0)');
    c.fillStyle=gx;
    c.beginPath(); c.moveTo(eB,eY-eR*0.55); c.lineTo(eB+nl*1.2,eY-eR*1.0);
    c.lineTo(eB+nl*1.2,eY+eR*1.0); c.lineTo(eB,eY+eR*0.55); c.closePath(); c.fill();
  }
  c.fillStyle=shade; c.strokeStyle=ink; c.lineWidth=1;
  c.beginPath(); c.moveTo(eB-nl*0.03, eY-eR*0.30); c.lineTo(eB+nl*0.14, eY);
  c.lineTo(eB-nl*0.03, eY+eR*0.30); c.closePath(); c.fill(); c.stroke();

  /* ── LANDING GEAR ── */
  const gearDn=opt.gearDn!==undefined?opt.gearDn:1;
  if(gearDn>0.02){
    const wR2=h*m2u(g.wheelD/2);
    const nwR=wR2*0.80;                        // nose wheels are smaller...
    const wheelY=groundY-wR2;
    const nWheelY=groundY-nwR;                 // ...so they ride on their own radius, not the main's
    c.strokeStyle=ink; c.lineWidth=Math.max(1.5,h*0.10);
    // nose
    const nx=X(g.gearN), nTop=Y(0.90);
    const nY=nTop+(nWheelY-nTop)*gearDn;
    c.beginPath(); c.moveTo(nx,nTop); c.lineTo(nx,nY); c.stroke();
    c.fillStyle=dark; c.lineWidth=1.1;
    [-1,1].forEach(sd=>{ c.beginPath(); c.arc(nx+sd*nwR*0.5, nY, nwR, 0, 7); c.fill(); c.stroke(); });
    // main bogie
    const mx=X(g.gearM), mTop=Y(0.94);
    const mY=mTop+(wheelY-mTop)*gearDn;
    c.strokeStyle=ink; c.lineWidth=Math.max(2,h*0.13);
    c.beginPath(); c.moveTo(mx,mTop); c.lineTo(mx,mY); c.stroke();
    const pairs=Math.max(1,Math.round(g.bogie/2));
    if(pairs>1){ c.lineWidth=Math.max(1.4,h*0.07);
      c.beginPath(); c.moveTo(mx-wR2*1.15*(pairs-1), mY); c.lineTo(mx+wR2*1.15*(pairs-1), mY); c.stroke(); }
    for(let i=0;i<pairs;i++){
      const off=(i-(pairs-1)/2)*wR2*2.30;
      c.fillStyle=dark; c.strokeStyle=ink; c.lineWidth=1.1;
      c.beginPath(); c.arc(mx+off, mY, wR2, 0, 7); c.fill(); c.stroke();
      c.strokeStyle='rgba(164,154,143,.45)';
      c.beginPath(); c.arc(mx+off, mY, wR2*0.40, 0, 7); c.stroke();
    }
  }

  return { nose:X(0), tail:X(1), h, yC, groundY, finTop,
           eA, eB, eY, eR, nl,
           wingLE:X(g.wingLE), wingTE:X(g.wingTE),
           doorX:(i)=>X(g.doors[Math.min(i,g.doors.length-1)]),
           doorTop:Y(-0.76), doorH:h*1.34,
           holdX:X(0.63), holdY:Y(0.28), holdW:L*0.11, holdH:h*0.46,
           fuelX:X(g.wingLE+0.05), fuelY:Y(0.72),
           X, Y, M };
}

/* ══════════════════════════════════════════════════════════════
   TOP VIEW — nose up.
   ══════════════════════════════════════════════════════════════ */
function drawAcTop(c,type,cx,cy,L,opt){
  opt=opt||{};
  const M=acMetrics(type), g=M.g;
  const bw=L*M.rF;
  const span=L*(g.span/g.len);
  const nose=cy-L/2;
  const X=(u)=>cx+u, Y=(f)=>nose+L*f;
  const ink=opt.ink||'rgba(246,241,232,.65)';
  const skin=opt.skin||'#2b2437', shade=opt.shade||'#221c2c';

  c.fillStyle=shade; c.strokeStyle=ink; c.lineWidth=1.1;
  [-1,1].forEach(sd=>{
    c.beginPath();
    c.moveTo(X(sd*bw*0.9), Y(g.wingLE));
    c.lineTo(X(sd*span/2*0.96), Y(g.wingTipX-0.050));
    c.lineTo(X(sd*span/2*0.96), Y(g.wingTipX));
    c.lineTo(X(sd*bw*0.9), Y(g.wingTE));
    c.closePath(); c.fill(); c.stroke();
    if(g.winglet!=='raked'){
      c.strokeStyle='rgba(240,182,74,.85)'; c.lineWidth=2.4;
      c.beginPath();
      c.moveTo(X(sd*span/2*0.96), Y(g.wingTipX-0.046));
      c.lineTo(X(sd*span/2*1.00), Y(g.wingTipX-0.004));
      c.stroke(); c.strokeStyle=ink; c.lineWidth=1.1;
    }
  });
  c.fillStyle=shade; c.strokeStyle=ink;
  [-1,1].forEach(sd=>{
    c.beginPath();
    c.moveTo(X(sd*bw*0.7), Y(g.stabLE));
    c.lineTo(X(sd*span*0.185), Y(g.stabTE-0.028));
    c.lineTo(X(sd*span*0.185), Y(g.stabTE));
    c.lineTo(X(sd*bw*0.6), Y(g.stabTE));
    c.closePath(); c.fill(); c.stroke();
  });
  const eR=bw*(g.fanD/g.fusDia)*1.15, eOff=span*0.255;
  for(let i=0;i<2;i++){
    const sd=i?1:-1, ex=X(sd*eOff);
    const eA=Y(g.engX), eB=Y(g.engX+g.nacL/g.len*1.1);
    c.fillStyle=skin; c.strokeStyle=ink; c.lineWidth=1.1;
    rrect(c, ex-eR, eA, eR*2, eB-eA, eR*0.8); c.fill(); c.stroke();
    c.strokeStyle='rgba(240,182,74,'+(opt.engRun?.9:.45)+')'; c.lineWidth=1.2;
    c.beginPath(); c.arc(ex, eA+eR*0.95, eR*0.60, 0, 7); c.stroke();
    if(opt.engRun){ const t=opt.t||0;
      c.strokeStyle='rgba(240,182,74,'+(0.30+0.35*Math.sin(t*9+i))+')'; c.lineWidth=1.6;
      c.beginPath(); c.arc(ex, eA+eR*0.95, eR*0.60+((t*7)%1)*eR*0.5, 0, 7); c.stroke();
      const gg=c.createLinearGradient(0,eB,0,eB+L*0.09);
      gg.addColorStop(0,'rgba(255,178,62,.30)'); gg.addColorStop(1,'rgba(255,178,62,0)');
      c.fillStyle=gg; c.fillRect(ex-eR*0.9, eB, eR*1.8, L*0.09); }
  }
  c.fillStyle=skin; c.strokeStyle=ink; c.lineWidth=1.4;
  c.beginPath();
  c.moveTo(X(0), Y(0));
  c.bezierCurveTo(X(bw*0.72), Y(0.028), X(bw), Y(0.080), X(bw), Y(0.125));
  c.lineTo(X(bw), Y(0.75));
  c.bezierCurveTo(X(bw*0.92), Y(0.895), X(bw*0.44), Y(0.985), X(bw*0.13), Y(1.0));
  c.lineTo(X(-bw*0.13), Y(1.0));
  c.bezierCurveTo(X(-bw*0.44), Y(0.985), X(-bw*0.92), Y(0.895), X(-bw), Y(0.75));
  c.lineTo(X(-bw), Y(0.125));
  c.bezierCurveTo(X(-bw), Y(0.080), X(-bw*0.72), Y(0.028), X(0), Y(0));
  c.closePath(); c.fill(); c.stroke();
  c.fillStyle='rgba(150,205,255,.55)';
  c.beginPath(); c.ellipse(X(0), Y(0.033), bw*0.50, L*0.019, 0, 0, 7); c.fill();
  c.fillStyle='rgba(240,182,74,.42)'; c.strokeStyle=ink; c.lineWidth=1;
  c.beginPath();
  c.moveTo(X(-bw*0.15), Y(g.finLE)); c.lineTo(X(bw*0.15), Y(g.finLE));
  c.lineTo(X(bw*0.09), Y(g.finTE));  c.lineTo(X(-bw*0.09), Y(g.finTE));
  c.closePath(); c.fill(); c.stroke();

  return { nose, tail:Y(1), bw, span, eOff, eR, X, Y };
}

/* ══════════════════════════════════════════════════════════════
   HANDOFF TO PYRGOS — a completed ODYSSEY flight becomes a real
   strip in the tower sim. Shared via localStorage, so it works
   entirely offline: both apps are same-origin on file:// and on
   the deployed site alike.
   ══════════════════════════════════════════════════════════════ */
const HANDOFF_KEY="argus_flights_v1";
function readHandoffs(){
  try{ const a=JSON.parse(localStorage.getItem(HANDOFF_KEY)); return Array.isArray(a)?a:[]; }
  catch(_){ return []; }
}
function splitCs(cs){
  const c=(cs||"").replace(/\s+/g,"").toUpperCase();
  const m=c.match(/^([A-Z]{2,3})(\d{1,4})$/);
  return m ? {cs:c, pre:m[1], num:m[2]} : {cs:c||"ODY001", pre:c.slice(0,3)||"ODY", num:c.slice(3)||"001"};
}
/* Which PYRGOS tower would actually see this flight? */
const PYRGOS_TOWERS=["VOMM","VIDP","EGLL"];
function handoffTargets(){
  if(!F.route) return [];
  const out=[];
  if(PYRGOS_TOWERS.includes(F.route.from)) out.push({icao:F.route.from,role:"departure"});
  if(PYRGOS_TOWERS.includes(F.route.to))   out.push({icao:F.route.to,  role:"arrival"});
  return out;
}
function pushHandoff(status){
  if(!F.route||!F.callsign) return null;
  const a=FLEET[F.type]||{};
  const id=F.handoffId||(F.handoffId="ODY"+Date.now().toString(36));
  const {cs,pre,num}=splitCs(F.callsign);
  const rec={
    id, ts:Date.now(), status,                      // 'planned' → filed · 'flown' → completed
    cs, pre, num, type:F.type, reg:a.reg||"",
    from:F.route.from, to:F.route.to, alt:F.route.alt,
    rwy:F.rwy||null,                                // departure runway at origin
    arrRwy:F.landRwy||null,                         // landing runway at destination
    sid:F.sid||null, cruiseFL:F.cruiseFL||0,
    tow:F.ls?Math.round(F.ls.tow):null, mac:F.ls?+F.ls.towMac.toFixed(1):null, ths:F.trim||null,
    v1:F.perf?F.perf.v1:null, vr:F.perf?F.perf.vr:null, v2:F.perf?F.perf.v2:null,
    // an arrival strip is useless without a VREF, so derive it if the flight hasn't flown yet
    vref: F.vref || (F.ls && a.mldw
      ? Math.round((a.vrefMLW||(a.v2ref||140)*0.9)
          * Math.sqrt(Math.min(a.mldw, F.ls.tow-(F.fuelCalc?F.fuelCalc.trip:0))/a.mldw))
      : null),
    ldw: F.ls&&F.fuelCalc ? Math.round(F.ls.tow-F.fuelCalc.trip) : null,
    block:F.block?Math.round(F.block):null,
    pax:F.pax||0, score:(status==='flown'&&F.score)?F.score.total:null
  };
  let all=readHandoffs().filter(r=>r.id!==id);
  all.unshift(rec);
  all=all.slice(0,12);                              // keep the last dozen
  try{ localStorage.setItem(HANDOFF_KEY, JSON.stringify(all)); }catch(_){ return null; }
  return rec;
}

/* ══════════════════════════════════════════════════════════════
   ATC LINK — the tower talks back
   PYRGOS writes every clearance it issues to an ODYSSEY flight into
   localStorage. We read it live. The runway the tower assigns, the
   sequence number and the hold are not suggestions: the flight deck
   is made to obey them. `storage` fires cross-tab, so a controller in
   one tab and a pilot in another are flying the same aeroplane.
   ══════════════════════════════════════════════════════════════ */
const ATC_KEY="argus_atc_v1";
function readATC(){
  try{ const a=JSON.parse(localStorage.getItem(ATC_KEY)); return Array.isArray(a)?a:[]; }
  catch(_){ return []; }
}
function myATC(){
  if(!F.handoffId) return null;
  const r=readATC().find(x=>x&&x.id===F.handoffId);
  if(!r) return null;
  // a clearance older than 15 min is stale — the tower has gone home
  if(Date.now()-r.ts > 15*60*1000) return null;
  return r;
}
/* is the tower actually working this flight right now? */
function atcActive(){ const r=myATC(); return !!(r && r.tower); }

/* ══════════════════════════════════════════════════════════════
   METAR — parse the real thing, then fly it
   ══════════════════════════════════════════════════════════════ */
function parseMetar(raw, fallback){
  const R=(raw||"").toUpperCase();
  const out={ raw:R, wdir:0, wspd:0, gust:0, vis:9999, ceil:null, cover:"CLR",
              temp:15, qnh:1013, rain:false, snow:false, ts:false, fog:false };
  if(fallback){ out.wdir=fallback.wdir||0; out.wspd=fallback.wspd||0; out.temp=fallback.temp!=null?fallback.temp:15; }

  const wind=R.match(/\b(\d{3}|VRB)(\d{2,3})(?:G(\d{2,3}))?KT\b/);
  if(wind){ out.wdir = wind[1]==="VRB" ? out.wdir : +wind[1];
            out.wspd = +wind[2]; out.gust = wind[3]?+wind[3]:0; }

  /* visibility — metres (e.g. 4000) or statute miles (e.g. 1 1/2SM). CAVOK/9999 = unlimited */
  if(/\bCAVOK\b/.test(R)) out.vis=9999;
  else {
    const sm=R.match(/\b(?:(\d)\s)?(\d{1,2})\/(\d)SM\b/) || R.match(/\b(\d{1,2})SM\b/);
    const mtr=R.match(/\s(\d{4})\s/);
    if(sm){ const miles = sm.length===4
              ? (+(sm[1]||0) + (+sm[2])/(+sm[3]))
              : +sm[1];
            out.vis=Math.round(miles*1609); }
    else if(mtr) out.vis=+mtr[1];
  }

  /* ceiling — the LOWEST broken or overcast layer, in feet AGL. That is the definition. */
  let ceil=null, cover="CLR";
  const layers=[...R.matchAll(/\b(FEW|SCT|BKN|OVC)(\d{3})\b/g)];
  layers.forEach(m=>{
    const ft=+m[2]*100;
    if((m[1]==="BKN"||m[1]==="OVC") && (ceil===null||ft<ceil)){ ceil=ft; cover=m[1]; }
  });
  if(!layers.length && /\bCAVOK|CLR|SKC|NSC\b/.test(R)) cover="CLR";
  else if(layers.length && ceil===null) cover=layers[layers.length-1][1];
  if(/\bVV(\d{3})\b/.test(R)){ const vv=+R.match(/\bVV(\d{3})\b/)[1]*100;
    if(ceil===null||vv<ceil){ ceil=vv; cover="OVC"; } }
  out.ceil=ceil; out.cover=cover;

  const t=R.match(/\s(M?\d{2})\/(M?\d{2})\s/);
  if(t) out.temp = t[1].startsWith("M") ? -(+t[1].slice(1)) : +t[1];
  const q=R.match(/\bQ(\d{4})\b/); if(q) out.qnh=+q[1];
  const a=R.match(/\bA(\d{4})\b/); if(a) out.qnh=Math.round(+a[1]/100*33.8639);

  out.rain = /(^|\s)(-|\+)?(SH)?RA/.test(R) || /\bDZ\b/.test(R);
  out.snow = /(^|\s)(-|\+)?(SH)?SN/.test(R);
  out.ts   = /\bTS/.test(R);
  out.fog  = /\bFG\b/.test(R) || /\bBR\b/.test(R) || out.vis<2000;
  return out;
}
/* the weather at a field, parsed — falls back to a benign day if we never fetched */
function wxAt(icao){
  const raw = F.wx && F.wx[icao] ? F.wx[icao] : null;
  const p = parseMetar(raw?raw.raw:"", raw);
  p.live = !!(raw && !raw.sim);
  return p;
}
/* wind components on a given runway — the numbers that actually change the numbers */
function windComp(wx, rwyHdgDeg){
  const d=((wx.wdir - rwyHdgDeg)*Math.PI/180);
  return { head: wx.wspd*Math.cos(d), cross: wx.wspd*Math.sin(d),
           gustHead: (wx.gust||wx.wspd)*Math.cos(d) };
}

/* ══════════════════════════════════════════════════════════════
   SYNTHETIC OUTSIDE WORLD — what the crew actually sees
   A pinhole camera at the aeroplane, looking down the runway. Everything
   below is projected through it: the runway, the approach lights, the PAPI.
   The PAPI is not decorative — it is computed from the real angle between
   the aeroplane and each light unit, so it tells you the truth about your
   glidepath, and it will call you high when you are high.
   ══════════════════════════════════════════════════════════════ */
const FT2M=0.3048, M2FT=3.28084;
function makeCam(W,H,pitchDeg,fovDeg){
  const f=(W/2)/Math.tan((fovDeg||60)*Math.PI/360);
  const p=(pitchDeg||0)*Math.PI/180;
  return {W,H,f,cx:W/2,cy:H/2,sp:Math.sin(p),cp:Math.cos(p)};
}
/* world point: X = metres right of centreline, Y = metres above the camera,
   Z = metres ahead of the camera along its own axis. Returns null if behind. */
function proj(cam,X,Y,Z){
  const Zc = Z*cam.cp + Y*cam.sp;
  const Yc = Y*cam.cp - Z*cam.sp;
  if(Zc<3) return null;                    // behind, or through, the eye
  return { x: cam.cx + cam.f*X/Zc, y: cam.cy - cam.f*Yc/Zc, z:Zc };
}
/* rotate the runway frame into the camera frame by the crab angle */
function crabbed(psiRad, X, Z){
  const s=Math.sin(psiRad), c=Math.cos(psiRad);
  return { X: X*c - Z*s, Z: X*s + Z*c };
}
/* how far can we see? exponential extinction — fog eats the far end first */
function fogAlpha(dist, visM){
  if(visM>=9000) return 0;
  return 1-Math.exp(-2.6*dist/Math.max(120,visM));
}
/* PAPI: four units abeam the threshold. Each shows white above its own angle,
   red below. 2 white + 2 red is the 3° slope. This is the real logic. */
const PAPI_ANG=[2.5, 2.833, 3.167, 3.5];
function papiState(aglFt, distM){
  if(distM<60) return [1,1,1,1];
  const ang=Math.atan2(Math.max(0,aglFt)*FT2M, distM)*180/Math.PI;
  return PAPI_ANG.map(a=> ang>=a ? 1 : 0);      // 1 = white, 0 = red
}

/* ---- the view out of the windscreen ---- */
function drawOutside(c, W, H, V){
  /* V: {agl, distM, pitch, crab, hdg, night, wx, rwyLen, rwyW, elev, onGround, rollout, ias} */
  const wx=V.wx, night=V.night;
  const visM = wx.vis;
  const cam = makeCam(W,H, V.pitch, 36);
  const horizonY = cam.cy + cam.f*Math.tan(V.pitch*Math.PI/180);

  /* ── sky: it darkens with height, because it does ── */
  const altKm = Math.max(0, (V.agl+V.elev)*FT2M/1000);
  const deep = Math.min(1, altKm/11);
  const sky=c.createLinearGradient(0,0,0,Math.max(1,horizonY));
  if(night){
    sky.addColorStop(0,"#02050c"); sky.addColorStop(1, deep>.5?"#050a16":"#0b1424");
  }else{
    const topR=Math.round(90-60*deep), topG=Math.round(150-90*deep), topB=Math.round(225-90*deep);
    sky.addColorStop(0,`rgb(${topR},${topG},${topB})`);
    sky.addColorStop(0.75,`rgb(${140-40*deep},${190-50*deep},${235-40*deep})`);
    sky.addColorStop(1, wx.fog?"#b9c4c8":`rgb(${196-30*deep},${222-30*deep},${240-20*deep})`);
  }
  c.fillStyle=sky; c.fillRect(0,0,W,Math.max(0,horizonY));

  /* stars, once it is properly dark and properly high */
  if(night && deep>0.15){
    c.fillStyle="rgba(255,255,255,"+(0.25+0.45*deep)+")";
    for(let i=0;i<70;i++){
      const sx=(i*137.5)%W, sy=((i*79.3)%Math.max(1,horizonY))*0.9;
      c.fillRect(sx, sy, 1.2, 1.2);
    }
  }

  /* ── ground ── */
  const gnd=c.createLinearGradient(0,horizonY,0,H);
  if(night){ gnd.addColorStop(0,"#0a1410"); gnd.addColorStop(1,"#050b09"); }
  else if(wx.snow){ gnd.addColorStop(0,"#c9d6d8"); gnd.addColorStop(1,"#eef3f4"); }
  else { gnd.addColorStop(0,"#546b4a"); gnd.addColorStop(1,"#2c3a28"); }
  c.fillStyle=gnd; c.fillRect(0,Math.max(0,horizonY),W,H-Math.max(0,horizonY));

  /* haze band right on the horizon — the single cheapest thing that sells distance */
  if(horizonY>0&&horizonY<H){
    const hz=c.createLinearGradient(0,horizonY-26,0,horizonY+16);
    const hazeCol = night?"10,22,32" : wx.fog?"186,196,200" : "170,196,214";
    hz.addColorStop(0,`rgba(${hazeCol},0)`);
    hz.addColorStop(0.55,`rgba(${hazeCol},${wx.fog?0.85:0.5})`);
    hz.addColorStop(1,`rgba(${hazeCol},0)`);
    c.fillStyle=hz; c.fillRect(0,horizonY-26,W,42);
  }

  /* ── the aeroplane is IN the cloud: whiteout, and nothing else matters ── */
  const inCloud = wx.ceil!=null && V.agl > wx.ceil-120 && V.agl < wx.ceil+900;
  const aboveCloud = wx.ceil!=null && V.agl >= wx.ceil+900;
  if(aboveCloud){
    /* a cloud deck below us, receding to the horizon */
    const deckY = (()=>{ const p=proj(cam,0,-(V.agl-wx.ceil)*FT2M, 12000); return p?p.y:horizonY+30; })();
    const dg=c.createLinearGradient(0,Math.max(horizonY,deckY-40),0,H);
    dg.addColorStop(0,night?"rgba(30,42,60,.75)":"rgba(255,255,255,.82)");
    dg.addColorStop(1,night?"rgba(16,24,36,.95)":"rgba(226,236,244,.98)");
    c.fillStyle=dg; c.fillRect(0,Math.max(0,Math.min(horizonY,deckY-40)),W,H);
  }

  /* ── the runway, if we can be looking at it ── */
  const showRwy = V.distM < 22000 && V.agl < 6500;
  if(showRwy && !inCloud){
    const L=V.rwyLen, HW=V.rwyW/2;
    const d0=V.distM;                                  // metres to threshold (negative once past it)
    /* the eye is not on the tarmac: it is gndH + a fuselage radius above it, so
       even parked on the runway you look DOWN the centreline, not along it */
    const camY=-(V.agl*FT2M + (V.eyeH||5));            // ground is this far BELOW the camera
    const P=(X,Z)=>{ const r=crabbed(V.crab, X, Z); return proj(cam, r.X, camY, r.Z); };

    /* fogged-out overlay strength for anything at the threshold */
    const fA=fogAlpha(Math.max(0,d0), visM);

    /* --- approach lighting: 900 m of it, the thing you actually see first --- */
    if(d0>-200){
      for(let k=1;k<=18;k++){
        const z=d0-k*50;                                // 50 m spacing, back from the threshold
        if(z< -50) continue;
        const p=P(0,z); if(!p) continue;
        const a=(1-fogAlpha(Math.max(0,z),visM))*(night?1:0.9);
        if(a<=0.02) continue;
        const sz=Math.max(2.0, cam.f/Math.max(60,p.z)*3.0);
        /* the 300 m crossbar — a real ALS has one, and it is how you judge roll */
        const isBar = (k===6);
        c.fillStyle = night?`rgba(255,246,214,${a})`:`rgba(255,255,255,${a*.9})`;
        if(night){ c.shadowColor="rgba(255,235,170,.9)"; c.shadowBlur=6; }
        const nx = isBar?5:3;
        for(let i=0;i<nx;i++){
          const off=(i-(nx-1)/2)*(isBar?4.5:1.9);
          const q=P(off,z); if(!q) continue;
          c.fillRect(q.x-sz/2, q.y-sz/2, sz, sz);
        }
        c.shadowBlur=0;
        /* sequenced flashers — the rabbit, running in toward the threshold */
        if(night && k>6){
          const phase=((V.t||0)*1.6)%1;
          const want=Math.floor((1-phase)*12)+6;
          if(k===want){ const q=P(0,z);
            if(q){ c.fillStyle="rgba(255,255,255,.95)"; c.shadowColor="#fff"; c.shadowBlur=14;
                   c.fillRect(q.x-sz, q.y-sz, sz*2, sz*2); c.shadowBlur=0; } }
        }
      }
    }

    /* --- the runway surface --- */
    const c1=P(-HW,d0), c2=P(HW,d0), c3=P(HW,d0+L), c4=P(-HW,d0+L);
    if(c1&&c2&&c3&&c4){
      c.beginPath(); c.moveTo(c1.x,c1.y); c.lineTo(c2.x,c2.y); c.lineTo(c3.x,c3.y); c.lineTo(c4.x,c4.y); c.closePath();
      const rg=c.createLinearGradient(0,c3.y,0,c1.y);
      if(night){ rg.addColorStop(0,"#0a0d0e"); rg.addColorStop(1,"#181d20"); }
      else if(wx.rain||V.wet){ rg.addColorStop(0,"#22282c"); rg.addColorStop(1,"#3d464c"); }
      else { rg.addColorStop(0,"#252b2e"); rg.addColorStop(1,"#454c51"); }
      c.fillStyle=rg; c.fill();
      /* an edge stroke, because at 1.5 nm the runway is 20 px wide and a fill
         alone simply does not read against terrain */
      c.strokeStyle=night?"rgba(150,170,180,.35)":"rgba(240,248,250,.55)";
      c.lineWidth=1; c.stroke();

      /* threshold bar + piano keys */
      const paint=(alpha)=>night?`rgba(220,230,235,${alpha*.75})`:`rgba(245,250,252,${alpha})`;
      const tb1=P(-HW,d0+2), tb2=P(HW,d0+2), tb3=P(HW,d0+8), tb4=P(-HW,d0+8);
      if(tb1&&tb2&&tb3&&tb4){ c.beginPath(); c.moveTo(tb1.x,tb1.y); c.lineTo(tb2.x,tb2.y);
        c.lineTo(tb3.x,tb3.y); c.lineTo(tb4.x,tb4.y); c.closePath();
        c.fillStyle=paint(1-fA); c.fill(); }
      for(let i=0;i<8;i++){
        const x0=-HW+3+i*(V.rwyW-6)/8, x1=x0+(V.rwyW-6)/8*0.55;
        const k1=P(x0,d0+12), k2=P(x1,d0+12), k3=P(x1,d0+42), k4=P(x0,d0+42);
        if(k1&&k2&&k3&&k4){ c.beginPath(); c.moveTo(k1.x,k1.y); c.lineTo(k2.x,k2.y);
          c.lineTo(k3.x,k3.y); c.lineTo(k4.x,k4.y); c.closePath();
          c.fillStyle=paint((1-fA)*.95); c.fill(); }
      }
      /* centreline: 30 m stripe, 20 m gap — the real dimensions */
      for(let z=d0+60; z<d0+L-30; z+=50){
        const s1=P(-0.45,z), s2=P(0.45,z), s3=P(0.45,z+30), s4=P(-0.45,z+30);
        if(s1&&s2&&s3&&s4){
          const a=(1-fogAlpha(Math.max(0,z),visM));
          if(a<0.03) continue;
          c.beginPath(); c.moveTo(s1.x,s1.y); c.lineTo(s2.x,s2.y); c.lineTo(s3.x,s3.y); c.lineTo(s4.x,s4.y); c.closePath();
          c.fillStyle=paint(a*.9); c.fill();
        }
      }
      /* touchdown zone bars at 300 m, aiming point at 400 m */
      [[300,22],[400,45],[600,22]].forEach(([z,len])=>{
        [-1,1].forEach(sgn=>{
          const bx=sgn*(HW*0.42);
          const t1=P(bx-1.4,d0+z), t2=P(bx+1.4,d0+z), t3=P(bx+1.4,d0+z+len), t4=P(bx-1.4,d0+z+len);
          if(t1&&t2&&t3&&t4){
            const a=(1-fogAlpha(Math.max(0,d0+z),visM));
            if(a<0.03) return;
            c.beginPath(); c.moveTo(t1.x,t1.y); c.lineTo(t2.x,t2.y); c.lineTo(t3.x,t3.y); c.lineTo(t4.x,t4.y); c.closePath();
            c.fillStyle=paint(a*.9); c.fill();
          }
        });
      });
      /* edge lines */
      [-HW+1.2, HW-1.2].forEach(x=>{
        const e1=P(x-0.5,d0), e2=P(x+0.5,d0), e3=P(x+0.5,d0+L), e4=P(x-0.5,d0+L);
        if(e1&&e2&&e3&&e4){ c.beginPath(); c.moveTo(e1.x,e1.y); c.lineTo(e2.x,e2.y);
          c.lineTo(e3.x,e3.y); c.lineTo(e4.x,e4.y); c.closePath();
          c.fillStyle=paint((1-fA)*.55); c.fill(); }
      });
      /* the number, painted on the surface where it belongs */
      const nEnd=P(0,d0+70);
      if(nEnd && V.rwyName && d0>-300 && d0<3000){
        const sc=cam.f/Math.max(80,nEnd.z);
        const fs=Math.max(6, sc*26);
        if(fs>7){
          c.save(); c.translate(nEnd.x,nEnd.y);
          c.font=`bold ${fs}px ui-monospace,monospace`; c.textAlign="center";
          c.fillStyle=paint((1-fA)*.9);
          c.setTransform(1,0,0,0.42,nEnd.x,nEnd.y);      // squash: we are looking along it, not at it
          c.fillText(V.rwyName, 0, 0);
          c.restore();
        }
      }
    }

    /* --- runway lighting --- */
    if(night || wx.fog || visM<6000){
      const glow=(px,py,col,sz,a)=>{ c.fillStyle=col.replace("A",a); c.shadowColor=col.replace("A",Math.min(1,a));
        c.shadowBlur=sz*3.5; c.beginPath(); c.arc(px,py,sz,0,7); c.fill(); c.shadowBlur=0; };
      for(let z=d0; z<=d0+L; z+=60){
        const a=(1-fogAlpha(Math.max(0,z),visM));
        if(a<0.04) continue;
        const sz=Math.max(0.9, cam.f/Math.max(70, z-d0+Math.max(1,d0))*0.9);
        [-HW,HW].forEach(x=>{ const p=P(x,z); if(p) glow(p.x,p.y,"rgba(255,244,214,A)",Math.min(3.4,sz),a*.95); });
      }
      /* green threshold bar, red at the far end */
      for(let i=-4;i<=4;i++){
        const gp=P(i*HW/4.4, d0+1);
        if(gp){ const a=1-fA; if(a>0.04) glow(gp.x,gp.y,"rgba(60,255,150,A)",2.6,a); }
        const rp=P(i*HW/4.4, d0+L-1);
        if(rp){ const a=1-fogAlpha(Math.max(0,d0+L),visM); if(a>0.04) glow(rp.x,rp.y,"rgba(255,70,70,A)",2.2,a); }
      }
      /* centreline lights */
      for(let z=d0+30; z<d0+L; z+=60){
        const p=P(0,z); if(!p) continue;
        const a=(1-fogAlpha(Math.max(0,z),visM)); if(a<0.05) continue;
        glow(p.x,p.y,"rgba(255,255,255,A)",1.7,a*.9);
      }
    }

    /* --- PAPI: computed, not decorated --- */
    if(d0>50 && d0<9000 && V.agl>10){
      const st=papiState(V.agl, d0);
      const px0=-(HW+16);                              // left of the threshold, where it lives
      for(let i=0;i<4;i++){
        const p=P(px0-i*4.2, d0+3); if(!p) continue;
        const a=(1-fA)*0.95; if(a<0.05) continue;
        const white=st[i]===1;
        const col=white?"rgba(255,255,255,A)":"rgba(255,58,58,A)";
        const sz=Math.max(1.8, cam.f/Math.max(90,p.z)*2.2);
        c.fillStyle=col.replace("A",a);
        c.shadowColor=col.replace("A",a); c.shadowBlur=sz*4;
        c.beginPath(); c.arc(p.x,p.y,sz,0,7); c.fill(); c.shadowBlur=0;
      }
    }
  }

  /* ── in cloud: you see nothing, and that is the lesson ── */
  if(inCloud){
    const c0=night?"rgba(40,52,68,":"rgba(232,238,242,";
    c.fillStyle=c0+"0.94)"; c.fillRect(0,0,W,H);
    for(let i=0;i<28;i++){
      const t=(V.t||0)*0.4+i;
      const sx=(i*97+ (t*40)%W)%W, sy=(i*61)%H;
      c.fillStyle=c0+(0.05+0.05*Math.sin(t))+")";
      c.beginPath(); c.arc(sx,sy,40+18*Math.sin(i*2.1),0,7); c.fill();
    }
  }
  /* ── fog everywhere else ── */
  else if(visM<6000){
    const f=Math.min(0.9, 1-visM/6000);
    c.fillStyle=night?`rgba(30,40,50,${f*.7})`:`rgba(206,214,218,${f*.85})`;
    c.fillRect(0,0,W,H);
  }
  /* rain on the glass */
  if(wx.rain && !inCloud){
    c.strokeStyle=night?"rgba(180,205,230,.30)":"rgba(230,240,250,.35)"; c.lineWidth=1.1;
    const t=(V.t||0);
    for(let i=0;i<60;i++){
      const rx=((i*167 + t*420)%(W+80))-40, ry=((i*89 + t*760)%(H+60))-30;
      c.beginPath(); c.moveTo(rx,ry); c.lineTo(rx-5, ry+16); c.stroke();
    }
  }

  /* ── the windscreen we are looking through ── */
  c.save();
  const post=night?"rgba(6,10,14,.95)":"rgba(20,26,30,.92)";
  c.fillStyle=post;
  c.beginPath();                                       // top coaming
  c.moveTo(0,0); c.lineTo(W,0); c.lineTo(W,H*0.055);
  c.quadraticCurveTo(W/2,H*0.135, 0,H*0.055); c.closePath(); c.fill();
  c.fillRect(0,H-H*0.10,W,H*0.10);                     // glareshield
  c.fillRect(0,0,W*0.030,H); c.fillRect(W-W*0.030,0,W*0.030,H);
  /* The window post does NOT cross the eye line. The captain sits left of the
     aircraft centreline and looks down the runway through clear glass; the post
     is outboard of that. Putting it on the optical axis would hide the very
     thing the view exists to show. */
  c.fillStyle=night?"rgba(10,16,20,.9)":"rgba(28,36,42,.88)";
  c.fillRect(W*0.735,0,W*0.019,H-H*0.10);
  c.restore();

  /* the flight-path marker: where the aeroplane is ACTUALLY going, not where it points.
     With a crosswind these are not the same thing, and that is the whole point. */
  const fpm=proj(cam, 0, 0, 1000);
  if(fpm && !inCloud){
    const fx=cam.cx + cam.f*Math.tan(V.crab)*0 + (cam.cx - proj(cam,0,0,1000).x)*0;
    const gx=cam.cx + cam.f*Math.sin(V.crab);          // drift shows as lateral offset
    const gy=cam.cy + cam.f*Math.tan((V.pitch - (V.fpa||0))*Math.PI/180);
    c.strokeStyle="rgba(60,255,170,.85)"; c.lineWidth=1.4;
    c.beginPath(); c.arc(gx,gy,5,0,7); c.stroke();
    c.beginPath(); c.moveTo(gx-14,gy); c.lineTo(gx-5,gy);
    c.moveTo(gx+5,gy); c.lineTo(gx+14,gy);
    c.moveTo(gx,gy-5); c.lineTo(gx,gy-11); c.stroke();
  }
  /* boresight — where the nose points. Kept small and open in the middle: this
     symbol must never cover the runway it exists to help you find. */
  c.strokeStyle="rgba(255,220,90,.75)"; c.lineWidth=1.4;
  c.beginPath(); c.moveTo(cam.cx-26,cam.cy); c.lineTo(cam.cx-14,cam.cy);
  c.moveTo(cam.cx+14,cam.cy); c.lineTo(cam.cx+26,cam.cy); c.stroke();
}

/* ══════════════════════════════════════════════════════════════
   LABEL PLACER — prevents the text collisions on every canvas
   ══════════════════════════════════════════════════════════════ */
function Labels(c){
  const used=[];
  const hit=(r)=>used.some(u=>!(r.x2<u.x1||r.x1>u.x2||r.y2<u.y1||r.y1>u.y2));
  return {
    /* try candidate offsets until one doesn't collide; skip if none fit */
    put(txt,x,y,{font='8px ui-monospace',col='#a49a8f',align='left',cands=[[0,0]],pad=2,must=false}={}){
      c.font=font;
      const w=c.measureText(txt).width, h=parseInt(font)||8;
      for(const [dx,dy] of cands){
        let px=x+dx, py=y+dy;
        let x1=align==='right'?px-w:align==='center'?px-w/2:px;
        const r={x1:x1-pad,y1:py-h-pad,x2:x1+w+pad,y2:py+pad};
        if(!hit(r)||must){ used.push(r); c.fillStyle=col; c.textAlign=align;
          c.fillText(txt,px,py); c.textAlign='left'; return true; }
      }
      return false;
    },
    block(x1,y1,x2,y2){ used.push({x1,y1,x2,y2}); },
    reset(){ used.length=0; }
  };
}

/* ══════════════════════════════════════════════════════════════
   THE CG CHART  (index × weight, %MAC diagonals) — no overlaps
   ══════════════════════════════════════════════════════════════ */
function drawTrimChart(sel,liveSel,a,opts){
  opts=opts||{};
  const cv=$(sel); if(!cv) return;
  let t=0;
  const H0=opts.h||450;
  /* two palettes: the dark console, and the printed sheet */
  const PAL=opts.paper?{grid:'#ddd7c7',ax:'#4a4437',fan:'#a49c88',fanMaj:'#6d6656',lab:'#14120d',
      env:'#1a7a3c',envFill:'rgba(26,122,60,.08)',envFill2:'rgba(26,122,60,.03)',
      mtow:'#b3202e',mlw:'#c8971f',mzfw:'#0d2f6b',perf:'#c8971f',zfw:'#0d2f6b',
      ok:'#1a7a3c',bad:'#b3202e',ring:'#fffdf7',hdr:'#4a4437'}
    :{grid:'rgba(58,50,71,.45)',ax:'rgba(106,99,119,.9)',fan:'rgba(164,154,143,.13)',fanMaj:'rgba(164,154,143,.30)',
      lab:'rgba(164,154,143,.75)',env:'rgba(62,224,143,.65)',envFill:'rgba(62,224,143,.11)',envFill2:'rgba(62,224,143,.03)',
      mtow:'rgba(255,84,112,.8)',mlw:'rgba(255,178,62,.7)',mzfw:'rgba(107,183,255,.7)',perf:'rgba(255,178,62,.85)',
      zfw:'#6bb7ff',ok:'#f0b64a',bad:'#ff5470',ring:'#08070a',hdr:'rgba(106,99,119,.85)'};
  anim(()=>{
    const {c,W,H}=fit(cv,H0); if(!W) return;
    t+=0.03;
    c.clearRect(0,0,W,H);
    if(opts.paper){ c.fillStyle='#fffdf7'; c.fillRect(0,0,W,H); }
    const L=Labels(c);
    /* generous margins: a dedicated %MAC band on top, index band below,
       and a right gutter reserved for the weight-limit labels            */
    const padL=46,padR=74,padT=34,padB=36;
    const wLo=Math.min(...a.env.map(p=>p[1]))-3, wHi=Math.max(...a.env.map(p=>p[1]))+3;
    let iLo=1e9,iHi=-1e9;
    a.env.forEach(([m,wt])=>{ const ix=OPS.idxAt(m,wt*1000,a); iLo=Math.min(iLo,ix); iHi=Math.max(iHi,ix); });
    iLo-=8; iHi+=8;
    const X=(i)=>padL+(i-iLo)/(iHi-iLo)*(W-padL-padR);
    const Y=(w)=>H-padB-(w-wLo)/(wHi-wLo)*(H-padT-padB);
    /* plot frame — everything outside is label territory */
    L.block(0,0,W,padT-12); L.block(0,H-padB+14,W,H); L.block(0,0,padL-4,H); L.block(W-padR+4,0,W,H);

    // grid
    c.strokeStyle=PAL.grid; c.lineWidth=1;
    const iStep=10;
    for(let i=Math.ceil(iLo/iStep)*iStep;i<=iHi;i+=iStep){ const px=X(i);
      if(px<padL||px>W-padR)continue;
      c.beginPath(); c.moveTo(px,padT); c.lineTo(px,H-padB); c.stroke();
      c.font='8px ui-monospace'; c.fillStyle=PAL.ax; c.textAlign='center';
      c.fillText(i,px,H-padB+14); c.textAlign='left'; }
    for(let w=Math.ceil(wLo/10)*10;w<=wHi;w+=10){ const py=Y(w);
      c.beginPath(); c.moveTo(padL,py); c.lineTo(W-padR,py); c.stroke();
      c.font='8px ui-monospace'; c.fillStyle=PAL.ax; c.textAlign='right';
      c.fillText(w,padL-7,py+3); c.textAlign='left'; }
    c.fillStyle=PAL.hdr; c.font='8px ui-monospace'; c.textAlign='center';
    c.fillText('INDEX',(padL+W-padR)/2,H-8); c.textAlign='left';
    c.save(); c.translate(12,(padT+H-padB)/2+30); c.rotate(-Math.PI/2);
    c.fillText('WEIGHT  kg × 1000',0,0); c.restore();

    // %MAC diagonal fan — labels live in the reserved top band
    for(let m=16;m<=40;m+=2){
      const x0=X(OPS.idxAt(m,wLo*1000,a)), y0=Y(wLo);
      const x1=X(OPS.idxAt(m,wHi*1000,a)), y1=Y(wHi);
      const maj=(m%4===0);
      c.strokeStyle=maj?PAL.fanMaj:PAL.fan;
      c.lineWidth=maj?1:.8;
      c.save(); c.beginPath(); c.rect(padL,padT,W-padL-padR,H-padT-padB); c.clip();
      c.beginPath(); c.moveTo(x0,y0); c.lineTo(x1,y1); c.stroke(); c.restore();
      if(maj && x1>padL+8 && x1<W-padR-8){
        c.font='8px ui-monospace'; c.fillStyle=PAL.lab; c.textAlign='center';
        c.fillText(m+'%',x1,padT-8); c.textAlign='left';
      }
    }
    c.fillStyle=PAL.lab; c.font='7px ui-monospace';
    c.fillText('%MAC',padL-2,padT-19);

    // envelope
    c.beginPath();
    a.env.forEach(([m,wt],i)=>{ const px=X(OPS.idxAt(m,wt*1000,a)), py=Y(wt); i?c.lineTo(px,py):c.moveTo(px,py); });
    c.closePath();
    const g=c.createLinearGradient(0,padT,0,H-padB);
    g.addColorStop(0,PAL.envFill); g.addColorStop(1,PAL.envFill2);
    c.fillStyle=g; c.fill();
    c.strokeStyle=PAL.env; c.lineWidth=1.7; c.stroke();

    // weight limits — labels in the RIGHT gutter, stacked, never on the plot
    const lims=[[a.mtow,'MTOW',PAL.mtow],[a.mldw,'MLW',PAL.mlw],[a.mzfw,'MZFW',PAL.mzfw]];
    lims.forEach(([w,lab,col])=>{ const py=Y(w/1000); if(py<padT||py>H-padB) return;
      c.strokeStyle=col; c.setLineDash([5,4]); c.lineWidth=1;
      c.beginPath(); c.moveTo(padL,py); c.lineTo(W-padR,py); c.stroke(); c.setLineDash([]);
      c.font='7.5px ui-monospace'; c.fillStyle=col; c.textAlign='left';
      c.fillText(lab,W-padR+5,py-1);
      c.fillStyle=PAL.ax; c.font='7px ui-monospace';
      c.fillText(fmt(w/1000)+'t',W-padR+5,py+8); });

    // fwd perf-correction line — only if this aircraft's sheet carries the caution
    if(a.fwdPerf!=null){
    const px0=X(OPS.idxAt(a.fwdPerf,wLo*1000,a)), py0=Y(wLo);
    const px1=X(OPS.idxAt(a.fwdPerf,wHi*1000,a)), py1=Y(wHi);
    c.save(); c.beginPath(); c.rect(padL,padT,W-padL-padR,H-padT-padB); c.clip();
    c.strokeStyle=PAL.perf; c.setLineDash([2,3]); c.lineWidth=1.3;
    c.beginPath(); c.moveTo(px0,py0); c.lineTo(px1,py1); c.stroke(); c.setLineDash([]);
    c.restore();
    L.put(a.fwdPerf+'% PERF',px0,H-padB-6,{font:'7px ui-monospace',col:PAL.perf,
      align:'center',cands:[[0,0],[0,-11],[16,0]]});
    }

    if(!F.ls) return;
    // ZFW → TOW vector
    const zx=X(F.ls.zfwIdx), zy=Y(F.ls.zfw/1000);
    const tx=X(F.ls.towIdx), ty=Y(F.ls.tow/1000);
    c.strokeStyle='rgba(240,182,74,.55)'; c.setLineDash([3,3]); c.lineWidth=1.3;
    c.beginPath(); c.moveTo(zx,zy); c.lineTo(tx,ty); c.stroke(); c.setLineDash([]);
    // arrowhead
    const ang=Math.atan2(ty-zy,tx-zx);
    c.fillStyle='rgba(240,182,74,.7)';
    c.save(); c.translate((zx+tx)/2,(zy+ty)/2); c.rotate(ang);
    c.beginPath(); c.moveTo(5,0); c.lineTo(-3,3); c.lineTo(-3,-3); c.closePath(); c.fill(); c.restore();

    c.fillStyle=PAL.zfw; c.fillRect(zx-3.5,zy-3.5,7,7);
    L.put('ZFW '+F.ls.zfwMac.toFixed(1)+'%',zx,zy,{font:'8px ui-monospace',col:PAL.zfw,
      cands:[[9,4],[9,-7],[-9,4],[-9,-7],[0,15]],align:'left'});

    const ok=F.lsOk, col=ok?PAL.ok:PAL.bad;
    const r0=6+Math.sin(t*2.4)*1.3;
    c.fillStyle=col; c.globalAlpha=.16; c.beginPath(); c.arc(tx,ty,r0+12,0,7); c.fill(); c.globalAlpha=1;
    c.beginPath(); c.arc(tx,ty,r0,0,7); c.fill();
    c.strokeStyle=PAL.ring; c.lineWidth=1.6; c.stroke();
    L.put('TOW '+F.ls.towMac.toFixed(1)+'%',tx,ty,{font:'bold 9px ui-monospace',col,
      cands:[[12,-8],[12,6],[-12,-8],[-12,6],[0,-16],[0,20]],align:'left',must:true});

    if(!ok){
      c.fillStyle=opts.paper?'rgba(179,32,46,.10)':'rgba(255,84,112,.14)'; c.fillRect(padL,padT,W-padL-padR,18);
      c.fillStyle=PAL.bad; c.font='bold 9px ui-monospace'; c.textAlign='center';
      c.fillText('⚠  OUT OF ENVELOPE — LOADSHEET WOULD BE REJECTED',(padL+W-padR)/2,padT+13);
      c.textAlign='left';
    }
    const lv=liveSel?$(liveSel):null;
    if(lv){ lv.textContent=ok?'IN LIMITS':'OUT OF LIMITS'; lv.style.color=ok?'var(--gold)':'var(--red)'; }
  });
}

/* ══ pitch trim scale ══ */
function drawThsScale(sel,a,paper){
  const cv=$(sel); if(!cv) return;
  const P=paper?{ln:'#6d6656',tk:'#4a4437',lab:'#14120d',up:'#1a7a3c',dn:'#0d2f6b',pt:'#c8971f',ptx:'#14120d'}
    :{ln:'rgba(164,154,143,.5)',tk:'rgba(164,154,143,.7)',lab:'rgba(106,99,119,.95)',
      up:'rgba(62,224,143,.7)',dn:'rgba(107,183,255,.7)',pt:'#f0b64a',ptx:'#ffd98a'};
  anim(()=>{
    const {c,W,H}=fit(cv,paper?72:104); if(!W) return;
    c.clearRect(0,0,W,H);
    if(paper){ c.fillStyle='#fffdf7'; c.fillRect(0,0,W,H); }
    const padL=30,padR=30,y=H*.46,m0=10,m1=42;
    const X=(m)=>padL+(m-m0)/(m1-m0)*(W-padL-padR);
    c.strokeStyle=P.ln; c.lineWidth=1.4;
    c.beginPath(); c.moveTo(padL,y); c.lineTo(W-padR,y); c.stroke();
    for(let m=m0;m<=m1;m+=2){ const px=X(m), maj=m%4===0;
      c.strokeStyle=maj?P.tk:P.ln;
      c.beginPath(); c.moveTo(px,y); c.lineTo(px,y-(maj?7:4)); c.stroke();
      if(maj){ c.fillStyle=P.lab; c.font='8px ui-monospace'; c.textAlign='center';
        c.fillText(m,px,y-11); } }
    c.textAlign='left';
    c.fillStyle=P.lab; c.font='7.5px ui-monospace';
    c.fillText('%MAC',4,y-11);
    c.fillText('THS',4,y+15);
    for(let m=12;m<=40;m+=4){ const px=X(m);
      c.fillStyle=P.tk; c.font='8px ui-monospace'; c.textAlign='center';
      c.fillText(OPS.trim(m,a).toFixed(1),px,y+15); }
    c.fillStyle=P.up; c.font='7px ui-monospace'; c.textAlign='center';
    c.fillText('NOSE UP',X(16),y+29);
    if(!a.thsAllUp){ c.fillStyle=P.dn; c.fillText('NOSE DOWN',X(38),y+29); }
    else { c.fillStyle=P.up; c.fillText('NOSE UP',X(38),y+29); }
    c.textAlign='left';
    if(F.ls){ const m=clamp(F.ls.towMac,m0,m1), px=X(m);
      c.fillStyle=P.pt;
      c.beginPath(); c.moveTo(px,y-2); c.lineTo(px-5,y-11); c.lineTo(px+5,y-11); c.closePath(); c.fill();
      c.globalAlpha=.22; c.beginPath(); c.arc(px,y,10,0,7); c.fill(); c.globalAlpha=1;
      c.fillStyle=P.ptx; c.font='bold 10px ui-monospace'; c.textAlign='center';
      c.fillText('THS '+F.trim.toFixed(1)+(a.thsAllUp?' UP':(F.trim>=0?' UP':' DN')),clamp(px,54,W-54),H-5); c.textAlign='left'; }
  });
}

function zoneDiagramHTML(){ return `<div class="pBox"><h5>Index Correction Zones</h5>
  <div class="in" style="padding:4px"><canvas id="zoneCv" class="pCv" height="120"></canvas></div></div>`; }
function drawZoneDiagram(a){
  const cv=$('#zoneCv'); if(!cv) return;
  let t=0;
  anim(()=>{
    const {c,W,H}=fit(cv,120); if(!W) return; t+=0.02;
    c.clearRect(0,0,W,H);
    c.fillStyle='#fffdf7'; c.fillRect(0,0,W,H);
    const x0=W*0.10, x1=W*0.95, cy=H*0.46, bh=H*0.30;
    // fuselage outline (top-down, nose left)
    c.strokeStyle='#14120d'; c.lineWidth=1.1; c.fillStyle='#fff';
    c.beginPath();
    c.moveTo(x0,cy);
    c.quadraticCurveTo(x0+W*.03,cy-bh/2, x0+W*.10,cy-bh/2);
    c.lineTo(x1-W*.06,cy-bh/2);
    c.quadraticCurveTo(x1,cy-bh/2, x1,cy);
    c.quadraticCurveTo(x1,cy+bh/2, x1-W*.06,cy+bh/2);
    c.lineTo(x0+W*.10,cy+bh/2);
    c.quadraticCurveTo(x0+W*.03,cy+bh/2, x0,cy);
    c.closePath(); c.setLineDash([3,2]); c.stroke(); c.setLineDash([]);
    // cabin zone spans
    const Z=[['OA',.13,.26,a.zones.OA],['OB',.26,.66,a.zones.OB],['OC',.66,.92,a.zones.OC]];
    Z.forEach(([k,f0,f1,zn])=>{
      const zx0=x0+(x1-x0)*f0, zx1=x0+(x1-x0)*f1;
      const frac=clamp((F.pax[k]||0)/zn.seats,0,1);
      // seat blocks (two rows, like the sheet's yellow seats)
      const n=Math.max(2,Math.round((zx1-zx0)/9));
      for(let i=0;i<n;i++){
        const sx=zx0+i*((zx1-zx0)/n)+1;
        const on=(i/n)<frac;
        [-1,1].forEach(r=>{
          c.fillStyle=on?'#f5d33a':'#efeadb';
          c.strokeStyle='#9b9484'; c.lineWidth=.5;
          c.fillRect(sx,cy+r*bh*0.16-4,(zx1-zx0)/n-2,8);
          c.strokeRect(sx,cy+r*bh*0.16-4,(zx1-zx0)/n-2,8);
        });
      }
      // bracket + label above
      c.strokeStyle='#14120d'; c.lineWidth=.9;
      c.beginPath(); c.moveTo(zx0,cy-bh/2-8); c.lineTo(zx0,cy-bh/2-13);
      c.lineTo(zx1,cy-bh/2-13); c.lineTo(zx1,cy-bh/2-8); c.stroke();
      c.fillStyle='#14120d'; c.font='bold 8px Arial'; c.textAlign='center';
      c.fillText(k,(zx0+zx1)/2,cy-bh/2-16);
      c.font='7px Arial'; c.fillStyle='#4a4437';
      c.fillText('('+zn.seats+' PAX) ROW '+zn.rows,(zx0+zx1)/2,cy-bh/2-25.5);
      c.fillStyle=(F.pax[k]||0)?'#0d2f6b':'#9b9484'; c.font='bold 8px Arial';
      c.fillText((F.pax[k]||0)+' pax',(zx0+zx1)/2,cy-bh/2-33);
      c.textAlign='left';
    });
    // cargo compartments below
    const Cg=[['CPT1',.16,.36],['CPT3',.58,.70],['CPT4',.70,.82],['CPT5',.82,.92]];
    Cg.forEach(([k,f0,f1])=>{
      const zx0=x0+(x1-x0)*f0, zx1=x0+(x1-x0)*f1, y=cy+bh/2+6;
      const frac=clamp((F.holds[k]||0)/a.holds[k].max,0,1);
      c.strokeStyle='#14120d'; c.lineWidth=.9;
      c.strokeRect(zx0,y,zx1-zx0,15);
      c.fillStyle='rgba(13,47,107,.16)'; c.fillRect(zx0+1,y+1,(zx1-zx0-2)*frac,13);
      c.fillStyle='#14120d'; c.font='bold 7.5px Arial'; c.textAlign='center';
      c.fillText(k.replace('CPT',''),(zx0+zx1)/2,y+10);
      c.font='6.5px Arial'; c.fillStyle='#4a4437';
      c.fillText('('+fmt(a.holds[k].max)+'kg)',(zx0+zx1)/2,y+24);
      if(F.holds[k]){ c.fillStyle='#0d2f6b'; c.font='bold 7px Arial';
        c.fillText(fmt(F.holds[k]),(zx0+zx1)/2,y+32); }
      c.textAlign='left';
    });
    c.fillStyle='#4a4437'; c.font='7px Arial';
    c.fillText('PAX',4,cy-4); c.fillText('CARGO',4,cy+bh/2+16);
    // live CG tick travelling along the fuselage
    if(F.ls){
      const hArm=a.LEMAC+F.ls.towMac/100*a.MAC;
      const fx=x0+(x1-x0)*clamp((hArm-4)/34,0,1);
      c.strokeStyle=F.lsOk?'#1a7a3c':'#b3202e'; c.lineWidth=1.6;
      c.beginPath(); c.moveTo(fx,cy-bh/2-4); c.lineTo(fx,cy+bh/2+4); c.stroke();
      const pr=3+Math.sin(t*3)*.8;
      c.fillStyle=F.lsOk?'#1a7a3c':'#b3202e';
      c.beginPath(); c.arc(fx,cy,pr+2,0,7); c.fill();
      c.font='bold 7px Arial'; c.textAlign='center';
      c.fillText('CG',fx,cy+bh/2+2+13);
      c.textAlign='left';
    }
  });
}
function lookupTablesHTML(a){
  const col=(k,unit,hdr)=>{ const T=a.printed[k];
    const cur=['OA','OB','OC'].includes(k)?(F.pax[k]||0):(F.holds[k]||0);
    let hiIdx=-1; T.forEach(([q],i)=>{ if(cur>=q) hiIdx=i; });
    return `<div><div style="font-family:Arial;font-size:7.5px;font-weight:700;margin-bottom:2px">${hdr}</div>
      <div class="lookWrap"><table class="lookT"><thead><tr><th>${unit}</th><th>idx</th></tr></thead><tbody>
      ${T.map(([q,i],n)=>`<tr class="${n===hiIdx?'hi':''}"><td>${fmt(q)}</td><td>${i>0?'+':''}${i}</td></tr>`).join('')}
      </tbody></table></div></div>`; };
  return `<div class="pBox"><h5>Load in Lower Compartment &amp; Passengers — printed index correction</h5>
    <div class="in"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">
      ${col('CPT1','kg','Cargo 1')}${col('CPT3','kg','Cargo 3')}${col('CPT4','kg','Cargo 4')}${col('CPT5','kg','Cargo 5')}
      ${col('OA','pax','Cabin OA')}${col('OB','pax','Cabin OB')}${col('OC','pax','Cabin OC')}
    </div><div class="pHint">The highlighted row is the one you'd read for the load currently on board.</div></div></div>`;
}
function lmcTableHTML(a){
  return `<div class="pBox"><h5>LMC Index Table</h5><div class="in">
    <table class="pT"><thead><tr><th colspan="3">PAX LMC — index impact per +1 pax</th></tr>
      <tr><th>Zone</th><th>Index change</th><th>Applied</th></tr></thead><tbody>
      ${Object.keys(a.lmcPax).map(z=>`<tr><td class="lab">${z}</td><td>${a.lmcPax[z]>0?'+':''}${a.lmcPax[z]}</td>
        <td class="${(F.pax[z]||0)?'pos':''}">${((F.pax[z]||0)*a.lmcPax[z]).toFixed(2)}</td></tr>`).join('')}
    </tbody></table>
    <table class="pT" style="margin-top:5px"><thead><tr><th colspan="3">CARGO LMC — index impact per +100 kg</th></tr>
      <tr><th>Zone</th><th>Index change</th><th>Applied</th></tr></thead><tbody>
      ${Object.keys(a.lmcCgo).map(k=>`<tr><td class="lab">${k}</td><td>${a.lmcCgo[k]>0?'+':''}${a.lmcCgo[k]}</td>

}

function sheetMode(el,a){
  const LI=loadInputs(a,()=>fill());
  const inner=`
    <div class="pGrid" style="grid-template-columns:1fr 1fr;margin-bottom:9px">
      ${zoneDiagramHTML()}
      <div class="pBox"><h5>Index Calculation Table</h5><div class="in">
