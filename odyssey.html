<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODYSSEY · Flight Operations</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2308070a'/%3E%3Cpath d='M3 18 29 11' stroke='%23f0b64a' stroke-width='2.4' stroke-linecap='round'/%3E%3Cpath d='M9 16 5.5 11l2.6-.7 4.4 3.4' stroke='%23f0b64a' stroke-width='1.8' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M13.5 25.5 11 21' stroke='%23f0b64a' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M5 27h9' stroke='%23f0b64a' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  /* dark UI: stops the browser painting a white canvas, white scrollbar,
     or a white overscroll/rubber-band area when the OS is in light mode */
  :root{ color-scheme: dark; }
  html{ background:#08070a; }
  html,body{ overscroll-behavior:none; background-color:#08070a; }

  :root{
    --bg:#08070a; --bg2:#0c0b0f; --panel:#121016; --panel2:#191620; --panel3:#221d2b;
    --line:#272232; --line2:#3a3247; --line3:#4d4260;
    --ink:#f6f1e8; --muted:#a49a8f; --faint:#6a6377;
    --gold:#f0b64a; --gold2:#ffd98a; --gold3:#c98f2c; --goldGlow:rgba(240,182,74,.5);
    --green:#3ee08f; --red:#ff5470; --amber:#ffb23e; --blue:#6bb7ff; --violet:#a78bfa; --cyan:#22d3ee;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:rgba(240,182,74,.28)}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:7px}
  ::-webkit-scrollbar-track{background:transparent}

  #bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}

  .top{position:fixed;top:0;left:0;right:0;height:60px;z-index:40;display:flex;align-items:center;gap:14px;
    padding:0 18px;background:linear-gradient(180deg,rgba(12,11,15,.96),rgba(8,7,10,.82));
    border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
  .logo{display:flex;align-items:center;gap:11px;flex:none;cursor:pointer}
  .logo .mk{width:38px;height:38px;flex:none}
  .logo .mk canvas{width:100%;height:100%;display:block}
  .logo .tx b{display:block;font-size:15px;font-weight:800;letter-spacing:.26em;line-height:1;
    background:linear-gradient(90deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo .tx small{display:block;font-family:var(--mono);font-size:7px;letter-spacing:.22em;color:var(--faint);margin-top:3px}

  .hud{display:flex;gap:7px;flex:1;justify-content:center;overflow:hidden}
  .chip{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:80px;padding:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    transition:border-color .3s}
  .chip .v{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--gold);line-height:1;white-space:nowrap}
  .chip .l{font-family:var(--mono);font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin-top:4px}
  .chip.bad{border-color:rgba(255,84,112,.5)} .chip.bad .v{color:var(--red)}
  .chip.ok .v{color:var(--green)}
  .chip.pop{animation:chipPop .5s cubic-bezier(.2,.9,.3,1)}
  @keyframes chipPop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}

  .tools{display:flex;gap:6px;flex:none}
  .tbtn{width:36px;height:36px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);display:grid;place-items:center;transition:.2s}
  .tbtn:hover{color:var(--gold);border-color:var(--gold3);background:var(--panel2);transform:translateY(-1px)}
  .tbtn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tbtn.home{color:var(--gold);border-color:var(--gold3)}

  #view{position:fixed;top:60px;left:0;right:0;bottom:0;z-index:10;overflow-y:auto;overflow-x:hidden}
  .screen{animation:scIn .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes scIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  /* ══ OPS BOARD ══ */
  .board{position:relative;min-height:calc(100vh - 60px);padding:24px 3vw 40px}
  .board-h{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:4px}
  .board-h h1{margin:0;font-size:clamp(21px,3vw,31px);font-weight:800;letter-spacing:-.02em}
  .board-h .kick{font-family:var(--mono);font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
    margin-bottom:7px;display:flex;align-items:center;gap:9px}
  .board-h .kick::before{content:"";width:22px;height:1px;background:var(--gold)}
  .board-h p{margin:7px 0 0;color:var(--muted);font-size:12.5px;max-width:62ch;line-height:1.6}
  .release{display:flex;align-items:center;gap:13px;padding:11px 15px;border-radius:12px;
    background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line2);cursor:pointer;transition:.3s}
  .release.ready{border-color:var(--gold);box-shadow:0 0 0 1px rgba(240,182,74,.15),0 20px 46px -30px var(--goldGlow)}
  .release .rl{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .release .rv{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--faint);letter-spacing:.05em;margin-top:3px}
  .release.ready .rv{color:var(--gold)}
  .release canvas{width:40px;height:40px;flex:none}

  .board-grid{display:grid;grid-template-columns:1fr 420px 1fr;gap:15px;margin-top:20px;align-items:start}
  @media(max-width:1300px){.board-grid{grid-template-columns:1fr 1fr}.core{grid-column:1/-1;order:-1}}
  @media(max-width:800px){.board-grid{grid-template-columns:1fr}}
  .col{display:flex;flex-direction:column;gap:11px}
  .core{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line2);
    background:radial-gradient(120% 90% at 50% 12%,#1b1523,#09070d)}
  .core canvas{display:block;width:100%}
  .core .ctag{position:absolute;top:12px;left:14px;font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint)}
  .core .creg{position:absolute;bottom:12px;left:14px;font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.1em}
  .core .cstat{position:absolute;bottom:12px;right:14px;font-family:var(--mono);font-size:8.5px;color:var(--muted);
    letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .core .cstat::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 8px var(--gold);animation:blip 2s infinite}
  @keyframes blip{0%,100%{opacity:1}50%{opacity:.25}}

  .st{position:relative;display:flex;gap:11px;align-items:center;padding:12px 14px;border-radius:var(--r);
    background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);
    cursor:pointer;transition:transform .3s cubic-bezier(.2,.8,.2,1),border-color .3s,box-shadow .3s;overflow:hidden}
  .st::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--line2);transition:.3s}
  .st:hover{transform:translateX(3px);border-color:var(--line3)}
  .st.avail::before{background:var(--gold)}
  .st.avail:hover{border-color:var(--gold3);box-shadow:0 16px 38px -30px var(--goldGlow)}
  .st.done::before{background:var(--green)}
  .st.locked{opacity:.4;cursor:not-allowed}
  .st.locked:hover{transform:none}
  .st.star .t::after{content:"★";margin-left:6px;font-size:9px;color:var(--gold)}
  .st .mini{width:58px;height:44px;flex:none;border-radius:8px;overflow:hidden;background:#0a0810;border:1px solid var(--line)}
  .st .mini canvas{display:block;width:100%;height:100%}
  .st .body{flex:1;min-width:0}
  .st .n{font-family:var(--mono);font-size:8px;letter-spacing:.16em;color:var(--faint)}
  .st .t{font-size:13px;font-weight:700;margin-top:2px}
  .st .d{font-size:10px;color:var(--faint);margin-top:3px;line-height:1.35;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .st .led{width:9px;height:9px;border-radius:50%;flex:none;background:var(--line2);transition:.3s}
  .st.avail .led{background:var(--gold);box-shadow:0 0 10px var(--gold);animation:blip 2.4s infinite}
  .st.done .led{background:var(--green);box-shadow:0 0 8px rgba(62,224,143,.7)}

  /* ══ STATION ══ */
  .stn{padding:20px 3vw 96px;min-height:calc(100vh - 60px)}
  .stn-h{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:16px}
  .stn-h h2{margin:0;font-size:clamp(18px,2.6vw,26px);font-weight:800;letter-spacing:-.015em}
  .stn-h .kick{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);
    margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .stn-h .kick::before{content:"";width:18px;height:1px;background:var(--gold)}
  .stn-h p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.65;max-width:80ch}

  .g{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  .gA{grid-template-columns:1.15fr .85fr} .gB{grid-template-columns:.9fr 1.1fr} .gC{grid-template-columns:.78fr 1.22fr}
  @media(max-width:1150px){.g2,.g3,.gA,.gB,.gC{grid-template-columns:1fr}}
  .card{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:var(--r);padding:14px 16px;position:relative}
  .card.hl{border-color:var(--gold3)}
  .card h3{margin:0 0 3px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
  .card h3::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold);flex:none}
  .card .hint{color:var(--faint);font-size:10.5px;line-height:1.5;margin:0 0 10px}
  .lbl{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}

  .cv{position:relative;background:radial-gradient(120% 100% at 50% 0%,#181321,#0a0810);
    border:1px solid var(--line2);border-radius:var(--r);overflow:hidden}
  .cv canvas{display:block;width:100%}
  .cv .tag{position:absolute;top:10px;left:13px;font-family:var(--mono);font-size:8px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--faint);z-index:2}
  .cv .live{position:absolute;top:10px;right:13px;font-family:var(--mono);font-size:8px;color:var(--gold);
    display:flex;align-items:center;gap:5px;z-index:2;letter-spacing:.08em}
  .cv .live::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;
    box-shadow:0 0 7px currentColor;animation:blip 1.8s infinite}

  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:2px;gap:2px;flex-wrap:wrap}
  .seg button{color:var(--muted);font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:7px;transition:.16s}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--gold);color:#17110a;font-weight:700}
  .btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink);
    background:linear-gradient(180deg,#2e2739,var(--panel2));
    border:1px solid var(--line2);border-bottom-color:#15111c;border-radius:9px;padding:9px 14px;
    transition:transform .12s cubic-bezier(.3,1.5,.5,1), box-shadow .18s, border-color .18s, color .18s;
    box-shadow:0 2px 0 rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);position:relative}
  .btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1.5px);
    box-shadow:0 5px 16px -6px var(--goldGlow), inset 0 1px 0 rgba(255,255,255,.09)}
  .btn:active{transform:translateY(1px);box-shadow:0 0 0 rgba(0,0,0,0), inset 0 2px 5px rgba(0,0,0,.4)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.primary{background:linear-gradient(180deg,#f7cd7c,var(--gold) 55%,#d99a2c);color:#17110a;
    border-color:#c8912c;border-bottom-color:#9a6e18;font-weight:700;
    box-shadow:0 3px 0 #8a621a, 0 10px 24px -14px var(--goldGlow), inset 0 1px 0 rgba(255,255,255,.45)}
  .btn.primary:hover{transform:translateY(-1.5px);
    box-shadow:0 4px 0 #8a621a, 0 16px 34px -14px var(--goldGlow), inset 0 1px 0 rgba(255,255,255,.5);color:#17110a}
  .btn.primary:active{transform:translateY(2px);
    box-shadow:0 1px 0 #8a621a, inset 0 2px 6px rgba(0,0,0,.3)}
  .btn:disabled{background:var(--panel);color:var(--faint);border-color:var(--line);cursor:not-allowed;transform:none}
  .btn.danger{color:var(--red);border-color:rgba(255,84,112,.4)}
  .btn.danger:hover{background:rgba(255,84,112,.1);border-color:var(--red)}
  .btn.sm{padding:6px 10px;font-size:9.5px}
  .btnrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:3px;background:var(--line2);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--gold);cursor:pointer;box-shadow:0 0 0 4px rgba(240,182,74,.14)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:var(--gold);cursor:pointer}
  input[type=text]{background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:8px;
    padding:8px 10px;font-family:var(--mono);font-size:11.5px;width:100%;outline:none}
  input[type=text]:focus{border-color:var(--gold)}
  .ctl{margin:9px 0}
  .ctl label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-bottom:5px}
  .ctl label b{color:var(--gold);font-weight:700}

  .ro{display:grid;grid-template-columns:1fr auto;gap:0 12px;font-family:var(--mono);font-size:10.5px}
  .ro .k{color:var(--faint);padding:6px 0;border-bottom:1px solid var(--line)}
  .ro .v{color:var(--ink);padding:6px 0;border-bottom:1px solid var(--line);text-align:right;font-weight:600}
  .ro .v.g{color:var(--gold)} .ro .v.ok{color:var(--green)} .ro .v.bad{color:var(--red)} .ro .v.wr{color:var(--amber)}
  .ro .k.tot,.ro .v.tot{border-bottom:none;padding-top:9px;font-size:12.5px}
  .tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px}
  .tbl th{text-align:left;color:var(--faint);font-weight:500;font-size:8px;letter-spacing:.12em;text-transform:uppercase;
    padding:6px;border-bottom:1px solid var(--line2)}
  .tbl td{padding:6px;border-bottom:1px solid var(--line)}
  .tbl tr:hover td{background:rgba(240,182,74,.03)}
  .tbl td.neg{color:var(--red)} .tbl td.pos{color:var(--green)}

  .bdg{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;
    text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
  .bdg.ok{color:var(--green);border-color:rgba(62,224,143,.4);background:rgba(62,224,143,.07)}
  .bdg.bad{color:var(--red);border-color:rgba(255,84,112,.4);background:rgba(255,84,112,.07)}
  .bdg.warn{color:var(--amber);border-color:rgba(255,178,62,.4);background:rgba(255,178,62,.07)}
  .bdg.g{color:var(--gold);border-color:var(--gold3);background:rgba(240,182,74,.07)}

  .chk{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;
    margin-bottom:5px;cursor:pointer;transition:.18s;font-family:var(--mono);font-size:10.5px}
  .chk:hover{border-color:var(--gold3);background:rgba(240,182,74,.03);transform:translateX(2px)}
  .chk .bx{width:15px;height:15px;border-radius:4px;border:1px solid var(--line2);flex:none;display:grid;place-items:center;
    font-size:9px;color:transparent;transition:.18s}
  .chk.on{border-color:var(--gold3);background:rgba(240,182,74,.06)}
  .chk.on .bx{background:var(--gold);border-color:var(--gold);color:#17110a}
  .chk .nm{flex:1;color:var(--muted)} .chk.on .nm{color:var(--ink)}
  .chk .st2{font-size:8px;color:var(--faint);letter-spacing:.1em}
  .chk.on .st2{color:var(--green)}

  .steps{display:flex;gap:5px;margin-top:9px}
  .steps .s{flex:1;height:3px;border-radius:3px;background:var(--line);overflow:hidden;position:relative}
  .steps .s .f{position:absolute;inset:0;width:0;background:var(--gold);transition:width .35s;border-radius:3px}
  .steps .s.done .f{width:100%;background:var(--green)}
  .steps .s.act .f{width:100%;animation:shim 1.4s infinite}
  @keyframes shim{0%,100%{opacity:.5}50%{opacity:1}}

  .foot{position:fixed;left:0;right:0;bottom:0;height:62px;z-index:35;display:flex;align-items:center;
    justify-content:space-between;gap:12px;padding:0 3vw;
    background:linear-gradient(180deg,rgba(8,7,10,.5),rgba(8,7,10,.97));border-top:1px solid var(--line);backdrop-filter:blur(12px)}
  .foot .msg{font-family:var(--mono);font-size:10.5px;color:var(--muted);flex:1;line-height:1.4}
  .foot .msg b{color:var(--gold)}
  .foot.hide{display:none}

  .toasts{position:fixed;top:70px;right:16px;z-index:80;display:flex;flex-direction:column;gap:7px;align-items:flex-end}
  .toast{background:var(--panel2);border:1px solid var(--line2);border-left:3px solid var(--gold);border-radius:9px;
    padding:9px 13px;font-family:var(--mono);font-size:10.5px;color:var(--ink);max-width:340px;
    animation:tIn .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 14px 34px -18px rgba(0,0,0,.9)}
  .toast.bad{border-left-color:var(--red)} .toast.ok{border-left-color:var(--green)} .toast.warn{border-left-color:var(--amber)}
  @keyframes tIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

  .scrim{position:fixed;inset:0;z-index:90;background:rgba(5,4,7,.82);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .scrim.on{display:flex}
  .modal{width:min(94vw,620px);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line2);
    border-radius:16px;padding:24px;position:relative;animation:mIn .35s cubic-bezier(.2,.8,.2,1)}
  @keyframes mIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  .modal::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .modal h3{margin:0 0 8px;font-size:18px}
  .modal p{color:var(--muted);font-size:12.5px;line-height:1.65}
  .x{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;border:1px solid var(--line2);
    color:var(--muted);display:grid;place-items:center;font-size:12px}
  .x:hover{color:var(--ink)}

  /* ══ MOTION & DEPTH ══ */
  @keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
  .st{animation:cardIn .5s cubic-bezier(.2,.8,.2,1) backwards}
  .st:nth-child(1){animation-delay:.02s}.st:nth-child(2){animation-delay:.07s}
  .st:nth-child(3){animation-delay:.12s}.st:nth-child(4){animation-delay:.17s}
  .st:nth-child(5){animation-delay:.22s}
  .card,.cv{animation:cardIn .45s cubic-bezier(.2,.8,.2,1) backwards}
  .stn-h{animation:cardIn .4s cubic-bezier(.2,.8,.2,1) backwards}

  .st{position:relative;overflow:hidden}
  .st::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:.35s;
    background:radial-gradient(420px 120px at var(--mx,50%) var(--my,50%),rgba(240,182,74,.10),transparent 70%)}
  .st:not(.locked):hover::before{opacity:1}
  .st:not(.locked):hover{transform:translateY(-2px);border-color:rgba(240,182,74,.5)}
  .st.avail::after{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
    background:linear-gradient(180deg,transparent,var(--gold),transparent);
    animation:edgeGlow 2.4s ease-in-out infinite}
  @keyframes edgeGlow{0%,100%{opacity:.25}50%{opacity:.9}}

  .core{position:relative;overflow:hidden}
  .core::after{content:"";position:absolute;left:0;right:0;height:1px;top:0;
    background:linear-gradient(90deg,transparent,rgba(240,182,74,.55),transparent);
    animation:scan 5s cubic-bezier(.5,0,.5,1) infinite}
  @keyframes scan{0%{top:2%;opacity:0}12%{opacity:.9}88%{opacity:.9}100%{top:98%;opacity:0}}

  .btn{position:relative;overflow:hidden}
  .btn::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);
    transform:translateX(-100%)}
  .btn:hover::after{animation:sheen .6s ease}
  @keyframes sheen{to{transform:translateX(100%)}}
  .btn.primary:not(:disabled){animation:pBreathe 3s ease-in-out infinite}
  @keyframes pBreathe{0%,100%{box-shadow:0 8px 24px -10px var(--goldGlow)}
    50%{box-shadow:0 10px 34px -8px var(--goldGlow)}}

  .chip{transition:.25s}
  .chip.pop{animation:chipPop .45s cubic-bezier(.2,1.6,.4,1)}
  @keyframes chipPop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}

  .ro .v{transition:color .3s}
  .bdg{transition:.25s}
  .tbl tbody tr{transition:background .18s}
  .tbl tbody tr:hover{background:rgba(240,182,74,.06)}

  /* ══ ENGINE START PEDESTAL ══ */
  .ped{background:linear-gradient(180deg,#42424a,#2c2c33);border:1px solid #17171a;border-radius:8px;
    padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 14px 34px -20px #000}
  .pedT{font-family:var(--mono);font-size:7px;letter-spacing:.2em;color:#9a9aa6;text-align:center;margin-bottom:9px}
  /* ENG MODE rotary: three real detents */
  .modeSel{display:flex;gap:0;justify-content:center;margin-bottom:13px;
    background:#191a1d;border:1px solid #0d0d0f;border-radius:5px;padding:3px;box-shadow:inset 0 2px 5px rgba(0,0,0,.6)}
  .modeSel button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:3px;
    color:#9a9aa6;font-family:var(--mono);font-size:7.5px;letter-spacing:.06em;font-weight:700;transition:.12s;
    display:flex;flex-direction:column;align-items:center;gap:4px}
  .modeSel button .dt{width:5px;height:5px;border-radius:50%;background:#3a3a42;box-shadow:inset 0 0 2px #000}

  .modeSel button.on .dt{background:#3ee08f;box-shadow:0 0 7px #3ee08f}
  /* masters, side by side */
  .mstRow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mstCol{background:#212126;border:1px solid #131316;border-radius:6px;padding:9px 8px}
  .mstCol h5{margin:0 0 7px;font-family:var(--mono);font-size:7px;letter-spacing:.14em;
    color:#b6b6c0;text-align:center;font-weight:700}
  /* annunciator light stack */
  .ann{display:grid;grid-template-columns:1fr;gap:3px;margin-bottom:8px}
  .ann div{font-family:var(--mono);font-size:6px;letter-spacing:.06em;text-align:center;
    padding:3.5px 2px;border-radius:2px;background:#141416;color:rgba(255,255,255,.16);
    border:1px solid #0a0a0c;transition:.18s;font-weight:700}
  .ann div.lit{background:rgba(62,224,143,.9);color:#08210f;box-shadow:0 0 9px rgba(62,224,143,.55)}

  .ann div.red{background:rgba(255,84,112,.92);color:#2a0208;box-shadow:0 0 10px rgba(255,84,112,.6)}
  /* the master switch itself — guarded, throws with a click */
  .mstSw{width:100%;padding:0;background:#141416;border:1px solid #0a0a0c;border-radius:4px;
    height:54px;position:relative;cursor:pointer;overflow:hidden;transition:.15s}
  .mstSw:hover{border-color:#5a5a66}
  .mstSw .knb{position:absolute;left:50%;transform:translateX(-50%);width:20px;height:22px;border-radius:3px;
    background:linear-gradient(180deg,#d8d8de,#8a8a94);border:1px solid #0a0a0c;
    top:28px;transition:top .22s cubic-bezier(.4,1.6,.5,1);box-shadow:0 3px 6px rgba(0,0,0,.55)}
  .mstSw.on .knb{top:4px;background:linear-gradient(180deg,#8fe9bd,#3ee08f)}
  .mstSw .pos{position:absolute;left:0;right:0;font-family:var(--mono);font-size:5.5px;
    color:rgba(255,255,255,.35);text-align:center;letter-spacing:.1em}
  .mstSw .pos.u{top:2px} .mstSw .pos.d{bottom:2px}
  .mstSw.on .pos.u{color:#3ee08f}

  /* ══ MCDU — modelled on the real unit ══ */
  .mcdu{background:linear-gradient(180deg,#3a3a3d,#232326 12%,#1c1c1f);
    border:1px solid #45454a;border-radius:10px;padding:11px 11px 13px;
    box-shadow:0 26px 60px -30px #000, inset 0 1px 0 rgba(255,255,255,.10);max-width:340px}
  .mScr{position:relative;display:grid;grid-template-columns:30px 1fr 30px;gap:5px;align-items:stretch}
  /* the screen lives in the MIDDLE column — the keys flank it */
  .mScr canvas{grid-column:2;grid-row:1;width:100%;height:336px;display:block;border-radius:3px;
    border:2px solid #101012;background:#04120a;
    box-shadow:inset 0 0 34px rgba(0,0,0,.9), 0 0 20px rgba(62,224,143,.13)}
  /* line-select keys — wide, flat, hardware-grey, with the bar you actually press */

  .lsk.L{grid-column:1} .lsk.R{grid-column:3}
  .lsk button{width:30px;height:17px;border-radius:2px;
    background:linear-gradient(180deg,#4a4a50,#2e2e33);border:1px solid #17171a;

  .lsk button:hover{background:linear-gradient(180deg,#6a6a72,#45454c);color:#fff}
  .lsk button:active{transform:translateY(1px);border-bottom-width:1px;
    background:linear-gradient(180deg,#2e2e33,#4a4a50)}
  .lsk.L button::before{content:'';width:9px;height:2px;background:#8d8d96;border-radius:1px}
  .lsk.R button::after{content:'';width:9px;height:2px;background:#8d8d96;border-radius:1px}
  /* page keys */
  .mPg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:9px}

    background:linear-gradient(180deg,#4a4a50,#2c2c31);border:1px solid #17171a;border-bottom:2px solid #111;
    color:#c3c3ca;font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;font-weight:700;transition:.08s}
  .mPg button:hover{background:linear-gradient(180deg,#63636b,#3d3d43);color:#fff}
  .mPg button:active{transform:translateY(1px);border-bottom-width:1px}
  .mPg button.on{background:linear-gradient(180deg,#f0d08a,#d9a63c);color:#1a1408;
    border-color:#8a6a20;box-shadow:0 0 10px rgba(240,182,74,.35)}
  /* alpha-numeric keypad */
  .mKeys{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:7px}
  .mKeys button{aspect-ratio:1;border-radius:3px;
    background:linear-gradient(180deg,#46464c,#28282d);border:1px solid #151518;border-bottom:2px solid #0e0e10;
    color:#d2d2d8;font-family:var(--mono);font-size:8px;font-weight:700;transition:.07s;padding:0}
  .mKeys button:hover{background:linear-gradient(180deg,#5e5e67,#3a3a40);color:#fff}
  .mKeys button:active{transform:translateY(1px);border-bottom-width:1px;
    background:linear-gradient(180deg,#28282d,#46464c)}
  .mKeys button[data-k="CLR"]{font-size:6.5px;color:#ffb23e}
  .mKeys button[data-k="←"]{color:#ffb23e}
  .mcHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;
    font-family:var(--mono);font-size:7px;letter-spacing:.16em;color:#6e6e78}

  /* keyboard hint bar */
  #keybar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;gap:0;
    background:linear-gradient(180deg,rgba(8,7,10,0),rgba(8,7,10,.96) 42%);
    padding:20px 18px 9px;justify-content:center;flex-wrap:wrap;pointer-events:none}
  #keybar.on{display:flex}
  #keybar .kk{display:inline-flex;align-items:center;gap:5px;margin:0 7px;
    font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--muted);transition:.2s}
  #keybar .kk.dim{opacity:.30}
  #keybar kbd{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:16px;
    padding:0 4px;border-radius:4px;background:var(--panel2);border:1px solid var(--line2);
    border-bottom-width:2px;color:var(--gold);font-size:8.5px;font-weight:700;font-family:var(--mono)}
  .hrow{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:var(--muted)}
  .hrow kbd{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:18px;
    padding:0 5px;border-radius:4px;background:var(--panel2);border:1px solid var(--line2);
    border-bottom-width:2px;color:var(--gold);font-size:9px;font-family:var(--mono);flex-shrink:0}
  body{padding-bottom:34px}

  /* boot */
  #boot{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;
    justify-content:center;flex-direction:column;gap:16px;transition:opacity .7s .35s,visibility .7s .35s}
  #boot.gone{opacity:0;visibility:hidden}
  #boot canvas{width:150px;height:150px}
  #boot .bt{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--gold);text-transform:uppercase}
  #boot .bs{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;color:var(--faint);height:12px}
  #boot .bbar{width:190px;height:2px;background:var(--line2);border-radius:2px;overflow:hidden}
  #boot .bbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold2),var(--gold));
    transition:width .3s}

  /* ══ THE PAPER TRIM SHEET ══ */
  .modeSeg{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px}
  .modeSeg button{color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:7px 14px;
    border-radius:7px;transition:.2s;position:relative}
  .modeSeg button:hover{color:var(--ink)}
  .modeSeg button.off{opacity:.38;cursor:not-allowed}
  .modeSeg button.on{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#17110a;font-weight:700;
    box-shadow:0 6px 18px -8px var(--goldGlow)}

  .paper{background:#f7f4ea;color:#14120d;border-radius:10px;padding:0;overflow:hidden;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.85),0 0 0 1px rgba(240,182,74,.18);
    font-family:"Times New Roman",Georgia,serif;position:relative;animation:pIn .6s cubic-bezier(.2,.8,.2,1)}
  @keyframes pIn{from{opacity:0;transform:perspective(900px) rotateX(6deg) translateY(20px)}to{opacity:1;transform:none}}
  .paper::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.012) 0 1px,transparent 1px 3px)}
  .pHd{display:grid;grid-template-columns:150px 1fr 190px;border-bottom:1.5px solid #14120d}
  .pHd>div{padding:9px 11px;display:flex;align-items:center;justify-content:center;text-align:center}
  .pHd .brand{border-right:1px solid #14120d;flex-direction:column;gap:2px}
  .pHd .brand b{font-size:15px;letter-spacing:.02em;color:#0d2f6b;line-height:1;font-family:Georgia,serif;font-style:italic}
  .pHd .brand span{font-size:8px;letter-spacing:.14em;color:#b3202e;font-weight:700;font-family:Arial,sans-serif}
  .pHd .ttl{font-size:19px;letter-spacing:.02em;border-right:1px solid #14120d}
  .pHd .ac{flex-direction:column;font-size:9px;font-family:Arial,sans-serif;line-height:1.5}
  .pHd .ac b{font-size:11px}

  .pBody{padding:11px 13px 13px}
  .pGrid{display:grid;gap:9px}
  .pBox{border:1px solid #14120d;position:relative}
  .pBox>h5{margin:0;padding:4px 7px;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;
    font-family:Arial,sans-serif;font-weight:700;border-bottom:1px solid #14120d;text-align:center;background:#e8e3d4}
  .pBox .in{padding:7px}
  .pT{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:9px}
  .pT th,.pT td{border:1px solid #6d6656;padding:2.5px 5px;text-align:center;height:17px}
  .pT th{background:#e8e3d4;font-size:7.5px;letter-spacing:.06em;font-weight:700}
  .pT td.lab{text-align:left;background:#f0ecdf;font-weight:600;white-space:nowrap}
  .pT td.neg{background:#f6e9e9} .pT td.pos{background:#e9f2e9}
  .pT td.shade{background:#d9d4c4}
  .pT td .v{font-variant-numeric:tabular-nums;font-weight:700}
  .pT tr.tot td{background:#e8e3d4;font-weight:700}
  .pT td.hot{animation:cellPop .55s ease}
  @keyframes cellPop{0%{background:#ffe9b0}100%{}}
  /* interactive cells in WORK IT */
  .pT input.cell{width:100%;border:none;background:#fffdf5;font-family:Arial,sans-serif;font-size:10px;
    text-align:center;font-weight:700;outline:none;padding:2px 0;color:#14120d;
    box-shadow:inset 0 0 0 1.5px #c8b98a;border-radius:2px}

  .pT input.cell.bad{box-shadow:inset 0 0 0 2px #b3202e;background:#fbeaec;color:#8c1420;animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  .pFormula{font-family:"Times New Roman",serif;font-size:11px;text-align:center;padding:6px 0}

  .pFrac{display:inline-block;text-align:center;vertical-align:middle;margin:0 2px}
  .pFrac .n{border-bottom:1px solid #14120d;padding:0 5px;display:block;font-size:9.5px}
  .pFrac .d{padding:0 5px;display:block;font-size:9.5px}

    background:#faf6e8}
  .pCaution b{color:#b3202e}
  .pFoot{display:flex;justify-content:space-between;border-top:1px solid #14120d;padding:6px 11px;
    font-family:Arial,sans-serif;font-size:8px;color:#4a4437}
  .pCv{width:100%;display:block;background:#fffdf7;border:1px solid #14120d}
  .pStamp{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) rotate(-14deg);
    border:4px double #1a7a3c;color:#1a7a3c;font-family:Arial,sans-serif;font-weight:800;font-size:26px;
    letter-spacing:.14em;padding:8px 22px;opacity:0;pointer-events:none;border-radius:5px;z-index:5;
    background:rgba(233,247,238,.55)}
  .pStamp.on{animation:stampIn .5s cubic-bezier(.2,1.5,.4,1) forwards}
  .pStamp.rej{border-color:#b3202e;color:#b3202e;background:rgba(251,234,236,.55)}
  @keyframes stampIn{0%{opacity:0;transform:translate(-50%,-50%) rotate(-14deg) scale(2.6)}
    70%{opacity:1;transform:translate(-50%,-50%) rotate(-14deg) scale(.94)}
    100%{opacity:.92;transform:translate(-50%,-50%) rotate(-14deg) scale(1)}}
  .pHint{font-family:Arial,sans-serif;font-size:8px;color:#6d6656;padding:3px 0;line-height:1.45}
  .lookT{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:8px}
  .lookT th{background:#e8e3d4;border:1px solid #6d6656;padding:2px 3px;font-size:7px;letter-spacing:.05em}
  .lookT td{border:1px solid #9b9484;padding:1.5px 3px;text-align:center;font-variant-numeric:tabular-nums}

  .lookWrap{max-height:190px;overflow:auto;border:1px solid #6d6656}

  .doc{background:#faf8f2;color:#17140f;border-radius:9px;padding:18px 20px;font-family:var(--mono);font-size:10px;
    line-height:1.6;max-height:400px;overflow:auto}
  .doc h4{margin:0 0 3px;font-size:12.5px;letter-spacing:.1em}
  .doc .dl{border-bottom:1px dashed #b9ad93;margin:8px 0}
  .doc .r{display:flex;justify-content:space-between;gap:12px}
  .doc .r span:last-child{font-weight:700}
  .doc .sec{font-weight:700;letter-spacing:.14em;font-size:8px;color:#6b6250;margin:10px 0 4px;text-transform:uppercase}
</style>
</head>

<script>
/* ══════════════════════════════════════════════════════════════════════
   ODYSSEY · Flight Operations Simulator
   LOAD & TRIM is built on the real Nepal Airlines A320-233 LOAD and TRIM
   SHEET (Form A320_233_TRIMSHEET v1.0, 06-Jun-2024). The index formula,
   station H-arms, compartment limits, LMC index tables and fuel index
   table are taken from that document and verified against its own
   printed index-correction tables.
   ══════════════════════════════════════════════════════════════════════ */
const $=(s)=>document.querySelector(s), $$=(s)=>[...document.querySelectorAll(s)];
const fmt=(n)=>Math.round(n).toLocaleString('en-US');
const pad=(n,l=2)=>String(n).padStart(l,'0');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function nowZ(){const d=new Date();return pad(d.getUTCHours())+pad(d.getUTCMinutes())+"Z";}
function rrect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

const FLEET={
  A320:{

/* ───────── OPS MATH ───────── */
const OPS={
  idx:(w,arm,a)=> w*(arm-a.REF)/a.C,
  macFrom(W,I,a){ if(W<=0)return 0; const h=(I-a.K)*a.C/W + a.REF; return (h-a.LEMAC)/a.MAC*100; },
  idxAt(mac,W,a){ const h=a.LEMAC+mac/100*a.MAC; return (h-a.REF)*W/a.C + a.K; },
  /* read a printed column exactly as a load controller does: step down to the row at or below the value */
  readCol(tab,q){ let v=0; for(let i=0;i<tab.length;i++){ if(q>=tab[i][0]) v=tab[i][1]; else break; } return v; },
  /* fuel index straight off the printed density grid */
  readFuelGrid(a,fuel,dens){ const G=a.fuelGrid; if(!G) return OPS.fuelIndex(a,fuel);
    let col=G.dens.indexOf(dens); if(col<0) col=G.dens.indexOf(0.785); if(col<0) col=5;
    const R=G.rows; let v=R[0][col+1];
    for(let i=0;i<R.length;i++){ if(fuel>=R[i][0]) v=R[i][col+1]; else break; }
    return v; },
  fuelIndex(a,f){ const T=a.fuelIdx; if(f<=T[0][0])return T[0][1];
    for(let i=1;i<T.length;i++){ if(f<=T[i][0]){ const [w0,i0]=T[i-1],[w1,i1]=T[i];
      return i0+(i1-i0)*(f-w0)/((w1-w0)||1);} } return T[T.length-1][1]; },
  loadsheet(a,pax,holds,fuel){
    const doi=a.K+OPS.idx(a.dow,a.dowArm,a);
    let W=a.dow,I=doi; const zi={},hi={};
    for(const z in a.zones){ const w=(pax[z]||0)*a.paxWt; W+=w; zi[z]=OPS.idx(w,a.zones[z].arm,a); I+=zi[z]; }
    for(const h in a.holds){ const w=holds[h]||0; W+=w; hi[h]=OPS.idx(w,a.holds[h].arm,a); I+=hi[h]; }
    const zfw=W, zfwIdx=I, fIdx=OPS.fuelIndex(a,fuel);
    const tow=zfw+fuel, towIdx=zfwIdx+fIdx;
    return {doi,zfw,zfwIdx,zfwMac:OPS.macFrom(zfw,zfwIdx,a),tow,towIdx,towMac:OPS.macFrom(tow,towIdx,a),
      fIdx,zi,hi,paxN:Object.values(pax).reduce((s,v)=>s+(v||0),0),
      paxW:Object.values(pax).reduce((s,v)=>s+(v||0),0)*a.paxWt,
      cargoW:Object.values(holds).reduce((s,v)=>s+(v||0),0)};
  },
  inEnvelope(a,mac,w){ const t=w/1000,P=a.env; let ins=false;
    for(let i=0,j=P.length-1;i<P.length;j=i++){ const xi=P[i][0],yi=P[i][1],xj=P[j][0],yj=P[j][1];
      if(((yi>t)!==(yj>t)) && (mac < (xj-xi)*(t-yi)/((yj-yi)||1e-9)+xi)) ins=!ins; }
    return ins; },
  /* pitch trim is aircraft-specific — the A320 and A330 sheets print different scales */
  trim(mac,a){ if(a&&a.ths) return a.ths(mac);
    if(mac<=20)return 4.0; if(mac<=34)return +(4.0-(mac-20)*(4/14)).toFixed(1);
    if(mac<=40)return +(-(mac-34)*(2/6)).toFixed(1); return -2.0; },
  vspeeds(a,tow,flap,elev,temp,wind,cont){
    const wR=tow/a.mtow;
    const rho=1.225*Math.pow(1-2.25577e-5*elev,4.256)*(288.15/(273.15+temp));
    const sig=Math.max(.45,rho/1.225), fF={1:1.05,2:1.0,3:0.95}[flap]||1;
    /* V2 scales with √(W/MTOW): v2ref is this type's V2 at MTOW, ISA, sea level */
    const v0=Math.sqrt(wR/sig)*(a.v2ref||a.vref)*fF;
    const v2=Math.round(v0*0.98), vr=Math.round(v2*0.97), v1=Math.round(vr*0.965);
    let todr=(900+2050*Math.pow(wR,2.4))/sig*(1-wind*0.005)*(cont?1.28:1)*(flap===3?0.90:flap===1?1.10:1);
    if(a.cat==="H") todr*=1.45;
    return {v1,vr,v2,todr:Math.round(todr)};
  },
  flexTemp(a,len,todr,t){ const m=len-todr; if(m<400)return null;
    const f=Math.min(65,Math.round(t+m/90)); return f>t+2?f:null; },
  fuel(a,dist,altDist,extra,taxiMin){
    const gs=a.cruise.tas,b=a.cruise.burn;
    const trip=Math.round(dist/gs*b), cont=Math.round(trip*.05);
    const altn=Math.round(altDist/gs*b*1.15), fr=Math.round(b*.5), taxi=Math.round(b/60*taxiMin);
    return {trip,cont,altn,fr,taxi,extra,block:trip+cont+altn+fr+taxi+extra,min:trip+cont+altn+fr+taxi};
  },
  landing(a,ldw,flap,wind,wet,brake){
    const wR=ldw/a.mldw;
    let l=(700+1250*Math.pow(wR,2.1))*(1-wind*.004)*(wet?1.35:1)*(flap===4?.92:1);
    l*={LOW:1.18,MED:1.0,MAX:.86}[brake]||1;
    if(a.cat==="H") l*=1.45;
    return Math.round(l);
  }
};

let stopFns=[];

function anim(fn){ let alive=true,id=null;
  const loop=(t)=>{ if(!alive)return; try{fn(t);}catch(e){console.error(e);alive=false;return;} id=requestAnimationFrame(loop); };
  id=requestAnimationFrame(loop);
  stopFns.push(()=>{alive=false;if(id)cancelAnimationFrame(id);}); }
function fit(cv,h){ const r=cv.getBoundingClientRect(); const dpr=Math.min(2,devicePixelRatio||1);
  const H=h||r.height||150, W=r.width||300;
  cv.width=Math.max(1,W*dpr); cv.height=Math.max(1,H*dpr);
  const c=cv.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0);
  return {c,W,H}; }

/* ══════════════════════════════════════════════════════════════
   ANIMATED LOGOMARK — aircraft orbiting a gold meridian ring
   ══════════════════════════════════════════════════════════════ */
(function(){
  const cv=$('#logoCv'); let t=0;
  anim(()=>{
    const {c,W,H}=fit(cv,38); if(!W)return;
    t+=0.016;
    c.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2, R=W*0.36;
    // meridian ring (tilted ellipse)
    c.save(); c.translate(cx,cy); c.rotate(-0.35);
    c.strokeStyle='rgba(240,182,74,.28)'; c.lineWidth=1;
    c.beginPath(); c.ellipse(0,0,R,R*0.42,0,0,7); c.stroke();
    c.strokeStyle='rgba(240,182,74,.16)';
    c.beginPath(); c.ellipse(0,0,R*0.62,R*0.9,0,0,7); c.stroke();
    c.restore();
    // outer arc sweep
    c.strokeStyle='rgba(240,182,74,.55)'; c.lineWidth=1.6; c.lineCap='round';
    c.beginPath(); c.arc(cx,cy,R+3,t*0.9,t*0.9+1.5); c.stroke();
    c.strokeStyle='rgba(240,182,74,.2)';
    c.beginPath(); c.arc(cx,cy,R+3,t*0.9+Math.PI,t*0.9+Math.PI+0.8); c.stroke();
    // core dot
    const pl=0.85+0.15*Math.sin(t*2.4);
    c.fillStyle='rgba(240,182,74,'+(0.12*pl)+')'; c.beginPath(); c.arc(cx,cy,R*0.5,0,7); c.fill();
    c.fillStyle='#f0b64a'; c.beginPath(); c.arc(cx,cy,1.6,0,7); c.fill();
    // orbiting aircraft with trail
    const a0=t*1.25;
    for(let i=6;i>=0;i--){
      const aa=a0-i*0.10;
      const px=cx+Math.cos(aa)*R, py=cy+Math.sin(aa)*R*0.72;
      if(i===0){
        c.save(); c.translate(px,py); c.rotate(aa+Math.PI/2);
        c.fillStyle='#ffd98a';
        c.beginPath(); c.moveTo(0,-4.6); c.lineTo(3.4,3); c.lineTo(0,1.4); c.lineTo(-3.4,3); c.closePath(); c.fill();
        c.restore();
      } else {
        c.fillStyle='rgba(255,217,138,'+(0.30*(1-i/7))+')';
        c.beginPath(); c.arc(px,py,1.7*(1-i/9),0,7); c.fill();
      }
    }
  });
})();

/* ══ ambient starfield / vector drift ══ */
(function(){
  const cv=$('#bgfx'); let t=0;
  const P=Array.from({length:60},()=>({x:Math.random(),y:Math.random(),z:0.3+Math.random()*0.7,s:Math.random()*2}));
  anim(()=>{
    const r=cv.getBoundingClientRect(); const dpr=Math.min(2,devicePixelRatio||1);
    if(cv.width!==Math.floor(innerWidth*dpr)){ cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; }
    const c=cv.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0);
    const W=innerWidth,H=innerHeight;
    t+=0.0035;
    c.clearRect(0,0,W,H);
    // slow diagonal hairlines
    c.strokeStyle='rgba(58,50,71,.30)'; c.lineWidth=1;
    for(let i=-2;i<14;i++){ const x=(i*140 + (t*40)%140);
      c.beginPath(); c.moveTo(x,0); c.lineTo(x-H*0.32,H); c.stroke(); }
    // drifting particles
    P.forEach(p=>{
      const px=((p.x + t*0.02*p.z)%1)*W, py=((p.y + t*0.008*p.z)%1)*H;
      c.fillStyle='rgba(240,182,74,'+(0.05+0.07*p.z)+')';
      c.fillRect(px,py,p.s*p.z,p.s*p.z);
    });
  });
})();

function board(el){
  const a=FLEET[F.type];
  const ready=releaseReady();
  const doneN=SKEYS.filter(k=>STN[k].ok()).length;
  el.innerHTML=`
  <div class="board">
    <div class="board-h">
      <div>
        <div class="kick">Operations Board</div>
        <h1>${F.callsign?F.callsign:'Flight not yet identified'}</h1>
        <p>Every workstation, live. Work them in whatever order you like — the board tracks what's unlocked, what's done, and what's still holding up the release.</p>
      </div>
      <div class="release ${ready?'ready':''}" id="relBox">
        <canvas id="relRing"></canvas>
        <div>
          <div class="rl">Dispatch release</div>
          <div class="rv">${ready?'READY TO GO':doneN+' / '+SKEYS.length+' STATIONS'}</div>
        </div>
      </div>
    </div>

    <div class="board-grid">
      <div class="col" id="colL"></div>
      <div class="core">
        <span class="ctag">Aircraft · live state</span>
        <canvas id="coreCv" height="430"></canvas>
        <span class="creg">${a.reg} · ${a.variant}</span>
        <span class="cstat" id="coreStat">On stand</span>
      </div>
      <div class="col" id="colR"></div>
    </div>
  </div>`;

  // station cards
  const mk=(k)=>{
    const s=STN[k], st=stnState(k);
    const d=document.createElement('div');
    d.className='st '+st+(s.star?' star':'');
    d.innerHTML=`<span class="mini"><canvas></canvas></span>
      <span class="body"><span class="n">${s.n}</span><div class="t">${s.t}</div><div class="d">${s.d}</div></span>
      <span class="led"></span>`;
    d.onclick=()=>{ if(st==='locked'){ const miss=s.req().filter(r=>!STN[r].ok()).map(r=>STN[r].t);
      toast("Locked — first complete: "+miss.join(' · '),"warn"); return; } go(k); };
    // mini preview animation
    const mcv=d.querySelector('canvas');
    if(s.mini) s.mini(mcv,st);
    return d;
  };
  SKEYS.forEach(k=>{ const col=STN[k].col===0?'#colL':'#colR'; $(col).appendChild(mk(k)); });

  // release ring
  (function(){
    const cv=$('#relRing'); let t=0;
    anim(()=>{ const {c,W,H}=fit(cv,40); if(!W)return; t+=0.02;
      c.clearRect(0,0,W,H);
      const cx=W/2,cy=H/2,R=W*0.36;
      c.strokeStyle='rgba(58,50,71,.9)'; c.lineWidth=3;
      c.beginPath(); c.arc(cx,cy,R,0,7); c.stroke();
      const f=doneN/SKEYS.length;
      c.strokeStyle=ready?'#f0b64a':'#6a6377'; c.lineWidth=3; c.lineCap='round';
      c.beginPath(); c.arc(cx,cy,R,-Math.PI/2,-Math.PI/2+7*f/1.0*0.9); c.stroke();
      if(ready){ c.strokeStyle='rgba(240,182,74,'+(0.3+0.3*Math.sin(t*3))+')'; c.lineWidth=6;
        c.beginPath(); c.arc(cx,cy,R,0,7); c.stroke();
        c.fillStyle='#f0b64a'; c.font='bold 11px ui-monospace'; c.textAlign='center';
        c.fillText('GO',cx,cy+4); c.textAlign='left'; }
      else { c.fillStyle='#6a6377'; c.font='bold 10px ui-monospace'; c.textAlign='center';
        c.fillText(Math.round(f*100)+'%',cx,cy+3.5); c.textAlign='left'; }
    });
  })();
  $('#relBox').onclick=()=>{
    if(!ready){ const miss=["crew","disp","load","perf","ramp","prep"].filter(k=>!STN[k].ok()).map(k=>STN[k].t);
      toast("Release blocked — outstanding: "+miss.join(' · '),"warn"); return; }
    if(STN.turn.ok()) go('fly'); else go('turn');
  };

  // ── the central aircraft: live, reacting to state ──
  coreAircraft();
  keys([...globalKeys(),
    ['enter','Open next station',()=>{ const nxt=SKEYS.find(k=>stnState(k)==='avail');
      if(nxt) go(nxt); else toast("Nothing available — check the board.","warn"); }],
    ['r','Dispatch release',()=>$('#relBox').click(), {live:()=>releaseReady()}]
  ]);
  foot(null);
}

/* ══ mini previews on the board cards ══ */
function miniBase(cv,st,draw){
  let t=0;
  anim(()=>{ const {c,W,H}=fit(cv,44); if(!W)return; t+=0.02;
    c.clearRect(0,0,W,H);
    c.fillStyle=st==='locked'?'#0a0810':'#0c0912'; c.fillRect(0,0,W,H);
    draw(c,W,H,t,st);
  });
}
const MC={done:'#3ee08f',avail:'#f0b64a',locked:'#4d4260'};
function mCrew(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.strokeStyle=col;c.lineWidth=1.2;
  c.beginPath();c.arc(W/2,H*0.36,5,0,7);c.stroke();
  c.beginPath();c.arc(W/2,H*0.92,10,Math.PI,0);c.stroke();
  c.globalAlpha=.35+.3*Math.sin(t*2);c.beginPath();c.arc(W/2,H*0.36,8,0,7);c.stroke();c.globalAlpha=1; }); }
function mDisp(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.strokeStyle=col;c.lineWidth=1.2;
  c.beginPath();c.moveTo(6,H-9);c.quadraticCurveTo(W/2,4,W-6,H-9);c.stroke();
  const p=(t*0.35)%1; const px=6+(W-12)*p, py=(H-9)-Math.sin(p*Math.PI)*(H-20);
  c.fillStyle=col;c.beginPath();c.arc(px,py,2.2,0,7);c.fill();
  c.fillStyle=col;c.globalAlpha=.6;c.fillRect(5,H-11,3,3);c.fillRect(W-8,H-11,3,3);c.globalAlpha=1; }); }
function mLoad(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  // envelope + dot
  c.strokeStyle=col;c.lineWidth=1;c.globalAlpha=.55;
  c.beginPath();c.moveTo(9,H-7);c.lineTo(13,9);c.lineTo(W-11,7);c.lineTo(W-8,H-7);c.closePath();c.stroke();c.globalAlpha=1;
  const mac=F.ls?clamp((F.ls.towMac-14)/26,0,1):0.5+0.24*Math.sin(t);
  const wf=F.ls?clamp((F.ls.tow/1000-38)/42,0,1):0.5;
  const px=10+(W-20)*mac, py=(H-8)-(H-16)*wf;
  const bad=F.ls&&!F.lsOk;
  c.fillStyle=bad?'#ff5470':col;
  c.globalAlpha=.3;c.beginPath();c.arc(px,py,5,0,7);c.fill();c.globalAlpha=1;
  c.beginPath();c.arc(px,py,2.4,0,7);c.fill(); }); }
function mPerf(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.fillStyle='rgba(120,110,140,.25)';c.fillRect(5,H/2-5,W-10,10);
  const p=(t*0.5)%1;
  c.fillStyle=col;c.fillRect(5,H/2-5,(W-10)*0.66,10);
  c.fillStyle='#ffd98a';
  const px=5+(W-10)*0.66*p;
  c.beginPath();c.moveTo(px+4,H/2);c.lineTo(px-3,H/2+3);c.lineTo(px-1,H/2);c.lineTo(px-3,H/2-3);c.closePath();c.fill();
  c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(5+(W-10)*0.66,H/2-8);c.lineTo(5+(W-10)*0.66,H/2+8);c.stroke(); }); }
function mRamp(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.strokeStyle=col;c.lineWidth=1;
  c.beginPath();c.moveTo(W/2,6);c.lineTo(W/2,H-6);c.moveTo(8,H*0.55);c.lineTo(W-8,H*0.55);c.stroke();
  // danger arc pulse
  const r=6+((t*10)%12);
  c.globalAlpha=Math.max(0,1-((t*10)%12)/12)*0.7;
  c.strokeStyle='#ff5470';c.beginPath();c.arc(W*0.30,H*0.62,r,0,7);c.stroke();
  c.beginPath();c.arc(W*0.70,H*0.62,r,0,7);c.stroke();c.globalAlpha=1; }); }
function mPrep(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.fillStyle='#050805';c.fillRect(4,4,W-8,H-8);
  c.fillStyle=col;c.font='6px ui-monospace';
  const n=Object.values(F.fmc||{}).filter(Boolean).length;
  for(let i=0;i<4;i++){ c.globalAlpha=i<n?1:.28; c.fillRect(7,8+i*8,W-24,2.4); }
  c.globalAlpha=(Math.sin(t*4)>0)?1:.2; c.fillRect(W-14,8+Math.min(3,n)*8,4,2.4); c.globalAlpha=1; }); }
function mTurn(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  const P=F.turn.prog||{};
  ['fuel','cater','board','load'].forEach((k,i)=>{
    const y=7+i*8.4;
    c.fillStyle='rgba(120,110,140,.25)';c.fillRect(6,y,W-12,3);
    const p=(P[k]||0)/100;
    c.fillStyle=col;c.fillRect(6,y,(W-12)*p,3);
  }); }); }
function mFly(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  c.strokeStyle='rgba(120,110,140,.4)';c.lineWidth=1;
  c.beginPath();c.moveTo(0,H*0.62);c.lineTo(W,H*0.62);c.stroke();
  const p=(t*0.3)%1;
  const px=W*p, py=H*0.62-Math.sin(p*Math.PI)*(H*0.42);
  c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();
  for(let i=0;i<=20;i++){const q=i/20*p;const qx=W*q,qy=H*0.62-Math.sin(q*Math.PI)*(H*0.42);
    i?c.lineTo(qx,qy):c.moveTo(qx,qy);}c.stroke();
  c.save();c.translate(px,py);c.rotate(-Math.cos(p*Math.PI)*0.6);
  c.fillStyle='#ffd98a';c.beginPath();c.moveTo(5,0);c.lineTo(-4,3);c.lineTo(-2,0);c.lineTo(-4,-3);c.closePath();c.fill();c.restore(); }); }
function mBrief(cv,st){ miniBase(cv,st,(c,W,H,t)=>{ const col=MC[st];
  const bars=[0.55,0.8,0.65,0.9];
  bars.forEach((b,i)=>{ const x=8+i*((W-16)/4); const h=(H-14)*b*(st==='done'?1:0.55+0.1*Math.sin(t*2+i));
    c.fillStyle=col;c.globalAlpha=.35+.4*b;c.fillRect(x,H-7-h,(W-16)/4-4,h);c.globalAlpha=1; }); }); }

/* central animated aircraft on the board */
function coreAircraft(){
  const cv=$('#coreCv'); if(!cv) return;
  const a=FLEET[F.type];
  let t=0;
  const stat=$('#coreStat');
  anim(()=>{
    const {c,W,H}=fit(cv,430); if(!W) return;
    t+=0.016;
    c.clearRect(0,0,W,H);
    const cx=W/2, cy=H*0.52;
    const L=Math.min(H*0.78, W*0.62);   // fuselage length
    const scale=L/44;                   // metres → px (A320 ~37.6m)

    // ---- stand markings ----
    c.strokeStyle='rgba(58,50,71,.5)'; c.lineWidth=1;
    for(let r=60;r<Math.max(W,H);r+=48){ c.beginPath(); c.arc(cx,cy,r,0,7); c.stroke(); }
    // radar sweep
    const sw=t*0.55;
    const g=c.createConicGradient?c.createConicGradient(sw,cx,cy):null;
    if(g){ g.addColorStop(0,'rgba(240,182,74,.10)'); g.addColorStop(0.06,'rgba(240,182,74,0)');
      g.addColorStop(1,'rgba(240,182,74,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(W,H),0,7); c.fill(); }

    // ---- the ACTUAL top-down aircraft for this type ----
    const A=drawAcTop(c,F.type,cx,cy,L,{engRun:F.eng.started,t});
    const nose=A.nose, tail=A.tail, G=geo(F.type);

    // ---- LOAD OVERLAY: cabin zones + holds, filled by actual load ----
    if(F.ls){
      const zoneY={};
      Object.keys(G.zoneY).forEach(k=>zoneY[k]=[nose+L*G.zoneY[k][0], nose+L*G.zoneY[k][1]]);
      Object.keys(a.zones).forEach(z=>{
        if(!zoneY[z])return;
        const [y0,y1]=zoneY[z];
        const frac=clamp((F.pax[z]||0)/a.zones[z].seats,0,1);
        const h=(y1-y0);
        const zw=A.bw*1.5;
        c.fillStyle='rgba(107,183,255,.10)'; c.fillRect(cx-zw/2,y0,zw,h);
        c.fillStyle='rgba(107,183,255,'+(0.20+0.35*frac)+')';
        c.fillRect(cx-zw/2,y0,zw,h*frac);
        c.strokeStyle='rgba(107,183,255,.45)'; c.lineWidth=.8;
        c.strokeRect(cx-zw/2,y0,zw,h);
        c.fillStyle='rgba(246,241,232,.9)'; c.font='bold 8px ui-monospace'; c.textAlign='center';
        if(h>17) c.fillText(z+' '+(F.pax[z]||0),cx,y0+h/2+3);
        c.textAlign='left';
      });
      // holds as amber bars beside the fuselage — from this type's own layout
      const holdY={};
      Object.keys(G.holdY).forEach(k=>holdY[k]=[nose+L*G.holdY[k][0], nose+L*G.holdY[k][1]]);
      Object.keys(a.holds).forEach(hk=>{
        if(!holdY[hk])return;
        const [y0,y1]=holdY[hk]; const hh=y1-y0;
        const frac=clamp((F.holds[hk]||0)/a.holds[hk].max,0,1);
        const bx=cx+A.bw+7;
        c.fillStyle='rgba(240,182,74,.10)'; c.fillRect(bx,y0,10,hh);
        c.fillStyle='rgba(240,182,74,'+(0.25+0.45*frac)+')'; c.fillRect(bx,y1-hh*frac,10,hh*frac);
        c.strokeStyle='rgba(240,182,74,.4)'; c.lineWidth=.8; c.strokeRect(bx,y0,10,hh);
        if(hh>13){ c.fillStyle='rgba(164,154,143,.9)'; c.font='7px ui-monospace';
          c.fillText(hk.replace('CPT',''),bx+13,y0+hh/2+2.5); }
      });
      // CG marker travelling along the fuselage
      const mac=F.ls.towMac;
      const hArm=a.LEMAC+mac/100*a.MAC;             // metres from datum
      const yCG=clamp(nose + (hArm/44)*L*1.02, nose+8, tail-8);
      const ok=F.lsOk;
      c.strokeStyle=ok?'#f0b64a':'#ff5470'; c.lineWidth=1.4; c.setLineDash([4,3]);
      c.beginPath(); c.moveTo(cx-W*0.22,yCG); c.lineTo(cx+W*0.22,yCG); c.stroke(); c.setLineDash([]);
      const pr=5+Math.sin(t*3)*1.2;
      c.fillStyle=ok?'#f0b64a':'#ff5470';
      c.globalAlpha=.2; c.beginPath(); c.arc(cx,yCG,pr+8,0,7); c.fill(); c.globalAlpha=1;
      c.beginPath(); c.arc(cx,yCG,pr,0,7); c.fill();
      // CG label sits in the LEFT gutter, clear of the hold bars on the right
      c.fillStyle=ok?'#ffd98a':'#ff5470'; c.font='bold 9px ui-monospace'; c.textAlign='right';
      c.fillText('CG '+mac.toFixed(1)+'%',cx-W*0.235,yCG+3); c.textAlign='left';
    }

    // ---- bottom status strip: single line, no stacking ----
    const strip=[];
    if(F.ls&&!F.lsOk) strip.push(['OUT OF ENVELOPE','#ff5470']);
    if(F.ramp.found&&F.ramp.found.length) strip.push(['✓ '+F.ramp.found.length+' defect(s) rectified','#3ee08f']);
    if(F.perfCorr&&F.ls&&F.lsOk) strip.push(['FWD CG PERF CORR','#ffb23e']);
    if(strip.length){
      c.font='8px ui-monospace';
      const gap=14;
      let tw=0; strip.forEach(([t2])=>tw+=c.measureText(t2).width+gap);
      let sx=cx-(tw-gap)/2;
      c.fillStyle='rgba(8,7,10,.72)';
      rrect(c,sx-10,H-26,tw-gap+20,17,8); c.fill();
      strip.forEach(([t2,col])=>{ c.fillStyle=col; c.fillText(t2,sx,H-14); sx+=c.measureText(t2).width+gap; });
    }

    // status label
    if(stat){
      let s='On stand';
      if(F.flyDone) s='Flight complete';
      else if(F.eng.started) s='Engines running';
      else if(F.lsSigned&&F.perfAccepted) s='Loaded · ready';
      else if(F.route) s='Planning';
      stat.textContent=s;
    }
  });
}

function sCrew(el){
  el.innerHTML=`

    <p>Identify the flight and choose the metal. The aircraft type drives everything downstream — its weights, its certified CG envelope, and the index arithmetic on the trim sheet.</p></div></div>
  <div class="g gA">

      <div class="ctl"><div class="lbl">Quick pick</div>
        <div class="seg" id="csQ">${["RNA217","RNA411","AIC573","IGO2041"].map(x=>`<button data-v="${x}">${x}</button>`).join('')}</div></div>
      <div class="ctl"><div class="lbl">Fleet</div>

    </div>
    <div>
      <div class="cv" style="margin-bottom:12px"><span class="tag">Selected aircraft</span><span class="live">FLEET</span>

        <h3>Career</h3>
        <div class="ro">
          <span class="k">Flights</span><span class="v g">${CAREER.flights}</span>
          <span class="k">Block hours</span><span class="v">${(CAREER.hours||0).toFixed(1)}h</span>
          <span class="k">Best score</span><span class="v g">${CAREER.best||0}</span>
          <span class="k">Avg safety index</span><span class="v ${(CAREER.safety||100)>=85?'ok':'wr'}">${Math.round(CAREER.safety||100)}%</span>
        </div>

      <span class="k">Registration</span><span class="v">${a.reg}</span>

      <span class="k">Wake category</span><span class="v">${a.cat==='H'?'HEAVY':'MEDIUM'}</span>
      <span class="k">MTOW / MZFW / MLW</span><span class="v">${fmt(a.mtow)} / ${fmt(a.mzfw)} / ${fmt(a.mldw)}</span>
      <span class="k">MAC / LEMAC</span><span class="v">${a.MAC} m @ ${a.LEMAC} m</span>
      <span class="k">Index datum (REF)</span><span class="v">${a.REF} m · C=${a.C} · K=${a.K}</span>
    </div>
    <div style="margin-top:9px">${a.real?'<span class="bdg g">◆ REAL AIRLINE TRIM SHEET DATA</span>':'<span class="bdg">Representative data</span>'}</div>
    <div class="hint" style="margin-top:8px">${a.source}</div>`; };
  info();
  keys([...globalKeys(),
    ['tab','Next fleet',()=>{ const ks=Object.keys(FLEET); const i=ks.indexOf(F.type);
      const b=$$('#acSeg button')[(i+1)%ks.length]; b.click(); }]
  ]);
  $('#csIn').oninput=e=>{ F.callsign=e.target.value.toUpperCase(); e.target.value=F.callsign; renderHUD(); };
  $$('#csQ button').forEach(b=>b.onclick=()=>{ F.callsign=b.dataset.v; $('#csIn').value=F.callsign; renderHUD();
    toast("Callsign "+F.callsign,"ok"); });
  $$('#acSeg button').forEach(b=>b.onclick=()=>{ F.type=b.dataset.v;
    $$('#acSeg button').forEach(x=>x.classList.toggle('on',x===b));
    F.route=null;F.block=0;F.perf=null;F.perfAccepted=false;resetLoad(); info(); renderHUD();
    toast(FLEET[F.type].name+" selected","ok"); });
  // aircraft preview — the ACTUAL silhouette for this type
  (function(){ const cv=$('#acCv'); let t=0;
    anim(()=>{ const {c,W,H}=fit(cv,190); if(!W)return; t+=0.014;
      const a=FLEET[F.type], g=geo(F.type), M=acMetrics(F.type);

      const gy2=y+L*M.down+7;
      c.strokeStyle='rgba(106,99,119,.55)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(x,gy2); c.lineTo(x+L,gy2); c.stroke();

      c.fillStyle='rgba(240,182,74,.95)'; c.font='9px ui-monospace'; c.textAlign='center';
      c.fillText(a.reg+'  ·  '+g.len.toFixed(1)+' m long  ·  '+g.span.toFixed(1)+' m span  ·  '+g.height.toFixed(1)+' m tall',
        W/2, H-11);
      c.fillStyle='rgba(106,99,119,.95)'; c.font='7.5px ui-monospace';
      c.fillText(g.nEng+' × '+g.engType+'  ·  '+g.bogie+'-wheel mains  ·  '+

/* shared: recompute the loadsheet from current state */
function calcLoad(a){
  const fuel=F.block||0;
  const ls=OPS.loadsheet(a,F.pax,F.holds,fuel); F.ls=ls;
  const limZ=ls.zfw<=a.mzfw, limT=ls.tow<=a.mtow;
  const ldw=ls.tow-(F.fuelCalc?F.fuelCalc.trip:0); F.ldw=ldw;
  const limL=ldw<=a.mldw;
  let pairOk=true;
  F.pairInfo=[];
  const PRS = a.pairs || (a.pairMax?[{ks:a.pairMax.ks,max:a.pairMax.max,name:"CPT 3+4 combined"}]:[]);
  PRS.forEach(p=>{ const sum=p.ks.reduce((t,k)=>t+(F.holds[k]||0),0);
    const ok=sum<=p.max; if(!ok) pairOk=false;
    F.pairInfo.push({name:p.name,sum,max:p.max,ok}); });
  F.pairSum=F.pairInfo.length?F.pairInfo[0].sum:0;
  const inEnv=OPS.inEnvelope(a,ls.towMac,ls.tow), zEnv=OPS.inEnvelope(a,ls.zfwMac,ls.zfw);
  F.lsOk=limZ&&limT&&limL&&inEnv&&zEnv&&pairOk&&ls.paxN>0;
  F.trim=OPS.trim(ls.towMac,a);
  F.perfCorr = a.fwdPerf!=null && ls.towMac<a.fwdPerf;
  F.limFlags={limZ,limT,limL,inEnv,zEnv,pairOk};
  renderHUD();
  return ls;
}

/* ── shared actions ── */
function signLoadsheet(a){
  calcLoad(a);
  if(!F.ls||F.ls.paxN===0){ toast("No passengers loaded.","bad"); return false; }
  if(!F.lsOk){ toast("REJECTED — outside limits. Redistribute the load.","bad");
    F.score.safety-=8; F.score.events.push("Loadsheet rejected (outside limits)"); renderHUD(); return false; }
  F.lsSigned=true; F.perfAccepted=false; F.perf=null;
  toast("Loadsheet signed. TOW "+fmt(F.ls.tow)+" kg · "+F.ls.towMac.toFixed(1)+" %MAC · THS "+F.trim.toFixed(1),"ok");
  return true;
}
function autoTrim(a){
  /* aim for a sensible operational CG: just aft of the sheet's caution line if it has one,
     otherwise the middle of the certified envelope for this aircraft.                      */
  const macs=a.env.map(p=>p[0]);
  const tgtMac = a.fwdPerf!=null ? a.fwdPerf+5
    : +(((Math.min(...macs)+Math.max(...macs))/2)).toFixed(1);
  const load=Math.round(a.seats*0.84);
  const tot=Object.values(a.zones).reduce((s,z)=>s+z.seats,0);
  Object.keys(a.zones).forEach(z=>F.pax[z]=Math.round(load*a.zones[z].seats/tot));
  const bag=Math.round(load*13), hk=Object.keys(a.holds);
  let best=null;
  for(let st=0;st<=10;st++){
    const H={}; hk.forEach(k=>H[k]=0);
    H[hk[0]]=Math.min(a.holds[hk[0]].max,Math.round(bag*st/10));
    let rem=bag-H[hk[0]];
    hk.slice(1).forEach(k=>{ H[k]=Math.min(a.holds[k].max,Math.round(rem/(hk.length-1))); });
    const ls=OPS.loadsheet(a,F.pax,H,F.block||0);
    if(OPS.inEnvelope(a,ls.towMac,ls.tow)&&ls.zfw<=a.mzfw&&ls.tow<=a.mtow){
      const d=Math.abs(ls.towMac-tgtMac);
      if(!best||d<best.d) best={H,d,mac:ls.towMac};
    }
  }
  if(best){ F.holds=best.H; F.lsSigned=false; go('load');
    toast("Auto-trimmed to "+best.mac.toFixed(1)+" %MAC — inside the envelope.","ok"); }
  else toast("No legal trim found at this fuel/pax load.","bad");
}
function doLMC(a){
  const zs=Object.keys(a.zones), z=zs[Math.floor(Math.random()*zs.length)];
  const d=Math.random()>.5?1:-1, n=1+Math.floor(Math.random()*5);
  const b4=F.pax[z]||0; F.pax[z]=clamp(b4+d*n,0,a.zones[z].seats);
  const act=F.pax[z]-b4;
  if(!act){ toast("No LMC possible in that zone.","warn"); return; }
  const di=(act*a.lmcPax[z]).toFixed(2);
  F.lmc.push(`${act>0?'+':''}${act} pax ${z} · Δidx ${di>0?'+':''}${di}`);
  F.lsSigned=false; go('load');
  toast(`LAST MINUTE CHANGE: ${act>0?'+':''}${act} pax in ${z}. Index shift ${di>0?'+':''}${di}. Recompute and re-sign.`,"warn");
}

/* ══════════════════════════════════════════════════════════════
   KEYBOARD COMMAND LAYER
   Every station registers its own bindings; a hint bar shows what's
   live. Fly the whole rotation without touching the mouse.
   ══════════════════════════════════════════════════════════════ */
const KB={ map:{}, hints:[], enabled:true };
function keys(defs){          // defs: [[key, label, fn, opts]]
  KB.map={}; KB.hints=[];
  defs.forEach(([k,label,fn,o])=>{
    (Array.isArray(k)?k:[k]).forEach(kk=>{ KB.map[kk.toLowerCase()]={fn,label,o:o||{}}; });
    if(label) KB.hints.push({k:Array.isArray(k)?k[0]:k,label,o:o||{}});
  });
  renderKeyBar();
}
function renderKeyBar(){
  const bar=$('#keybar'); if(!bar) return;
  if(!KB.enabled||!KB.hints.length){ bar.classList.remove('on'); bar.innerHTML=''; return; }
  bar.classList.add('on');
  bar.innerHTML=KB.hints.map(h=>{
    const live = h.o.live ? h.o.live() : true;
    const disp = ({' ':'SPACE',arrowup:'↑',arrowdown:'↓',arrowleft:'←',arrowright:'→',
      enter:'⏎',escape:'ESC',backspace:'⌫'})[h.k.toLowerCase()] || h.k.toUpperCase();
    return `<span class="kk ${live?'':'dim'}"><kbd>${disp}</kbd>${h.label}</span>`;
  }).join('');
}
addEventListener('keydown',e=>{
  if(!KB.enabled) return;
  const tag=(e.target.tagName||'').toLowerCase();
  const typing = tag==='input'||tag==='textarea'||e.target.isContentEditable;
  // MCDU has its own capture; plain inputs must keep normal typing
  if(typing && !e.target.dataset.mcdu) {
    if(e.key==='Escape') e.target.blur();
    return;
  }
  const k=e.key.toLowerCase();
  // global first
  if(k==='escape'){ const sc=$('#scrim'); if(sc&&sc.classList.contains('on')){ closeModal(); e.preventDefault(); return; } }
  if(k==='?'||(k==='/'&&e.shiftKey)){ keyHelp(); e.preventDefault(); return; }
  const b=KB.map[k];
  if(b){ if(b.o.live && !b.o.live()){ toast(b.o.why?b.o.why():"Not available yet.","warn"); }
    else b.fn(e);
    e.preventDefault(); renderKeyBar(); }
});
function keyHelp(){
  const rows=(g)=>g.map(([k,d])=>`<div class="hrow"><kbd>${k}</kbd><span>${d}</span></div>`).join('');
  modal(`<h3>Keyboard</h3>
